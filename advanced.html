 who really need help often face long waiting lists.</em>"},{"name":"Environment & climate","q":["What can individuals do about climate change?","Is recycling enough?","Should governments ban plastic bags?","Are electric cars the answer?"],"chunks":["carbon footprint","climate emergency","renewable energy","cut greenhouse gas emissions","go green","single-use plastic","sustainable lifestyle","greenwashing","fossil fuels","tipping point","drive electric","do one's bit","at the expense of future generations","face the music"],"model":"<em>I'm a strong advocate of individual action, even though I know it won't fix the climate crisis on its own. We need governments to crack down on fossil fuels and big polluters. But I also think there's a case for everyone doing their bit — cutting back on flights, eating less meat, switching to renewable energy at home. Each small step pushes the needle.</em>"},{"name":"Travel & tourism","q":["Has tourism gone too far?","What makes a holiday memorable?","Would you prefer to live abroad permanently?","Is travelling alone a good idea?"],"chunks":["off the beaten track","go sightseeing","get away from it all","broaden one's horizons","backpacking","tourist trap","local cuisine","sustainable tourism","jet lag","a stopover","a once-in-a-lifetime experience","take in the sights","wander around","mass tourism","on a shoestring budget"],"model":"<em>The way I see it, mass tourism has reached a tipping point in many places. Cities like Venice and Barcelona are suffering — locals are priced out, and the experience becomes a tourist trap. I'd love to see a shift towards more sustainable, off-the-beaten-track travel — slower, more respectful, and ultimately more rewarding.</em>"},{"name":"City vs countryside","q":["Where would you rather live and why?","What are the downsides of urban life?","Should we encourage people to move to rural areas?"],"chunks":["the hustle and bustle","quality of life","commute / rush hour","green spaces","peace and quiet","amenities at your fingertips","cost of living","sprawling suburb","sleepy village","traffic jam","take the train","get cabin fever","stuck in a rut","up and coming neighbourhood","leafy suburb"],"model":"<em>Honestly, I'm torn. I love the buzz of the city — there's always something on, you can grab food at midnight, and you bump into all kinds of people. But the cost of living and the pollution take a toll. I imagine I'd be happiest somewhere in between: a leafy suburb with a fast train into town.</em>"},{"name":"Family & relationships","q":["Has family life changed in your country?","Is it better to have one close friend or many?","What's the secret to a long-lasting relationship?"],"chunks":["extended family","tight-knit","close-knit community","get along (well) with","drift apart","fall out with someone","patch things up","take after one's mother","spitting image of","family ties","blood is thicker than water","empty-nester","quality time","strike a balance","stormy relationship"],"model":"<em>I'd say family life in Spain has shifted quite a bit. It used to be common for several generations to live under one roof, but nowadays young people move out earlier, partly because of work. Even so, family ties remain strong — Sundays still belong to family lunches. So, traditions have evolved, but the core hasn't really.</em>"},{"name":"Hobbies & free time","q":["What do you do to unwind?","Are people losing the art of slow leisure?","Do you prefer indoor or outdoor activities?"],"chunks":["take up a hobby","kill time","be hooked on","let off steam","wind down","recharge one's batteries","an avid reader","be into something","get the hang of","be all thumbs at","time flies when you're having fun","go for a stroll","catch up on (a series)","binge-watch","at a loose end"],"model":"<em>Funnily enough, what really lets me unwind is the simplest thing — a long walk with no phone. There's a tendency to fill every spare minute with screens, and I've noticed I come back from a walk far more relaxed than after a Netflix binge. So I'd say slow leisure is making a quiet comeback.</em>"},{"name":"Money & shopping","q":["Is money the key to happiness?","Has shopping changed in your lifetime?","Should we tax the rich more?","How do you usually decide whether to buy something?","Why has online shopping grown so much in recent years?","Do you think we'll still use cash in the future?"],"chunks":["money doesn't grow on trees","live within / beyond one's means","tighten one's belt","make ends meet","splash out on","window shopping","retail therapy","online shopping","bargain hunting","impulse buy","disposable income","cost of living crisis","value for money","a steal","cash strapped"],"model":"<em>Money isn't the be-all and end-all, but let's not kid ourselves — life is far easier when bills aren't a worry. I'd say it's not the amount you have, but the security it gives you. Beyond a certain point, happiness flatlines. What really moves the needle is health, purpose and relationships.</em>"},{"name":"Media & news","q":["Where do you get your news?","Can we trust the media?","Should fake news be a crime?","How do you usually get your news?","How has the way people consume news changed in your lifetime?","Will traditional newspapers survive in the long run?"],"chunks":["a balanced view","biased reporting","clickbait","go viral","filter bubble","mainstream media","tabloid","sensationalism","investigative journalism","fact-checking","tweet storm","whistleblower","echo chamber","hold (sb) accountable","gloss over"],"model":"<em>By and large, I tend to be wary of single sources. I try to read at least two outlets with different leanings before forming an opinion. Clickbait headlines are designed to play on our emotions, and that's how filter bubbles thrive. If we want a balanced view, the responsibility is on us as readers as much as on journalists.</em>"},{"name":"Future predictions","q":["What will cities look like in 50 years?","Will books be replaced by screens?","Is the four-day work week realistic?"],"chunks":["a brave new world","at the cutting edge","mark a turning point","change beyond recognition","driverless cars","virtual reality","smart cities","go paperless","work remotely","carbon-neutral","life expectancy","fast-track","trial and error","quantum leap"],"model":"<em>By 2075, I imagine cities will have transformed beyond recognition. Driverless transport, smart grids, vertical farms — none of this is science fiction anymore. The big question is whether we'll have used the time wisely to tackle climate change. Either way, the kids growing up now will face a world we can barely picture.</em>"},{"name":"FAMILY","q":["Tell me about your family — who do you see most often?","How have family roles changed in the last 50 years?","How do you think families will look in the future?"],"chunks":[],"model":""},{"name":"ENVIRONMENT","q":["What do you personally do to take care of the environment?","Why has the environmental crisis become such a big issue lately?","What kind of changes will be necessary in the next decade?"],"chunks":[],"model":""},{"name":"HEALTH","q":["What do you do to stay healthy?","Why are mental health issues so much more visible nowadays?","How might healthcare look 20 years from now?"],"chunks":[],"model":""},{"name":"FOOD","q":["Tell me about a typical meal in your culture.","How have eating habits changed in recent years?","What kind of food trends do you expect to see in the future?"],"chunks":[],"model":""},{"name":"TRAVEL","q":["Tell me about a trip that left a real impression on you.","How is travelling today different from 30 years ago?","What problems will mass tourism cause in the future?"],"chunks":[],"model":""},{"name":"CITIES vs COUNTRYSIDE","q":["Where would you prefer to live, and why?","Why are people moving from villages to cities all over the world?","How do you imagine cities will look in 30 years?"],"chunks":[],"model":""},{"name":"LANGUAGES","q":["How many languages do you speak, and how did you learn them?","Why is English so dominant in today's world?","Will smaller languages survive the rise of global English?"],"chunks":[],"model":""},{"name":"ART & CULTURE","q":["What kind of art or culture do you enjoy most?","How has the way we consume culture changed with the internet?","What role might AI play in art in the future?"],"chunks":[],"model":""},{"name":"GENERATIONS","q":["What's the biggest difference between your generation and your parents'?","Why is the gap between generations getting wider?","What will the next generation value most, do you think?"],"chunks":[],"model":""},{"name":"SOCIAL MEDIA","q":["Do you use social media a lot?","How has social media changed the way people relate to each other?","Will today's social platforms still exist in 20 years?"],"chunks":[],"model":""},{"name":"SUSTAINABILITY","q":["Do you try to live in a sustainable way?","Why are sustainable habits becoming so popular today?","Should sustainability be a personal choice or a legal obligation?"],"chunks":[],"model":""}],
  SPEAKING_FUNCTIONS: [{"h":"Dar tu opinión — neutro","d":"Para empezar a opinar sin sonar tajante.","items":[{"r":"neutral","t":"I think (that) / I believe (that) …"},{"r":"neutral","t":"In my opinion / From my point of view…"},{"r":"neutral","t":"As I see it / The way I see it, …"},{"r":"neutral","t":"It seems to me that…"},{"r":"neutral","t":"I'd say (that)…"},{"r":"neutral","t":"To my mind, …"},{"r":"neutral","t":"Personally (speaking), I reckon…"},{"r":"neutral","t":"If you ask me, …"}]},{"h":"Dar tu opinión — fuerte / decidida","d":"Para defender una postura clara (úsala con cuidado en Aptis Speaking; suena bien si la matizas).","items":[{"r":"strong","t":"I'm absolutely convinced (that)…"},{"r":"strong","t":"There's no doubt in my mind (that)…"},{"r":"strong","t":"I firmly believe (that)…"},{"r":"strong","t":"I'm a strong advocate of…"},{"r":"strong","t":"I have to say (that)…"},{"r":"strong","t":"It goes without saying (that)…"},{"r":"strong","t":"There's no question (that)…"},{"r":"strong","t":"What I do know for sure is (that)…"}]},{"h":"Hedging — suavizar la opinión","d":"Bajar el tono para sonar matizado y educado (muy C1).","items":[{"r":"hedge","t":"I tend to think (that)…"},{"r":"hedge","t":"I'm inclined to think (that)…"},{"r":"hedge","t":"It would seem (that)…"},{"r":"hedge","t":"To some extent, I'd agree that…"},{"r":"hedge","t":"It could be argued (that)…"},{"r":"hedge","t":"It's hard to say, but…"},{"r":"hedge","t":"I'm not entirely sure, but I'd say…"},{"r":"hedge","t":"There's a case to be made for / against…"},{"r":"hedge","t":"Up to a point, yes, but…"}]},{"h":"Acuerdo — total","d":"Estar de acuerdo abiertamente.","items":[{"r":"agree","t":"I couldn't agree more."},{"r":"agree","t":"Absolutely. / Definitely."},{"r":"agree","t":"That's exactly how I feel."},{"r":"agree","t":"You're absolutely right."},{"r":"agree","t":"That's a fair point."},{"r":"agree","t":"That sums it up perfectly."},{"r":"agree","t":"I'm with you on that one."}]},{"h":"Acuerdo parcial","d":"Reconocer parte de la idea antes de añadir matices (clave en C1).","items":[{"r":"partial","t":"That's true to some extent, however…"},{"r":"partial","t":"I see your point, but…"},{"r":"partial","t":"You have a point, but on the other hand…"},{"r":"partial","t":"Up to a point, yes, but I'd add (that)…"},{"r":"partial","t":"There's some truth in that, although…"},{"r":"partial","t":"I'd agree that…, but I'd also say (that)…"},{"r":"partial","t":"That may well be the case, yet…"}]},{"h":"Desacuerdo educado","d":"Estar en desacuerdo sin parecer agresiva.","items":[{"r":"polite","t":"I see what you mean, but I'm afraid I don't agree."},{"r":"polite","t":"With respect, I'd have to disagree."},{"r":"polite","t":"I'm not sure I see it that way."},{"r":"polite","t":"That's an interesting point, but…"},{"r":"polite","t":"I take your point, but I think…"},{"r":"polite","t":"I beg to differ."},{"r":"polite","t":"I tend to disagree, actually."}]},{"h":"Introducir un ejemplo","d":"Ilustra tu opinión, gana puntos en C1.","items":[{"r":"example","t":"For instance, …"},{"r":"example","t":"To give you an example, …"},{"r":"example","t":"Take, for example, …"},{"r":"example","t":"A case in point is…"},{"r":"example","t":"As an illustration, …"},{"r":"example","t":"Just look at…"},{"r":"example","t":"I remember when…"}]},{"h":"Comparar y contrastar (P3 Aptis)","d":"Para describir y comparar dos fotos o ideas.","items":[{"r":"compare","t":"Both pictures show…"},{"r":"compare","t":"In contrast, …"},{"r":"compare","t":"Whereas the first one…, the second…"},{"r":"compare","t":"They differ in that…"},{"r":"compare","t":"What strikes me is (that)…"},{"r":"compare","t":"On the one hand…, on the other hand…"},{"r":"compare","t":"While X is…, Y seems to be…"},{"r":"compare","t":"There's a clear contrast between…"},{"r":"compare","t":"The most striking similarity / difference is…"}]},{"h":"Especular (P3-P4 Aptis)","d":"Hablar de probabilidad, hipótesis o suposiciones sobre la foto.","items":[{"r":"speculate","t":"It looks as if…"},{"r":"speculate","t":"It appears (that)…"},{"r":"speculate","t":"I'd say they're probably…"},{"r":"speculate","t":"They might / could / may be…"},{"r":"speculate","t":"Judging by their expressions, …"},{"r":"speculate","t":"It's hard to tell, but…"},{"r":"speculate","t":"I imagine (that)…"},{"r":"speculate","t":"I get the impression (that)…"},{"r":"speculate","t":"This must / can't be…"}]},{"h":"Generalizar / Estereotipar (con cuidado)","d":"Hablar en general sin sonar absoluto.","items":[{"r":"general","t":"On the whole, …"},{"r":"general","t":"By and large, …"},{"r":"general","t":"Generally speaking, …"},{"r":"general","t":"For the most part, …"},{"r":"general","t":"There's a tendency for + sb + to-inf…"},{"r":"general","t":"As a rule, …"},{"r":"general","t":"More often than not, …"}]},{"h":"Ganar tiempo / Pensar","d":"En vez de quedarte en blanco, ¡suena natural!","items":[{"r":"filler","t":"Well, let me think for a second…"},{"r":"filler","t":"That's a good question, actually."},{"r":"filler","t":"Hmm, it's a tricky one."},{"r":"filler","t":"Let me see…"},{"r":"filler","t":"How can I put this?"},{"r":"filler","t":"What I mean is…"},{"r":"filler","t":"How shall I say…"},{"r":"filler","t":"I'd need to think about that, but off the top of my head, …"}]},{"h":"Reformular / Aclarar","d":"Si no te has explicado, no abandones — reformula.","items":[{"r":"reformulate","t":"What I mean is…"},{"r":"reformulate","t":"In other words, …"},{"r":"reformulate","t":"To put it another way, …"},{"r":"reformulate","t":"That is to say, …"},{"r":"reformulate","t":"Or rather, …"},{"r":"reformulate","t":"By that I mean…"}]},{"h":"Concluir tu respuesta","d":"Cerrar con elegancia (clave en P4 Aptis, donde la respuesta es larga).","items":[{"r":"conclude","t":"All in all, …"},{"r":"conclude","t":"At the end of the day, …"},{"r":"conclude","t":"To sum up, …"},{"r":"conclude","t":"In short, …"},{"r":"conclude","t":"That's why I think…"},{"r":"conclude","t":"So, on balance, …"},{"r":"conclude","t":"Ultimately, …"}]}],
  FLASHCARDS: [{"cat":"Vocabulary","front":"ALBEIT","back":"Although / even though\n\n\"She accepted the offer, albeit reluctantly.\"\n\n→ aunque, si bien"},{"cat":"Vocabulary","front":"HITHERTO","back":"Until now / up to this point\n\n\"Hitherto unknown species have been discovered.\"\n\n→ hasta ahora, hasta este momento"},{"cat":"Vocabulary","front":"INSOFAR AS","back":"To the extent that\n\n\"I'll help you insofar as I am able.\"\n\n→ en la medida en que"},{"cat":"Vocabulary","front":"OSTENSIBLY","back":"Apparently / seemingly (but perhaps not really)\n\n\"He was ostensibly calm, but trembling inside.\"\n\n→ aparentemente, en apariencia"},{"cat":"Vocabulary","front":"PREDICATED ON","back":"Based on / dependent on\n\n\"The plan was predicated on stable funding.\"\n\n→ basado en, condicionado por"},{"cat":"Vocabulary","front":"CONTINGENT ON","back":"Dependent on something happening first\n\n\"Approval is contingent on further review.\"\n\n→ supeditado a, condicionado a"},{"cat":"Vocabulary","front":"INVETERATE","back":"Having a habit so firmly established it's unlikely to change\n\n\"She's an inveterate optimist.\"\n\n→ empedernido/a, incorregible"},{"cat":"Vocabulary","front":"EQUIVOCATE","back":"To speak or act ambiguously, avoiding commitment\n\n\"Stop equivocating and give me a straight answer.\"\n\n→ ser evasivo, hablar con ambigüedad"},{"cat":"Vocabulary","front":"PERFUNCTORY","back":"Carried out with minimum effort; superficial\n\n\"He gave a perfunctory nod and moved on.\"\n\n→ superficial, rutinario, sin interés"},{"cat":"Vocabulary","front":"COMMENSURATE WITH","back":"In proportion to / corresponding to\n\n\"Her salary is commensurate with her experience.\"\n\n→ proporcional a, acorde con"},{"cat":"Vocabulary","front":"TENUOUS","back":"Very weak or slight; not substantial\n\n\"There is only a tenuous link between the two events.\"\n\n→ tenue, débil, sin fundamento"},{"cat":"Vocabulary","front":"PROLIFERATE","back":"To increase rapidly in number\n\n\"Social media platforms have proliferated in recent years.\"\n\n→ proliferar, multiplicarse"},{"cat":"Vocabulary","front":"EXACERBATE","back":"To make a problem or situation worse\n\n\"The drought exacerbated the food shortage.\"\n\n→ exacerbar, agravar, empeorar"},{"cat":"Vocabulary","front":"CORROBORATE","back":"To confirm or give support to a statement\n\n\"Witnesses corroborated her account.\"\n\n→ corroborar, confirmar, respaldar"},{"cat":"Vocabulary","front":"CIRCUMVENT","back":"To find a way around an obstacle or rule\n\n\"They tried to circumvent the regulations.\"\n\n→ eludir, sortear, burlar"},{"cat":"Vocabulary","front":"UNPRECEDENTED","back":"Never done or known before\n\n\"The response was unprecedented in its speed.\"\n\n→ sin precedentes, inédito"},{"cat":"Vocabulary","front":"NOTWITHSTANDING","back":"Despite / in spite of (formal)\n\n\"Notwithstanding the difficulties, they succeeded.\"\n\n→ a pesar de, no obstante"},{"cat":"Vocabulary","front":"DISCREPANCY","back":"A lack of compatibility between facts or claims\n\n\"There is a discrepancy between the two reports.\"\n\n→ discrepancia, divergencia"},{"cat":"Vocabulary","front":"NUANCED","back":"Showing awareness of subtle distinctions\n\n\"Her analysis was nuanced and well-argued.\"\n\n→ matizado/a, con matices"},{"cat":"Vocabulary","front":"MITIGATE","back":"To lessen the gravity or seriousness of something\n\n\"Exercise can mitigate the effects of stress.\"\n\n→ mitigar, atenuar, reducir"},{"cat":"Vocabulary","front":"ACQUIESCE","back":"To accept something reluctantly but without protest\n\n\"She acquiesced to the new terms despite disagreeing.\"\n\n→ condescender, asentir sin convicción"},{"cat":"Vocabulary","front":"IMPINGE ON","back":"To have a negative effect on; to encroach on\n\n\"Long hours impinge on employees' personal lives.\"\n\n→ incidir negativamente en, afectar"},{"cat":"Vocabulary","front":"PERVASIVE","back":"Spreading widely through an area or group\n\n\"There is a pervasive sense of mistrust in the institution.\"\n\n→ generalizado, omnipresente"},{"cat":"Vocabulary","front":"SUBSTANTIATE","back":"To provide evidence to support a claim\n\n\"Can you substantiate these allegations?\"\n\n→ fundamentar, respaldar con pruebas"},{"cat":"Vocabulary","front":"CONTENTIOUS","back":"Causing or likely to cause disagreement\n\n\"Immigration remains a highly contentious issue.\"\n\n→ controvertido, polémico"},{"cat":"Grammar","front":"INVERSION — negative adverbials\n\nComplete:\n\"____ did we realise how serious it was.\"","back":"\"Not until much later did we realise how serious it was.\"\n\nRule: negative adverbial → auxiliary + subject\n\nTriggers:\nNever · Rarely · Seldom · Hardly · Scarcely\nNo sooner · Little · Only then · Not only"},{"cat":"Grammar","front":"CLEFT SENTENCES\n\nRewrite with emphasis on 'by leaving early':\n\"She ruined everything by leaving early.\"","back":"\"It was by leaving early that she ruined everything.\"\n\nOther structures:\n• What + clause + be + FOCUS\n  \"What she did was leave early.\"\n• The reason / The thing / The place + that..."},{"cat":"Grammar","front":"MIXED CONDITIONAL\n\nWhat does this express?\n\"If I had studied medicine, I would be a doctor now.\"","back":"Past unreal condition → Present unreal result\n\nIF + past perfect → WOULD + bare infinitive\n\nThe past action affects the present consequence.\n\n→ Si hubiera estudiado medicina, ahora sería médico."},{"cat":"Grammar","front":"WISH / IF ONLY — three patterns\n\nTranslate: \"Ojalá hubiera escuchado tu consejo.\"","back":"\"I wish I had listened to your advice.\"\n\nThree patterns:\n• WISH + past perfect → regret about PAST\n• WISH + past simple → desire for PRESENT change\n• WISH + would → complaint about sb's behaviour\n\n\"If only\" = more emphatic version of 'wish'"},{"cat":"Grammar","front":"ADVANCED MODALS — past deductions\n\nDifference:\n\"He may have left\" · \"He must have left\" · \"He can't have left\"","back":"MAY HAVE + pp → possibility (uncertain)\n\"He may have left.\" (quizás se fue)\n\nMUST HAVE + pp → logical deduction (almost certain)\n\"He must have left — it's dark inside.\"\n\nCAN'T HAVE + pp → impossibility\n\"He can't have said that — he wasn't there.\""},{"cat":"Grammar","front":"MANDATIVE SUBJUNCTIVE\n\nIs this correct?\n\"The committee recommended that he attend the meeting.\"","back":"YES — mandative subjunctive.\n\nUsed after: recommend · suggest · insist · propose · demand · request · require · urge + THAT\n\nForm: bare infinitive (no -s in 3rd person)\n✓ \"It is essential that she be informed.\"\n✓ \"They demanded that he resign.\""},{"cat":"Grammar","front":"PARTICIPLE CLAUSES\n\nRewrite:\n\"Because he had worked all night, he was exhausted.\"","back":"\"Having worked all night, he was exhausted.\"\n\nPerfect participle (having + pp) = action before main verb\nSimple participle = simultaneous action\n\"Sitting by the window, she watched the rain.\"\n\n⚠️ The subject of both clauses must be the same."},{"cat":"Grammar","front":"ADVANCED RELATIVE CLAUSES\n\nWhat does 'which' refer to here?\n\"She passed the exam, which surprised everyone.\"","back":"'Which' refers to the ENTIRE previous clause.\n→ El hecho de que aprobara sorprendió a todos.\n\n⚠️ Cannot use 'that' in non-defining clauses.\n\nAdvanced forms:\n\"...in which case / by which time / of which / to whom / all of whom\""},{"cat":"Grammar","front":"IT-EXTRAPOSITION\n\nRewrite:\n\"That he survived was remarkable.\"","back":"\"It was remarkable that he survived.\"\n\nExtraposition moves the subject clause to the end.\n\nPatterns:\n• It is + adj + that-clause\n• It is + adj + to-inf\n• It seems / appears + that-clause\n• It has been argued / suggested + that-clause\n\nVery common in academic writing."},{"cat":"Grammar","front":"FRONTING for emphasis\n\nRewrite:\n\"I have never seen such dedication.\"","back":"\"Never have I seen such dedication.\"\n\nFronting = moving an element to the front, often triggering inversion.\n\nExamples:\n\"Rarely does one encounter such talent.\"\n\"Only by working together can we solve this.\"\n\"Under no circumstances should you sign.\""},{"cat":"Grammar","front":"NOMINALISATION\n\nConvert to formal written style:\n\"The economy declined rapidly and this worried investors.\"","back":"\"The rapid decline of the economy caused concern among investors.\"\n\nNominalisation = verb/adjective → noun\n• decline → the decline of\n• improve → an improvement in\n• fail → the failure of\n• analyse → an analysis of\n\nCreates formal, concise academic prose."},{"cat":"Grammar","front":"CONCESSIVE clauses — 4 structures\n\nExpress this concession in 4 different ways:\n\"He worked hard. He didn't pass.\"","back":"• Although he worked hard, he didn't pass.\n• Despite working hard, he didn't pass.\n• He worked hard; however, he didn't pass.\n• Hard as he worked, he didn't pass. (literary inversion)\n\nMore: even though · for all that · in spite of the fact that · much as"},{"cat":"Grammar","front":"ELLIPSIS & SUBSTITUTION\n\nImprove:\n\"She wants to leave and I want to leave too.\"","back":"✓ \"She wants to leave, and so do I.\"\n✓ \"She wants to leave, as do I.\" (formal)\n✓ \"She wants to leave, and I do too.\"\n\nOther substitution:\n• I think so / I hope so / I'm afraid not\n• If so / if not\n• Do so (instead of repeating a verb phrase)"},{"cat":"Grammar","front":"EMPHASIS with auxiliary DO\n\nHow and when do you use stressed 'do' for emphasis?","back":"Add stressed DO / DOES / DID before the main verb:\n\n\"I do understand your concern.\"\n\"She does try her best.\"\n\"He did warn us about this.\"\n\nUsed to:\n• Contradict a previous claim\n• Reassure or acknowledge\n• Express surprise\n\n→ Sí que entiendo / Sí que lo intentó"},{"cat":"Collocations","front":"REACH, ARRIVE or GET TO?\n\nWhich verb collocates with:\na conclusion · an agreement · a compromise · a decision · a consensus","back":"REACH collocates with all:\n→ reach a conclusion / agreement / compromise / decision / consensus / settlement\n\n⚠️ NOT:\n✗ arrive a conclusion\n✗ get to an agreement\n\nAlso: reach a deadlock · reach a turning point"},{"cat":"Collocations","front":"MAKE or DO?\n\na suggestion · research · a complaint · progress · an effort · a living · damage · an exception","back":"MAKE: a suggestion · a complaint · an effort · a living · an exception\n\nDO: research · progress · damage\n\nTrick:\n• DO = processes / activities\n• MAKE = producing / creating\n\nAlso: make a profit · do a favour · make an impact"},{"cat":"Collocations","front":"STRONG COLLOCATIONS with 'evidence'\n\nWhich verbs and adjectives collocate with 'evidence'?","back":"Verbs:\ngather · provide · present · weigh up · cite evidence\nevidence suggests / indicates / points to\n\nAdjectives:\ncompelling · overwhelming · concrete · substantial · empirical · anecdotal evidence\n\n⚠️ NOT: *do evidence / *make evidence"},{"cat":"Collocations","front":"VERB + PREPOSITION\n\nFill in:\naccount ___ · result ___ · comply ___ · abstain ___ · stem ___","back":"account FOR\nresult IN\ncomply WITH\nabstain FROM\nstem FROM\n\nOthers:\nimpinge ON · amount TO · adhere TO\nrefrain FROM · testify TO · attribute TO"},{"cat":"Collocations","front":"ADJECTIVE + NOUN collocations\n\nFind the right adjective:\n___ pressure · ___ impact · ___ majority · ___ overhaul","back":"mounting / peer pressure\nprofound / far-reaching impact\nvast / overwhelming majority\ncomplete / radical / thorough overhaul\n\nOthers:\nflagrant violation · stark contrast\nsweeping changes · vested interest · stringent measures"},{"cat":"Collocations","front":"COLLOCATIONS with 'issue'\n\nWhich verbs and adjectives go with 'issue'?","back":"Verbs:\nraise / address / tackle / highlight / resolve / dodge an issue\n\nAdjectives:\npressing / burning / contentious / thorny / controversial / underlying issue\n\n⚠️ NOT: *solve an issue (use 'resolve' or 'address')\n⚠️ NOT: *do an issue"},{"cat":"Discourse","front":"Formal alternatives to HOWEVER / BUT\n\nName at least 6.","back":"• Nevertheless\n• Nonetheless\n• Notwithstanding (this)\n• That said\n• Even so\n• Conversely (contrast of ideas)\n• Yet (more literary)\n• Be that as it may\n• For all that\n\nAll introduce a counterargument or qualification."},{"cat":"Discourse","front":"How do you CONCEDE a point formally?","back":"• Admittedly, ...\n• It cannot be denied that...\n• There is some truth in the claim that...\n• While it is true that X, ...\n• Granted (that)...\n• It would be remiss not to acknowledge...\n\nStrategy: concede → pivot with 'however / nevertheless / that said'"},{"cat":"Discourse","front":"Discourse markers for ADDING information (beyond 'also')\n\nGive at least 5.","back":"• Moreover\n• Furthermore\n• In addition (to this)\n• What is more\n• Over and above this\n• Not only that, but...\n• To compound this\n• Coupled with this\n• Beyond this"},{"cat":"Discourse","front":"Formal ways to INTRODUCE AN EXAMPLE\n\nAlternatives to 'for example'.","back":"• For instance\n• To illustrate (this)\n• A case in point is...\n• Take, for example,...\n• This is exemplified by...\n• As evidenced by...\n• As demonstrated by...\n• To give a concrete example..."},{"cat":"Discourse","front":"CONTRAST vs CONCESSION connectors\n\nDifference between 'although' and 'nevertheless'?","back":"ALTHOUGH = subordinating conjunction (joins clauses)\n\"Although it was raining, we went out.\"\n\nNEVERTHELESS = adverbial connector (links sentences)\n\"It was raining. Nevertheless, we went out.\"\n\nSubordinators: even though · while · whereas · despite the fact that\nAdverbials: however · even so · nonetheless · that said"},{"cat":"Discourse","front":"Signposting in APTIS Speaking\n\nHow do you manage a long spoken turn at C1/C2?","back":"Opening: \"To address this question, I'd like to...\"\nAdding: \"Furthermore, it's worth noting that...\"\nContrasting: \"On the other hand, one could argue...\"\nConcluding: \"To sum up / All things considered...\"\nBuying time: \"That's an interesting point. Let me think...\"\nSelf-correcting: \"What I mean to say is...\""},{"cat":"Reported Speech","front":"REPORTING VERBS — patterns\n\ninsist · suggest · warn · advise · deny · accuse · urge","back":"insist on -ing / that + clause\nsuggest -ing / that + clause (NOT suggest sb to)\nwarn sb not to / that\nadvise sb to / that\ndeny -ing (NOT to-inf)\naccuse sb of -ing\nurge sb to + inf\n\n✗ She suggested me to go.\n✓ She suggested (that) I go / suggested going."},{"cat":"Reported Speech","front":"TENSE BACKSHIFT\n\nReport:\n\"We have been working on this for months.\"","back":"\"They said they had been working on it for months.\"\n\nBackshift rules:\npresent simple → past simple\npresent continuous → past continuous\npresent perfect → past perfect\npast simple → past perfect\nwill → would · can → could · may → might\n\n⚠️ No backshift if reporting something still true."},{"cat":"Reported Speech","front":"REPORTING QUESTIONS\n\nReport:\n\"Are you coming to the meeting tomorrow?\"","back":"\"She asked whether / if I was coming to the meeting the following day.\"\n\nKey rules:\n• Yes/No questions → whether / if\n• Wh-questions → wh-word\n• Statement word order (no inversion)\n• No question mark\n✗ She asked was I coming.\n✓ She asked whether I was coming."},{"cat":"Register","front":"Rewrite in FORMAL register:\n\"We need to look into this problem ASAP and fix it.\"","back":"\"It is imperative that this matter be investigated and resolved without delay.\"\n\nFormal transforms:\nneed to → it is imperative / essential that\nlook into → investigate / examine\nfix → resolve / rectify / address\nASAP → without delay / at the earliest opportunity\nproblem → issue / matter / concern"},{"cat":"Register","front":"WORDY vs CONCISE — formal writing\n\nImprove: \"Due to the fact that he was ill, he was unable to attend.\"","back":"✓ \"Because he was ill, he could not attend.\"\n✓ \"Owing to illness, he was unable to attend.\"\n\nWordy → Concise:\n• due to the fact that → because / since\n• in the event that → if\n• at this point in time → now / currently\n• in spite of the fact that → although / despite\n• with regard to → regarding / on"},{"cat":"Register","front":"PASSIVE VOICE in formal writing\n\nWhy is passive preferred academically? Give two examples.","back":"• Removes personal agent → objectivity\n• Focuses on action/result, not who did it\n\n\"Several studies have been conducted...\"\n\"The findings were published in 2023.\"\n\nWith agent (when agent matters):\n\"The report was written by an independent body.\"\n\n⚠️ Overuse makes text heavy — balance is key."},{"cat":"APTIS Skills","front":"APTIS Writing Part 4 (C1/C2)\n\nWhat is assessed at this level?","back":"A structured long-form response (~250–300 words)\nFormats: essay · report · article\n\nAssessed on:\n• Task completion & relevance\n• Coherence & cohesion\n• Range of vocabulary & collocations\n• Grammatical accuracy & complexity\n• Register appropriateness\n\nKey: develop arguments — don't just list points. Use hedging, concession, formal discourse."},{"cat":"APTIS Skills","front":"HEDGING language — why and how?\n\nGive 6 hedging expressions.","back":"Hedging = expressing uncertainty / avoiding overstatement\n\n• It would appear that...\n• It seems / tends to suggest that...\n• This may / might indicate...\n• To some extent...\n• There is a possibility that...\n• Evidence suggests (not 'proves')\n• It could be argued that...\n\n⚠️ Overconfident claims = lower register score at C1/C2."},{"cat":"APTIS Skills","front":"PARAPHRASING at C1/C2\n\nHow do you paraphrase:\n'The results were inconclusive'?","back":"Strategies:\n• Synonym swap: \"The findings were ambiguous / indeterminate.\"\n• Structure change: \"No definitive conclusions could be drawn.\"\n• Nominalisation: \"The inconclusiveness of the results...\"\n\nC2 tip: change BOTH vocabulary AND structure simultaneously.\nChanging only one = C1 minimum.\nChanging both = C2 signal."},{"cat":"APTIS Skills","front":"APTIS Speaking — how do you show C1/C2?","back":"• Extended turns without hesitation\n• Complex sentences with subordination\n• Sophisticated vocabulary in context\n• Discourse management: signpost, summarise, expand\n• Self-correction without breaking fluency\n• Nuanced opinions: concede, qualify, contrast\n\nUseful phrases:\n\"While I see the value in X, I'd argue that...\"\n\"To build on that idea...\"\n\"That raises an interesting point about...\""},{"cat":"Idioms","front":"'To have the upper hand'\n\nMeaning + example sentence.","back":"To be in a position of advantage or control\n\n\"After the negotiations, the union clearly had the upper hand.\"\n\n→ llevar la delantera, tener ventaja\n\nRelated: gain the upper hand · lose the upper hand · hold all the cards"},{"cat":"Idioms","front":"'To sit on the fence'\n\nMeaning + register note.","back":"To avoid taking sides or making a decision\n\n\"Politicians often sit on the fence on controversial issues.\"\n\n→ nadar entre dos aguas, no mojarse\n\nRegister: informal/neutral\nFormal equivalent: 'to remain non-committal · to adopt a neutral stance'"},{"cat":"Idioms","front":"'To bear the brunt of'\n\nMeaning + example.","back":"To suffer the main force or worst part of something bad\n\n\"Low-income households bore the brunt of the economic crisis.\"\n\n→ llevarse la peor parte, cargar con el peso\n\n⚠️ Always followed by 'of'"},{"cat":"Idioms","front":"'A double-edged sword'\n\nExplain and use in a sentence.","back":"Something that has both advantages and disadvantages\n\n\"Social media is a double-edged sword: it connects people but also spreads misinformation.\"\n\n→ un arma de doble filo\n\nSynonym phrase: a mixed blessing · a two-sided coin"},{"cat":"Idioms","front":"'To cut corners'\n\nMeaning, example, and register.","back":"To do something in the easiest/cheapest way, reducing quality\n\n\"The construction company cut corners and the building was unsafe.\"\n\n→ escatimar esfuerzos, hacer las cosas a medias\n\nRegister: informal/neutral\nOK in APTIS speaking; avoid in formal essays.\nFormal: 'to compromise on quality / to take shortcuts'"},{"cat":"Idioms","front":"'To take something with a pinch of salt'\n\nMeaning + example.","back":"To not completely believe something; to be sceptical\n\n\"Take his claims with a pinch of salt — he tends to exaggerate.\"\n\n→ coger algo con pinzas, no tomarlo al pie de la letra\n\nFormal alternative: 'to approach sth with scepticism · to treat with caution'"},{"cat":"Idioms","front":"'To turn a blind eye to'\n\nMeaning + example.","back":"To deliberately ignore something wrong or unpleasant\n\n\"Management turned a blind eye to the misconduct for years.\"\n\n→ hacer la vista gorda\n\nFormal alternative: 'to overlook · to condone · to disregard deliberately'"},{"cat":"Idioms","front":"'To be on the same page'\n\nMeaning + formal alternative.","back":"To have the same understanding or agreement about something\n\n\"Let's make sure we're all on the same page before moving forward.\"\n\n→ estar de acuerdo, entenderse\n\nMore formal: 'to reach a mutual understanding · to be in agreement · to share a common position'\n\nRegister: informal — use sparingly in APTIS writing."}],
  NAT_DATA: [{"id":"greetings","title":"Greetings & Small Talk","color":"#ff6b35","desc":"How you open a conversation signals immediately whether you sound natural or formal.","subcats":[{"name":"How are you?","pairs":[{"avoid":"I am fine, thank you.","natural":"Not bad, thanks. You?","context":"The most natural default — casual and reciprocal.","example":"\"Hey, how's it going?\" — \"<span>Not bad, thanks. You?</span>\""},{"avoid":"I am very well.","natural":"Pretty good, actually!","context":"Add 'actually' to make it sound spontaneous, not rehearsed.","example":"\"Haven't seen you in ages! How are you?\" — \"<span>Pretty good, actually!</span>\""},{"avoid":"I am tired.","natural":"I'm absolutely shattered.","context":"British English; very common. Also: 'wiped out' (US).","example":"\"You look rough.\" — \"<span>Yeah, I'm absolutely shattered. Late night.</span>\""},{"avoid":"I am busy.","natural":"I've been run off my feet.","context":"Idiom meaning extremely busy, no time to rest.","example":"\"How's work?\" — \"<span>Honestly, I've been run off my feet this week.</span>\""},{"avoid":"I am stressed.","natural":"I'm a bit overwhelmed, to be honest.","context":"'To be honest' softens a complaint and sounds conversational.","example":"\"You seem quiet.\" — \"<span>Yeah, I'm a bit overwhelmed, to be honest.</span>\""}]},{"name":"Opening / Checking in","pairs":[{"avoid":"Hello, how are you?","natural":"Hey! How's things?","context":"Informal British opener. Also: 'How's it going?', 'Alright?'","example":"\"<span>Hey! How's things?</span>\" — \"Yeah, not bad!\""},{"avoid":"How have you been?","natural":"What have you been up to?","context":"More engaging — invites a real answer instead of 'fine'.","example":"\"<span>Long time no see! What have you been up to?</span>\""},{"avoid":"It has been a long time.","natural":"Ages! Where have you been hiding?","context":"Playful and warm — sounds like someone who actually missed you.","example":"\"<span>Ages! Where have you been hiding?</span>\" — \"Ha, I know, it's been mad.\""}]}]},{"id":"reactions","title":"Reactions & Responses","color":"#7eb8c4","desc":"What you say after someone tells you something is where native fluency really shows.","subcats":[{"name":"Surprise","pairs":[{"avoid":"Really? That is surprising.","natural":"No way!","context":"The go-to for disbelief. Universal across ages.","example":"\"They cancelled the whole project.\" — \"<span>No way!</span>\""},{"avoid":"I did not expect that.","natural":"That came out of nowhere.","context":"Means it was completely unexpected.","example":"\"She resigned this morning.\" — \"<span>That came out of nowhere.</span>\""},{"avoid":"That is very unexpected.","natural":"I never saw that coming.","context":"Slightly more emphatic version.","example":"\"They broke up after ten years.\" — \"<span>Wow, I never saw that coming.</span>\""},{"avoid":"I am shocked.","natural":"I'm absolutely gobsmacked.","context":"British English; very vivid and natural.","example":"\"He won the award.\" — \"<span>I'm gobsmacked — genuinely didn't expect that.</span>\""}]},{"name":"Good news","pairs":[{"avoid":"That is very good!","natural":"That's brilliant!","context":"British favourite. Also: 'That's great!', 'Amazing!'","example":"\"I got the promotion.\" — \"<span>That's brilliant! Well deserved.</span>\""},{"avoid":"I am happy for you.","natural":"Oh, that's such good news!","context":"More natural emotional response — sounds genuinely warm.","example":"\"The surgery went well.\" — \"<span>Oh, that's such good news.</span>\""},{"avoid":"Congratulations.","natural":"Congrats! That's massive.","context":"'That's massive' adds genuine weight.","example":"\"We closed the deal.\" — \"<span>Congrats! That's massive.</span>\""}]},{"name":"Bad news / Sympathy","pairs":[{"avoid":"I am sorry to hear that.","natural":"Oh no, that's awful.","context":"Immediate, genuine-sounding sympathy.","example":"\"My cat passed away.\" — \"<span>Oh no, that's awful. I'm so sorry.</span>\""},{"avoid":"That is unfortunate.","natural":"What a nightmare.","context":"Empathetic and colloquial — used for stressful situations.","example":"\"I missed my flight.\" — \"<span>What a nightmare. What are you going to do?</span>\""},{"avoid":"I understand your situation.","natural":"That sounds really tough.","context":"Validates without minimising.","example":"\"It's been a rough few months.\" — \"<span>That sounds really tough.</span>\""}]},{"name":"Expressing agreement with something said","pairs":[{"avoid":"Yes, that is correct.","natural":"Exactly.","context":"One word, maximum natural weight.","example":"\"It's about communication, not just grammar.\" — \"<span>Exactly.</span>\""},{"avoid":"Yes, I agree with you.","natural":"Tell me about it.","context":"Means 'I know this all too well' — empathetic agreement.","example":"\"The commute is brutal.\" — \"<span>Tell me about it.</span>\""},{"avoid":"That is absolutely true.","natural":"Spot on.","context":"British English meaning precisely correct.","example":"\"The problem is the structure, not the content.\" — \"<span>Spot on.</span>\""}]}]},{"id":"agreement","title":"Agreeing & Disagreeing","color":"#c8b560","desc":"Nuance in how you agree or push back is a key C1/C2 marker.","subcats":[{"name":"Agreeing","pairs":[{"avoid":"I agree.","natural":"Absolutely / Totally.","context":"Short, emphatic, conversational.","example":"\"This approach makes no sense.\" — \"<span>Totally.</span>\""},{"avoid":"You are right.","natural":"You've got a point.","context":"Acknowledges the other person's reasoning specifically.","example":"\"It might be worth waiting.\" — \"<span>Yeah, you've got a point.</span>\""},{"avoid":"That is a good idea.","natural":"That actually makes a lot of sense.","context":"'Actually' signals you're thinking it through.","example":"\"Why not just ask them directly?\" — \"<span>That actually makes a lot of sense.</span>\""},{"avoid":"I think that is also true.","natural":"Funnily enough, I was thinking the same thing.","context":"Conversational phrase for parallel thinking.","example":"\"We should restructure the whole thing.\" — \"<span>Funnily enough, I was thinking the same thing.</span>\""}]},{"name":"Soft disagreement","pairs":[{"avoid":"I do not agree.","natural":"I'm not so sure about that.","context":"Polite, thoughtful disagreement — very C1.","example":"\"It'll be fine.\" — \"<span>I'm not so sure about that, honestly.</span>\""},{"avoid":"That is not correct.","natural":"I see it slightly differently.","context":"Diplomatic way to offer a contrasting view.","example":"\"The issue is the price.\" — \"<span>I see it slightly differently — I think it's about trust.</span>\""},{"avoid":"But that is not true.","natural":"Well, it depends, doesn't it.","context":"Introduces nuance without direct confrontation.","example":"\"Remote work is less productive.\" — \"<span>Well, it depends, doesn't it.</span>\""},{"avoid":"I think you are wrong.","natural":"I'd push back a little on that.","context":"Professional, assertive but not aggressive — ideal for debates.","example":"\"The data speaks for itself.\" — \"<span>I'd push back a little on that — context matters.</span>\""}]},{"name":"Conceding a point","pairs":[{"avoid":"You are correct in that aspect.","natural":"Fair enough.","context":"Signals you accept the point gracefully.","example":"\"It's risky but so is doing nothing.\" — \"<span>Fair enough.</span>\""},{"avoid":"I accept your argument.","natural":"I'll give you that.","context":"Concedes one point while possibly holding the broader position.","example":"\"The design is original at least.\" — \"<span>I'll give you that.</span>\""},{"avoid":"I see your point, but…","natural":"That's a fair point, but…","context":"More natural acknowledgement before your counterpoint.","example":"\"<span>That's a fair point, but</span> I still think the timing is off.\""}]}]},{"id":"opinion","title":"Expressing Opinion","color":"#a8d8a8","desc":"How you frame an opinion is as important as its content at C1 level.","subcats":[{"name":"Introducing your view","pairs":[{"avoid":"In my opinion, …","natural":"If you ask me, …","context":"More conversational and direct.","example":"\"<span>If you ask me,</span> they should have consulted the team first.\""},{"avoid":"I think that…","natural":"Personally, I reckon…","context":"'Reckon' is very natural British English for 'think'.","example":"\"<span>Personally, I reckon</span> it's going to take longer than they think.\""},{"avoid":"I believe this is important.","natural":"The way I see it, …","context":"Introduces a perspective without being preachy.","example":"\"<span>The way I see it,</span> the whole model needs rethinking.\""},{"avoid":"It is my opinion that…","natural":"I'd argue that…","context":"More academic and confident — great for APTIS writing.","example":"\"<span>I'd argue that</span> the benefits far outweigh the risks.\""}]},{"name":"Hedging & softening","pairs":[{"avoid":"Maybe it is good.","natural":"It's not bad, as it goes.","context":"British understatement for 'it's actually quite good'.","example":"\"What do you think of the plan?\" — \"<span>It's not bad, as it goes.</span>\""},{"avoid":"I am not certain.","natural":"I couldn't say for sure.","context":"Honest, natural way to express uncertainty.","example":"\"Will it work?\" — \"<span>I couldn't say for sure, but it seems promising.</span>\""},{"avoid":"Perhaps it will work.","natural":"It might do, who knows.","context":"Very casual, slightly sceptical hedge.","example":"\"Do you think they'll change the policy?\" — \"<span>It might do, who knows.</span>\""}]}]},{"id":"time","title":"Talking About Time","color":"#c084d4","desc":"Native speakers never say 'after a long time'. They say 'eventually' — and they say it right.","subcats":[{"name":"Speed & timing","pairs":[{"avoid":"He did it very quickly.","natural":"He got it done in no time.","context":"Idiom meaning very quickly.","example":"\"How long did it take?\" — \"<span>In no time, surprisingly.</span>\""},{"avoid":"It happened very fast.","natural":"It all happened so fast.","context":"More natural rhythm — 'so' adds emotional weight.","example":"\"<span>It all happened so fast</span> — one day he was here, the next he was gone.\""},{"avoid":"Do it now.","natural":"Do it straight away.","context":"British English; also: 'right away', 'right now'.","example":"\"Can you send that?\" — \"<span>Sure, I'll do it straight away.</span>\""},{"avoid":"After a long time…","natural":"Eventually, …","context":"Use 'eventually' for something that happened after a long wait.","example":"\"<span>Eventually</span>, they reached an agreement.\""}]},{"name":"Frequency","pairs":[{"avoid":"I do this many times.","natural":"I do this all the time.","context":"Natural intensifier for frequency.","example":"\"Do you work from home?\" — \"<span>All the time, yeah.</span>\""},{"avoid":"Sometimes I feel tired.","natural":"I do get tired sometimes.","context":"The 'do' adds emphasis — very natural in speech.","example":"\"You never complain.\" — \"<span>I do get tired sometimes, but it's fine.</span>\""},{"avoid":"I have never done this before.","natural":"I've never actually done this.","context":"'Actually' makes it sound spontaneous, not recited.","example":"\"Have you tried cold-water swimming?\" — \"<span>I've never actually done it, no.</span>\""}]}]},{"id":"effort","title":"Effort, Ability & Difficulty","color":"#f08080","desc":"Talking about what you can or can't do — with native naturalness.","subcats":[{"name":"Ability & difficulty","pairs":[{"avoid":"It was very difficult.","natural":"It was no easy feat.","context":"C1-level idiom for something that required significant effort.","example":"\"You finished the marathon?\" — \"<span>Yeah, it was no easy feat.</span>\""},{"avoid":"I cannot do it.","natural":"It's beyond me.","context":"Natural for things outside your knowledge or ability.","example":"\"Can you fix the server?\" — \"<span>That's beyond me, I'm afraid.</span>\""},{"avoid":"I managed to do it.","natural":"I pulled it off.","context":"Phrasal verb meaning succeeded at something challenging.","example":"\"Did the presentation go well?\" — \"<span>Somehow I pulled it off.</span>\""},{"avoid":"It was easy.","natural":"It was a doddle.","context":"British English; also: 'a piece of cake', 'a breeze'.","example":"\"Was the exam hard?\" — \"<span>Honestly, it was a doddle.</span>\""}]},{"name":"Trying & giving up","pairs":[{"avoid":"I tried very hard.","natural":"I gave it my best shot.","context":"Means you tried as hard as you could.","example":"\"How did it go?\" — \"<span>I gave it my best shot — we'll see.</span>\""},{"avoid":"I will try.","natural":"I'll give it a go.","context":"Very natural British English for 'I'll attempt it'.","example":"\"Can you fix it?\" — \"<span>I'll give it a go.</span>\""},{"avoid":"I stopped trying.","natural":"I gave up.","context":"Simple, natural — don't avoid this one, it's correct.","example":"\"Did you finish the course?\" — \"<span>No, I gave up after week three.</span>\""},{"avoid":"Please continue.","natural":"Carry on.","context":"British English; also: 'go ahead', 'go on'.","example":"\"Sorry, I interrupted you.\" — \"<span>No worries, carry on.</span>\""}]}]},{"id":"social","title":"Social Expressions","color":"#88c0a8","desc":"Politeness, thanks, apologies — done naturally rather than mechanically.","subcats":[{"name":"Thanking","pairs":[{"avoid":"You are welcome.","natural":"No worries!","context":"Most natural response to thanks in British/Australian English.","example":"\"Thanks for helping.\" — \"<span>No worries!</span>\""},{"avoid":"You are welcome.","natural":"Don't mention it.","context":"Slightly more formal but very common.","example":"\"That was really kind.\" — \"<span>Oh, don't mention it.</span>\""},{"avoid":"You are welcome.","natural":"Any time!","context":"Signals you're genuinely happy to help again.","example":"\"You saved me there.\" — \"<span>Any time!</span>\""},{"avoid":"Thank you very much.","natural":"Cheers!","context":"Informal British English for 'thanks'. Also used as a toast.","example":"\"Here's your coffee.\" — \"<span>Cheers!</span>\""}]},{"name":"Apologising","pairs":[{"avoid":"I am very sorry.","natural":"I'm so sorry, that was my fault.","context":"Taking clear ownership sounds more genuine.","example":"\"The file got corrupted.\" — \"<span>I'm so sorry, that was my fault entirely.</span>\""},{"avoid":"Excuse me.","natural":"Sorry, could I just…?","context":"Softer way to navigate past someone or interrupt.","example":"\"<span>Sorry, could I just</span> squeeze past?\""},{"avoid":"I apologise for the delay.","natural":"Sorry to keep you waiting.","context":"More human and direct than 'I apologise for'.","example":"\"<span>Sorry to keep you waiting</span> — it took longer than expected.\""}]},{"name":"Encouraging","pairs":[{"avoid":"Good luck!","natural":"You've got this!","context":"More personal and confident — shows faith in the person.","example":"\"I'm so nervous about tomorrow.\" — \"<span>You've got this!</span>\""},{"avoid":"I believe in you.","natural":"You'll smash it.","context":"British English; very enthusiastic encouragement.","example":"\"It's my first time presenting.\" — \"<span>You'll smash it, don't worry.</span>\""},{"avoid":"Don't worry.","natural":"It'll be fine, honestly.","context":"The 'honestly' adds warmth and sincerity.","example":"\"What if something goes wrong?\" — \"<span>It'll be fine, honestly.</span>\""}]}]},{"id":"work","title":"Work, Ideas & Conversation","color":"#d4a468","desc":"Professional but natural — for discussions, presentations, and everyday workplace talk.","subcats":[{"name":"Moving conversation forward","pairs":[{"avoid":"Let me explain.","natural":"Here's the thing…","context":"Natural way to introduce the key point.","example":"\"<span>Here's the thing</span> — we need to rethink the whole approach.\""},{"avoid":"For example, …","natural":"Take X, for instance.","context":"More dynamic way to introduce an example.","example":"\"<span>Take remote work, for instance</span> — it changed everything.\""},{"avoid":"In conclusion, …","natural":"When all is said and done, …","context":"More conversational summary phrase.","example":"\"<span>When all is said and done,</span> it's the relationships that matter.\""},{"avoid":"This is very important.","natural":"This is the crux of it.","context":"Academic-sounding but conversational — great for APTIS.","example":"\"<span>This is really the crux of it</span> — without trust, nothing else works.\""}]},{"name":"Handling uncertainty at work","pairs":[{"avoid":"I don't know.","natural":"I'll have to look into that.","context":"Professional and forward-looking.","example":"\"Do we have the budget approved?\" — \"<span>I'll have to look into that and get back to you.</span>\""},{"avoid":"I will think about it.","natural":"Let me sleep on it.","context":"Idiom meaning to delay a decision until tomorrow.","example":"\"Do you want to commit to this?\" — \"<span>Let me sleep on it — I'll let you know tomorrow.</span>\""},{"avoid":"That is not possible.","natural":"That's a bit of a stretch.","context":"Polite way to say something is unrealistic.","example":"\"Can we finish by Monday?\" — \"<span>That's a bit of a stretch, honestly.</span>\""},{"avoid":"We should discuss this.","natural":"We need to have a proper chat about this.","context":"'Proper' adds emphasis — it's needed seriously.","example":"\"<span>We need to have a proper chat about this</span> — there's a lot to unpack.\""}]},{"name":"Emphasising","pairs":[{"avoid":"It is very important.","natural":"It really matters.","context":"Simple but sounds genuine rather than rehearsed.","example":"\"<span>This really matters</span> — it's not just a formality.\""},{"avoid":"I am completely certain.","natural":"I'd stake my reputation on it.","context":"Strong idiomatic assertion — use sparingly for impact.","example":"\"Are you sure it'll work?\" — \"<span>I'd stake my reputation on it.</span>\""},{"avoid":"It is completely wrong.","natural":"It's way off.","context":"Casual but effective — means far from correct.","example":"\"Is my estimate close?\" — \"<span>Way off, I'm afraid.</span>\""}]}]}],
  MATCHING: [{"title":"Verbos + sus sinónimos (round 1)","pairs":[["obtain","acquire"],["cease","halt"],["enhance","improve"],["jeopardize","endanger"],["contemplate","reflect"]]},{"title":"Adjetivos formales C1","pairs":[["crucial","vital"],["arduous","demanding"],["affluent","wealthy"],["peculiar","strange"],["evident","apparent"]]},{"title":"Sustantivos & collocations","pairs":[["objective","aim"],["transformation","change"],["occupation","profession"],["obstacle","challenge"],["concept","notion"]]}],
  DAILY_TIPS: ["<em>Present perfect</em> conecta el pasado con AHORA. Si la conexión existe (resultado, novedad, experiencia), úsalo. Si no, ve al past simple.","<em>Would</em> describe pasados habituales (no estados). Para estados, usa <em>used to</em>. ❌ <em>I would be shy.</em> ✓ <em>I used to be shy.</em>","En <em>cleft sentences</em>, lo que pones detrás de <strong>It was X that…</strong> es lo que enfatizas. <em>It was the rain that ruined it</em> (no el viento).","Después de <em>I'd rather you…</em> usa past simple: <em>I'd rather you didn't smoke.</em>","<em>Inversión</em> tras adverbios negativos: <em>Never have I seen…</em>, <em>Hardly had I arrived when…</em> Muy elegante en writing.","<em>The more X, the more Y</em>: <em>The harder you work, the luckier you get.</em>","<strong>Actually</strong> = en realidad. <strong>Surely</strong> = seguramente NO (espera confirmación). Falsos amigos clásicos.","<em>Causative have</em>: <em>I had my hair cut</em> = me lo cortaron. Útil cuando no eres tú quien hace la acción.","El verbo <em>suggest</em> nunca lleva <em>to + inf</em>. ❌ <em>She suggested to leave.</em> ✓ <em>She suggested leaving / that we leave.</em>","<em>By the time</em> + presente → future perfect: <em>By the time you arrive, I'll have finished.</em>","<em>Wish + past perfect</em> = arrepentimiento. <em>I wish I had studied harder.</em>","<em>Adjective + preposition</em> fijas: <em>good at, keen on, bored with, afraid of, capable of.</em>","Después de <em>It's time / It's high time</em> → past simple. <em>It's high time you left.</em>","Recuerda los <em>three-part phrasal verbs</em>: <em>come up with, look forward to, put up with, get away with</em>. Inseparables siempre.","<em>Fronting</em>: empieza con lo importante. <em>Really good it was — best film I've seen.</em>"],
  TENSE_DATA: {"signals":{"Present Simple":["always","usually","often","sometimes","every day/week","on Mondays","twice a year","generally","as a rule"],"Present Continuous":["now","right now","at the moment","currently","these days","this week/month","look!","listen!","still"],"Present Perfect Simple":["just","already","yet","ever","never","so far","up to now","recently","lately","this morning (if still morning)"],"Present Perfect Continuous":["for + duration","since + point","all day/morning","how long…?","lately","recently"],"Past Simple":["yesterday","last week/month","ago","in 1990","when I was…","that day","then"],"Past Continuous":["while","as","when (acción larga + corta)","at 5pm yesterday","all day yesterday"],"Past Perfect Simple":["by the time","before","after","when (orden de acciones)","already","just","never (en pasado)"],"Past Perfect Continuous":["for + duration (en pasado)","since + point (en pasado)","how long had…?"],"Future Simple (will)":["probably","maybe","perhaps","I think","I'm sure","tomorrow","next…"],"Going to":["evidence right now","intention","plan"],"Future Continuous":["this time tomorrow","at 5pm tomorrow","in the middle of"],"Future Perfect":["by + future time","by the time","by then"]},"confusions":[{"t":"Past Simple vs Present Perfect","rule":"Past Simple = momento PASADO terminado. Present Perfect = conexión con AHORA.","ex":[{"good":"I visited Paris in 2018.","bad":"I have visited Paris in 2018."},{"good":"I've already eaten.","bad":"I already ate. (BrE)"},{"good":"She lived in Rome for 5 years (and left).","bad":""},{"good":"She has lived in Rome for 5 years (still does).","bad":""}],"tip":"Si hay <em>last/yesterday/ago/in 1990</em> → past simple. Si hay <em>just/already/yet/ever/never/lately/so far</em> → present perfect."},{"t":"Will vs Going to vs Present Continuous","rule":"Will = decisión espontánea, predicción sin evidencia. Going to = intención previa o predicción con evidencia. Present continuous = plan concreto con cita/lugar.","ex":[{"good":"OK, I'll have the chicken. (decides ahora)","bad":""},{"good":"I'm going to study medicine. (decisión previa)","bad":""},{"good":"Look at those clouds! It's going to rain. (evidencia)","bad":""},{"good":"I'm meeting John at 7. (plan fijado)","bad":""}],"tip":"Plan + hora + lugar → present continuous. Sin compromiso, solo decisión interna → going to."},{"t":"Would vs Used to","rule":"Both = pasados habituales. PERO <em>would</em> NO funciona con estados.","ex":[{"good":"I used to be shy.","bad":"I would be shy."},{"good":"I used to live in NYC.","bad":"I would live in NYC."},{"good":"My granddad would tell us stories.","bad":""}],"tip":"Si dudas → usa <em>used to</em>, funciona con ambos."},{"t":"Should have vs Must have vs Could have","rule":"Should have = lo que debió pasar/hacerse. Must have = deducción casi segura. Could have = posibilidad pasada o capacidad.","ex":[{"good":"You should have called me. (no lo hiciste, mal)","bad":""},{"good":"She must have left. Her coat's gone.","bad":""},{"good":"He could have won, but he chose to retire.","bad":""}],"tip":"<em>Should have</em> tiene tono de reproche. <em>Could have</em> es neutro."},{"t":"Past Perfect — cuándo es realmente necesario","rule":"Solo cuando necesitas dejar claro que una acción pasó ANTES que otra ya en el pasado.","ex":[{"good":"When I arrived, she had already left.","bad":""},{"good":"I had finished by the time he called.","bad":""},{"good":"After he ate, he left. (orden cronológico → past simple basta)","bad":""}],"tip":"Con <em>after/before</em> el past perfect es opcional; el orden ya está claro. Sin esas conjunciones, sí lo necesitas."},{"t":"By vs Until","rule":"By = no más tarde de (deadline). Until = la acción dura hasta entonces.","ex":[{"good":"Finish it by Friday.","bad":""},{"good":"I'll be working until Friday.","bad":""},{"good":"By Friday, I'll have finished it.","bad":""}],"tip":"<em>By</em> ↔ momento puntual. <em>Until</em> ↔ duración."}],"stories":[{"type":"Narrativa pasada clásica","desc":"Contar una historia o anécdota terminada (lo más común en exámenes).","tenses":["Past Simple (acción principal)","Past Continuous (fondo, ambiente)","Past Perfect (acciones anteriores)"],"ex":"<em>I <strong>was walking</strong> home when I <strong>saw</strong> a man who <strong>had left</strong> his wallet on a bench.</em>"},{"type":"Anécdota viva (oral)","desc":"Para enganchar al oyente, mezcla pasado con presente.","tenses":["Historical present (Present Simple)","Past Simple"],"ex":"<em>So I'm walking home and this guy comes up and asks me…</em>"},{"type":"Experiencia de vida","desc":"Logros, viajes, cosas que has hecho sin fecha concreta.","tenses":["Present Perfect (experiencia)","Past Simple (cuándo)"],"ex":"<em>I've been to Japan twice. The first time I went, I stayed in Tokyo.</em>"},{"type":"Predicción / Especulación futura","desc":"Opinar sobre el futuro.","tenses":["Will / Going to","May/Might/Could","Future Perfect","Future Continuous"],"ex":"<em>By 2050, electric cars will probably have replaced petrol ones.</em>"},{"type":"Hipótesis presente","desc":"Imaginar algo imposible o muy improbable AHORA.","tenses":["Past Simple en if-clause","Would + inf"],"ex":"<em>If I had more time, I'd learn a new language.</em>"},{"type":"Arrepentimiento / Hipótesis pasada","desc":"Cómo habría sido si…","tenses":["Past perfect","Would have + pp","Could/Might have + pp"],"ex":"<em>If I had studied harder, I would have got the job.</em>"},{"type":"Queja / Crítica","desc":"Quejarse de hábitos molestos o de algo que pasó.","tenses":["Present Continuous + always","Should have + pp","Need have + pp"],"ex":"<em>He's always interrupting me! You should have told him.</em>"},{"type":"Hecho atemporal / Generalización","desc":"Verdades, leyes, descripciones generales.","tenses":["Present Simple"],"ex":"<em>Water boils at 100°C. Most people in Spain speak Spanish.</em>"}]},
  MAPS: {"blocks":[{"id":"seasons","name":"Seasons","emoji":"🌿","topics":[{"id":"summer","name":"SUMMER","emoji":"☀️","pages":"pp.30-31","es":"Verano","aptis":true,"center":{"en":"SUMMER","es":"verano"},"zones":{"tl":[{"head":"FREE TIME","es":"tiempo libre","items":[{"en":"to relax","es":"relajarse"},{"en":"to unwind","es":"desconectar"},{"en":"to lounge around","es":"holgazanear"},{"en":"to recharge","es":"recargar energías"},{"en":"leisure","es":"ocio"}]}],"tm":[{"head":"MOUNTAINS","es":"montañas","items":[{"en":"peak","es":"cima"},{"en":"summit","es":"cumbre"},{"en":"hiking trail","es":"sendero"},{"en":"to trek","es":"hacer senderismo"},{"en":"altitude","es":"altitud"}]}],"tr":[{"head":"THE SUN","es":"el sol","items":[{"en":"heat wave","es":"ola de calor"},{"en":"scorching","es":"abrasador"},{"en":"to sunbathe","es":"tomar el sol"},{"en":"sunscreen","es":"protector solar"},{"en":"UV rays","es":"rayos UV"},{"en":"shade","es":"sombra"}]}],"ml":[{"head":"SEA & BEACH","es":"mar y playa","items":[{"en":"waves","es":"olas"},{"en":"breeze","es":"brisa"},{"en":"tide","es":"marea"},{"en":"snorkelling","es":"buceo con tubo"},{"en":"sandcastle","es":"castillo de arena"},{"en":"seafront","es":"paseo marítimo"}]}],"mr":[{"head":"TRAVEL","es":"viajes","items":[{"en":"itinerary","es":"itinerario"},{"en":"accommodation","es":"alojamiento"},{"en":"to check in/out","es":"registrarse/dejar"},{"en":"carry-on baggage","es":"equipaje de mano"},{"en":"jet lag","es":"desfase horario"}]}],"bl":[{"head":"CAMPING","es":"camping","items":[{"en":"tent","es":"tienda"},{"en":"campfire","es":"hoguera"},{"en":"sleeping bag","es":"saco de dormir"}]}],"bm":[{"head":"SIGHTSEEING","es":"turismo","items":[{"en":"landmark","es":"monumento"},{"en":"guided tour","es":"visita guiada"},{"en":"souvenir","es":"recuerdo"}]}],"br":[]},"grammar":["<span class='en'>luggage</span> incontable: <em>a piece of luggage</em>. <span class='en'>journey</span>=trayecto; <span class='en'>trip</span>=viaje corto; <span class='en'>travel</span>=incontable."],"sabias":"<strong>Scorching</strong> y <strong>sweltering</strong> (bochornoso) son adjetivos de temperatura que los examinadores del APTIS valoran en lugar del genérico <em>very hot</em>.","aptis_phrases":["<strong>Summer in Spain is absolutely scorching</strong> — temperatures regularly exceed 40°C inland.","<strong>One of the drawbacks of</strong> mass tourism is the enormous pressure it puts on coastal ecosystems.","<strong>Personally, I prefer</strong> spending summer outdoors rather than in an air-conditioned office."],"exercises":[{"q":"We need to check ___ by noon.","a":"out"},{"q":"I always travel with carry-___ baggage.","a":"on"},{"q":"It was absolutely ___ — nearly 42 degrees!","a":"scorching"},{"q":"The hotel overlooked ___ the sea.","a":"−"}]},{"id":"autumn","name":"AUTUMN","emoji":"🍂","pages":"p.34","es":"Otoño","aptis":true,"center":{"en":"AUTUMN","es":"otoño (UK) / fall (US)"},"zones":{"tl":[{"head":"WEATHER","es":"clima","items":[{"en":"chilly","es":"fresquito"},{"en":"crisp","es":"fresco y seco"},{"en":"overcast","es":"nublado"},{"en":"drizzle","es":"llovizna"},{"en":"mist","es":"neblina"},{"en":"frost","es":"escarcha"}]}],"tm":[{"head":"COLOURS","es":"colores","items":[{"en":"amber","es":"ámbar"},{"en":"russet","es":"rojizo"},{"en":"ochre","es":"ocre"},{"en":"golden","es":"dorado"},{"en":"crimson","es":"carmesí"}]}],"tr":[{"head":"HARVEST","es":"cosecha","items":[{"en":"crop","es":"cultivo"},{"en":"to harvest","es":"cosechar"},{"en":"vineyard","es":"viñedo"},{"en":"pumpkin","es":"calabaza"},{"en":"mushroom","es":"seta"},{"en":"chestnut","es":"castaña"}]}],"ml":[{"head":"BACK TO SCHOOL","es":"vuelta al cole","items":[{"en":"term","es":"trimestre"},{"en":"timetable","es":"horario"},{"en":"syllabus","es":"programa"},{"en":"to enrol","es":"matricularse"},{"en":"fresher","es":"estudiante de 1º"}]}],"mr":[{"head":"NATURE","es":"naturaleza","items":[{"en":"fallen leaves","es":"hojas caídas"},{"en":"to shed","es":"per const HTML_APT_SPEAKING = "<div class=\"sh\">\n    <h1>🎤 Speaking — Aptis Advanced</h1>\n    <p>Las 4 partes del examen explicadas, plantillas de discurso para sonar pro, temas recurrentes y frases hechas para opinar. Pulsa cada pestaña.</p>\n  </div>\n\n  <!-- TABS -->\n  <div class=\"tabs\">\n    <button class=\"tb on\" onclick=\"spTab('overview',this)\">📋 Estructura</button>\n    <button class=\"tb\" onclick=\"spTab('p1',this)\">1️⃣ Personal</button>\n    <button class=\"tb\" onclick=\"spTab('p2',this)\">2️⃣ Foto + Qs</button>\n    <button class=\"tb\" onclick=\"spTab('p3',this)\">3️⃣ Comparar</button>\n    <button class=\"tb\" onclick=\"spTab('p4',this)\">4️⃣ Discusión abstracta</button>\n    <button class=\"tb\" onclick=\"spTab('phrases',this)\">💬 Frases Pro</button>\n    <button class=\"tb\" onclick=\"spTab('topics',this)\">🌍 Temas recurrentes</button>\n    <button class=\"tb\" onclick=\"spTab('tips',this)\">⚡ Tips & errores</button>\n    <button class=\"tb\" onclick=\"spTab('trainer',this)\">🎲 Generador</button>\n  </div>\n\n  <!-- ====== OVERVIEW ====== -->\n  <div class=\"panel on\" id=\"sp-overview\">\n    <div class=\"card\">\n      <h3>⏱️ El examen en 12 minutos</h3>\n      <p style=\"font-size:13px;margin-bottom:10px\">Aptis Advanced Speaking dura ~<strong>12 minutos</strong>, se hace en ordenador, te grabas. Son <strong>4 partes</strong>, dificultad creciente. No hay examinador en directo: hablas a la pantalla. Eso es <em>una ventaja</em>: sin presión visual, sin interrupciones.</p>\n      <table class=\"rs-table\">\n        <thead><tr><th>Parte</th><th>Qué hay que hacer</th><th>Tiempo respuesta</th><th>Prep.</th></tr></thead>\n        <tbody>\n          <tr><td><span class=\"tag t-b\">Part 1</span></td><td>3 preguntas personales sencillas (hometown, hobbies, work…)</td><td><strong>30 s</strong> cada una</td><td>—</td></tr>\n          <tr><td><span class=\"tag t-g\">Part 2</span></td><td>Describe 1 foto + 2 preguntas personales relacionadas</td><td><strong>45 s</strong> cada una</td><td>—</td></tr>\n          <tr><td><span class=\"tag t-o\">Part 3</span></td><td>Compara 2 fotos + 2 preguntas de opinión</td><td><strong>45 s</strong> cada una</td><td>—</td></tr>\n          <tr><td><span class=\"tag t-r\">Part 4</span></td><td>Tema abstracto con 3 preguntas conectadas</td><td><strong>2 min</strong> para las 3</td><td><strong>1 min</strong></td></tr>\n        </tbody>\n      </table>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3>📊 Cómo se puntúa (CEFR)</h3>\n        <p style=\"font-size:13px\">Te asignan un nivel global: <strong>B2 / C1 / C2</strong>. Los criterios son:</p>\n        <ul class=\"sl\" style=\"font-size:13px;margin-top:6px\">\n          <li><strong>Lexical resource</strong>: vocabulario rico, idioms, collocations, no repetir.</li>\n          <li><strong>Grammatical range &amp; accuracy</strong>: rangos de tiempos, condicionales, inversión, modales.</li>\n          <li><strong>Pronunciation &amp; fluency</strong>: ritmo natural, entonación, sin pausas largas.</li>\n          <li><strong>Discourse management</strong>: organización, conectores, ideas que se hilan.</li>\n        </ul>\n        <div class=\"note\">⭐ Para C1 no necesitas ser perfecto. Necesitas <strong>variedad</strong>, <strong>fluidez</strong> y <strong>conectar ideas</strong>.</div>\n      </div>\n      <div class=\"card\">\n        <h3>🎯 Objetivo por parte</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>Part 1</strong>: muestra naturalidad — saluda mentalmente, no recites.</li>\n          <li><strong>Part 2</strong>: enseña <em>vocabulario descriptivo</em> + experiencia personal.</li>\n          <li><strong>Part 3</strong>: usa <em>comparativas</em> y <em>contrastes</em>; nunca describas las dos por separado.</li>\n          <li><strong>Part 4</strong>: aquí decides el grado: opinión razonada + ejemplo + condicional + cierre.</li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🧱 Esquema universal de respuesta C1 (memoriza esto)</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.8\">\n        🟦 OPINIÓN &nbsp;➜&nbsp; 🟪 RAZÓN (\"because…\", \"given that…\") &nbsp;➜&nbsp; 🟧 EJEMPLO (\"for instance…\") &nbsp;➜&nbsp; 🟨 MATIZ / CONTRASTE (\"that said…\") &nbsp;➜&nbsp; 🟩 CIERRE (\"at the end of the day…\")\n      </div>\n      <div class=\"ex\"><strong>Demo:</strong> \"I'd say technology has changed the way we communicate <em>(opinion)</em> mainly because it's removed physical distance <em>(reason)</em>. Take video calls during the pandemic, for instance — families that hadn't seen each other in years suddenly could <em>(example)</em>. That said, there's a downside: we're more connected, but arguably less present <em>(contrast)</em>. So at the end of the day, it's a trade-off we're still figuring out <em>(closing)</em>.\"</div>\n    </div>\n  </div>\n\n  <!-- ====== PART 1 ====== -->\n  <div class=\"panel\" id=\"sp-p1\">\n    <div class=\"card\">\n      <h3><span class=\"tag t-b\">PART 1</span> Preguntas personales · 3 Qs · 30 s cada una</h3>\n      <p style=\"font-size:13px\">Es <strong>warm-up</strong>. No demuestres todo lo que sabes aquí, demuestra <em>naturalidad</em>. La trampa: si das respuestas demasiado perfectas suenas memorizado y eso baja la nota.</p>\n    </div>\n\n    <div class=\"card\">\n      <h3>📝 Qué te van a preguntar</h3>\n      <div class=\"g2\">\n        <div>\n          <strong style=\"color:var(--acc);font-size:13px\">Temas habituales:</strong>\n          <ul class=\"sl\" style=\"font-size:13px;margin-top:6px\">\n            <li>Where are you from? / Where do you live?</li>\n            <li>What do you do? / What do you study?</li>\n            <li>Tell me about your hobbies / free time.</li>\n            <li>What did you do last weekend?</li>\n            <li>What are your plans for the future?</li>\n            <li>Do you live with family / friends / alone?</li>\n            <li>What's your favourite kind of food / music / film?</li>\n            <li>How do you usually relax?</li>\n          </ul>\n        </div>\n        <div>\n          <strong style=\"color:var(--grn);font-size:13px\">Estructura ideal (≈3 frases):</strong>\n          <div class=\"struct\" style=\"margin-top:6px\">1. Respuesta directa.<br>2. Detalle + razón (\"because…\").<br>3. Mini ejemplo o anécdota.</div>\n          <div class=\"note\">No metas listas largas. <strong>1 idea bien desarrollada</strong> &gt; 4 ideas a medias.</div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3>✅ Respuesta modelo — \"Tell me about your hobbies\"</h3>\n        <div class=\"ex\">\"Honestly, my main thing these days is <strong>cycling</strong>. I picked it up during lockdown and it's stuck with me — I love how it clears my head after work. Last Sunday I did a 40-kilometre route along the coast with a couple of friends, and we ended up having brunch at a tiny café we'd never noticed before. It's the kind of hobby that gives you a bit of everything: exercise, fresh air and small adventures.\"</div>\n        <div class=\"note\">⚡ Fíjate: solo <strong>UN</strong> hobby. Detalle + experiencia + cierre que conecta.</div>\n      </div>\n      <div class=\"card\">\n        <h3>❌ Respuesta floja</h3>\n        <div class=\"ex\" style=\"border-left-color:var(--red);background:rgba(248,81,73,.05)\">\"I like cycling, reading, watching films, cooking and travelling. Cycling is good. Reading is good too. I read a lot of books. Films are interesting. I cook with my mother.\"</div>\n        <div class=\"note\" style=\"background:rgba(248,81,73,.08);border-color:rgba(248,81,73,.2);color:#fca5a5\">Demasiado plana, vocabulario A2, no hay nada que el examinador pueda <em>premiar</em>. Es la respuesta de listas que MUCHO mata.</div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🪄 Frases que te salvan en P1</h3>\n      <div class=\"g3\">\n        <div class=\"ex\">\"Funnily enough,…\"</div>\n        <div class=\"ex\">\"I'd say I'm pretty into…\"</div>\n        <div class=\"ex\">\"It depends, but normally…\"</div>\n        <div class=\"ex\">\"To be honest, lately…\"</div>\n        <div class=\"ex\">\"I tend to…\"</div>\n        <div class=\"ex\">\"Believe it or not,…\"</div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>⚡ Tips Part 1</h3>\n      <ul class=\"sl\" style=\"font-size:13px\">\n        <li>Usa <strong>presente perfecto</strong> al menos una vez (\"I've been into… for years\").</li>\n        <li>Si te bloqueas, gana tiempo con: <em>\"That's actually a good question — let me think for a second…\"</em></li>\n        <li>No hace falta que la historia sea verdad. Puede ser una pequeña <strong>ficción útil</strong>.</li>\n        <li>30 s = aprox. <strong>4 frases</strong>. Calcula con tu reloj antes del examen.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- ====== PART 2 ====== -->\n  <div class=\"panel\" id=\"sp-p2\">\n    <div class=\"card\">\n      <h3><span class=\"tag t-g\">PART 2</span> Foto + 2 preguntas personales · 45 s cada una</h3>\n      <p style=\"font-size:13px\">Te enseñan UNA imagen. Tres respuestas: <strong>(1)</strong> describe la foto, <strong>(2)</strong> y <strong>(3)</strong> dos preguntas personales sobre el tema de la foto. Suelen ser temas cotidianos: una familia comiendo, gente trabajando, alguien estudiando, una calle llena de gente, etc.</p>\n    </div>\n\n    <div class=\"card\">\n      <h3>🖼️ Cómo describir la foto en 45 segundos</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.7\">\n        <strong>① QUÉ:</strong> \"The picture shows / In this image we can see…\"<br>\n        <strong>② QUIÉN:</strong> \"There appear to be… / In the foreground/background…\"<br>\n        <strong>③ ACCIÓN:</strong> \"They seem to be …-ing / It looks as if…\"<br>\n        <strong>④ AMBIENTE:</strong> \"The atmosphere feels… / It strikes me as…\"<br>\n        <strong>⑤ INFERENCIA / OPINIÓN:</strong> \"I'd guess they're… / This reminds me of…\"\n      </div>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3>🗣️ Frases descriptivas premium</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"In the foreground there's…, while in the background you can spot…\"</li>\n          <li>\"Judging by their expressions, they seem to be…\"</li>\n          <li>\"It's hard to tell exactly, but I'd say…\"</li>\n          <li>\"What strikes me most is…\"</li>\n          <li>\"There's a sense of… in the way they're…\"</li>\n          <li>\"At first glance it looks like…, but on closer inspection…\"</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3>🎨 Vocabulario para describir</h3>\n        <div style=\"font-size:13px;line-height:1.8\">\n          <strong style=\"color:var(--org)\">Personas:</strong> middle-aged, in their twenties, casually dressed, smartly dressed, unkempt, beaming, frowning, deep in thought<br>\n          <strong style=\"color:var(--org)\">Lugares:</strong> bustling, packed, deserted, cosy, cluttered, spacious, run-down, neatly organised<br>\n          <strong style=\"color:var(--org)\">Ambiente:</strong> tense, lively, peaceful, hectic, intimate, festive, serene, chaotic<br>\n          <strong style=\"color:var(--org)\">Iluminación:</strong> dimly lit, sun-drenched, bathed in light, cast in shadow\n        </div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>✅ Respuesta modelo · Foto: una familia cenando juntos</h3>\n      <div class=\"ex\">\"The picture shows what looks like <strong>a multigenerational family gathered around a dinner table</strong>. In the foreground there's an older woman, possibly the grandmother, serving food, while the others — I'd guess parents and a couple of teenagers — are chatting and laughing. The atmosphere feels warm and a bit chaotic, the way real family
