\"</li>\n        <li>It-cleft → \"It's phones <strong>that</strong> are genuinely addictive.\"</li>\n        <li>Wh-cleft → \"<strong>What's</strong> genuinely addictive <strong>is</strong> phones.\"</li>\n        <li>All-cleft → \"<strong>All</strong> phones really do <strong>is</strong> hijack our attention.\"</li>\n      </ol>\n    </div>\n  </div>\n\n  <!-- MODAL PERFECTS -->\n  <div class=\"panel\" id=\"pg-modals\">\n    <div class=\"card\">\n      <h3>🎯 Modal perfects — hablar del pasado con matiz</h3>\n      <p style=\"font-size:13px\">Modal + <strong>have + participio</strong>. Te da deducción, arrepentimiento, crítica o posibilidad referida al pasado. Es UNO de los marcadores más claros de C1.</p>\n    </div>\n\n    <table class=\"rs-table\">\n      <thead><tr><th>Estructura</th><th>Significado</th><th>Ejemplo</th></tr></thead>\n      <tbody>\n        <tr><td><strong>must have + pp</strong></td><td>Deducción casi segura (positiva)</td><td>\"She <strong>must have left</strong> early — her car's gone.\"</td></tr>\n        <tr><td><strong>can't have + pp</strong></td><td>Deducción casi segura (negativa)</td><td>\"He <strong>can't have known</strong> about the meeting.\"</td></tr>\n        <tr><td><strong>may / might have + pp</strong></td><td>Posibilidad pasada</td><td>\"They <strong>might have missed</strong> the train.\"</td></tr>\n        <tr><td><strong>could have + pp</strong></td><td>Posibilidad / capacidad no usada</td><td>\"You <strong>could have called</strong> me — I was free.\"</td></tr>\n        <tr><td><strong>should have + pp</strong></td><td>Crítica / arrepentimiento</td><td>\"I <strong>should have studied</strong> harder.\"</td></tr>\n        <tr><td><strong>shouldn't have + pp</strong></td><td>Critica acción hecha</td><td>\"You <strong>shouldn't have said</strong> that.\"</td></tr>\n        <tr><td><strong>needn't have + pp</strong></td><td>Hizo algo que no era necesario</td><td>\"You <strong>needn't have brought</strong> wine — there was plenty.\"</td></tr>\n        <tr><td><strong>would have + pp</strong></td><td>Conditional 3 / hipótesis pasada</td><td>\"I <strong>would have helped</strong> if you'd asked.\"</td></tr>\n      </tbody>\n    </table>\n\n    <div class=\"card\" style=\"margin-top:12px\">\n      <h3>⚖️ Comparación que confunde a TODO el mundo</h3>\n      <div class=\"g2\">\n        <div>\n          <strong style=\"color:var(--grn)\">could have done</strong>\n          <div class=\"def\">Posibilidad / capacidad pasada que NO se usó.</div>\n          <div class=\"ex\">\"I <strong>could have gone</strong> to the party but I was tired.\" (no fui)</div>\n        </div>\n        <div>\n          <strong style=\"color:var(--acc)\">may/might have done</strong>\n          <div class=\"def\">Especulación: quizás pasó, no estoy seguro.</div>\n          <div class=\"ex\">\"He <strong>might have gone</strong> to the party — I haven't checked.\"</div>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🎤 Cómo lucirlos en Speaking</h3>\n      <ul class=\"sl\" style=\"font-size:13px;line-height:1.9\">\n        <li>\"Looking back, I <strong>should have started</strong> learning English much earlier.\"</li>\n        <li>\"My grandparents <strong>couldn't have imagined</strong> a world with smartphones.\"</li>\n        <li>\"Some experts argue we <strong>shouldn't have rushed</strong> the AI rollout.\"</li>\n        <li>\"Things <strong>might have turned out</strong> differently if education had been more flexible.\"</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- FRONTING -->\n  <div class=\"panel\" id=\"pg-fronting\">\n    <div class=\"card\">\n      <h3>⬅️ Fronting — mover info al inicio para enfatizar</h3>\n      <p style=\"font-size:13px\">Cambias el orden estándar (S-V-O) para colocar al principio el elemento que quieres destacar. Muy común en escritura formal y discursos.</p>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3>📐 Patrones</h3>\n        <div class=\"struct\" style=\"white-space:normal;line-height:1.8\">\n          <strong>1. Adjetivo / participio:</strong> Far more important is…<br>\n          <strong>2. Lugar:</strong> In the middle of the room stood…<br>\n          <strong>3. Adverbio:</strong> So tired was she that…<br>\n          <strong>4. Objeto:</strong> A bigger mistake we couldn't have made.\n        </div>\n      </div>\n      <div class=\"card\">\n        <h3>✨ Ejemplos para Writing</h3>\n        <ul class=\"sl\" style=\"font-size:13px;line-height:1.9\">\n          <li><strong>Far more important</strong> than salary <strong>is</strong> a healthy work environment.</li>\n          <li><strong>Particularly worrying</strong> <strong>is</strong> the rise in childhood obesity.</li>\n          <li><strong>Equally relevant</strong> <strong>is</strong> the impact on rural communities.</li>\n          <li><strong>So drastic were</strong> the changes <strong>that</strong> nobody could keep up.</li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--grn)\">\n      <h3>⚖️ Fronting vs. Inversion</h3>\n      <p style=\"font-size:13px;margin-bottom:6px\">No son lo mismo:</p>\n      <ul class=\"sl\" style=\"font-size:13px;line-height:1.9\">\n        <li><strong>Fronting</strong> = mueves un elemento al inicio. NO siempre invierte.</li>\n        <li><strong>Inversion</strong> = sujeto y aux cambian de orden. SIEMPRE pasa con adv. negativos.</li>\n        <li>\"In the corner sat a cat.\" → fronting + inversión \"naturalmente\" porque hay verbo de posición.</li>\n        <li>\"Equally important is the cost.\" → fronting con inversión be-S.</li>\n        <li>\"Never have I seen…\" → inversión obligatoria por <em>never</em>.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- HEDGING -->\n  <div class=\"panel\" id=\"pg-hedging\">\n    <div class=\"card\">\n      <h3>🪶 Hedging &amp; Stance — cómo decir cosas sin sonar tajante</h3>\n      <p style=\"font-size:13px\">Suavizar afirmaciones es un marcador clarísimo de inglés culto. En Writing y Part 4, no afirmes, <em>matiza</em>.</p>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3>🛡️ Hedging (suavizar)</h3>\n        <ul class=\"sl\" style=\"font-size:13px;line-height:1.9\">\n          <li><strong>It would seem that…</strong></li>\n          <li><strong>There is reason to believe (that)…</strong></li>\n          <li><strong>It might be argued that…</strong></li>\n          <li><strong>This appears to suggest that…</strong></li>\n          <li><strong>Many would claim that…</strong></li>\n          <li><strong>To some extent,…</strong></li>\n          <li><strong>Tend to / be inclined to + inf</strong></li>\n          <li><strong>Arguably / presumably / supposedly</strong></li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3>🎯 Stance adverbs (postura)</h3>\n        <ul class=\"sl\" style=\"font-size:13px;line-height:1.9\">\n          <li><strong>Admittedly,…</strong> (\"yes, vale, te lo concedo\")</li>\n          <li><strong>Crucially,…</strong> (\"lo decisivo es\")</li>\n          <li><strong>Notably,…</strong> (\"y muy especialmente\")</li>\n          <li><strong>Curiously,…</strong> (\"curiosamente\")</li>\n          <li><strong>Frankly,…</strong> (\"para ser sincero\")</li>\n          <li><strong>Surprisingly,…</strong></li>\n          <li><strong>Understandably,…</strong></li>\n          <li><strong>Inevitably,…</strong></li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>⚖️ Tajante vs. matizado</h3>\n      <table class=\"rs-table\">\n        <thead><tr><th>❌ Tajante (B1/B2)</th><th>✅ Matizado (C1)</th></tr></thead>\n        <tbody>\n          <tr><td>Social media is bad.</td><td>It would seem that social media has, on balance, more drawbacks than benefits.</td></tr>\n          <tr><td>This will solve everything.</td><td>This appears to be a step in the right direction, although it's unlikely to solve everything.</td></tr>\n          <tr><td>People don't read books anymore.</td><td>There's some evidence to suggest that reading habits have shifted, particularly among younger generations.</td></tr>\n          <tr><td>The government must act.</td><td>It might be argued that the government has a responsibility to step in.</td></tr>\n        </tbody>\n      </table>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--pur)\">\n      <h3>🎤 Cierre con stance (úsalo en Part 4)</h3>\n      <ul class=\"sl\" style=\"font-size:13px;line-height:1.9\">\n        <li>\"<strong>Admittedly</strong>, there are downsides, but on balance the change has been positive.\"</li>\n        <li>\"<strong>Crucially</strong>, none of this works without proper regulation.\"</li>\n        <li>\"<strong>Inevitably</strong>, the next decade will look very different from this one.\"</li>\n      </ul>\n    </div>\n  </div>";

const HTML_APT_REPORTED = "<div class=\"sh\"><h1>Reported Speech</h1><p>Backshift de tiempos, pronombres y modales. Verbos de reporte con sus estructuras.</p></div>\n  <div class=\"tabs\">\n    <button class=\"tb on\" onclick=\"rsTab('rs-tenses')\">⏱️ Backshift de tiempos</button>\n    <button class=\"tb\" onclick=\"rsTab('rs-pronouns')\">🔄 Pronombres & Expresiones</button>\n    <button class=\"tb\" onclick=\"rsTab('rs-modals')\">⚙️ Modales</button>\n    <button class=\"tb\" onclick=\"rsTab('rs-verbs')\">📝 Verbos de reporte</button>\n  </div>\n  <div id=\"rs-tenses\" class=\"panel on\">\n    <div class=\"card\" style=\"overflow-x:auto\">\n      <table class=\"rs-table\">\n        <thead><tr><th>Tiempo original</th><th>Estilo directo</th><th>→ Reported speech</th><th>Ejemplo</th></tr></thead>\n        <tbody>\n          <tr><td><span class=\"tag t-b\">Present simple</span></td><td><em>\"I work here.\"</em></td><td><span class=\"tag t-g\">Past simple</span></td><td>She said she <strong>worked</strong> there.</td></tr>\n          <tr><td><span class=\"tag t-b\">Present continuous</span></td><td><em>\"I'm leaving.\"</em></td><td><span class=\"tag t-g\">Past continuous</span></td><td>He said he <strong>was leaving</strong>.</td></tr>\n          <tr><td><span class=\"tag t-b\">Present perfect</span></td><td><em>\"I've finished.\"</em></td><td><span class=\"tag t-g\">Past perfect</span></td><td>She said she <strong>had finished</strong>.</td></tr>\n          <tr><td><span class=\"tag t-b\">Present perf. cont.</span></td><td><em>\"I've been waiting.\"</em></td><td><span class=\"tag t-g\">Past perfect cont.</span></td><td>He said he <strong>had been waiting</strong>.</td></tr>\n          <tr><td><span class=\"tag t-b\">Past simple</span></td><td><em>\"She left.\"</em></td><td><span class=\"tag t-g\">Past perfect</span></td><td>He said she <strong>had left</strong>.</td></tr>\n          <tr><td><span class=\"tag t-b\">Past continuous</span></td><td><em>\"I was sleeping.\"</em></td><td><span class=\"tag t-g\">Past perfect cont.</span></td><td>She said she <strong>had been sleeping</strong>.</td></tr>\n          <tr><td><span class=\"tag t-b\">Past perfect</span></td><td><em>\"They had gone.\"</em></td><td><span class=\"tag t-g\">Past perfect (sin cambio)</span></td><td>He said they <strong>had gone</strong>.</td></tr>\n          <tr><td><span class=\"tag t-b\">will</span></td><td><em>\"It will rain.\"</em></td><td><span class=\"tag t-g\">would</span></td><td>She said it <strong>would</strong> rain.</td></tr>\n          <tr><td><span class=\"tag t-b\">can</span></td><td><em>\"I can help.\"</em></td><td><span class=\"tag t-g\">could</span></td><td>He said he <strong>could</strong> help.</td></tr>\n          <tr><td><span class=\"tag t-b\">may</span></td><td><em>\"It may work.\"</em></td><td><span class=\"tag t-g\">might</span></td><td>She said it <strong>might</strong> work.</td></tr>\n          <tr><td><span class=\"tag t-b\">must</span></td><td><em>\"You must go.\"</em></td><td><span class=\"tag t-g\">had to / must</span></td><td>He said I <strong>had to/must</strong> go.</td></tr>\n          <tr><td><span class=\"tag t-y\">could/would/should/might</span></td><td><em>\"I would help.\"</em></td><td><span class=\"tag t-y\">Sin cambio</span></td><td>She said she <strong>would</strong> help.</td></tr>\n        </tbody>\n      </table>\n    </div>\n    <div class=\"note\">⚠️ No hay backshift si la información sigue siendo verdad: <em>\"The sun rises in the east.\" → He said the sun rises in the east.</em></div>\n  </div>\n  <div id=\"rs-pronouns\" class=\"panel\">\n    <div class=\"card\" style=\"overflow-x:auto\">\n      <table class=\"rs-table\">\n        <thead><tr><th>Original</th><th>Reported</th><th>Expresiones de tiempo</th><th>→ Reported</th></tr></thead>\n        <tbody>\n          <tr><td>I</td><td>he / she</td><td>now</td><td>then / at that moment</td></tr>\n          <tr><td>you</td><td>I / we / they</td><td>today</td><td>that day</td></tr>\n          <tr><td>we</td><td>they</td><td>yesterday</td><td>the day before / the previous day</td></tr>\n          <tr><td>my / your</td><td>his / her / their</td><td>tomorrow</td><td>the next day / the following day</td></tr>\n          <tr><td>here</td><td>there</td><td>last week</td><td>the week before / the previous week</td></tr>\n          <tr><td>this</td><td>that</td><td>next year</td><td>the following year</td></tr>\n          <tr><td>these</td><td>those</td><td>ago</td><td>before / previously</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </div>\n  <div id=\"rs-modals\" class=\"panel\">\n    <div class=\"card\" style=\"overflow-x:auto\">\n      <table class=\"rs-table\">\n        <thead><tr><th>Modal original</th><th>En reported speech</th><th>Ejemplo</th></tr></thead>\n        <tbody>\n          <tr><td>will</td><td>would</td><td><em>\"I'll call.\" → She said she <strong>would</strong> call.</em></td></tr>\n          <tr><td>can</td><td>could</td><td><em>\"I can swim.\" → He said he <strong>could</strong> swim.</em></td></tr>\n          <tr><td>may</td><td>might</td><td><em>\"It may snow.\" → She said it <strong>might</strong> snow.</em></td></tr>\n          <tr><td>must (obligación)</td><td>had to</td><td><em>\"You must leave.\" → He said I <strong>had to</strong> leave.</em></td></tr>\n          <tr><td>must (deducción)</td><td>must (sin cambio)</td><td><em>\"She must be tired.\" → He said she <strong>must</strong> be tired.</em></td></tr>\n          <tr><td>shall (futuro)</td><td>would</td><td><em>\"I shall return.\" → She said she <strong>would</strong> return.</em></td></tr>\n          <tr><td>shall (sugerencia)</td><td>should</td><td><em>\"Shall I open it?\" → He asked if he <strong>should</strong> open it.</em></td></tr>\n          <tr><td>could / would / should / might</td><td>Sin cambio</td><td><em>\"I should study.\" → She said she <strong>should</strong> study.</em></td></tr>\n          <tr><td>needn't</td><td>needn't / didn't need to</td><td><em>\"You needn't worry.\" → He said I <strong>needn't</strong> worry.</em></td></tr>\n        </tbody>\n      </table>\n    </div>\n  </div>\n  <div id=\"rs-verbs\" class=\"panel\">\n    <div class=\"g2\">\n      <div class=\"card\">\n        <div class=\"tag t-b\">verb + that-clause</div>\n        <div class=\"def\">admit, agree, announce, claim, complain, confirm, deny, explain, insist, mention, promise, reply, reveal, say, state, suggest, warn</div>\n        <div class=\"ex\">She <strong>admitted that</strong> she had made a mistake.</div>\n      </div>\n      <div class=\"card\">\n        <div class=\"tag t-g\">verb + sb + that-clause</div>\n        <div class=\"def\">assure, convince, inform, notify, persuade, remind, tell, warn</div>\n        <div class=\"ex\">He <strong>told me that</strong> the meeting was cancelled.</div>\n      </div>\n      <div class=\"card\">\n        <div class=\"tag t-o\">verb + to-infinitive</div>\n        <div class=\"def\">agree, claim, demand, offer, promise, refuse, threaten</div>\n        <div class=\"ex\">She <strong>refused to sign</strong> the contract.</div>\n      </div>\n      <div class=\"card\">\n        <div class=\"tag t-p\">verb + sb + to-infinitive</div>\n        <div class=\"def\">advise, ask, beg, convince, encourage, instruct, invite, order, persuade, remind, tell, urge, warn</div>\n        <div class=\"ex\">He <strong>urged her to reconsider</strong> her decision.</div>\n      </div>\n      <div class=\"card\">\n        <div class=\"tag t-y\">verb + -ing</div>\n        <div class=\"def\">admit, apologise for, confess to, deny, insist on, recommend, suggest</div>\n        <div class=\"ex\">She <strong>denied having</strong> taken the money. <br>He <strong>suggested going</strong> to the cinema.</div>\n        <div class=\"note\">⚠️ suggest + -ing (NOT suggest sb to)</div>\n      </div>\n      <div class=\"card\">\n        <div class=\"tag t-r\">Questions (reported)</div>\n        <div class=\"struct\">wh- word + subject + verb (statement order)</div>\n        <div class=\"ex\">Direct: \"Where do you live?\" → She asked me <strong>where I lived</strong>.</div>\n        <div class=\"ex\">Yes/No: \"Are you coming?\" → He asked <strong>whether/if I was coming</strong>.</div>\n        <div class=\"note\">⚠️ NO inversion + NO question mark en reported questions</div>\n      </div>\n    </div>\n  </div>";

const HTML_APT_PLAN = "<div class=\"sh\">\n    <h1>🧠 Plan de estudio Focus-friendly</h1>\n    <p>Microsesiones, 8 semanas estructuradas, manifesto antifocus-killer. Pensado para cuando empiezas con todas las ganas y a los 4 días te pierdes.</p>\n  </div>\n\n  <div class=\"card\" style=\"border-left:4px solid var(--pur);background:linear-gradient(135deg,rgba(188,140,255,.06),rgba(88,166,255,.04))\">\n    <h3 style=\"color:var(--pur)\">📜 MANIFESTO</h3>\n    <ol style=\"font-size:13.5px;padding-left:22px;line-height:1.9\">\n      <li><strong>20 minutos &gt; 2 horas.</strong> 20 minutos centrados valen más que 2 horas dispersas.</li>\n      <li><strong>Una cosa por sesión.</strong> Si abres 4 pestañas, cierras 4 pestañas sin acabar nada.</li>\n      <li><strong>Mejor mal que nada.</strong> Hoy no rinde, vale, pero <em>haz algo</em>: 3 flashcards. Mañana.</li>\n      <li><strong>Lo aburrido se intercala.</strong> 15 min gramática + 5 min de algo que te guste (idioms, Speaking).</li>\n      <li><strong>Sin culpa.</strong> Saltarte un día no rompe nada. Romper un mes sí.</li>\n      <li><strong>El cerebro recuerda lo emocional.</strong> Si una palabra te suena ridícula, perfecto: la has aprendido.</li>\n      <li><strong>Empieza siempre por lo fácil.</strong> Para arrancar el motor, no para impresionar a nadie.</li>\n    </ol>\n  </div>\n\n  <div class=\"g2\">\n    <div class=\"card\">\n      <h3>⏰ Microsesión modelo (25 min)</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.8\">\n        <strong>5 min</strong> warm-up: 5 flashcards rápidas o 3 sinónimos del día anterior.<br>\n        <strong>15 min</strong> bloque principal: una unidad de gramática <em>o</em> una parte del Speaking.<br>\n        <strong>5 min</strong> cierre: anota 3 palabras nuevas en una nota del móvil.\n      </div>\n      <div class=\"note\">⏳ Pomodoro adaptado: <strong>2 microsesiones</strong> al día son tu meta mínima.</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>📅 Semana tipo</h3>\n      <table class=\"rs-table\">\n        <thead><tr><th>Día</th><th>Foco</th><th>Tiempo</th></tr></thead>\n        <tbody>\n          <tr><td>Lunes</td><td>Gramática (1 unidad)</td><td>25 min</td></tr>\n          <tr><td>Martes</td><td>Vocabulario + flashcards</td><td>25 min</td></tr>\n          <tr><td>Miércoles</td><td>Speaking Part 1+2 (graba)</td><td>25 min</td></tr>\n          <tr><td>Jueves</td><td>Test corto + repasar errores</td><td>25 min</td></tr>\n          <tr><td>Viernes</td><td>Speaking Part 4 (grábate)</td><td>25 min</td></tr>\n          <tr><td>Sábado</td><td>Algo \"fácil\": idioms / phrasals</td><td>15 min</td></tr>\n          <tr><td>Domingo</td><td>Descanso o test diagnóstico</td><td>—</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </div>\n\n  <div class=\"card\">\n    <h3>🗺️ Mapa 8 semanas — qué tocar y cuándo</h3>\n    <div class=\"g2\">\n      <div>\n        <strong style=\"color:var(--acc)\">Bloque 1 (S1–S2): Cimientos</strong>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>Tiempos verbales (Verb Map)</li>\n          <li>Reported Speech</li>\n          <li>Speaking Part 1 (graba 3 respuestas)</li>\n          <li>50 flashcards de vocabulario</li>\n        </ul>\n        <strong style=\"color:var(--grn)\">Bloque 2 (S3–S4): Estructuras C1</strong>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>Inversión, cleft sentences</li>\n          <li>Modales avanzados (must have, might have…)</li>\n          <li>Speaking Part 2 (5 fotos describir)</li>\n          <li>Idioms por temas</li>\n        </ul>\n      </div>\n      <div>\n        <strong style=\"color:var(--org)\">Bloque 3 (S5–S6): Refinamiento</strong>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>Phrasal verbs por partícula</li>\n          <li>Natural English (vs. formal)</li>\n          <li>Speaking Part 3 (5 comparaciones)</li>\n          <li>Sinónimos avanzados</li>\n        </ul>\n        <strong style=\"color:var(--red)\">Bloque 4 (S7–S8): Simulación</strong>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>2 tests completos cronometrados</li>\n          <li>Speaking Part 4 (10 temas grabados)</li>\n          <li>Repaso errores recurrentes</li>\n          <li>Vocabulario premium (advvocab)</li>\n        </ul>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"card\" style=\"border-left:4px solid var(--yel)\">\n    <h3>🚨 Si caes en bucle de scroll / dispersión</h3>\n    <ul class=\"sl\" style=\"font-size:13px;line-height:1.9\">\n      <li>Cierra TODO menos esta web.</li>\n      <li>Pon un timer de <strong>10 min</strong>. Solo 10. No 25.</li>\n      <li>Elige UNA tarjeta del home y haz lo mínimo.</li>\n      <li>Cuando suene el timer, decides si sigues. Casi siempre sigues.</li>\n      <li>Si aun así no puedes: cierra y vuelve mañana sin culpa.</li>\n    </ul>\n  </div>";

const HTML_APT_VERBMAP = "<div class=\"sh\"><h1>Verb Tenses Map</h1><p>Mapa visual de todos los tiempos verbales con timeline, estructura y ejemplos.</p></div>\n  <div id=\"verbmap-content\">\n<div class=\"g2\">\n  <div class=\"card\">\n    <div class=\"tag t-b\">Present Simple</div>\n    <div class=\"struct\">subject + V(s/es)</div>\n    <div class=\"ex\">She <strong>works</strong> every day. — estados, rutinas, verdades generales</div>\n    <div style=\"background:rgba(88,166,255,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ——●—————— now ——————————→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-g\">Present Continuous</div>\n    <div class=\"struct\">am/is/are + V-ing</div>\n    <div class=\"ex\">She <strong>is working</strong> right now. — acciones en progreso ahora o temporales</div>\n    <div style=\"background:rgba(63,185,80,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ————[===●===]——— now ———→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-o\">Past Simple</div>\n    <div class=\"struct\">V-ed / irregular</div>\n    <div class=\"ex\">She <strong>worked</strong> yesterday. — acción completa en el pasado</div>\n    <div style=\"background:rgba(240,136,62,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ——●———————————now———→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-o\">Past Continuous</div>\n    <div class=\"struct\">was/were + V-ing</div>\n    <div class=\"ex\">She <strong>was working</strong> when I called. — acción en progreso en momento pasado</div>\n    <div style=\"background:rgba(240,136,62,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ——[====●====]————now———→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-p\">Present Perfect</div>\n    <div class=\"struct\">have/has + past participle</div>\n    <div class=\"ex\">She <strong>has worked</strong> here for years. — pasado con relevancia presente</div>\n    <div style=\"background:rgba(188,140,255,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ——●═══════════════●now——→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-p\">Present Perfect Continuous</div>\n    <div class=\"struct\">have/has been + V-ing</div>\n    <div class=\"ex\">She <strong>has been working</strong> all day. — actividad en progreso hasta ahora</div>\n    <div style=\"background:rgba(188,140,255,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ——[========●now====]——→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-y\">Past Perfect</div>\n    <div class=\"struct\">had + past participle</div>\n    <div class=\"ex\">She <strong>had worked</strong> there before. — anterior a otro momento pasado</div>\n    <div style=\"background:rgba(210,153,34,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ●——●———————————now———→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-y\">Past Perfect Continuous</div>\n    <div class=\"struct\">had been + V-ing</div>\n    <div class=\"ex\">She <strong>had been working</strong> for hours when he arrived. — duración antes de otro pasado</div>\n    <div style=\"background:rgba(210,153,34,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ [======●]——●————now———→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-b\">Future Simple (will)</div>\n    <div class=\"struct\">will + infinitive</div>\n    <div class=\"ex\">She <strong>will work</strong> tomorrow. — predicciones, promesas, decisiones espontáneas</div>\n    <div style=\"background:rgba(88,166,255,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ————————now————●———→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-b\">Future Continuous</div>\n    <div class=\"struct\">will be + V-ing</div>\n    <div class=\"ex\">She <strong>will be working</strong> at 9. — en progreso en un punto futuro</div>\n    <div style=\"background:rgba(88,166,255,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ————now——[====●====]——→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-g\">Future Perfect</div>\n    <div class=\"struct\">will have + past participle</div>\n    <div class=\"ex\">She <strong>will have finished</strong> by June. — completado antes de punto futuro</div>\n    <div style=\"background:rgba(63,185,80,.08);border-radius:6px;padding:6px 8px;font-size:11px;margin-top:6px;color:var(--mu)\">↔ ————now——●═══════●——→</div>\n  </div>\n  <div class=\"card\">\n    <div class=\"tag t-r\">Going to</div>\n    <div class=\"struct\">am/is/are going to + inf</div>\n    <div class=\"ex\">She <strong>is going to work</strong> abroad. — intención decidida, evidencia presente</div>\n    <div class=\"note\" style=\"margin-top:6px\">Going to = intención ya decidida; will = decisión en el momento</div>\n  </div>\n</div>\n<div class=\"note\" style=\"margin-top:12px\">⭐ Regla de oro: <strong>Stative verbs</strong> (know, believe, want, need, own, seem) <strong>NO</strong> se usan en continuo: <span style=\"color:var(--red);text-decoration:line-through\">I am knowing</span> → <span style=\"color:var(--grn)\">I know</span></div>\n</div>";
