function buildPool(mode){
  const T = APP_DATA.TESTS_ALL;
  if (mode === 'p1') return shuffle(T.p1).slice(0,10).map(q => ({ type:'p1', ...q }));
  if (mode === 'p2') return shuffle([
    ...T.p2_hub.map(q => ({ type:'p2', ...q })),
    ...T.quizBasic.map(q => ({
      type:'p2',
      s: q.sentence || q.q || '',
      o: q.options || q.opts || [],
      a: (q.options||q.opts||[]).indexOf(q.answer || q.ans),
      fb: q.explanation || q.hint || ''
    })),
    ...T.quizAdvanced.map(q => ({
      type:'p2',
      s: q.sentence || q.q || '',
      o: q.options || q.opts || [],
      a: (q.options||q.opts||[]).indexOf(q.answer || q.ans),
      fb: q.explanation || q.hint || ''
    })),
  ]).slice(0,10);
  if (mode === 'p3') return shuffle(T.p3_hub).slice(0,Math.min(6, T.p3_hub.length)).map(q => ({ type:'p3', ...q }));
  if (mode === 'p4') return shuffle(T.p4_hub).slice(0,10).map(q => ({ type:'p4', ...q }));
  if (mode === 'coll') return shuffle([
    ...T.quizColloc.map(q => ({
      type:'p2',
      s: q.sentence || q.q || '',
      o: q.options || q.opts || [],
      a: (q.options||q.opts||[]).indexOf(q.answer || q.ans),
      fb: q.explanation || q.hint || ''
    })),
    ...APP_DATA.STUDY_COLLOC_QUIZ.map(q => ({
      type:'p2',
      s: q.sentence || q.q || '',
      o: q.options || q.opts || [],
      a: typeof q.answer === 'number' ? q.answer : (q.options||q.opts||[]).indexOf(q.answer || q.correct),
      fb: q.explanation || q.hint || ''
    })),
  ]).slice(0,12);
  if (mode === 'syn') return shuffle(T.synQ.map(q => ({
    type:'p2',
    s: 'Sinónimo de <strong>' + (q.target||'') + '</strong>:',
    o: q.options || q.opts || [],
    a: (q.options||q.opts||[]).indexOf(q.correct || q.ans),
    fb: q.explanation || q.hint || ''
  }))).slice(0,12);
  if (mode === 'def') return shuffle(T.defQ.map(q => ({
    type:'p2',
    s: 'Definición: <em>' + (q.definition||q.q||'') + '</em>',
    o: q.options || q.opts || [],
    a: (q.options||q.opts||[]).indexOf(q.correct || q.ans),
    fb: q.explanation || q.hint || ''
  }))).slice(0,12);
  if (mode === 'ctx') return shuffle(T.ctxQ.map(q => ({
    type:'p2',
    s: (q.sentence || q.q || '').replace('___','<span class="blank">___</span>'),
    o: q.wordBank || q.options || q.opts || [],
    a: (q.wordBank||q.options||q.opts||[]).indexOf(q.correct || q.ans),
    fb: q.explanation || q.hint || ''
  }))).slice(0,12);
  if (mode.startsWith('apt')) {
    const n = mode.slice(3);
    let src;
    if (T.apt && T.apt[n]) src = T.apt[n];
    else if (T.extra && T.extra[n]) src = T.extra[n];
    else return [];
    // apt.vocab is a matching structure (label/words/opts/correct) — skip; use only grammar (q/opts/ans)
    const all = (src.grammar||[])
      .filter(q => q && q.q && Array.isArray(q.opts))
      .map(q => ({
        type:'p2',
        s: q.q,
        o: q.opts,
        a: q.ans ? (q.ans.charCodeAt(0)-65) : 0,
        fb: q.fb || q.hint || ''
      }));
    return shuffle(all).slice(0,15);
  }
  if (mode === 'full') {
    const pool = [
      ...shuffle(T.p1).slice(0,7).map(q => ({ type:'p1', ...q })),
      ...shuffle(T.p2_hub).slice(0,8).map(q => ({ type:'p2', ...q })),
      ...shuffle(T.p3_hub).slice(0,4).map(q => ({ type:'p3', ...q })),
      ...shuffle(T.p4_hub).slice(0,6).map(q => ({ type:'p4', ...q })),
    ];
    return shuffle(pool);
  }
  if (mode === 'errors') {
    if (!STATE.errors.length) { alert('No tienes errores pendientes. ¡Haz un test primero!'); return null; }
    return STATE.errors.map(e => ({ type:'p2', s:e.q, o:[e.correct, e.yours||'(otra)'], a:0, fb:e.fb||'' }));
  }
  return [];
}

window.startTest = function(mode){
  const pool = buildPool(mode);
  if (!pool) return;
  TEST_STATE.mode = mode;
  TEST_STATE.qIdx = 0; TEST_STATE.score = 0; TEST_STATE.answers = []; TEST_STATE.pool = pool; TEST_STATE.current = pool; TEST_STATE.total = pool.length;
  if (mode === 'full') { TEST_STATE.timeLeft = 15*60; startTimer(); }
  renderTestQuestion();
};
function startTimer(){
  clearInterval(TEST_STATE.timer);
  TEST_STATE.timer = setInterval(() => {
    TEST_STATE.timeLeft--;
    const el = document.getElementById('test-timer');
    if (el) el.textContent = formatTime(TEST_STATE.timeLeft);
    if (TEST_STATE.timeLeft <= 0) { clearInterval(TEST_STATE.timer); finishTest(); }
  }, 1000);
}
function formatTime(s){ return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function renderTestQuestion(){
  const p = document.getElementById('page-tests');
  const q = TEST_STATE.pool[TEST_STATE.qIdx];
  woBuild = []; // reset word-order build state on each question
  if (!q) { finishTest(); return; }
  const prog = ((TEST_STATE.qIdx) / TEST_STATE.total) * 100;
  const timerHtml = TEST_STATE.mode === 'full' ? `<span id="test-timer" style="font-family:var(--serif);font-size:1.1rem;color:var(--accent)">${formatTime(TEST_STATE.timeLeft)}</span>` : '';
  let bodyHtml = '';
  if (q.type === 'p1') {
    const T = APP_DATA.TESTS_ALL;
    const wrongs = shuffle(T.p1.filter(x => x.w !== q.w)).slice(0,3).map(x => x.d);
    q._opts = shuffle([q.d, ...wrongs]);
    q._a = q._opts.indexOf(q.d);
    bodyHtml = `
      <div class="q-meta">Part 1 — Word Definitions</div>
      <div class="q-stem">What does <strong>${esc(q.w)}</strong> mean?</div>
      <div class="q-opts">${q._opts.map((opt,i) => `<button class="q-opt" onclick="answerQ(${i}, ${q._a}, this)">${String.fromCharCode(65+i)}. ${esc(opt)}</button>`).join('')}</div>`;
  } else if (q.type === 'p2') {
    const stem = (q.s||'').replace('___', '<span class="blank">___</span>').replace(/_________/g, '<span class="blank">_________</span>');
    bodyHtml = `<div class="q-meta">Part 2 — Sentence Completion</div>
      <div class="q-stem">${stem}</div>
      <div class="q-opts">${q.o.map((opt,i) => `<button class="q-opt" onclick="answerQ(${i}, ${q.a}, this)">${String.fromCharCode(65+i)}. ${esc(opt)}</button>`).join('')}</div>`;
  } else if (q.type === 'p3') {
    const scrambled = shuffle(q.correct).map((w,i) => `<span class="wo-w" data-w="${esc(w)}" data-i="${i}" onclick="woAdd(this)">${esc(w)}</span>`).join('');
    bodyHtml = `<div class="q-meta">Part 3 — Word Order</div>
      <div class="q-stem">${q.hint || 'Ordena las palabras para formar la frase correcta.'}</div>
      <div class="wo-bank" id="wo-bank">${scrambled}</div>
      <div class="q-stem"><strong>Tu frase:</strong></div>
      <div class="wo-build" id="wo-build"></div>
      <div style="display:flex;gap:8px">
        <button class="btn sec" onclick="woClear()">↻ Reset</button>
        <button class="btn acc" onclick='woCheck(${JSON.stringify(q.correct)})'>Comprobar</button>
      </div>`;
  } else if (q.type === 'p4') {
    const words = q.s.split(/(\s+)/);
    bodyHtml = `<div class="q-meta">Part 4 — Find the Error</div>
      <div class="q-stem">Haz click en la palabra/frase incorrecta:</div>
      <div class="q-stem" style="background:var(--line-soft);padding:14px;border-radius:6px;line-height:2">
        ${words.map(w => /\s+/.test(w) ? w : `<span class="wo-w" onclick="answerP4(this,'${(w||'').replace(/'/g,"&#39;")}','${(q.err||'').replace(/'/g,"&#39;")}')" data-w="${esc(w)}">${esc(w)}</span>`).join('')}
      </div>`;
  }
  p.innerHTML = `
    <div class="h-sec"><h1>${TEST_STATE.mode === 'full' ? 'Examen completo' : 'Test '+TEST_STATE.mode.toUpperCase()}</h1>
      <p>Pregunta ${TEST_STATE.qIdx+1} de ${TEST_STATE.total} ${TEST_STATE.mode==='full' ? '· Tiempo: ' : ''} ${timerHtml}</p></div>
    <div class="progress"><div class="pbar" style="width:${prog}%"></div></div>
    <div class="card">${bodyHtml}
      <div class="q-fb" id="q-fb"></div>
      <div class="q-nav"><button class="btn sec" onclick="exitTest()">← Salir</button>
        <button class="btn" id="next-btn" onclick="nextQ()" style="display:none">Siguiente →</button></div>
    </div>`;
}
window.answerQ = function(chosen, correct, btn){
  const ok = chosen === correct;
  const q = TEST_STATE.pool[TEST_STATE.qIdx];
  // Scope to the test page only — there are also .q-opt elements on hidden Grammar pages
  const container = (btn && btn.closest && (btn.closest('.q-opts') || btn.closest('.q-block') || btn.closest('#page-tests'))) || document.getElementById('page-tests');
  container.querySelectorAll('.q-opt').forEach((b,i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('ok');
    if (i === chosen && !ok) b.classList.add('bad');
  });
  const fb = document.getElementById('q-fb');
  fb.className = 'q-fb show ' + (ok ? 'ok':'bad');
  fb.innerHTML = ok ? '✓ ¡Correcto!' : `✗ ${q.fb || ('La respuesta correcta es: <strong>'+(q.o ? q.o[correct] : q.d)+'</strong>')}`;
  TEST_STATE.answers.push({ q, chosen, ok });
  if (ok) TEST_STATE.score++;
  else addError({ id:`t${Date.now()}-${TEST_STATE.qIdx}`, type:q.type, q:q.s || q.w, correct: q.o?q.o[correct]:q.d, yours: q.o?q.o[chosen]:'', fb:q.fb||'' });
  document.getElementById('next-btn').style.display = '';
};
window.exitTest = function(){ TEST_STATE.current = null; clearInterval(TEST_STATE.timer); renderTests(); };
window.nextQ = function(){ TEST_STATE.qIdx++; if (TEST_STATE.qIdx >= TEST_STATE.total) finishTest(); else renderTestQuestion(); };

let woBuild = [];
window.woAdd = function(el){
  if (el.classList.contains('used')) return;
  el.classList.add('used');
  woBuild.push({ w: el.dataset.w, ref: el });
  const build = document.getElementById('wo-build');
  const span = document.createElement('span');
  span.className = 'wo-w placed';
  span.textContent = el.dataset.w;
  span.onclick = () => { el.classList.remove('used'); span.remove(); woBuild = woBuild.filter(x => x.ref !== el); };
  build.appendChild(span);
};
window.woClear = function(){
  document.querySelectorAll('#wo-bank .wo-w').forEach(w => w.classList.remove('used'));
  document.getElementById('wo-build').innerHTML = ''; woBuild = [];
};
window.woCheck = function(correct){
  const user = woBuild.map(x => x.w);
  const ok = JSON.stringify(user) === JSON.stringify(correct);
  const fb = document.getElementById('q-fb');
  fb.className = 'q-fb show ' + (ok ? 'ok':'bad');
  fb.innerHTML = ok ? '✓ ¡Correcto!' : `✗ La frase correcta es: <strong>${correct.join(' ')}</strong>`;
  if (ok) TEST_STATE.score++;
  TEST_STATE.answers.push({ q: TEST_STATE.pool[TEST_STATE.qIdx], ok });
  document.getElementById('next-btn').style.display = '';
};
window.answerP4 = function(el, clicked, err){
  const ok = clicked === err;
  const containerP4 = (el && el.closest && (el.closest('.q-stem') || el.closest('#page-tests'))) || document.getElementById('page-tests');
  containerP4.querySelectorAll('.wo-w[data-w]').forEach(s => {
    s.style.pointerEvents = 'none';
    if (s.dataset.w === err) { s.style.background = 'var(--good-soft)'; s.style.color = 'var(--good)'; }
  });
  if (!ok) { el.style.background = 'var(--bad-soft)'; el.style.color = 'var(--bad)'; }
  const q = TEST_STATE.pool[TEST_STATE.qIdx];
  const fb = document.getElementById('q-fb');
  fb.className = 'q-fb show ' + (ok ? 'ok':'bad');
  fb.innerHTML = ok ? `✓ ¡Correcto! Debería ser: <strong>${q.correct}</strong>. ${q.fb||''}` : `✗ El error está en "<strong>${q.err}</strong>". Debería ser: <strong>${q.correct}</strong>. ${q.fb||''}`;
  if (ok) TEST_STATE.score++;
  TEST_STATE.answers.push({ q, ok });
  document.getElementById('next-btn').style.display = '';
};

function addError(item){
  if (!STATE.errors.find(e => e.id === item.id || (e.q === item.q && e.correct === item.correct))) {
    STATE.errors.push({ ...item, ts: Date.now() });
    saveErrors();
  }
}
function removeError(id){ STATE.errors = STATE.errors.filter(e => e.id !== id); saveErrors(); }
window.removeError = removeError;

function finishTest(){
  clearInterval(TEST_STATE.timer);
  const p = document.getElementById('page-tests');
  const pct = TEST_STATE.total ? Math.round((TEST_STATE.score / TEST_STATE.total) * 100) : 0;
  let level = 'A2';
  if (pct >= 91) level = 'C2'; else if (pct >= 80) level = 'C1'; else if (pct >= 67) level = 'B2'; else if (pct >= 50) level = 'B1';
  TEST_STATE.current = null;
  p.innerHTML = `
    <div class="q-end">
      <div class="big">${TEST_STATE.score} / ${TEST_STATE.total}</div>
      <div class="lvl">${pct}% — Nivel orientativo: ${level}</div>
      <p>${pct >= 91 ? '¡Espectacular! Estás claramente en zona C2.' : pct >= 80 ? '¡Muy bien! Estás en nivel C1 sólido.' : pct >= 67 ? 'B2 bien establecido. Empuja un poco más para C1.' : 'Sigue practicando — los errores quedan guardados para repasarlos.'}</p>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap">
        <button class="btn" onclick="startTest('${TEST_STATE.mode}')">Repetir</button>
        <button class="btn sec" onclick="exitTest()">Volver al menú</button>
        <button class="btn acc" onclick="go('plan')">Plan de estudio</button>
      </div>
      <div class="review-list">
        ${TEST_STATE.answers.map((a,i) => {
          const q = a.q;
          const text = q.s || q.w || (q.correct && Array.isArray(q.correct) ? q.correct.join(' ') : (q.correct||''));
          return `<div class="review-it ${a.ok?'ok':''}">${i+1}. ${esc(String(text))}</div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderFlashWidget(deck, prefix){
  // Categories from deck.cat distinct
  const cats = Array.from(new Set(deck.map(c => c.cat)));
  return `
    <p class="muted">${deck.length} flashcards · ${cats.length} categorías. Click para girar.</p>
    <div class="filter-row" id="${prefix}-cats">
      <button class="fch on" data-c="__all">Todas</button>
      ${cats.map(c => `<button class="fch" data-c="${esc(c)}">${esc(c)}</button>`).join('')}
    </div>
    <div class="fc-wrap"><div class="fc" id="${prefix}-card">
      <div class="fc-f"><div class="fl" id="${prefix}-lbl">—</div><div class="fw" id="${prefix}-front" style="font-size:1.4rem">—</div></div>
      <div class="fc-b"><div class="fm" id="${prefix}-back">—</div></div>
    </div></div>
    <div class="fc-nav">
      <button class="btn sec" onclick="flPrev('${prefix}')">← Anterior</button>
      <span class="fc-cnt" id="${prefix}-cnt">0/0</span>
      <button class="btn sec" onclick="flNext('${prefix}')">Siguiente →</button>
    </div>
    <div style="text-align:center;margin-top:10px">
      <button class="btn sec" onclick="flShuffle('${prefix}')">🔀 Barajar</button>
      <button class="btn sec" onclick="flMark('${prefix}')" id="${prefix}-mark">📌 Marcar repaso</button>
    </div>
  `;
}
const FL_STATE = {};
function attachFlashWidget(prefix, deck){
  FL_STATE[prefix] = { deck: [...deck], idx: 0, all: [...deck] };
  document.getElementById(prefix+'-card').onclick = () => document.getElementById(prefix+'-card').classList.toggle('flip');
  document.querySelectorAll('#'+prefix+'-cats .fch').forEach(b => b.onclick = () => {
    document.querySelectorAll('#'+prefix+'-cats .fch').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    const c = b.dataset.c;
    FL_STATE[prefix].deck = c === '__all' ? [...FL_STATE[prefix].all] : FL_STATE[prefix].all.filter(x => x.cat === c);
    FL_STATE[prefix].idx = 0;
    flRender(prefix);
  });
  flRender(prefix);
}
function flRender(prefix){
  const S = FL_STATE[prefix];
  if (!S || !S.deck.length) {
    document.getElementById(prefix+'-front').textContent = '—';
    document.getElementById(prefix+'-back').textContent = '';
    document.getElementById(prefix+'-cnt').textContent = '0/0';
    return;
  }
  const c = S.deck[S.idx];
  document.getElementById(prefix+'-card').classList.remove('flip');
  document.getElementById(prefix+'-lbl').textContent = c.cat || '';
  document.getElementById(prefix+'-front').innerHTML = c.front.replace(/\n/g, '<br>');
  document.getElementById(prefix+'-back').textContent = c.back;
  document.getElementById(prefix+'-cnt').textContent = `${S.idx+1}/${S.deck.length}`;
  // update mark button
  const mk = document.getElementById(prefix+'-mark');
  if (mk) {
    const cardKey = c.cat + '::' + c.front;
    mk.textContent = STATE.srsMarked.includes(cardKey) ? '✅ Marcada' : '📌 Marcar repaso';
  }
}
window.flNext = function(prefix){ const S = FL_STATE[prefix]; if (!S.deck.length) return; S.idx = (S.idx+1) % S.deck.length; flRender(prefix); };
window.flPrev = function(prefix){ const S = FL_STATE[prefix]; if (!S.deck.length) return; S.idx = (S.idx-1+S.deck.length) % S.deck.length; flRender(prefix); };
window.flShuffle = function(prefix){ const S = FL_STATE[prefix]; S.deck = shuffle(S.deck); S.idx = 0; flRender(prefix); };
window.flMark = function(prefix){
  const S = FL_STATE[prefix]; if (!S.deck.length) return;
  const c = S.deck[S.idx]; const key = c.cat + '::' + c.front;
  if (STATE.srsMarked.includes(key)) STATE.srsMarked = STATE.srsMarked.filter(x => x !== key);
  else STATE.srsMarked.push(key);
  saveSrs();
  flRender(prefix);
};

function renderSRS(){
  let html = `<p class="muted">Tu sala de repaso: errores guardados + flashcards marcadas como difíciles.</p>
    <div class="srs-stats">
      <div class="srs-st"><div class="v">${STATE.errors.length}</div><div class="l">Errores pendientes</div></div>
      <div class="srs-st"><div class="v">${STATE.srsMarked.length}</div><div class="l">Cards marcadas</div></div>
    </div>`;
  if (STATE.errors.length) {
    html += `<h2 class="h-sub">Errores</h2><div class="review-list">${STATE.errors.map((e,i) => `
      <div class="review-it">
        <div><strong>${i+1}.</strong> ${esc(e.q||'')}</div>
        <div class="small">${e.yours?`<span style="text-decoration:line-through;color:var(--bad)">Tú: ${esc(e.yours)}</span> · `:''}<span style="color:var(--good)">Correcto: ${esc(e.correct||'')}</span></div>
        ${e.fb?`<div class="small">${e.fb}</div>`:''}
        <button class="btn sec" style="font-size:11px;padding:3px 10px;margin-top:4px" onclick="removeError('${e.id}');renderPlan()">Marcar como aprendido</button>
      </div>`).join('')}</div>`;
  } else html += `<p>¡Sin errores pendientes! Haz un test para empezar a guardar repasos.</p>`;
  if (STATE.srsMarked.length) {
    html += `<h2 class="h-sub">Tarjetas marcadas</h2><ul style="padding-left:20px">${STATE.srsMarked.map((k,i) => {
      const [cat, front] = k.split('::');
      return `<li><strong>${esc(cat)}:</strong> ${esc(front)}</li>`;
    }).join('')}</ul>`;
  }
  if (STATE.errors.length || STATE.srsMarked.length) {
    html += `<div style="text-align:center;margin-top:14px">
      <button class="btn sec" onclick="if(confirm('¿Limpiar todos los errores?')){STATE.errors=[];saveErrors();renderPlan();}">🗑 Borrar errores</button>
      <button class="btn sec" onclick="if(confirm('¿Limpiar tarjetas marcadas?')){STATE.srsMarked=[];saveSrs();renderPlan();}">🗑 Borrar marcadas</button>
    </div>`;
  }
  return html;
}

// Normalizador: quita acentos para que "sinonim" encuentre "Sinónimos"
const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
searchInput.addEventListener('input', e => {
  const q = norm(e.target.value.trim());
  const res = document.getElementById('search-results');
  if (!q) { res.innerHTML = ''; return; }
  // Filter + score (secciones primero, luego coincidencias en título, luego en snip/loc)
  const matches = SEARCH_INDEX
    .map(it => {
      const t = norm(it.title);
      const s = norm(it.snip);
      const l = norm(it.loc);
      let score = 0;
      const locRaw = String(it.loc||'');
      const isSection = /^[📍📂🎙📅🧪]/.test(locRaw);
      if (t === q) score += 100;
      else if (t.startsWith(q)) score += 50;
      else if (t.includes(q)) score += 30;
      if (s.includes(q)) score += 5;
      if (l.includes(q)) score += 3;
      if (isSection && score > 0) score += 20; // boost sections
      return { it, score };
    })
    .filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, 25)
    .map(x => x.it);
  if (!matches.length) { res.innerHTML = '<div class="sr"><div class="sr-t">Sin resultados</div></div>'; return; }
  res.innerHTML = matches.map(m => {
    const args = `'${m.page}'` + (m.sub ? `, '${m.sub}'` : (m.sub2 ? `, undefined` : '')) + (m.sub2 ? `, '${m.sub2}'` : '');
    return `<div class="sr" onclick="go(${args});searchModal.classList.remove('on');searchInput.value='';">
      <div class="sr-t">${esc(m.title)}<span class="sr-loc">${esc(m.loc)}</span></div>
      ${m.snip?`<div class="sr-snip">${esc(m.snip)}</div>`:''}
    </div>`;
  }).join('');
});
