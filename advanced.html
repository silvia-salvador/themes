const HTML_CONNECTORS = "\n  <div class=\"section-intro\">\n    Sentence adverbials show how a sentence fits with the rest of the text, or express the writer's attitude. They make texts easier to follow. <br>\n    ⚠ Common confusion: <em>On the contrary</em> contradicts what was just said — <em>On the other hand</em> introduces a different perspective.\n  </div>\n  <div class=\"conn-grid\">\n    <div class=\"conn-card h-teal\">\n      <h4>Adding / AND</h4>\n      <ul>\n        <li>As well <span class=\"es\">también</span></li>\n        <li>Moreover <span class=\"es\">además</span></li>\n        <li>Furthermore <span class=\"es\">además</span></li>\n        <li>Besides <span class=\"es\">aparte de</span></li>\n        <li>Likewise <span class=\"es\">igualmente</span></li>\n        <li>By the same token <span class=\"es\">de igual manera</span></li>\n        <li>What's more <span class=\"es\">además</span></li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-red\">\n      <h4>Contrast / BUT</h4>\n      <ul>\n        <li>Yet / Still <span class=\"es\">pero, aún así</span></li>\n        <li>However <span class=\"es\">sin embargo</span></li>\n        <li>Nevertheless <span class=\"es\">no obstante</span></li>\n        <li>Although / Though <span class=\"es\">aunque + subordinada</span></li>\n        <li>Despite / In spite of <span class=\"es\">a pesar de + sust.</span></li>\n        <li>Otherwise <span class=\"es\">de otra forma</span></li>\n        <li>On the other hand <span class=\"es\">por otro lado</span></li>\n        <li>Unlike <span class=\"es\">a diferencia de</span></li>\n        <li>Albeit <span class=\"es\">sin embargo (formal)</span></li>\n        <li>By contrast <span class=\"es\">por el contrario</span></li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-purple\">\n      <h4>Result / SO</h4>\n      <ul>\n        <li>Thus <span class=\"es\">por lo tanto</span></li>\n        <li>Hence <span class=\"es\">por lo tanto</span></li>\n        <li>Therefore <span class=\"es\">por lo tanto</span></li>\n        <li>Thereby <span class=\"es\">por lo tanto</span></li>\n        <li>Accordingly <span class=\"es\">por consiguiente</span></li>\n        <li>Consequently <span class=\"es\">por consiguiente</span></li>\n        <li>As a result <span class=\"es\">como resultado</span></li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-amber\">\n      <h4>Example / FOR EX.</h4>\n      <ul>\n        <li>For instance <span class=\"es\">por ejemplo</span></li>\n        <li>Such as <span class=\"es\">tal como (al enumerar)</span></li>\n        <li>Namely <span class=\"es\">por nombrar algunos</span></li>\n        <li>That is to say <span class=\"es\">es decir</span></li>\n        <li>In other words <span class=\"es\">en otras palabras</span></li>\n        <li>Like <span class=\"es\">como</span></li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-blue\">\n      <h4>Frequency</h4>\n      <ul>\n        <li>At times <span class=\"es\">a veces</span></li>\n        <li>Frequently <span class=\"es\">frecuentemente</span></li>\n        <li>Occasionally <span class=\"es\">ocasionalmente</span></li>\n        <li>Once in a while <span class=\"es\">de vez en cuando</span></li>\n        <li>On and off <span class=\"es\">de vez en cuando</span></li>\n        <li>Usually <span class=\"es\">normalmente</span></li>\n        <li>Once in a blue moon <span class=\"es\">rarísimas veces</span></li>\n        <li>On a daily basis <span class=\"es\">a diario</span></li>\n        <li>Regularly <span class=\"es\">con frecuencia</span></li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-green\">\n      <h4>Conclusion</h4>\n      <ul>\n        <li>To sum up</li>\n        <li>To wrap up</li>\n        <li>In a nutshell</li>\n        <li>Long story short</li>\n        <li>In short</li>\n        <li>Briefly</li>\n        <li>In summary</li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-pink\">\n      <h4>Order</h4>\n      <ul>\n        <li>Firstly <span class=\"es\">primeramente</span></li>\n        <li>Secondly <span class=\"es\">en segundo lugar</span></li>\n        <li>Thirdly <span class=\"es\">en tercer lugar</span></li>\n        <li>Lastly <span class=\"es\">por último</span></li>\n        <li>Last but not least</li>\n        <li>Finally <span class=\"es\">finalmente</span></li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-gray\">\n      <h4>Quantity</h4>\n      <ul>\n        <li>Plenty of <span class=\"es\">mucho/os</span></li>\n        <li>A number of <span class=\"es\">muchos</span></li>\n        <li>A great deal of <span class=\"es\">mucho/os</span></li>\n        <li>A bunch of <span class=\"es\">un puñado de</span></li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-amber\">\n      <h4>Possibility / MAYBE</h4>\n      <ul>\n        <li>By any chance <span class=\"es\">por casualidad</span></li>\n        <li>Might <span class=\"es\">puede que</span></li>\n        <li>Perhaps <span class=\"es\">quizás</span></li>\n        <li>Possibly <span class=\"es\">posiblemente</span></li>\n        <li>To be likely to <span class=\"es\">es probable que</span></li>\n        <li>There is a high likelihood</li>\n        <li>I stand a chance</li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-teal\">\n      <h4>Emphasis / VERY</h4>\n      <ul>\n        <li>Such + adj + noun <span class=\"es\">tal</span></li>\n        <li>Rather <span class=\"es\">bastante, más bien</span></li>\n        <li>Quite <span class=\"es\">bastante</span></li>\n        <li>Highly <span class=\"es\">extremadamente</span></li>\n        <li>Pretty <span class=\"es\">bastante</span></li>\n      </ul>\n    </div>\n    <div class=\"conn-card h-blue\">\n      <h4>Because</h4>\n      <ul>\n        <li>Since <span class=\"es\">ya que, puesto que</span></li>\n        <li>Provided that <span class=\"es\">siempre que</span></li>\n        <li>Granted that <span class=\"es\">dado que</span></li>\n        <li>Given that <span class=\"es\">dado que</span></li>\n        <li>Due to (the fact that) <span class=\"es\">debido a</span></li>\n      </ul>\n    </div>\n  </div>\n";
const HTML_ESSAY = "\n  <div class=\"essay-group\"><h4>Introducing the topic</h4>\n    <p>More and more families are choosing to have only one child.<br>\n    The trend nowadays is towards having smaller families.<br>\n    Recent research indicates that the number of teenagers who smoke is increasing.<br>\n    Hardly a week goes by without another report of _______ appearing in the media.<br>\n    This raises the issue of whether _______.<br>\n    Although most people would generally agree that _______, few would deny that _______.</p>\n  </div>\n  <div class=\"essay-group\"><h4>Stating your opinion</h4>\n    <p>As I see it, ... &nbsp;|&nbsp; It seems to me that ... &nbsp;|&nbsp; I am convinced that ...<br>\n    I am inclined to believe that ... &nbsp;|&nbsp; There is no doubt in my mind that ...<br>\n    One of the drawbacks of _____ is _____. However, one of the benefits is that _____.</p>\n  </div>\n  <div class=\"essay-group\"><h4>Changing topic</h4>\n    <p>As regards the causes for this, ... &nbsp;|&nbsp; Concerning the causes, ... &nbsp;|&nbsp; As for the causes, ...</p>\n  </div>\n  <div class=\"essay-group\"><h4>Presenting arguments</h4>\n    <p>One justification often given for _____ is that _____.<br>\n    Advocates / Proponents would claim that _____.<br>\n    Those who object to _____ often argue that _____.<br>\n    _______ are opposed to _______ on the grounds that _______.<br>\n    From the point of view of _______ / According to _______.</p>\n  </div>\n  <div class=\"essay-group\"><h4>Describing causes</h4>\n    <p>One factor which has led to _____ is _____.<br>\n    The problem often stems from ______.<br>\n    The situation has been exacerbated by ______.<br>\n    One consequence of _____ is _____.</p>\n  </div>\n  <div class=\"essay-group\"><h4>Proposing steps &amp; solutions</h4>\n    <p>The first step to be taken would be to ______.<br>\n    To alleviate the situation people should _______.<br>\n    To begin to tackle this situation, the government needs to _______.<br>\n    Were the government to _______, the situation would doubtless improve.<br>\n    It is vitally important that ______. &nbsp;|&nbsp; Legislation should be introduced to control _______.</p>\n  </div>\n  <div class=\"essay-group\"><h4>Concluding</h4>\n    <p>All in all it seems to me that ... &nbsp;|&nbsp; The obvious conclusion to be drawn is that ...<br>\n    All things considered, ... &nbsp;|&nbsp; On balance, I tend to believe that ...<br>\n    The world would surely be a better place to live in if ______.<br>\n    The prospects for the future will be bleak / grim unless _______.</p>\n  </div>\n  <div class=\"essay-group highlight\"><h4>Advanced problem &amp; solution phrases</h4>\n    <p>a crisis in education which must be <strong>addressed</strong><br>\n    something that must be <strong>tackled / dealt with</strong><br>\n    a challenge which must be <strong>met</strong><br>\n    something must be done to <strong>restore law and order</strong> in the inner cities</p>\n  </div>\n";
const HTML_APTIS_BLK = "\n  <div class=\"aptis-block\">\n    <h3>Part 1 — Compare pictures (45s each)</h3>\n    <p>If the picture is a landscape: <em>breathtaking views, I can make out the cabin tucked away in the mountains</em>. Talk about sensations: tranquility, serenity, sense of freedom, inner peace, disconnecting from your fast-paced routine.</p>\n    <p style=\"margin-top:0.5rem\">If it shows a busy scene: describe movement, the hustle and bustle; roads are slippery, people are prone to accidents, traffic congestion; rainy days make us feel drowsy or more depressed.</p>\n  </div>\n  <div class=\"aptis-block\">\n    <h3>Part 2 — 3 questions in 2 minutes (1 min prep)</h3>\n    <ul>\n      <li>How has technology changed our lives? Is it for the better?</li>\n      <li>Do you think e-books will replace paper books one day?</li>\n      <li>Should online banking overtake traditional banking?</li>\n    </ul>\n  </div>\n  <div class=\"aptis-block\">\n    <h3>Part 3 — Pros &amp; cons (1.5 min / 2 min prep) — Ecotourism example</h3>\n    <ul>\n      <li><strong>Pros:</strong> local economies earn money sustainably; people see untouched destinations; affordable; creates well-paying local jobs.</li>\n      <li><strong>Cons:</strong> damage to nature can occur; cultural changes may arise; problems if not locally managed; travel impacts the environment.</li>\n    </ul>\n  </div>\n  <div class=\"aptis-block\">\n    <h3>High-value linking expressions for speaking</h3>\n    <div class=\"tag-row\">\n      <span class=\"tag\">What's more,</span>\n      <span class=\"tag\">In contrast,</span>\n      <span class=\"tag\">Needless to say,</span>\n      <span class=\"tag\">Having said that,</span>\n      <span class=\"tag\">All things considered,</span>\n      <span class=\"tag\">On the whole,</span>\n      <span class=\"tag\">Funnily enough,</span>\n      <span class=\"tag\">Unfortunately,</span>\n      <span class=\"tag\">Subsequently,</span>\n      <span class=\"tag\">Simultaneously,</span>\n      <span class=\"tag\">Alternatively,</span>\n      <span class=\"tag\">In other words,</span>\n      <span class=\"tag\">As a matter of fact,</span>\n      <span class=\"tag\">Not to mention,</span>\n      <span class=\"tag\">It goes without saying that</span>\n    </div>\n  </div>\n";
const HTML_GRAMMAR_WEEKS = ["<div class=\"week-content active w1\" id=\"week-1\">\n  <div class=\"week-header\">\n    <div class=\"week-number\">01</div>\n    <div class=\"week-meta\">\n      <h2>Inversión Sintáctica</h2>\n      <span class=\"theme\">Inversion · Fronting · Negative Adverbials</span>\n    </div>\n  </div>\n\n  <div class=\"content-grid\">\n    <div class=\"card yellow\">\n      <div class=\"card-label\">📐 Qué es y por qué importa en APTIS</div>\n      <div class=\"rule-box\">\n        <h4>NEGATIVE ADVERBIALS + INVERSION</h4>\n        <p>Cuando pones al inicio una expresión negativa o restrictiva, el verbo auxiliar va ANTES del sujeto. Efecto: escritura formal, énfasis dramático. APTIS C1/C2 lo pide en Writing Task 2 y 3.</p>\n        <div class=\"formula\" style=\"font-family:'IBM Plex Mono',monospace;font-size:0.85rem;color:var(--accent1);background:var(--bg);padding:0.4rem 0.75rem;border-radius:4px;margin:0.5rem 0;display:inline-block;\">\n          Negative adv. + aux. + subject + main verb\n        </div>\n        <div class=\"example\">Never had I worked so hard on a project.</div>\n        <div class=\"personal\">Never had I felt so understood as when I became head of my department.</div>\n      </div>\n      <div class=\"rule-box\">\n        <h4>ONLY / RARELY / SELDOM / SCARCELY</h4>\n        <div class=\"example\">Only then did I realise the glaze needed a second firing.</div>\n        <div class=\"personal\">Seldom do I manage to sit still — unless I'm at the wheel.</div>\n      </div>\n      <div class=\"rule-box\">\n        <h4>NOT ONLY… BUT ALSO</h4>\n        <div class=\"example\">Not only did she pass the exam, but she also scored 90%.</div>\n        <div class=\"personal\">Not only does ceramics calm my nervous system, but it also gives me a business.</div>\n      </div>\n    </div>\n\n    <div class=\"card blue\">\n      <div class=\"card-label\">📅 Plan semanal — 5 sesiones × 25 min</div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w1d1')\" id=\"w1d1\">L</div>\n        <div class=\"day-info\">\n          <h4>Lunes — REGLA + FÓRMULA</h4>\n          <p>Lee la estructura Never/Seldom/Rarely. Escribe la fórmula en una tarjeta física. Di 3 frases en voz alta con ejemplos TUYOS (cerámica, gestión de equipo, trabajo).</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w1d2')\" id=\"w1d2\">M</div>\n        <div class=\"day-info\">\n          <h4>Martes — NOT ONLY… BUT ALSO</h4>\n          <p>Aprende la estructura con conector doble. Escribe 4 frases sobre tu semana real. Énfasis: el auxiliar MUST aparecer después de \"Not only\".</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w1d3')\" id=\"w1d3\">X</div>\n        <div class=\"day-info\">\n          <h4>Miércoles — ONLY + prepositional phrase</h4>\n          <p>\"Only when / Only after / Only by\". Transforma 5 frases normales en inversiones. Grábate diciendo las frases: el canal auditivo consolida.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w1d4')\" id=\"w1d4\">J</div>\n        <div class=\"day-info\">\n          <h4>Jueves — APTIS Writing Task 2</h4>\n          <p>Escribe un párrafo de opinión de 100 palabras sobre el trabajo remoto. Incluye MÍNIMO 2 inversiones. Corrige tú misma con la checklist.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w1d5')\" id=\"w1d5\">V</div>\n        <div class=\"day-info\">\n          <h4>Viernes — REPASO ACTIVO</h4>\n          <p>Sin notas: escribe 6 frases de inversión de memoria. Tiempo: 8 minutos. Si te bloqueas, sólo mira la tarjeta física, no el ordenador.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"content-grid three\">\n    <div class=\"card purple\">\n      <div class=\"card-label\">🃏 Frases de práctica — Revela la respuesta</div>\n      <div class=\"practice-prompt\" onclick=\"revealPrompt(this)\">\n        <div class=\"prompt-q\">Transforma: \"I had never seen such detailed engobe work before.\"</div>\n        <div class=\"reveal-hint\">→ toca para ver inversión</div>\n        <div class=\"prompt-a\">Never <u>had I seen</u> such detailed engobe work before.</div>\n      </div>\n      <div class=\"practice-prompt\" onclick=\"revealPrompt(this)\">\n        <div class=\"prompt-q\">Transforma: \"She rarely makes mistakes in her glaze calculations.\"</div>\n        <div class=\"reveal-hint\">→ toca para ver inversión</div>\n        <div class=\"prompt-a\">Rarely <u>does she make</u> mistakes in her glaze calculations.</div>\n      </div>\n      <div class=\"practice-prompt\" onclick=\"revealPrompt(this)\">\n        <div class=\"prompt-q\">Crea tu propia: \"Not only my role as manager…\"</div>\n        <div class=\"reveal-hint\">→ toca para ver modelo</div>\n        <div class=\"prompt-a\">Not only <u>does</u> being a manager test my patience, but it <u>also</u> fuels my hyperfocus when I'm passionate about something.</div>\n      </div>\n    </div>\n\n    <div class=\"card green\">\n      <div class=\"card-label\">⚡ Técnicas Focus para esta semana</div>\n      <div class=\"tip\"><span class=\"tip-icon\">🧠</span> <span><strong>Body doubling:</strong> Estudia con una sesión de estudio en YouTube de fondo. Tu cerebro de manager trabaja mejor con \"presencia\" aunque sea virtual.</span></div>\n      <div class=\"tip\"><span class=\"tip-icon\">🎙️</span> <span><strong>Dictado inverso:</strong> Grábate diciendo frases normales → pausa → di la inversión. El circuito motor + auditivo es más potente que leer.</span></div>\n      <div class=\"tip\"><span class=\"tip-icon\">📌</span> <span><strong>Post-it en el espejo:</strong> Escribe \"NEVER HAD I…\" en el baño. La exposición pasiva construye automatismo.</span></div>\n      <div style=\"margin-top:0.75rem\">\n        <span class=\"technique\">Pomodoro 25/5</span>\n        <span class=\"technique\">Tarjeta física</span>\n        <span class=\"technique\">Voz alta</span>\n        <span class=\"technique\">Body double</span>\n      </div>\n    </div>\n\n    <div class=\"card yellow\">\n      <div class=\"card-label\">🎯 APTIS — Dónde aparece esto</div>\n      <div class=\"task-row\"><div class=\"task-icon w\">✍️</div><div><strong>Writing Task 2-3</strong><br><span style=\"color:var(--muted);font-size:0.8rem\">Párrafos de argumento formal. La inversión sube el registro de B2 a C1 inmediatamente.</span></div></div>\n      <div class=\"task-row\"><div class=\"task-icon s\">🎤</div><div><strong>Speaking Part 4</strong><br><span style=\"color:var(--muted);font-size:0.8rem\">Discurso largo. Una inversión bien colocada al inicio impresiona al evaluador.</span></div></div>\n      <div class=\"task-row\"><div class=\"task-icon r\">📖</div><div><strong>Reading — Gap fill</strong><br><span style=\"color:var(--muted);font-size:0.8rem\">Reconocer inversiones en textos académicos. Saber la estructura = entender qué falta.</span></div></div>\n    </div>\n  </div>\n</div>","<div class=\"week-content w2\" id=\"week-2\">\n  <div class=\"week-header\">\n    <div class=\"week-number\">02</div>\n    <div class=\"week-meta\">\n      <h2>Condicionales Mixtas</h2>\n      <span class=\"theme\">Mixed Conditionals · Inverted Conditionals · Hypothetical Past</span>\n    </div>\n  </div>\n\n  <div class=\"content-grid\">\n    <div class=\"card blue\">\n      <div class=\"card-label\">📐 Las 3 condicionales mixtas del C1/C2</div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;margin-bottom:0.4rem;color:var(--accent2)\">TIPO A — Pasado hipotético → Consecuencia presente</h4>\n        <div class=\"formula\">If + past perfect … , would + bare infinitive</div>\n        <div class=\"example\">If I had been diagnosed earlier, my career would look very different now.</div>\n        <div class=\"personal\">If I hadn't discovered ceramics, I wouldn't have this creative outlet today.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;margin-bottom:0.4rem;color:var(--accent2)\">TIPO B — Estado presente hipotético → Consecuencia pasada</h4>\n        <div class=\"formula\">If + past simple … , would have + past participle</div>\n        <div class=\"example\">If I were more neurotypical, I would have chosen a conventional career path.</div>\n        <div class=\"personal\">If ceramics weren't so tactile, I would never have become passionate about it.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;margin-bottom:0.4rem;color:var(--accent2)\">CONDICIONAL INVERTIDA — Registro formal/escrito</h4>\n        <div class=\"formula\">Were it not for… / Had I known… / Should you need…</div>\n        <div class=\"example\">Were it not for my team's support, managing the department would be far harder.</div>\n        <div class=\"personal\">Had I known about glaze layering earlier, I would have avoided so many test failures.</div>\n      </div>\n    </div>\n\n    <div class=\"card purple\">\n      <div class=\"card-label\">📅 Plan semanal</div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w2d1')\" id=\"w2d1\">L</div>\n        <div class=\"day-info\">\n          <h4>Lunes — Tipo A con tu historia</h4>\n          <p>Escribe 5 frases sobre cómo sería tu vida HOY si algo del pasado hubiera sido diferente. Ejemplo clave: tu ascenso a manager de departamento, empezar cerámica.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w2d2')\" id=\"w2d2\">M</div>\n        <div class=\"day-info\">\n          <h4>Martes — Tipo B: quién eres → qué habría pasado</h4>\n          <p>Reflexiona: \"Si yo fuera diferente (más paciente, menos impulsiva, etc.), ¿qué habría ocurrido antes?\" 5 frases Tipo B.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w2d3')\" id=\"w2d3\">X</div>\n        <div class=\"day-info\">\n          <h4>Miércoles — Condicionales invertidas formales</h4>\n          <p>Práctica especial: transforma 4 condicionales normales en invertidas (\"Were it not for / Had I…\"). Son las que más sube la nota C1.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w2d4')\" id=\"w2d4\">J</div>\n        <div class=\"day-info\">\n          <h4>Jueves — Writing: texto de reflexión</h4>\n          <p>Tema: \"How has your background shaped who you are?\" 120 palabras. Usa 1 Tipo A, 1 Tipo B y 1 invertida. Es exactamente el tipo Speaking Part 3.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w2d5')\" id=\"w2d5\">V</div>\n        <div class=\"day-info\">\n          <h4>Viernes — Gap fill APTIS real</h4>\n          <p>Busca 1 ejercicio de condicionales mixtas online (British Council, APTIS practice). Cronométrate: 8 min máximo.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"content-grid three\">\n    <div class=\"card green\">\n      <div class=\"card-label\">🃏 Practica — Revela</div>\n      <div class=\"practice-prompt\" onclick=\"revealPrompt(this)\">\n        <div class=\"prompt-q\">\"No me diagnosticaron a tiempo, por eso ahora tengo estrategias tardías.\" → Tipo A</div>\n        <div class=\"reveal-hint\">→ toca para ver</div>\n        <div class=\"prompt-a\">If I had been diagnosed earlier, I would have developed coping strategies much sooner.</div>\n      </div>\n      <div class=\"practice-prompt\" onclick=\"revealPrompt(this)\">\n        <div class=\"prompt-q\">\"No soy neurotypical, por eso en el pasado seguí caminos no convencionales.\" → Tipo B</div>\n        <div class=\"reveal-hint\">→ toca para ver</div>\n        <div class=\"prompt-a\">If I were neurotypical, I would have followed a far more conventional career path.</div>\n      </div>\n      <div class=\"practice-prompt\" onclick=\"revealPrompt(this)\">\n        <div class=\"prompt-q\">Haz formal: \"If it wasn't for ceramics, I would have burned out years ago.\"</div>\n        <div class=\"reveal-hint\">→ toca para ver</div>\n        <div class=\"prompt-a\">Were it not for ceramics, I would have burned out years ago.</div>\n      </div>\n    </div>\n\n    <div class=\"card yellow\">\n      <div class=\"card-label\">⚡ Técnicas Focus</div>\n      <div class=\"tip\"><span class=\"tip-icon\">🗂️</span> <span><strong>Mapa mental de tiempos:</strong> dibuja en papel un árbol con 3 ramas: Tipo A / Tipo B / Invertida. Visual espacial = más ancla en memoria.</span></div>\n      <div class=\"tip\"><span class=\"tip-icon\">🎯</span> <span><strong>Ancla emocional:</strong> conecta cada tipo con un recuerdo real tuyo. La emoción fija el patrón gramatical mejor que la repetición mecánica.</span></div>\n      <div class=\"tip\"><span class=\"tip-icon\">🔄</span> <span><strong>Interleaving:</strong> mezcla frases Tipo A y Tipo B en el mismo ejercicio para que tu cerebro tenga que discriminar activamente.</span></div>\n    </div>\n\n    <div class=\"card blue\">\n      <div class=\"card-label\">🎯 APTIS — Dónde aparece</div>\n      <div class=\"task-row\"><div class=\"task-icon w\">✍️</div><div><strong>Writing Task 3</strong><br><span style=\"color:var(--muted);font-size:0.8rem\">Textos de reflexión o argumentación. Las mixtas demuestran dominio del sistema temporal.</span></div></div>\n      <div class=\"task-row\"><div class=\"task-icon s\">🎤</div><div><strong>Speaking Part 3-4</strong><br><span style=\"color:var(--muted);font-size:0.8rem\">Preguntas hipotéticas: \"What would you have done if…?\" — El APTIS las incluye directamente.</span></div></div>\n      <div class=\"task-row\"><div class=\"task-icon r\">📖</div><div><strong>Grammar Use of English</strong><br><span style=\"color:var(--muted);font-size:0.8rem\">Transformación de frases: convertir una condicional simple en mixta o invertida.</span></div></div>\n    </div>\n  </div>\n</div>","<div class=\"week-content w3\" id=\"week-3\">\n  <div class=\"week-header\">\n    <div class=\"week-number\">03</div>\n    <div class=\"week-meta\">\n      <h2>Cleft Sentences</h2>\n      <span class=\"theme\">It-clefts · Wh-clefts · All-clefts · Pseudo-clefts</span>\n    </div>\n  </div>\n\n  <div class=\"content-grid\">\n    <div class=\"card purple\">\n      <div class=\"card-label\">📐 Tipos de cleft — Con ejemplos de tu vida</div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;margin-bottom:0.4rem;color:var(--accent3)\">IT-CLEFT — énfasis en el elemento más importante</h4>\n        <div class=\"formula\">It + be + [FOCO] + relative clause</div>\n        <div class=\"example\">It was the texture of clay that made me fall in love with ceramics.</div>\n        <div class=\"personal\">It is empathy, not authority, that makes a good department manager.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;margin-bottom:0.4rem;color:var(--accent3)\">WH-CLEFT (Pseudo-cleft) — énfasis en la acción</h4>\n        <div class=\"formula\">What + subject + verb + be + [FOCO]</div>\n        <div class=\"example\">What I enjoy most about my job is the creative freedom it allows.</div>\n        <div class=\"personal\">What ceramic work gives me is a rare state of regulated focus.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;margin-bottom:0.4rem;color:var(--accent3)\">ALL-CLEFT — énfasis total, minimalista</h4>\n        <div class=\"formula\">All + subject + verb + be + infinitive / noun</div>\n        <div class=\"example\">All I need right now is ten minutes of silence.</div>\n        <div class=\"personal\">All she asked for was a clear diagnosis and a path forward.</div>\n      </div>\n    </div>\n\n    <div class=\"card green\">\n      <div class=\"card-label\">📅 Plan semanal</div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w3d1')\" id=\"w3d1\">L</div>\n        <div class=\"day-info\">\n          <h4>Lunes — IT-CLEFT con enfásis tuyo</h4>\n          <p>Escribe 5 it-clefts sobre qué/quién/cuándo cambió algo importante en tu vida. \"It was…that/who…\" Grábate diciéndolas.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w3d2')\" id=\"w3d2\">M</div>\n        <div class=\"day-info\">\n          <h4>Martes — WH-CLEFT sobre lo que te importa</h4>\n          <p>\"What I love about ceramics is… / What makes managing a team hard is… / What I've learnt at Freepik is…\" 5 frases.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w3d3')\" id=\"w3d3\">X</div>\n        <div class=\"day-info\">\n          <h4>Miércoles — ALL-CLEFT + mezcla de los tres</h4>\n          <p>Practica los tres tipos en un solo párrafo cohesivo. No repitas el mismo tipo dos veces seguidas.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w3d4')\" id=\"w3d4\">J</div>\n        <div class=\"day-info\">\n          <h4>Jueves — Speaking simulado</h4>\n          <p>Habla 2 minutos sobre \"something that has changed your perspective\". Incluye al menos 2 cleft sentences naturales. Grábate.</p>\n        </div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w3d5')\" id=\"w3d5\">V</div>\n        <div class=\"day-info\">\n          <h4>Viernes — Transformación rápida</h4>\n          <p>Toma 6 frases simples de tus notas de la semana y conviértelas en clefts. Cronómetro: 10 min.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"content-grid three\">\n    <div class=\"card yellow\">\n      <div class=\"card-label\">🃏 Practica — Revela</div>\n      <div class=\"practice-prompt\" onclick=\"revealPrompt(this)\">\n        <div class=\"prompt-q\">\"My diagnosis changed everything for me.\" → It-cleft con énfasis en \"my diagnosis\"</div>\n        <div class=\"reveal-hint\">→ toca para ver</div>\n        <div class=\"prompt-a\">It was my diagnosis that changed everything for me.</div>\n      </div>\n      <div class=\"practice-prompt\" onclick=\"revealPrompt(this)\">\n        <div class=\"prompt-q\">\"I really value the tactile process of making ceramics.\" → Wh-cleft</div>\n        <div class=\"reveal-hint\">→ toca para ver</div>\n        <div class=\"prompt-a\">What I really value is the tactile process of making ceramics.</div>\n      </div>\n      <div class=\"practice-prompt\" onclick=\"revealPrompt(this)\">\n        <div class=\"prompt-q\">\"I only need a quiet workspace to do my best work.\" → All-cleft</div>\n        <div class=\"reveal-hint\">→ toca para ver</div>\n        <div class=\"prompt-a\">All I need to do my best work is a quiet workspace.</div>\n      </div>\n    </div>\n\n    <div class=\"card blue\">\n      <div class=\"card-label\">⚡ Técnicas Focus</div>\n      <div class=\"tip\"><span class=\"tip-icon\">🎨</span> <span><strong>Código de color:</strong> IT-cleft = amarillo, WH-cleft = azul, ALL-cleft = verde. Cuando leas textos, subráyalos con ese color. El sistema visual clasifica más rápido.</span></div>\n      <div class=\"tip\"><span class=\"tip-icon\">🔁</span> <span><strong>Retrieval spacing:</strong> El viernes revisa las tarjetas del lunes/martes SIN mirar los ejemplos. El esfuerzo de recordar fija más que releer.</span></div>\n    </div>\n\n    <div class=\"card purple\">\n      <div class=\"card-label\">🎯 APTIS — Dónde aparece</div>\n      <div class=\"task-row\"><div class=\"task-icon w\">✍️</div><div><strong>Writing Task 3</strong><br><span style=\"color:var(--muted);font-size:0.8rem\">Las cleft sentences estructuran argumentos con elegancia. Sube el perfil inmediatamente a C1.</span></div></div>\n      <div class=\"task-row\"><div class=\"task-icon s\">🎤</div><div><strong>Speaking Parts 2-4</strong><br><span style=\"color:var(--muted);font-size:0.8rem\">\"What I find most interesting is…\" es una fórmula que los examinadores reconocen como C1.</span></div></div>\n    </div>\n  </div>\n</div>","<div class=\"week-content w4\" id=\"week-4\">\n  <div class=\"week-header\">\n    <div class=\"week-number\">04</div>\n    <div class=\"week-meta\">\n      <h2>Relative Clauses Avanzadas</h2>\n      <span class=\"theme\">Non-defining · Reduced · Nominalized · Which-clauses · Participle</span>\n    </div>\n  </div>\n\n  <div class=\"content-grid\">\n    <div class=\"card green\">\n      <div class=\"card-label\">📐 Estructuras avanzadas</div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:var(--accent4)\">NON-DEFINING (explicativa)</h4>\n        <div class=\"formula\">…, who/which/where/when, …</div>\n        <div class=\"example\">My mentor, who specialises in leadership coaching, recommended body doubling.</div>\n        <div class=\"personal\">Cerámica Emprendedor, which I founded last year, fills a gap in Spanish ceramic education.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:var(--accent4)\">REDUCED RELATIVE (participio)</h4>\n        <div class=\"formula\">Noun + [past/present participle phrase]</div>\n        <div class=\"example\">The manual written last month has already reached 500 downloads.</div>\n        <div class=\"personal\">The ceramics course designed for beginners requires no prior experience.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:var(--accent4)\">WHICH — referencia a toda la cláusula</h4>\n        <div class=\"formula\">…sentence…, which + verb…</div>\n        <div class=\"example\">She finished the project ahead of schedule, which impressed the whole team.</div>\n        <div class=\"personal\">I finally understood my own cognitive profile, which changed how I communicate at work.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:var(--accent4)\">PREPOSITION + WHOM/WHICH (formal)</h4>\n        <div class=\"formula\">…noun + preposition + whom/which + …</div>\n        <div class=\"example\">The colleague with whom I collaborate most is based in Barcelona.</div>\n        <div class=\"personal\">The framework upon which my course is built combines CBT and ACT principles.</div>\n      </div>\n    </div>\n\n    <div class=\"card yellow\">\n      <div class=\"card-label\">📅 Plan semanal</div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w4d1')\" id=\"w4d1\">L</div>\n        <div class=\"day-info\"><h4>Lunes — Defining vs Non-defining</h4><p>5 pares de frases que muestren la diferencia de significado. Las comas cambian el sentido. Practica con personas de tu entorno.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w4d2')\" id=\"w4d2\">M</div>\n        <div class=\"day-info\"><h4>Martes — Reduced relatives</h4><p>Toma 6 oraciones con \"which is / who is\" y redúcelas al participio. Más compacto = más C1.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w4d3')\" id=\"w4d3\">X</div>\n        <div class=\"day-info\"><h4>Miércoles — Which-clauses de referencia</h4><p>Escribe un párrafo describiendo tu semana usando al menos 3 \"…, which…\" que refieran a ideas completas.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w4d4')\" id=\"w4d4\">J</div>\n        <div class=\"day-info\"><h4>Jueves — Preposition + whom/which</h4><p>Práctica de registro formal. Útil para emails profesionales en Freepik o para el Writing C1.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w4d5')\" id=\"w4d5\">V</div>\n        <div class=\"day-info\"><h4>Viernes — Producción libre</h4><p>Describe tu marca \"Cerámica Emprendedor\" en un párrafo formal de 100 palabras usando todos los tipos de relative clause.</p></div>\n      </div>\n    </div>\n  </div>\n</div>","<div class=\"week-content w5\" id=\"week-5\">\n  <div class=\"week-header\">\n    <div class=\"week-number\">05</div>\n    <div class=\"week-meta\">\n      <h2>Modales Avanzados</h2>\n      <span class=\"theme\">Epistemic · Deontic · Dynamic · Perfect modals · Semi-modals</span>\n    </div>\n  </div>\n\n  <div class=\"content-grid\">\n    <div class=\"card\" style=\"border-top-color:#fb7185;\" >\n      <div class=\"card-label\" style=\"color:#fb7185;\">📐 Sistema modal completo C1/C2</div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#fb7185;\">EPISTEMIC (certeza/probabilidad)</h4>\n        <div class=\"formula\">must / can't / could / may / might + have + pp</div>\n        <div class=\"example\">She must have misunderstood the brief — her output is completely off.</div>\n        <div class=\"personal\">My leadership instincts must have been developing since childhood, though I never noticed them.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#fb7185;\">SEMI-MODALES (registro C1)</h4>\n        <div class=\"formula\">be bound to / be liable to / be supposed to / tend to</div>\n        <div class=\"example\">Deadlines are bound to create anxiety when you have executive function difficulties.</div>\n        <div class=\"personal\">High-firing glazes are liable to crack if the kiln cools too rapidly.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#fb7185;\">PERFECT MODALS — crítica/especulación pasada</h4>\n        <div class=\"formula\">should/could/would/needn't + have + pp</div>\n        <div class=\"example\">I needn't have worried — the presentation went perfectly.</div>\n        <div class=\"personal\">I should have started the course materials earlier, but hyperfocus helped me catch up.</div>\n      </div>\n    </div>\n\n    <div class=\"card blue\">\n      <div class=\"card-label\">📅 Plan semanal</div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w5d1')\" id=\"w5d1\">L</div>\n        <div class=\"day-info\"><h4>Lunes — Epistemic modals (certeza pasada)</h4><p>5 frases especulando sobre el pasado de personas de tu entorno o situaciones laborales. Must have / can't have / might have.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w5d2')\" id=\"w5d2\">M</div>\n        <div class=\"day-info\"><h4>Martes — Semi-modales de registro</h4><p>Reescribe 5 frases simples con semi-modales. \"She always arrives late\" → \"She tends to arrive late.\" Cambia el registro completamente.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w5d3')\" id=\"w5d3\">X</div>\n        <div class=\"day-info\"><h4>Miércoles — Perfect modals con arrepentimiento/crítica</h4><p>Should/could/would + have. Reflexiona sobre 5 situaciones reales tuyas donde hubieras podido actuar diferente.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w5d4')\" id=\"w5d4\">J</div>\n        <div class=\"day-info\"><h4>Jueves — Speaking: habla sobre algo que salió mal</h4><p>2 minutos: una situación laboral o personal que no salió como esperabas. Usa 3 perfect modals mínimo. Grábate.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w5d5')\" id=\"w5d5\">V</div>\n        <div class=\"day-info\"><h4>Viernes — Writing: email formal</h4><p>Email a un cliente de Cerámica Emprendedor sobre un retraso en entrega de materiales. Usa semi-modales y al menos 2 perfect modals.</p></div>\n      </div>\n    </div>\n  </div>\n</div>","<div class=\"week-content w6\" id=\"week-6\">\n  <div class=\"week-header\">\n    <div class=\"week-number\">06</div>\n    <div class=\"week-meta\">\n      <h2>Subjuntivo y Mood Formal</h2>\n      <span class=\"theme\">Subjunctive · Wish/If only · Formal that-clauses · Were to</span>\n    </div>\n  </div>\n\n  <div class=\"content-grid\">\n    <div class=\"card\" style=\"border-top-color:#fdba74;\">\n      <div class=\"card-label\" style=\"color:#fdba74;\">📐 Estructuras de mood en inglés C1/C2</div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#fdba74;\">SUBJUNTIVO FORMAL (mandato/recomendación)</h4>\n        <div class=\"formula\">suggest / recommend / insist / demand + that + S + bare infinitive</div>\n        <div class=\"example\">The committee recommended that all participants submit their work in advance.</div>\n        <div class=\"personal\">My psychiatrist suggested that I keep a daily attention log to track medication effects.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#fdba74;\">WISH + REGRET (tiempo/estructura)</h4>\n        <div class=\"formula\">wish + past simple (presente) / past perfect (pasado) / would (futuro)</div>\n        <div class=\"example\">I wish I had started learning ceramics a decade earlier.</div>\n        <div class=\"personal\">I wish my team would stop emailing me at 11pm when I need to sleep.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#fdba74;\">WERE TO — hipotético formal</h4>\n        <div class=\"formula\">If + S + were to + infinitive…</div>\n        <div class=\"example\">If the company were to expand internationally, additional funding would be required.</div>\n        <div class=\"personal\">If Cerámica Emprendedor were to reach 10,000 students, I would hire a content team.</div>\n      </div>\n    </div>\n\n    <div class=\"card purple\">\n      <div class=\"card-label\">📅 Plan semanal</div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w6d1')\" id=\"w6d1\">L</div>\n        <div class=\"day-info\"><h4>Lunes — Subjunctive de recomendación</h4><p>Escribe 5 recomendaciones formales (como si fueras tutora o consultora). \"It is essential that… / I suggest that…\" Sin -s en 3ª persona.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w6d2')\" id=\"w6d2\">M</div>\n        <div class=\"day-info\"><h4>Martes — Wish: los 3 tiempos</h4><p>10 frases con wish: 4 sobre presente (ojalá pudiera), 4 sobre pasado (ojalá hubiera), 2 sobre futuro (ojalá dejara de).</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w6d3')\" id=\"w6d3\">X</div>\n        <div class=\"day-info\"><h4>Miércoles — Were to en contexto profesional</h4><p>Escribe un párrafo sobre planes hipotéticos para Cerámica Emprendedor usando \"were to\". Es lenguaje de business plans.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w6d4')\" id=\"w6d4\">J</div>\n        <div class=\"day-info\"><h4>Jueves — Writing formal: propuesta</h4><p>Escribe una propuesta de 100 palabras para expandir un proyecto. Usa subjunctive, were to, y al menos 1 wish.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w6d5')\" id=\"w6d5\">V</div>\n        <div class=\"day-info\"><h4>Viernes — Repaso semanas 5-6</h4><p>Flashcards mixtas: modales + mood. Alterna rápidamente. El interleaving mejora retención a largo plazo.</p></div>\n      </div>\n    </div>\n  </div>\n</div>","<div class=\"week-content w7\" id=\"week-7\">\n  <div class=\"week-header\">\n    <div class=\"week-number\">07</div>\n    <div class=\"week-meta\">\n      <h2>Cohesión y Discourse Markers</h2>\n      <span class=\"theme\">Advanced linkers · Hedging · Stance adverbials · Nominalization</span>\n    </div>\n  </div>\n\n  <div class=\"content-grid\">\n    <div class=\"card\" style=\"border-top-color:#a78bfa;\">\n      <div class=\"card-label\" style=\"color:#a78bfa;\">📐 Lo que separa B2 de C1/C2 en coherencia</div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#a78bfa;\">STANCE ADVERBIALS (posicionamiento)</h4>\n        <div class=\"formula\">Admittedly / Arguably / Undeniably / Crucially / Notably</div>\n        <div class=\"example\">Admittedly, the research on plant-based nutrition in adults remains underfunded.</div>\n        <div class=\"personal\">Crucially, ceramic education in Spanish lacks practical, applied resources.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#a78bfa;\">HEDGING (mitigación académica)</h4>\n        <div class=\"formula\">It would appear / It seems likely / There is reason to believe</div>\n        <div class=\"example\">It would appear that executive function training yields better outcomes than medication alone.</div>\n        <div class=\"personal\">There is reason to believe that twice-exceptional profiles are significantly underdiagnosed.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#a78bfa;\">NOMINALIZACIÓN (densidad léxica)</h4>\n        <div class=\"formula\">verb → noun form (de-adjectivalization)</div>\n        <div class=\"example\">The implementation of the new strategy led to a significant improvement.</div>\n        <div class=\"personal\">The development of emotional regulation skills requires consistent daily practice.</div>\n      </div>\n      <div class=\"highlight-rule\">\n        <h4 style=\"font-size:0.85rem;color:#a78bfa;\">CONTRAST LINKERS avanzados</h4>\n        <div class=\"formula\">Notwithstanding / Be that as it may / Even so / For all that</div>\n        <div class=\"example\">The data is inconclusive; be that as it may, the trend is clearly positive.</div>\n        <div class=\"personal\">Notwithstanding the challenges of vegetarianism abroad, I have built a flexible meal-planning system.</div>\n      </div>\n    </div>\n\n    <div class=\"card green\">\n      <div class=\"card-label\">📅 Plan semanal</div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w7d1')\" id=\"w7d1\">L</div>\n        <div class=\"day-info\"><h4>Lunes — Stance adverbials en tu voz</h4><p>Escribe 8 frases de opinión sobre cualquier tema (vegetarianismo, cerámica, educación, trabajo) usando stance adverbials al inicio. Di cada una en voz alta.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w7d2')\" id=\"w7d2\">M</div>\n        <div class=\"day-info\"><h4>Martes — Hedging académico</h4><p>Toma 5 afirmaciones fuertes que hayas hecho antes y hazlas más académicas con hedging. \"A vegetarian diet affects energy levels\" → \"It would appear that a vegetarian diet may enhance certain aspects of energy levels.\"</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w7d3')\" id=\"w7d3\">X</div>\n        <div class=\"day-info\"><h4>Miércoles — Nominalización</h4><p>Convierte 8 frases verbales en formas nominalizadas. Ejercicio de densificación léxica. Muy útil para Writing Task 3.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w7d4')\" id=\"w7d4\">J</div>\n        <div class=\"day-info\"><h4>Jueves — Writing Task 3 completo</h4><p>Escribe un texto argumentativo de 150 palabras. Integra stance adverbials, hedging, nominalización y contrast linkers avanzados.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w7d5')\" id=\"w7d5\">V</div>\n        <div class=\"day-info\"><h4>Viernes — Speaking Part 4 simulado</h4><p>Grabación de 3 minutos sobre un tema de opinión (educación, tecnología, salud mental). Usa todo el vocabulario de esta semana.</p></div>\n      </div>\n    </div>\n  </div>\n</div>","<div class=\"week-content w8\" id=\"week-8\">\n  <div class=\"week-header\">\n    <div class=\"week-number\">08</div>\n    <div class=\"week-meta\">\n      <h2>Integración & Simulacro</h2>\n      <span class=\"theme\">Full APTIS simulation · Error correction · Personal audit · Exam strategy</span>\n    </div>\n  </div>\n\n  <div class=\"content-grid\">\n    <div class=\"card\" style=\"border-top-color:#34d399;\">\n      <div class=\"card-label\" style=\"color:#34d399;\">🗺️ Las 8 estructuras — Resumen visual rápido</div>\n      <ul class=\"checklist\" id=\"final-checklist\">\n        <li onclick=\"toggleCheck(this)\"><div class=\"check-box\">✓</div><div><strong>Inversión:</strong> Never had I / Not only did / Seldom does</div></li>\n        <li onclick=\"toggleCheck(this)\"><div class=\"check-box\">✓</div><div><strong>Condicionales mixtas:</strong> If + past perf → would / If + past → would have</div></li>\n        <li onclick=\"toggleCheck(this)\"><div class=\"check-box\">✓</div><div><strong>Cleft sentences:</strong> It was… that / What I… is / All I need is</div></li>\n        <li onclick=\"toggleCheck(this)\"><div class=\"check-box\">✓</div><div><strong>Relative clauses:</strong> Non-defining / Reduced / Prep + whom/which</div></li>\n        <li onclick=\"toggleCheck(this)\"><div class=\"check-box\">✓</div><div><strong>Modales avanzados:</strong> Epistemic + perfect modals + semi-modales</div></li>\n        <li onclick=\"toggleCheck(this)\"><div class=\"check-box\">✓</div><div><strong>Subjuntivo/Mood:</strong> Suggest that + bare inf / Wish / Were to</div></li>\n        <li onclick=\"toggleCheck(this)\"><div class=\"check-box\">✓</div><div><strong>Cohesión:</strong> Stance adv / Hedging / Nominalización / Contrast linkers</div></li>\n        <li onclick=\"toggleCheck(this)\"><div class=\"check-box\">✓</div><div><strong>Integración:</strong> Todo junto en escritura fluida y natural</div></li>\n      </ul>\n    </div>\n\n    <div class=\"card blue\">\n      <div class=\"card-label\">📅 Plan simulacro final</div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w8d1')\" id=\"w8d1\">L</div>\n        <div class=\"day-info\"><h4>Lunes — Auditoría personal</h4><p>Lee tus textos de las semanas 1-7. Identifica: ¿qué estructura usas menos? ¿cuál sigue sintiéndose forzada? Dedica 25 min sólo a esa.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w8d2')\" id=\"w8d2\">M</div>\n        <div class=\"day-info\"><h4>Martes — APTIS Writing simulacro</h4><p>Task 1 (email formal) + Task 2 (opinión 100 palabras) + Task 3 (argumento 150 palabras). Cronométrate. Usa TODAS las estructuras.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w8d3')\" id=\"w8d3\">X</div>\n        <div class=\"day-info\"><h4>Miércoles — Corrección autónoma</h4><p>Lee tu simulacro con estos ojos: ¿hay estructuras C1? ¿registro consistente? ¿uso variado de linkers? Reescribe los párrafos débiles.</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w8d4')\" id=\"w8d4\">J</div>\n        <div class=\"day-info\"><h4>Jueves — Speaking simulacro completo</h4><p>Grábate haciendo los 4 partes del Speaking APTIS. Escucha la grabación: ¿usas estructuras C1 de forma natural o suena forzado?</p></div>\n      </div>\n      <div class=\"structure-item\">\n        <div class=\"day-dot\" onclick=\"toggleDay(this,'w8d5')\" id=\"w8d5\">V</div>\n        <div class=\"day-info\"><h4>Viernes — Revisión de tarjetas + mentalidad</h4><p>Repasa todas las tarjetas físicas de las 8 semanas. Luego: 10 minutos de visualización positiva del día del examen. Liderar un equipo necesita regulación emocional también.</p></div>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"content-grid three\">\n    <div class=\"card yellow wide\" style=\"grid-column: 1/-1\">\n      <div class=\"card-label\">🎯 Estrategia de examen para mentes ocupadas de manager</div>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem\">\n        <div class=\"tip\" style=\"align-items:flex-start\"><span class=\"tip-icon\">⏱️</span><div><strong style=\"display:block;margin-bottom:0.3rem;color:var(--accent1)\">Reading</strong>Lee el título y preguntas ANTES del texto. Como manager ya priorizas a diario: aplica lo mismo aquí. Necesitas saber para qué lees, o te pierdes en detalles irrelevantes.</div></div>\n        <div class=\"tip\"><span class=\"tip-icon\">✍️</span><div><strong style=\"display:block;margin-bottom:0.3rem;color:var(--accent1)\">Writing</strong>1 min de esquema antes de escribir. Una frase = una idea. No empieces a escribir sin saber el final del párrafo.</div></div>\n        <div class=\"tip\"><span class=\"tip-icon\">🎤</span><div><strong style=\"display:block;margin-bottom:0.3rem;color:var(--accent1)\">Speaking</strong>Si pierdes el hilo, usa una fórmula de ganancia de tiempo: \"That's an interesting point — what I mean to say is…\" Compra 5 segundos.</div></div>\n        <div class=\"tip\"><span class=\"tip-icon\">👂</span><div><strong style=\"display:block;margin-bottom:0.3rem;color:var(--accent1)\">Listening</strong>No intentes escribir todo. Escucha la primera vez para el gist, la segunda para detalles. Es f\u00e1cil fijarse en detalles y perder el marco.</div></div>\n      </div>\n    </div>\n  </div>\n</div>"];
</script>
<script>/* MACRO PANEL — Runtime JS */
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

const STATE = {
  theme: lsGet('macro_panel_theme') || 'light',
  errors: JSON.parse(lsGet('macro_panel_errors') || '[]'),
  srsMarked: JSON.parse(lsGet('macro_panel_srs') || '[]'),
};
document.documentElement.setAttribute('data-theme', STATE.theme);

function go(page, subtab, subtab2){
  document.querySelectorAll('.np').forEach(b => b.classList.toggle('on', b.dataset.pg === page));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('on', p.id === 'page-'+page));
  window.scrollTo({top:0,behavior:'smooth'});
  if (subtab) {
    setTimeout(() => {
      const pageEl = document.getElementById('page-'+page);
      if (!pageEl) return;
      const btn = pageEl.querySelector(`[data-t="${subtab}"]`) || pageEl.querySelector(`[data-tab="${subtab}"]`);
      if (btn) btn.click();
      // Second-level subtab (e.g. Vocab → Phrasal &amp; Preps → "Phrasals de 3 partes")
      if (subtab2) {
        setTimeout(() => {
          const innerPanel = pageEl.querySelector(`#vc-${subtab}`) || pageEl.querySelector(`#gr-${subtab}`) || pageEl.querySelector(`#sw-${subtab}`) || pageEl.querySelector(`#pl-${subtab}`);
          if (!innerPanel) return;
          const innerBtn = innerPanel.querySelector(`[data-t="${subtab2}"]`) || innerPanel.querySelector(`[data-tab="${subtab2}"]`);
          if (innerBtn) innerBtn.click();
        }, 80);
      }
    }, 30);
  }
}
document.querySelectorAll('.np').forEach(b => b.onclick = () => go(b.dataset.pg));
document.getElementById('theme-btn').onclick = () => {
  STATE.theme = STATE.theme === 'light' ? 'dark' : 'light';
  lsSet('macro_panel_theme', STATE.theme);
  document.documentElement.setAttribute('data-theme', STATE.theme);
};

const searchModal = document.getElementById('search-modal');
const searchInput = document.getElementById('search-input');
document.getElementById('search-btn').onclick = openSearch;
function openSearch(){ searchModal.classList.add('on'); setTimeout(()=>searchInput.focus(),50); }
searchModal.onclick = e => { if(e.target.id==='search-modal') searchModal.classList.remove('on'); };
document.addEventListener('keydown', e => {
  if((e.metaKey||e.ctrlKey) && e.key === 'k'){ e.preventDefault(); openSearch(); }
  if(e.key === 'Escape') searchModal.classList.remove('on');
});

function esc(s){ return String(s).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c])); }
function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }
function saveErrors(){ lsSet('macro_panel_errors', JSON.stringify(STATE.errors)); }
function saveSrs(){ lsSet('macro_panel_srs', JSON.stringify(STATE.srsMarked)); }

/* ===================== HOME ===================== */

/* === Helper to activate apt-style tabs inside imported HTML === */
function activateAptTabs(container, fnName){
  if (!container) return;
  // For each .tabs section with .tb buttons, hook them
  container.querySelectorAll('.tabs').forEach(tabsEl => {
    const btns = tabsEl.querySelectorAll('.tb');
    btns.forEach(btn => {
      btn.onclick = (e) => {
        // Extract panel id from onclick="xxx('id', ...)"
        const oc = btn.getAttribute('onclick') || '';
        const m = oc.match(/\(\s*['"]([^'"]+)['"]/);
        if (!m) return;
        let panelId = m[1];
        // Prefix used by apt: spTab -> sp-, wTab -> w-, pgTab -> pg-, rsTab -> rs-
        const prefixMap = {'spTab':'sp-','wTab':'w-','pgTab':'pg-','rsTab':''};
        const pref = prefixMap[fnName] || '';
        // For rsTab the id already includes prefix
        const targetId = pref + panelId;
        // Find panels in same parent
        const parent = btn.closest('.pg, .panel, .apt-imp');
        const sib = parent || container;
        sib.querySelectorAll('.tb').forEach(x => x.classList.remove('on'));
        btn.classList.add('on');
        // Find the panel
        sib.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
        const tgt = sib.querySelector('#' + targetId);
        if (tgt) tgt.classList.add('on');
      };
    });
  });
  // Also handle spRandomTopic, vtMode, etc. — make them no-ops if missing
  ['spRandomTopic','spRandomP4','vtMode','prepTab','pgTab','wTab','spTab','rsTab','toggleFocusMode','pomodoroStart','pomodoroReset','fcFlip','goNext','goPrev'].forEach(fn => {
    if (typeof window[fn] === 'undefined') {
      window[fn] = function(){ /* placeholder for recovered apt UI */ };
    }
  });
}
window.activateAptTabs = activateAptTabs;

function renderHome(){
  const p = document.getElementById('page-home');
  // Quick stats
  let vocCount = 0; APP_DATA.VOCAB_CATS.forEach(c => vocCount += c.items.length);
  let pvCount = 0; Object.values(APP_DATA.PV_BY_PARTICLE).forEach(arr => pvCount += arr.length);
  let prepCount = 0; Object.values(APP_DATA.PREP_PHRASES).forEach(arr => prepCount += arr.length);
  let collCount = 0; Object.values(APP_DATA.COLLOCATIONS).forEach(arr => collCount += arr.length);
  let idiomCount = 0; APP_DATA.IDIOM_TOPICS.forEach(t => idiomCount += t.idioms.length);
  // tests total
  const T = APP_DATA.TESTS_ALL;
  let testTotal = (T.p1?T.p1.length:0) + (T.p2_hub?T.p2_hub.length:0) + (T.p3_hub?T.p3_hub.length:0) + (T.p4_hub?T.p4_hub.length:0)
    + (T.quizBasic?T.quizBasic.length:0) + (T.quizAdvanced?T.quizAdvanced.length:0) + (T.quizColloc?T.quizColloc.length:0)
    + (T.synQ?T.synQ.length:0) + (T.defQ?T.defQ.length:0) + (T.ctxQ?T.ctxQ.length:0)
    + Object.values(T.apt||{}).reduce((acc,v) => acc + aptCount(v), 0)
    + Object.values(T.extra||{}).reduce((acc,v) => acc + aptCount(v), 0);
  const tipIdx = (new Date()).getDate() % APP_DATA.DAILY_TIPS.length;
  const tip = APP_DATA.DAILY_TIPS[tipIdx];

  p.innerHTML = `
    <div class="hero">
      <div class="pre">CEFR · C1 / C2 · APTIS Advanced</div>
      <h1>Macro Panel · Inglés</h1>
      <p class="sub">"Mastery is not a destination but a daily practice of attention."</p>
    </div>
    <div class="stats-row">
      <div class="stat"><span class="s-n">${APP_DATA.HUB_GRAMMAR.length + APP_DATA.REF_GRAMMAR.length + APP_DATA.GRAMMAR_WEEKS.length}</span><span class="s-l">Unidades gramaticales</span></div>
      <div class="stat"><span class="s-n">${vocCount}</span><span class="s-l">Vocab entries</span></div>
      <div class="stat"><span class="s-n">${pvCount}</span><span class="s-l">Phrasal verbs</span></div>
      <div class="stat"><span class="s-n">${prepCount}</span><span class="s-l">Prep. phrases</span></div>
      <div class="stat"><span class="s-n">${collCount}</span><span class="s-l">Collocations</span></div>
      <div class="stat"><span class="s-n">${idiomCount}</span><span class="s-l">Idioms</span></div>
      <div class="stat"><span class="s-n">${APP_DATA.FLASHCARDS.length}</span><span class="s-l">Flashcards</span></div>
      <div class="stat"><span class="s-n">${testTotal}</span><span class="s-l">Preguntas test</span></div>
    </div>
    <h2 class="h-sub">Por dónde empiezo</h2>

function answerUnitQuiz(btn, ui, qi, oi){
  const u = APP_DATA.HUB_GRAMMAR[ui];
  const q = u.quiz[qi];
  const block = btn.closest('.q-block');
  const ok = oi === q.a;
  block.querySelectorAll('.q-opt').forEach((b,i) => {
    b.disabled = true;
    if (i === q.a) b.classList.add('ok');
    if (i === oi && !ok) b.classList.add('bad');
  });
  const fb = document.getElementById(`ufb-${ui}-${qi}`);
  fb.className = 'q-fb show ' + (ok ? 'ok':'bad');
  fb.innerHTML = ok ? '✓ ¡Correcto!' : `✗ ${q.fb || 'La respuesta correcta es: <strong>'+q.o[q.a]+'</strong>'}`;
  if (!ok) {
    addError({ id:`gr-${ui}-${qi}`, q: q.q, correct: q.o[q.a], yours: q.o[oi], fb: q.fb || '' });
  }
}

const TT_STATE = {};
function attachTenseDecider(){
  window.ttSet = function(key, val, el){
    TT_STATE[key] = val;
    const opts = el.parentElement.querySelectorAll('.tt-opt');
    opts.forEach(o => o.classList.remove('on'));
    el.classList.add('on');
    ttAdvance();
  };
  window.ttReset = function(){
    Object.keys(TT_STATE).forEach(k => delete TT_STATE[k]);
    document.querySelectorAll('#tt-root .tt-opt').forEach(o => o.classList.remove('on'));
    document.getElementById('tt-q2').style.display = 'none';
    document.getElementById('tt-result').classList.remove('on');
  };
}
function ttAdvance(){
  const q2 = document.getElementById('tt-q2');
  const r = document.getElementById('tt-result');
  if (!TT_STATE.when) return;
  // Ask second question depending on when
  const map = {
    present: { q: "2. ¿Es algo permanente o pasajero/en progreso?", opts: [
      { v:'general', t:'Hábito / verdad', tense:'Present Simple', ex:'<em>Water boils at 100°C.</em>' },
      { v:'now', t:'Ahora mismo / temporal', tense:'Present Continuous', ex:'<em>I am reading right now.</em>' },
      { v:'recent', t:'Conexión con AHORA / experiencia / resultado', tense:'Present Perfect', ex:'<em>I have just finished.</em>' },
      { v:'duration', t:'Duración hasta ahora', tense:'Present Perfect Continuous', ex:'<em>I have been waiting for an hour.</em>' },
    ]},
    past: { q: "2. ¿Cómo se relaciona con otro pasado o con el presente?", opts: [
      { v:'simple', t:'Pasado terminado, momento concreto', tense:'Past Simple', ex:'<em>I visited Paris in 2018.</em>' },
      { v:'bg', t:'Acción larga / fondo de otra acción', tense:'Past Continuous', ex:'<em>I was reading when she called.</em>' },
      { v:'before', t:'Antes que otra acción pasada', tense:'Past Perfect', ex:'<em>She had left when I arrived.</em>' },
      { v:'beforeDur', t:'Duración antes de otra pasada', tense:'Past Perfect Continuous', ex:'<em>I had been waiting for 30 min.</em>' },
    ]},
    future: { q: "2. ¿Qué tipo de futuro?", opts: [
      { v:'decision', t:'Decisión espontánea / predicción', tense:'Will + base', ex:'<em>I think it will rain.</em>' },
      { v:'intention', t:'Intención o evidencia', tense:'Be going to', ex:'<em>Look at those clouds — it’s going to rain.</em>' },

      { v:'completed', t:'Completado antes de un punto futuro', tense:'Future Perfect', ex:'<em>By 2030, I’ll have finished.</em>' },
    ]},
    hyp: { q: "2. ¿Hipótesis sobre cuándo?", opts: [
      { v:'pres', t:'Presente improbable', tense:'If + past simple, would + base', ex:'<em>If I had time, I would travel.</em>' },
      { v:'past', t:'Pasado imposible', tense:'If + past perfect, would have + pp', ex:'<em>If I had studied, I would have passed.</em>' },
      { v:'mixed', t:'Causa pasada → efecto presente', tense:'Mixed conditional', ex:'<em>If I had learned French, I would be in Paris now.</em>' },
      { v:'wish', t:'Deseo / arrepentimiento', tense:'Wish + past / past perfect', ex:'<em>I wish I knew / had known.</em>' },
    ]},
  };
  const m = map[TT_STATE.when];
  q2.style.display = '';
  document.getElementById('tt-q2-text').innerHTML = m.q;

  r.classList.remove('on');
}
function ttResult(o, el){
  const opts = el.parentElement.querySelectorAll('.tt-opt');
  opts.forEach(x => x.classList.remove('on'));
  el.classList.add('on');
  const r = document.getElementById('tt-result');
  r.classList.add('on');
  r.innerHTML = `<div class="tt-tense">${o.tense}</div>${o.ex}`;
}

function renderMapTopic(tp){
  const zones = tp.zones || {};
  const positions = ['tl','tm','tr','ml','mr','bl','bm','br'];
  let html = `<div class="map-card"><div class="map-h"><span class="map-emoji">${tp.emoji||''}</span>${esc(tp.name)} <span class="map-es">${esc(tp.es||'')}${tp.pages?' · '+esc(tp.pages):''}${tp.aptis?' · APTIS':''}</span></div>`;
  if (tp.center && tp.center.en) html += `<div class="map-center">${esc(tp.center.en)}${tp.center.es?' <span class="small" style="font-style:italic;color:inherit">(${esc(tp.center.es)})</span>':''}</div>`;
  html += `<div class="map-zones">`;
  positions.forEach(pos => {
    const zs = zones[pos] || [];
    zs.forEach(z => {
      html += `<div class="map-zone"><h5>${esc(z.head)}</h5>${z.es?`<span class="map-es-sm">${esc(z.es)}</span>`:''}<ul>${(z.items||[]).map(i => `<li><span class="me">${esc(i.en)}</span> <span class="ms">${esc(i.es||'')}</span></li>`).join('')}</ul></div>`;

  });
  html += `</div></div>`;
  return html;
}

        <div class="syn-chip" onclick="this.classList.toggle('open')">

        <div class="syn-w">${esc(g.word)}</div>
        <div class="syn-grid">${(g.syns||[]).map(s => `<div class="syn-chip"><span class="sw">${esc(s)}</span></div>`).join('')}</div>

  if (totalNoun) {
    const n = p.querySelector('#syn-noun');

  });

  // Search
  const q = p.querySelector('#syn-q');

  q.addEventListener('input', () => {

    p.querySelectorAll('.syn-grp').forEach(g => {
      const w = g.dataset.word || '';
      const txt = g.textContent.toLowerCase();
      const match = !term || w.includes(term) || txt.includes(term);
      g.style.display = match ? 'block' : 'none';
      if (match) visible++;
    });
    countEl.textContent = term ? `${visible} resultados` : `${totalWords} grupos`;
  });
}

const TEST_STATE = { current:null, qIdx:0, score:0, answers:[], pool:[], total:0, mode:null, timer:null, timeLeft:0 };

// Cuenta segura del total de preguntas de un test Aptis: grammar es array, vocab puede ser array u objeto {q1,q2,...}.
function aptCount(src){
  if (!src) return 0;
  const g = Array.isArray(src.grammar) ? src.grammar.length : 0;
  let v = 0;
  if (Array.isArray(src.vocab)) v = src.vocab.length;
  else if (src.vocab && typeof src.vocab === 'object') v = Object.keys(src.vocab).length;
  const f = Array.isArray(src.fillBlank) ? src.fillBlank.length : 0;
  return g + v + f;
}
