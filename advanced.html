<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Panel — English C1/C2 · APTIS</title>
<style>
:root{
  --bg:#fafaf7; --paper:#ffffff; --line:#e7e4dc; --line-soft:#f1efe8;
  --ink:#1a1a1a; --ink-soft:#4a4a4a; --mute:#8a8a85;
  --accent:#1f4e8c; --accent-soft:#eaf0f8;
  --good:#2d6a4f; --good-soft:#e7f0ec;
  --warn:#a8541a; --warn-soft:#fcefe0;
  --bad:#9d2929; --bad-soft:#fbe9e9;
  --serif:'Georgia','Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#11141a; --paper:#181c24; --line:#262b35; --line-soft:#1f242d;
  --ink:#e8e6df; --ink-soft:#bdbcb6; --mute:#7a7d85;
  --accent:#6fa8ec; --accent-soft:#1a2a3e;
  --good:#6fc28f; --good-soft:#1a2e22;
  --warn:#d99a5b; --warn-soft:#2e2519;
  --bad:#e07676; --bad-soft:#2e1c1c;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14.5px;line-height:1.65;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent}
::selection{background:var(--accent);color:#fff}
#bar{background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}
#bar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:10px 18px;flex-wrap:wrap}
.logo{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--ink);letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.logo .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block}
#nav{display:flex;gap:2px;flex-wrap:wrap;flex:1}
.np{background:transparent;border:1px solid transparent;color:var(--ink-soft);padding:5px 12px;border-radius:6px;font-size:12.5px;letter-spacing:.2px;transition:all .15s}
.np:hover{color:var(--ink);background:var(--line-soft)}
.np.on{background:var(--ink);color:var(--paper);font-weight:500}
.bar-actions{display:flex;align-items:center;gap:6px}
#search-btn,#theme-btn{background:transparent;border:1px solid var(--line);color:var(--ink-soft);padding:5px 10px;border-radius:6px;font-size:12px;transition:.15s}
#search-btn:hover,#theme-btn:hover{border-color:var(--ink);color:var(--ink)}
kbd{font-family:var(--sans);font-size:10px;background:var(--line-soft);border:1px solid var(--line);border-radius:3px;padding:1px 5px;color:var(--mute)}
main{max-width:1200px;margin:0 auto;padding:28px 18px 80px}
.page{display:none}
.page.on{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.h-sec{margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.h-sec h1{font-family:var(--serif);font-size:1.85rem;font-weight:600;color:var(--ink);margin-bottom:4px;letter-spacing:-.3px}
.h-sec p{color:var(--mute);font-size:13px;font-style:italic}
.h-sub{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--ink);margin:20px 0 10px;padding-bottom:4px;border-bottom:1px dotted var(--line)}
.h-sub2{font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--accent);margin:14px 0 6px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:14px}
.card h3{font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:8px}
.card h4{font-family:var(--serif);font-size:.95rem;color:var(--accent);font-weight:600;margin:10px 0 6px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.lbl{display:inline-block;font-size:10px;padding:1px 7px;border-radius:3px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;margin-right:4px}
.lbl-b{background:var(--accent-soft);color:var(--accent)}
.lbl-g{background:var(--good-soft);color:var(--good)}
.lbl-w{background:var(--warn-soft);color:var(--warn)}
.lbl-r{background:var(--bad-soft);color:var(--bad)}
.ex{background:var(--accent-soft);border-left:3px solid var(--accent);padding:7px 12px;margin:5px 0;font-size:13.5px;border-radius:0 4px 4px 0}
.ex em{color:var(--accent);font-style:normal;font-weight:600}
.ex.good{background:var(--good-soft);border-left-color:var(--good)}
.ex.good em{color:var(--good)}
.ex.bad{background:var(--bad-soft);border-left-color:var(--bad);opacity:.9}
.ex.bad em{color:var(--bad);text-decoration:line-through}
.note{background:var(--warn-soft);border:1px solid var(--warn);border-left-width:3px;border-radius:4px;padding:8px 12px;font-size:12.5px;color:var(--warn);margin:8px 0}
.struct{background:var(--line-soft);border:1px dashed var(--line);border-radius:4px;padding:6px 10px;font-family:'SF Mono',Menlo,monospace;font-size:12.5px;color:var(--ink);margin:6px 0}
.unit{background:var(--paper);border:1px solid var(--line);border-radius:8px;margin-bottom:10px;overflow:hidden}
.unit-h{display:flex;align-items:center;gap:12px;padding:13px 18px;cursor:pointer;transition:background .15s}
.unit-h:hover{background:var(--line-soft)}
.unit-n{width:28px;height:28px;border-radius:50%;background:var(--ink);color:var(--paper);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;flex-shrink:0}
.unit-t{font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--ink);flex:1}
.unit-sub{font-size:11.5px;color:var(--mute);font-style:italic}
.unit-arrow{color:var(--mute);font-size:11px;transition:transform .2s}
.unit.open .unit-arrow{transform:rotate(180deg)}
.unit-body{display:none;padding:0 18px 18px;border-top:1px solid var(--line-soft)}
.unit.open .unit-body{display:block}
.subsec{margin-top:14px}
.subsec h4{font-family:var(--serif);font-size:.95rem;color:var(--accent);font-weight:600;margin-bottom:6px;padding-top:12px;border-top:1px dotted var(--line)}
.subsec:first-child h4{border-top:none;padding-top:0}
.subtabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:18px}
.stb{background:transparent;border:none;color:var(--mute);padding:8px 14px;font-size:12.5px;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.stb:hover{color:var(--ink)}
.stb.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:500}
.panel{display:none}
.panel.on{display:block}
table.t{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
table.t th{background:var(--line-soft);color:var(--ink);padding:8px 10px;text-align:left;font-weight:600;font-size:12px;border-bottom:1px solid var(--line);letter-spacing:.2px;text-transform:uppercase}
table.t td{padding:8px 10px;border-bottom:1px solid var(--line-soft);vertical-align:top}
table.t tr:hover td{background:var(--line-soft)}
.q-block{margin:12px 0;padding:12px;background:var(--line-soft);border-radius:6px}
.q-stem{font-size:14.5px;line-height:1.7;margin-bottom:10px}
.q-stem .blank{display:inline-block;border-bottom:2px solid var(--ink);min-width:80px;text-align:center;font-style:italic;color:var(--accent);padding:0 4px}
.q-opts{display:grid;gap:5px}
.q-opt{background:var(--paper);border:1px solid var(--line);color:var(--ink);padding:7px 12px;border-radius:5px;text-align:left;font-size:13px;transition:.15s}
.q-opt:hover:not(:disabled){border-color:var(--accent)}
.q-opt:disabled{cursor:default;opacity:.85}
.q-opt.ok{background:var(--good-soft);border-color:var(--good);color:var(--good);font-weight:500}
.q-opt.bad{background:var(--bad-soft);border-color:var(--bad);color:var(--bad)}
.q-fb{margin-top:8px;padding:7px 10px;font-size:12px;border-radius:4px;display:none}
.q-fb.show{display:block}
.q-fb.ok{background:var(--good-soft);color:var(--good);border-left:3px solid var(--good)}
.q-fb.bad{background:var(--bad-soft);color:var(--bad);border-left:3px solid var(--bad)}
.btn{background:var(--ink);color:var(--paper);border:none;padding:8px 18px;border-radius:5px;font-size:13px;font-weight:500;transition:.15s}
.btn:hover{opacity:.85}
.btn.sec{background:var(--paper);color:var(--ink);border:1px solid var(--line)}
.btn.sec:hover{border-color:var(--ink)}
.btn.acc{background:var(--accent);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
#search-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding-top:90px}
#search-modal.on{display:flex}
#search-box{background:var(--paper);border-radius:8px;width:90%;max-width:560px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#search-input{width:100%;background:var(--line-soft);border:1px solid var(--line);border-radius:6px;padding:10px 14px;color:var(--ink);font-size:14px;outline:none}
#search-input:focus{border-color:var(--accent)}
#search-results{margin-top:10px;max-height:400px;overflow-y:auto}
.sr{padding:8px 12px;border-radius:5px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line-soft)}
.sr:hover{background:var(--line-soft)}
.sr .sr-t{font-weight:600;color:var(--ink)}
.sr .sr-loc{font-size:11px;color:var(--mute);margin-left:6px}
.sr .sr-snip{font-size:12px;color:var(--mute);margin-top:2px;line-height:1.4}
.hero{text-align:center;padding:30px 0 36px;border-bottom:1px solid var(--line);margin-bottom:30px}
.hero .pre{font-size:11px;color:var(--mute);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.hero h1{font-family:var(--serif);font-size:2.6rem;font-weight:600;color:var(--ink);margin-bottom:8px;letter-spacing:-.5px}
.hero .sub{font-family:var(--serif);font-style:italic;color:var(--mute);font-size:1rem;max-width:600px;margin:0 auto}
.qstart{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;max-width:900px;margin:0 auto}
.qs{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:14px;text-align:left;transition:.15s;color:var(--ink)}
.qs:hover{border-color:var(--ink);transform:translateY(-1px)}
.qs .qs-t{font-family:var(--serif);font-size:.95rem;font-weight:600;margin-bottom:3px}
.qs .qs-d{font-size:11.5px;color:var(--mute)}
.stats-row{display:flex;justify-content:center;gap:24px;margin:20px 0 30px;flex-wrap:wrap}
.stat{text-align:center}
.stat .s-n{font-family:var(--serif);font-size:1.8rem;font-weight:600;color:var(--ink);display:block}
.stat .s-l{font-size:10.5px;color:var(--mute);letter-spacing:1px;text-transform:uppercase}
.tense-tree{display:flex;flex-direction:column;gap:10px;margin:18px 0}
.tt-node{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:14px 16px}
.tt-q{font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:8px}
.tt-opts{display:flex;flex-wrap:wrap;gap:6px}
.tt-opt{background:var(--line-soft);border:1px solid var(--line);color:var(--ink);padding:6px 14px;border-radius:16px;font-size:12.5px;transition:.15s}
.tt-opt:hover{border-color:var(--accent);color:var(--accent)}
.tt-opt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.tt-result{display:none;margin-top:14px;padding:14px;background:var(--accent-soft);border-radius:6px;border-left:3px solid var(--accent)}
.tt-result.on{display:block}
.tt-tense{font-family:var(--serif);font-size:1.15rem;color:var(--accent);font-weight:600;margin-bottom:6px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fch{background:var(--paper);border:1px solid var(--line);color:var(--ink-soft);padding:4px 12px;border-radius:16px;font-size:12px;transition:.15s}
.fch:hover{border-color:var(--ink)}
.fch.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.pv-grp{margin-bottom:18px}
.pv-grp-h{font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--accent);margin-bottom:8px;display:flex;align-items:baseline;gap:8px}
.pv-grp-h .pv-meta{font-size:11px;color:var(--mute);font-style:italic;font-weight:normal}
.pv-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:8px}
.pv{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:9px 12px;cursor:pointer;transition:.15s}
.pv:hover{border-color:var(--ink)}
.pv-w{font-weight:600;color:var(--ink);font-size:13.5px}
.pv-m{font-size:12px;color:var(--ink-soft);margin-top:1px}
.pv-x{display:none;font-style:italic;color:var(--accent);font-size:12px;margin-top:5px;padding-top:5px;border-top:1px dotted var(--line)}
.pv.open .pv-x{display:block}
.pv-tip{display:none;font-size:11.5px;color:var(--warn);margin-top:4px}
.pv.open .pv-tip{display:block}
.col-grp{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.col-grp-h{font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:8px;padding-bottom:6px;border-bottom:1px dotted var(--line)}
.col-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:5px 14px}
.col-it{font-size:13px;padding:3px 0}
.col-it .col-w{color:var(--ink);font-weight:500}
.col-it .col-d{color:var(--mute);font-size:11.5px}
.col-it .col-tr{color:var(--mute);font-size:11px;font-style:italic;display:block;margin-top:1px}
.col-it .col-ex{color:var(--accent);font-size:11.5px;font-style:italic;display:block;margin-top:1px}
.col-it .col-fam{color:var(--good);font-size:11px;display:block;margin-top:1px}
.prep-card{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.prep-h{font-family:var(--serif);font-size:1.2rem;color:var(--accent);font-weight:600;margin-bottom:8px}
.prep-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:6px 14px}
.prep-it{font-size:13px;padding:4px 0;border-bottom:1px dotted var(--line-soft)}
.prep-it .pi-p{color:var(--ink);font-weight:600;font-family:var(--serif)}
.prep-it .pi-m{color:var(--mute);font-size:11.5px;display:block}
.prep-it .pi-ex{color:var(--accent);font-size:12px;font-style:italic;display:block;margin-top:1px}
.fn-grp{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:12px}
.fn-h{font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.fn-d{font-size:12px;color:var(--mute);margin-bottom:10px;font-style:italic}
.fn-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:5px 12px}
.fn-it{background:var(--line-soft);padding:5px 11px;border-radius:4px;font-size:12.5px;color:var(--ink);border-left:2px solid var(--accent)}
.fn-it.formal{border-left-color:var(--good)}
.fn-it.casual{border-left-color:var(--warn)}
.fn-it .fn-reg{font-size:9.5px;color:var(--mute);letter-spacing:.5px;text-transform:uppercase;margin-right:6px}
.topic-card{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.topic-card.open .topic-body{display:block}
.topic-h{cursor:pointer;font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--ink);display:flex;justify-content:space-between;align-items:center}
.topic-body{display:none;margin-top:10px}
.tp-block{margin-top:10px}
.tp-block-h{font-size:11px;color:var(--mute);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.tp-qs{font-size:13px;color:var(--ink-soft);margin-bottom:4px;font-style:italic}
.tp-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tp-chip{background:var(--accent-soft);color:var(--accent);padding:2px 9px;border-radius:12px;font-size:11.5px}
.test-hub{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:18px}
.test-c{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:16px;transition:.15s;cursor:pointer;text-align:left}
.test-c:hover{border-color:var(--ink);transform:translateY(-1px)}
.test-c-n{font-size:10.5px;color:var(--mute);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.test-c-t{font-family:var(--serif);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.test-c-d{font-size:12px;color:var(--ink-soft)}
.progress{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:18px}
.pbar{height:100%;background:var(--accent);transition:width .3s}
.q-meta{font-size:11px;color:var(--mute);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.q-nav{display:flex;justify-content:space-between;margin-top:18px;align-items:center;gap:10px;flex-wrap:wrap}
.q-end{text-align:center;padding:30px 20px;background:var(--paper);border:1px solid var(--line);border-radius:8px}
.q-end .big{font-family:var(--serif);font-size:2.8rem;font-weight:600;color:var(--ink)}
.q-end .lvl{font-family:var(--serif);font-size:1.1rem;color:var(--accent);font-style:italic;margin:8px 0 16px}
.review-list{text-align:left;max-height:340px;overflow-y:auto;margin:14px 0;padding:10px 0;border-top:1px solid var(--line)}
.review-it{padding:8px 10px;margin-bottom:6px;background:var(--bad-soft);border-radius:4px;font-size:12.5px}
.review-it.ok{background:var(--good-soft)}
.wo-bank,.wo-build{display:flex;flex-wrap:wrap;gap:5px;padding:12px;border-radius:6px;min-height:50px;margin-bottom:10px}
.wo-bank{background:var(--line-soft)}
.wo-build{background:var(--paper);border:1px dashed var(--accent)}
.wo-w{background:var(--paper);border:1px solid var(--line);color:var(--ink);padding:4px 10px;border-radius:4px;font-size:13px;cursor:pointer;transition:.15s}
.wo-w:hover{border-color:var(--accent)}
.wo-w.used{opacity:.25;cursor:default}
.wo-w.placed{background:var(--accent);color:#fff;border-color:var(--accent)}
.srs-stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.srs-st{text-align:center;min-width:80px}
.srs-st .v{font-family:var(--serif);font-size:1.6rem;font-weight:600}
.srs-st .l{font-size:10.5px;color:var(--mute);letter-spacing:1px;text-transform:uppercase}
.fc-wrap{perspective:1000px;max-width:560px;margin:20px auto;height:260px}
.fc{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}
.fc.flip{transform:rotateY(180deg)}
.fc-f,.fc-b{position:absolute;inset:0;backface-visibility:hidden;background:var(--paper);border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.fc-b{transform:rotateY(180deg);background:var(--accent-soft)}
.fc-f .fl{font-size:10px;color:var(--mute);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.fc-f .fw{font-family:var(--serif);font-size:1.7rem;font-weight:600;color:var(--ink)}
.fc-b .fm{font-size:13.5px;color:var(--ink);line-height:1.5;white-space:pre-line;text-align:left;max-width:100%}
.fc-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px}
.fc-cnt{font-size:11.5px;color:var(--mute);min-width:48px;text-align:center}
.muted{color:var(--mute)}
.center{text-align:center}
.small{font-size:11.5px;color:var(--mute)}
hr.div{border:none;border-top:1px dotted var(--line);margin:14px 0}
/* Idioms cards */
.idiom-card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.idiom-h{font-family:var(--serif);font-size:1.05rem;color:var(--accent);font-weight:600;margin-bottom:4px}
.idiom-es{font-size:12px;color:var(--mute);font-style:italic;margin-bottom:6px}
.idiom-m{font-size:13px;color:var(--ink-soft);margin-bottom:6px}
.idiom-tag{display:inline-block;font-size:10.5px;background:var(--line-soft);color:var(--ink-soft);padding:1px 8px;border-radius:10px;margin-left:6px}
/* Synonyms */
.syn-grp{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px}
.syn-w{font-family:var(--serif);font-size:1.25rem;color:var(--accent);margin-bottom:8px}
.syn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:6px}
.syn-chip{background:var(--line-soft);border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:12px;cursor:pointer;transition:.15s}
.syn-chip:hover{border-color:var(--accent)}
.syn-chip .sw{font-weight:600;color:var(--ink);display:block}
.syn-chip .se{color:var(--mute);font-size:11px;display:block}
.syn-chip .sex{font-size:11.5px;color:var(--accent);font-style:italic;margin-top:3px;display:none;line-height:1.4}
.syn-chip.open .sex{display:block}
/* Nature pairs (avoid/natural) */
.nat-grp{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px}
.nat-cat{font-family:var(--serif);font-size:1.05rem;color:var(--ink);margin-bottom:4px}
.nat-desc{font-size:12.5px;color:var(--mute);margin-bottom:10px;font-style:italic}
.nat-sub{margin-top:10px}
.nat-sub h5{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.nat-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--line-soft);padding:8px;border-radius:6px;margin-bottom:6px;font-size:12.5px}
.nat-avoid{color:var(--bad);text-decoration:line-through}
.nat-natural{color:var(--good);font-weight:500}
.nat-ctx{grid-column:1/-1;color:var(--mute);font-size:11.5px;font-style:italic;margin-top:3px}
.nat-ex{grid-column:1/-1;color:var(--ink-soft);font-size:12px;margin-top:3px}
.nat-ex span{background:var(--accent-soft);color:var(--accent);padding:1px 4px;border-radius:3px}
/* Tense story */
.tense-story{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:10px}
.tense-story h4{font-family:var(--serif);color:var(--accent);margin-bottom:6px}
.tense-story .ts-tags{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0}
.tense-story .ts-tag{background:var(--accent-soft);color:var(--accent);padding:2px 9px;border-radius:12px;font-size:11.5px}

.map-card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px}
.map-h{font-family:var(--serif);font-size:1.15rem;color:var(--ink);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.map-h .map-emoji{font-size:1.4rem}
.map-h .map-es{font-size:12px;color:var(--mute);font-style:italic;font-family:var(--sans);font-weight:normal}
.map-center{text-align:center;margin:10px 0;padding:10px;background:var(--accent-soft);border-radius:6px;color:var(--accent);font-family:var(--serif);font-weight:600}
.map-zones{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.map-zone{background:var(--line-soft);border:1px solid var(--line);border-radius:6px;padding:10px}
.map-zone h5{font-size:11.5px;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.map-zone .map-es-sm{font-size:11px;color:var(--mute);font-style:italic;margin-bottom:5px;display:block}
.map-zone ul{padding-left:14px;list-style:none}
.map-zone li{font-size:12px;color:var(--ink-soft);margin-bottom:2px}
.map-zone li .me{color:var(--ink);font-weight:500}
.map-zone li .ms{color:var(--mute);font-size:11px;font-style:italic}
/* Connectors / essay panels (from study_guide) */
.conn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.conn-card{background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;padding:12px 14px}
.conn-card.h-teal{border-left-color:#2d8e8a}
.conn-card.h-red{border-left-color:var(--bad)}
.conn-card.h-purple{border-left-color:#7a4ea8}
.conn-card.h-amber{border-left-color:var(--warn)}
.conn-card.h-blue{border-left-color:var(--accent)}
.conn-card.h-green{border-left-color:var(--good)}
.conn-card.h-pink{border-left-color:#b54a82}
.conn-card.h-gray{border-left-color:var(--mute)}
.conn-card h4{font-family:var(--serif);font-size:.95rem;color:var(--ink);margin-bottom:6px}
.conn-card ul{list-style:none;padding-left:0;font-size:12.5px}
.conn-card li{padding:3px 0;border-bottom:1px dotted var(--line-soft)}
.conn-card li:last-child{border-bottom:none}
.conn-card .es{display:block;font-size:11px;color:var(--mute);font-style:italic;margin-top:1px}
.essay-group{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.essay-group h4{font-family:var(--serif);color:var(--accent);font-size:1rem;margin-bottom:6px}
.essay-group p{font-size:13px;color:var(--ink-soft);line-height:1.7}
.essay-group.highlight{border-left:3px solid var(--accent);background:var(--accent-soft)}
.aptis-block{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:14px 16px;margin-bottom:10px}
.aptis-block h3{font-family:var(--serif);color:var(--accent);font-size:1rem;margin-bottom:6px}
.aptis-block p,.aptis-block li{font-size:13px;color:var(--ink-soft);line-height:1.7}
.aptis-block ul{padding-left:18px;margin-top:4px}
.aptis-block .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.aptis-block .tag{background:var(--accent-soft);color:var(--accent);padding:3px 10px;border-radius:14px;font-size:12px}
/* Grammar week (from aptis_grammar) — visually adapted */
.gw-card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin-bottom:14px}
.gw-h{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.gw-num{width:36px;height:36px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:600;font-size:14px}
.gw-meta h2{font-family:var(--serif);font-size:1.15rem;color:var(--ink);margin-bottom:2px}
.gw-meta .theme{font-size:11.5px;color:var(--mute);font-style:italic}
.gw-day{background:var(--line-soft);border-radius:5px;padding:8px 10px;margin-bottom:5px;font-size:12.5px}
.gw-day b{color:var(--accent)}
/* Plan study activate units */
.actu{display:grid;grid-template-columns:1fr 2fr;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:8px;font-size:12.5px}
.actu-l{font-family:var(--serif);color:var(--accent);font-weight:600}
.actu-r{color:var(--ink-soft);line-height:1.6}
.actu-r b{color:var(--ink)}
@media(max-width:700px){
  .hero h1{font-size:1.9rem}.h-sec h1{font-size:1.5rem}
  main{padding:18px 12px 70px}#bar-inner{padding:8px 12px;gap:10px}
  .logo{font-size:1rem}.np{font-size:11.5px;padding:4px 9px}
  .card,.unit-body{padding:14px}.hero{padding:18px 0 22px}
  .actu{grid-template-columns:1fr}
}

:["subir / bajar (transporte público)"],"examples":["She <em>got off</em> the bus at the wrong stop."],"tips":["Get on/off: autobús, tren, metro, avión"]}],"in/out":[{"w":"get in / out","meanings":["entrar / salir (coche, taxi)"],"examples":["He <em>got into</em> the taxi and gave the address."],"tips":["Get in/out: solo para coche o taxi"]}],"after":[{"w":"look after","meanings":["cuidar de alguien"],"examples":["She <em>looks after</em> her elderly mother at home."],"tips":["Look after = responsabilidad de cuidado"]},{"w":"take after","meanings":["parecerse a (un familiar)"],"examples":["She <em>takes after</em> her father — they're both incredibly stubborn."],"tips":["Take after = heredar rasgos de un familiar"]}],"apart":[{"w":"drift apart","meanings":["distanciarse poco a poco"],"examples":["After university, they gradually <em>drifted apart</em>."],"tips":["Drift apart = perder contacto sin pelea concreta"]}],"at":[{"w":"pick at","meanings":["picotear, comer sin ganas"],"examples":["He was so nervous he just <em>picked at</em> his food."],"tips":["Pick at = comer muy poco, sin apetito"]}],"across":[{"w":"come across as","meanings":["dar la impresión de ser"],"examples":["The main character <em>comes across as</em> cold at first."],"tips":["Come across as = la impresión que transmite algo o alguien"]}],"around":[{"w":"hang around","meanings":["estar sin hacer nada / esperar en un lugar"],"examples":["Teenagers often <em>hang around</em> the shopping centre after school."],"tips":["Hang around = merodear, estar sin plan concreto"]},{"w":"look around","meanings":["explorar un lugar, echar un vistazo"],"examples":["We <em>looked around</em> the old town for a couple of hours."],"tips":["Look around = explorar sin un objetivo concreto"]},{"w":"mess around","meanings":["perder el tiempo, hacer el tonto"],"examples":["On Sundays we just <em>mess around</em> with no plans."],"tips":["Mess around = sin plan ni propósito concreto"]}],"to":[{"w":"rise to fame","meanings":["hacerse famoso/a, ascender a la fama"],"examples":["She <em>rose to fame</em> after appearing in a viral video."],"tips":["Rise to fame = el momento en que alguien se hace conocido"]}],"under":[{"w":"come under fire","meanings":["ser criticado/a duramente"],"examples":["The minister <em>came under fire</em> for her handling of the crisis."],"tips":["Come under fire = recibir críticas intensas y públicas"]}],"from":[{"w":"fall from grace","meanings":["caer en desgracia"],"examples":["The once-popular leader <em>fell from grace</em> after the scandal."],"tips":["Fall from grace = perder la reputación y el favor público"]}],"behind":[{"w":"come from behind","meanings":["remontar, volver después de ir perdiendo"],"examples":["They <em>came from behind</em> to win 3–2."],"tips":["Come from behind = ganar cuando ibas perdiendo"]},{"w":"fall behind","meanings":["quedarse atrás, atrasarse en los estudios"],"examples":["She <em>fell behind</em> after missing several weeks of class."],"tips":["Fall behind = no avanzar al mismo ritmo que los demás"]}],"forward":[{"w":"look forward to","meanings":["tener ganas de, esperar con ilusión"],"examples":["I'm really <em>looking forward to</em> the holidays."],"tips":["Look forward to + noun/-ing = anticipar algo con ilusión"]}],"aside":[{"w":"put aside","meanings":["reservar dinero, apartar"],"examples":["Try to <em>put aside</em> a small amount every month."],"tips":["Put aside = guardar dinero para más adelante"]}],"up/down":[{"w":"go up / come down","meanings":["subir / bajar (precios)"],"examples":["Fuel prices have <em>gone up</em> again this month."],"tips":["Prices go up/come down — no 'increase/decrease by themselves'"]}],"—":[{"w":"spread","meanings":["difundirse (noticias, rumores)"],"examples":["Misinformation <em>spread</em> rapidly across social media."],"tips":["Spread = extenderse (no phrasal pero clave en este tema)"]},{"w":"peer pressure","meanings":["presión de grupo (colocación fija)"],"examples":["Many young people make bad choices due to <em>peer pressure</em>."],"tips":["Peer pressure = presión de los iguales para conformarse"]}],"against":[{"w":"rebel against","meanings":["rebelarse contra"],"examples":["Teenagers often <em>rebel against</em> authority as part of growing up."],"tips":["Rebel against = oponerse activamente a reglas o figuras de autoridad"]}]},

  PREP_USES: [{"word":"AT","tagline":"point in time / place / state","uses":[{"label":"Point in time","rule":"Specific times, meal times, and certain time expressions.","examples":["The meeting starts <strong>at</strong> 9 o'clock.","They arrived <strong>at</strong> midnight.","I'll call you <strong>at</strong> lunchtime."]},{"label":"Point in space","rule":"A precise location or destination (not an area).","examples":["She's waiting <strong>at</strong> the bus stop.","He studied <strong>at</strong> Oxford.","There was an accident <strong>at</strong> the junction."]},{"label":"State or activity","rule":"Being engaged in something or in a particular state.","examples":["The two countries are <strong>at</strong> war.","She's <strong>at</strong> her best in the mornings.","He laughed <strong>at</strong> the irony."]}]},{"word":"IN","tagline":"enclosed space / period / process","uses":[{"label":"Enclosed or larger space","rule":"Inside a container, room, city, country, or defined area.","examples":["The documents are <strong>in</strong> the drawer.","She grew up <strong>in</strong> a small village <strong>in</strong> Andalusia.","I read about it <strong>in</strong> the newspaper."]},{"label":"Periods of time","rule":"Months, years, decades, seasons, and longer durations.","examples":["The project was completed <strong>in</strong> record time.","Things changed dramatically <strong>in</strong> the 1990s.","She'll be back <strong>in</strong> two hours."]},{"label":"State or manner","rule":"Expressing condition, manner, or medium.","examples":["He spoke <strong>in</strong> a low voice.","She's <strong>in</strong> good health.","Please write <strong>in</strong> pen, not pencil."]}]},{"word":"ON","tagline":"surface / day / contact","uses":[{"label":"Surface contact","rule":"On top of or touching a surface.","examples":["The keys are <strong>on</strong> the table.","There's a scratch <strong>on</strong> the screen.","The town is <strong>on</strong> the coast."]},{"label":"Days and dates","rule":"Specific days, dates, and named occasions.","examples":["The interview is <strong>on</strong> Monday.","She was born <strong>on</strong> the 3rd of March.","We always visit them <strong>on</strong> New Year's Day."]},{"label":"Media and technology","rule":"Electronic media, devices, and broadcast.","examples":["I saw it <strong>on</strong> the news.","She found the information <strong>on</strong> the internet.","They spoke <strong>on</strong> the phone for an hour."]}]},{"word":"BY","tagline":"agent / deadline / means","uses":[{"label":"Agent in passive","rule":"Who performed the action in a passive construction.","examples":["The report was written <strong>by</strong> the senior analyst.","The decision was overturned <strong>by</strong> the court.","The exhibition was curated <strong>by</strong> a team of experts."]},{"label":"Deadline","rule":"Not later than a certain point in time.","examples":["Please submit your application <strong>by</strong> Friday.","The results must be published <strong>by</strong> the end of the month.","Can you have this ready <strong>by</strong> tomorrow morning?"]},{"label":"Means or method","rule":"How something is done or transported.","examples":["She travels <strong>by</strong> train whenever possible.","You can pay <strong>by</strong> card.","The contract was signed <strong>by</strong> mistake."]}]},{"word":"FOR","tagline":"purpose / duration / reason","uses":[{"label":"Purpose or benefit","rule":"Why something is done or who benefits.","examples":["This medication is <strong>for</strong> pain relief.","She bought flowers <strong>for</strong> her mother.","There's a room reserved <strong>for</strong> guests."]},{"label":"Duration","rule":"How long something lasts (completed or ongoing).","examples":["He's been working there <strong>for</strong> over a decade.","She studied <strong>for</strong> six hours without a break.","The exhibition runs <strong>for</strong> three weeks."]},{"label":"Support or preference","rule":"Being in favour of something.","examples":["Are you <strong>for</strong> or against the proposal?","All the committee members voted <strong>for</strong> the motion.","She campaigned <strong>for</strong> electoral reform."]}]},{"word":"WITH","tagline":"accompaniment / instrument / manner","uses":[{"label":"Accompaniment","rule":"Together with someone or something.","examples":["She went to the conference <strong>with</strong> a colleague.","He left the office <strong>with</strong> all the relevant files.","The proposal came <strong>with</strong> a detailed budget."]},{"label":"Instrument or means","rule":"What is used to do something.","examples":["He signed the contract <strong>with</strong> a fountain pen.","She cut the ribbon <strong>with</strong> a pair of scissors.","The stain came out <strong>with</strong> cold water."]},{"label":"Cause of feeling","rule":"What causes an emotion (often followed by a gerund or noun).","examples":["She trembled <strong>with</strong> anxiety before the presentation.","He was flushed <strong>with</strong> embarrassment.","They roared <strong>with</strong> laughter."]}]},{"word":"TO","tagline":"direction / recipient / relation","uses":[{"label":"Direction or destination","rule":"Movement towards a place or person.","examples":["She walked <strong>to</strong> the station.","He was transferred <strong>to</strong> the Madrid office.","Please send the invoice <strong>to</strong> the finance department."]},{"label":"Recipient","rule":"Who receives something (often used with verbs like give, send, lend).","examples":["He handed the report <strong>to</strong> his manager.","The prize was awarded <strong>to</strong> an unknown artist.","She explained the situation <strong>to</strong> the board."]},{"label":"Contrast or limit","rule":"Expressing range (from…to) or proportion.","examples":["The temperature rose from 10 <strong>to</strong> 30 degrees overnight.","The project was completed <strong>to</strong> a high standard.","This is inferior <strong>to</strong> the previous model."]}]},{"word":"OF","tagline":"possession / part / content","uses":[{"label":"Possession and relationship","rule":"Showing that something belongs to or is associated with something else.","examples":["The outcome <strong>of</strong> the negotiations was uncertain.","The role <strong>of</strong> the government in this matter is clear.","A significant proportion <strong>of</strong> the workforce was affected."]},{"label":"Content or material","rule":"What something consists of or contains.","examples":["A cup <strong>of</strong> coffee was all she needed.","The walls were built <strong>of</strong> limestone.","She submitted a piece <strong>of</strong> original research."]},{"label":"After adjectives","rule":"Many adjectives take 'of' in C1 constructions.","examples":["He was fully aware <strong>of</strong> the consequences.","She was deeply ashamed <strong>of</strong> her earlier remarks.","The board approved, regardless <strong>of</strong> the risks."]}]},{"word":"FROM","tagline":"origin / separation / distance","uses":[{"label":"Origin or source","rule":"Where something or someone comes from.","examples":["The report came <strong>from</strong> an anonymous source.","She graduated <strong>from</strong> a prestigious institution.","The data was gathered <strong>from</strong> multiple surveys."]},{"label":"Separation or prevention","rule":"Being apart, excluded, or protected from something.","examples":["The organisation dissociated itself <strong>from</strong> the scandal.","The law protects citizens <strong>from</strong> arbitrary detention.","It's difficult to distinguish one <strong>from</strong> the other."]},{"label":"Range (from…to)","rule":"Expressing a span or spectrum.","examples":["Prices range <strong>from</strong> affordable to extremely expensive.","The project took anywhere <strong>from</strong> two to five years.","Reactions varied <strong>from</strong> enthusiasm to outright hostility."]}]},{"word":"ABOUT","tagline":"topic / approximation / concerning","uses":[{"label":"Topic or subject","rule":"Concerning a particular theme (talk/write/think about).","examples":["She wrote a compelling essay <strong>about</strong> urban inequality.","There is growing concern <strong>about</strong> data privacy.","What I find interesting <strong>about</strong> this case is its complexity."]},{"label":"Approximation","rule":"Roughly; not exactly.","examples":["<strong>About</strong> half of the participants withdrew from the study.","The renovation will take <strong>about</strong> three months.","She left <strong>about</strong> an hour ago."]}]},{"word":"THROUGH","tagline":"passage / means / process","uses":[{"label":"Passage or movement","rule":"Moving within or across something from one side to the other.","examples":["The bill passed <strong>through</strong> parliament without opposition.","She pushed her way <strong>through</strong> the crowd.","Light filtered <strong>through</strong> the curtains."]},{"label":"Means or agency","rule":"By means of something, often abstract.","examples":["She got the job <strong>through</strong> a personal contact.","Change can only come <strong>through</strong> sustained effort.","The issue was resolved <strong>through</strong> negotiation."]}]},{"word":"BETWEEN / AMONG","tagline":"two vs. more than two","uses":[{"label":"Between (two entities)","rule":"Used for two things, people, or groups clearly differentiated.","examples":["The agreement was reached <strong>between</strong> the two parties.","There's a crucial difference <strong>between</strong> theory and practice.","Negotiations <strong>between</strong> management and the union broke down."]},{"label":"Among (multiple entities)","rule":"Used for three or more things, or within a group.","examples":["The funds were distributed <strong>among</strong> the affected communities.","<strong>Among</strong> the proposals submitted, two stood out.","She felt at ease <strong>among</strong> her peers."] icio, volver loco","meaning":"To irritate someone very much.","generic":{"ex":"The constant noise from next door is <em>driving me up the wall</em>."},"personal":{"ex":"My cats knocking things off shelves at 3am <em>drives me up the wall</em>, but I love them anyway.","tag":"🐱 Cats"},"note":"Informal. Very common in everyday conversation."},{"phrase":"see eye to eye","es":"estar de acuerdo, ver las cosas igual","meaning":"To agree with someone, to have the same opinion.","generic":{"ex":"They don't always <em>see eye to eye</em>, but they respect each other."},"personal":{"ex":"My sister and I rarely <em>see eye to eye</em> on things like spirituality, but those conversations are always interesting.","tag":"👭 Personal"},"note":"Often used in negative: 'they don't see eye to eye'."},{"phrase":"the apple of someone's eye","es":"la niña de los ojos de alguien, el favorito","meaning":"Someone's most beloved and cherished person.","generic":{"ex":"Her youngest daughter is clearly <em>the apple of her eye</em>."},"personal":{"ex":"My two cats are absolutely <em>the apple of my eye</em> — I can't imagine home without them.","tag":"🐱 Cats"},"note":"Warm, affectionate tone. Common in family contexts."}]},{"id":"food","emoji":"🍽️","title":"Food & Eating","idioms":[{"phrase":"a piece of cake","es":"pan comido, muy fácil","meaning":"Something that is very easy to do.","generic":{"ex":"The first part of the exam was <em>a piece of cake</em>."},"personal":{"ex":"The reading section of APTIS felt like <em>a piece of cake</em> compared to the grammar tasks.","tag":"📝 APTIS"},"note":"Very common. Works in both spoken and written English."},{"phrase":"not my cup of tea","es":"no es lo mío, no me va","meaning":"Something you don't particularly like or enjoy.","generic":{"ex":"Extreme sports are really <em>not my cup of tea</em>."},"personal":{"ex":"Mass-produced, generic design is just <em>not my cup of tea</em> — at Freepik I always gravitate towards the more original content.","tag":"💼 Freepik"},"note":"Polite, understated way to express dislike. Very British."},{"phrase":"bite off more than you can chew","es":"abarcar más de lo que puedes, meterse en más de lo que puedes manejar","meaning":"To take on more than you are able to deal with.","generic":{"ex":"She <em>bit off more than she could chew</em> by agreeing to manage three projects at once."},"personal":{"ex":"When I launched the APTIS prep alongside the new ceramics course, I slightly <em>bit off more than I could chew</em>.","tag":"📝 APTIS"},"note":"Common in work or study contexts. Also: 'I think I've bitten off more than I can chew'."},{"phrase":"food for thought","es":"algo que hace reflexionar, material para pensar","meaning":"Something that deserves serious consideration or reflection.","generic":{"ex":"The documentary gave us plenty of <em>food for thought</em>."},"personal":{"ex":"Reading Simon Sinek's work on leadership gave me a lot of <em>food for thought</em> about how I manage my team.","tag":"🧠 Personal"},"note":"Neutral register. Works well in writing and speaking tasks."},{"phrase":"spill the beans","es":"irse de la lengua, revelar un secreto","meaning":"To reveal secret information, often accidentally.","generic":{"ex":"Someone <em>spilled the beans</em> about the surprise party."},"personal":{"ex":"I almost <em>spilled the beans</em> to my students about the new glaze workshop before I'd finished planning it.","tag":"🏺 Ceramics"},"note":"Informal. Often used in a lighthearted context."},{"phrase":"the icing on the cake","es":"la guinda del pastel, lo que completa algo perfecto","meaning":"An additional benefit that makes something even better.","generic":{"ex":"Winning the award was great — the prize money was just <em>the icing on the cake</em>."},"personal":{"ex":"I love teaching ceramics, but when a student tells me it changed how they see their work — that's <em>the icing on the cake</em>.","tag":"🏺 Ceramics"},"note":"Positive idiom. The 'cake' is already good on its own."}]},{"id":"films","emoji":"🎬","title":"Films & Books","idioms":[{"phrase":"on the edge of your seat","es":"con el corazón en un puño, en tensión","meaning":"Very excited or tense, especially while watching something.","generic":{"ex":"The final scene had the entire audience <em>on the edge of their seats</em>."},"personal":{"ex":"A good documentary about craftsmanship keeps me <em>on the edge of my seat</em> just as much as any thriller.","tag":"🎬 Films"},"note":"Classic film/book review language. Great for APTIS speaking."},{"phrase":"steal the show","es":"llevarse todos los aplausos, acaparar toda la atención","meaning":"To be the most impressive or popular part of a performance or event.","generic":{"ex":"The child actor completely <em>stole the show</em>."},"personal":{"ex":"In ceramics exhibitions, it's often the most unexpected piece — a simple bowl — that <em>steals the show</em>.","tag":"🏺 Ceramics"},"note":"Can be used outside film/theatre contexts too."},{"phrase":"a page-turner","es":"un libro que engancha, que no puedes dejar","meaning":"A book so engaging you cannot stop reading it.","generic":{"ex":"Her latest novel is a real <em>page-turner</em> — I finished it in two days."},"personal":{"ex":"Scattered Minds by Gabor Maté is an absolute <em>page-turner</em> — I kept reading well past midnight.","tag":"📖 Reading"},"note":"Also used figuratively: 'that report was a real page-turner' (often ironic)."},{"phrase":"it's not rocket science","es":"no es ninguna ciencia, no es tan complicado","meaning":"Something is not as difficult as it might seem.","generic":{"ex":"Learning basic grammar rules — <em>it's not rocket science</em>."},"personal":{"ex":"Mixing a basic engobe <em>isn't rocket science</em>, but the chemistry behind what happens at cone 10 absolutely is.","tag":"🏺 Ceramics"},"note":"Slightly informal. Can sound dismissive — use with care."},{"phrase":"in the spotlight","es":"en el punto de mira, con toda la atención encima","meaning":"Receiving a lot of public attention.","generic":{"ex":"The director has been <em>in the spotlight</em> since winning the award."},"personal":{"ex":"Presenting new course material at Freepik always puts you <em>in the spotlight</em> — which I find both energising and nerve-wracking.","tag":"💼 Freepik"},"note":"Works in professional, creative and media contexts."}]},{"id":"places","emoji":"🏛️","title":"Public Places","idioms":[{"phrase":"put something on the map","es":"poner algo en el mapa, dar proyección a algo","meaning":"To make something famous or widely known.","generic":{"ex":"The film festival really <em>put the town on the map</em>."},"personal":{"ex":"I'd love for Cerámica Emprendedor to <em>put</em> quality ceramics education <em>on the map</em> in the Spanish-speaking world.","tag":"🏺 Ceramics"},"note":"Common in media, tourism and business discussions."},{"phrase":"a hidden gem","es":"una joya escondida, un lugar poco conocido pero fantástico","meaning":"Something excellent that is not well known.","generic":{"ex":"That little café is a real <em>hidden gem</em>."},"personal":{"ex":"The vintage market near the beach is a complete <em>hidden gem</em> — hardly any tourists, fantastic pieces.","tag":"🛍️ Markets"},"note":"Very useful for describing places in APTIS speaking tasks."},{"phrase":"the tip of the iceberg","es":"la punta del iceberg","meaning":"A small, visible part of a much larger, hidden problem.","generic":{"ex":"The issues we see are just <em>the tip of the iceberg</em>."},"personal":{"ex":"The noise and crowds in tourist areas are just <em>the tip of the iceberg</em> — the real impact on local communities runs much deeper.","tag":"🏛️ Places"},"note":"Often used to introduce a deeper issue. Excellent in writing tasks."},{"phrase":"hustle and bustle","es":"ajetreo, bullicio","meaning":"The busy, noisy activity of a place.","generic":{"ex":"After years in the city, she longed to escape the <em>hustle and bustle</em>."},"personal":{"ex":"Living near the beach means I can escape the <em>hustle and bustle</em> of work whenever I need to reset.","tag":"🌊 Beach"},"note":"Fixed phrase — always 'hustle and bustle', never just one word."},{"phrase":"go off the beaten track","es":"alejarse de los circuitos habituales","meaning":"To visit or explore places that are not commonly known.","generic":{"ex":"We decided to <em>go off the beaten track</em> and explore lesser-known villages."},"personal":{"ex":"On hikes I always prefer to <em>go off the beaten track</em> — the best views are never on the main path.","tag":"🥾 Hiking"},"note":"Same meaning as 'off the beaten track' — both forms are used."}]},{"id":"leaders","emoji":"🎤","title":"Leaders & Celebrities","idioms":[{"phrase":"in the limelight","es":"en el candelero, en el centro de atención","meaning":"Receiving a lot of public attention or fame.","generic":{"ex":"She has been <em>in the limelight</em> ever since her debut album."},"personal":{"ex":"Some people thrive <em>in the limelight</em>, but I find that sustained visibility at work is energising only when it's about the ideas, not the person.","tag":"💼 Work"},"note":"Slightly more formal than 'in the spotlight'. Both are correct."},{"phrase":"a double-edged sword","es":"un arma de doble filo","meaning":"Something that has both advantages and disadvantages.","generic":{"ex":"Fame is often <em>a double-edged sword</em>."},"personal":{"ex":"Social media is <em>a double-edged sword</em> for Cerámica Emprendedor — massive reach, but also endless comparison culture.","tag":"🏺 Ceramics"},"note":"Excellent for balanced arguments in APTIS writing tasks."},{"phrase":"have a lot on your plate","es":"tener mucho entre manos, estar muy ocupado","meaning":"To have a lot of things to deal with or responsibilities.","generic":{"ex":"The director clearly has <em>a lot on her plate</em> right now."},"personal":{"ex":"Between Freepik, Cerámica Emprendedor and APTIS prep, I've had <em>a lot on my plate</em> this year.","tag":"📝 APTIS"},"note":"Natural and common. Good for describing workload."},{"phrase":"bite the bullet","es":"armarse de valor, hacer algo difícil pero necesario","meaning":"To endure a difficult or painful situation with courage.","generic":{"ex":"She knew the conversation would be hard, but she <em>bit the bullet</em> and addressed it directly."},"personal":{"ex":"I had to <em>bite the bullet</em> and sign up for the APTIS speaking section even though it terrifies me.","tag":"📝 APTIS"},"note":"Implies reluctance followed by decisive action."},{"phrase":"on thin ice","es":"en terreno resbaladizo, en una situación arriesgada","meaning":"In a risky or precarious situation.","generic":{"ex":"After missing two deadlines, he knew he was <em>on thin ice</em> with his manager."},"personal":{"ex":"Speaking too fast in professional meetings puts me <em>on thin ice</em> — I lose clarity and people stop following.","tag":"💼 Work"},"note":"Often implies the risk of getting into serious trouble."}]},{"id":"sports","emoji":"⚽","title":"Sports & Games","idioms":[{"phrase":"jump on the bandwagon","es":"subirse al carro, seguir la moda","meaning":"To join an activity or cause that has become popular.","generic":{"ex":"Many brands <em>jumped on the bandwagon</em> when sustainability became trendy."},"personal":{"ex":"A lot of design platforms have <em>jumped on the AI bandwagon</em>, but at Freepik the challenge is doing it meaningfully.","tag":"💼 Freepik"},"note":"Slightly critical tone — implies following without genuine commitment."},{"phrase":"keep your eye on the ball","es":"no perder el foco, mantener la concentración","meaning":"To stay focused on the most important thing.","generic":{"ex":"With so many distractions, it's important to <em>keep your eye on the ball</em>."},"personal":{"ex":"In the weeks before the APTIS exam, I really need to <em>keep my eye on the ball</em> and not let other projects take over.","tag":"📝 APTIS"},"note":"Great for work and study contexts."},{"phrase":"move night.","generic":{"ex":"She <em>burned the midnight oil</em> to finish her dissertation."},"personal":{"ex":"In the final weeks before the APTIS exam, I've been <em>burning the midnight oil</em> going through grammar structures I keep getting wrong.","tag":"📝 APTIS"},"note":"Implies dedication but also fatigue. Classic study idiom."},{"phrase":"get your head around something","es":"llegar a entender algo difícil, asimilar algo","meaning":"To manage to understand something complicated.","generic":{"ex":"I'm still trying to <em>get my head around</em> how this software works."},"personal":{"ex":"Mixed conditionals — I just can't <em>get my head around</em> them under exam pressure, even though I understand them when I'm relaxed.","tag":"📝 APTIS"},"note":"Very common in conversation. Often used with 'can't': 'I can't get my head around it'."},{"phrase":"hit the books","es":"ponerse a estudiar en serio","meaning":"To study hard.","generic":{"ex":"Exams are next week — it's time to <em>hit the books</em>."},"personal":{"ex":"Every Sunday evening I <em>hit the books</em> for the APTIS — vocabulary, collocations, and at least one timed writing task.","tag":"📝 APTIS"},"note":"Informal. American English origin but widely understood."},{"phrase":"learn something by heart","es":"aprenderse algo de memoria","meaning":"To memorise something completely.","generic":{"ex":"She <em>learned all the key formulas by heart</em> before the exam."},"personal":{"ex":"I don't try to <em>learn idioms by heart</em> in isolation — I need them anchored to real situations I've lived.","tag":"📝 APTIS"},"note":"'Learn by heart' vs 'memorise' — both correct, but 'by heart' sounds more natural."},{"phrase":"a steep learning curve","es":"una curva de aprendizaje muy pronunciada, algo difícil de aprender","meaning":"A process where you have to learn a lot very quickly.","generic":{"ex":"Starting a new job always involves <em>a steep learning curve</em>."},"personal":{"ex":"Learning high-temperature glaze chemistry was <em>a steep learning curve</em> — nothing behaves the way it does at earthenware temperatures.","tag":"🏺 Ceramics"},"note":"Common in professional and academic contexts. Very useful in APTIS."},{"phrase":"put your thinking cap on","es":"ponerse a pensar en serio, activar el cerebro","meaning":"To think carefully and creatively about a problem.","generic":{"ex":"This problem is tricky — <em>put your thinking caps on</em>."},"personal":{"ex":"Every time I sit down to design a new ceramics manual, I have to really <em>put my thinking cap on</em> — the structure matters as much as the content.","tag":"🏺 Ceramics"},"note":"Slightly old-fashioned but still widely used and understood."}]},{"id":"money","emoji":"💰","title":"Money & Shopping","idioms":[{"phrase":"cost an arm and a leg","es":"costar un ojo de la cara, ser carísimo","meaning":"To be extremely expensive.","generic":{"ex":"Good quality ceramics tools can <em>cost an arm and a leg</em>."},"personal":{"ex":"A proper electric kiln for a home studio <em>costs an arm and a leg</em>, but it's an investment that pays for itself.","tag":"🏺 Ceramics"},"note":"Very common. Usually used as a verb phrase: 'it cost an arm and a leg'."},{"phrase":"tighten your belt","es":"apretarse el cinturón, gastar menos","meaning":"To spend less money because you have less available.","generic":{"ex":"With rising prices, many families have had to <em>tighten their belts</em>."},"personal":{"ex":"In the early days of Cerámica Emprendedor, I had to really <em>tighten my belt</em> to invest in quality materials.","tag":"🏺 Ceramics"},"note":"Common in economic discussions. Good for APTIS writing tasks."},{"phrase":"break the bank","es":"arruinarse, costar una fortuna","meaning":"To cost more money than you can afford.","generic":{"ex":"You don't need to <em>break the bank</em> to eat well."},"personal":{"ex":"Vintage markets are one of the few places where you can find beautiful objects without <em>breaking the bank</em>.","tag":"🛍️ Markets"},"note":"Often used in the negative: 'it won't break the bank'."},{"phrase":"money doesn't grow on trees","es":"el dinero no cae del cielo","meaning":"Money is not easily available; you have to work for it.","generic":{"ex":"She keeps spending without thinking — <em>money doesn't grow on trees</em>."},"personal":{"ex":"When students ask why quality ceramics courses cost what they do, I always say: good materials and good instruction — <em>money doesn't grow on trees</em>.","tag":"🏺 Ceramics"},"note":"Slightly parental tone. Often said as a reminder or reprimand."},{"phrase":"a penny for your thoughts","es":"¿en qué estás pensando? (para invitar a alguien a hablar)","meaning":"Said to someone who is quiet, to invite them to share their thoughts.","generic":{"ex":"You've been very quiet — <em>a penny for your thoughts</em>."},"personal":{"ex":"When a ceramics student stares at a piece for a long time without speaking, I always think: <em>a penny for your thoughts</em>.","tag":"🏺 Ceramics"},"note":"Warm, slightly old-fashioned expression. More conversational than formal."}]},{"id":"news","emoji":"📰","title":"News & Information","idioms":[{"phrase":"the elephant in the room","es":"el elefante en la habitación, el tema que nadie quiere mencionar","meaning":"An obvious problem that everyone knows about but no one wants to discuss.","generic":{"ex":"Climate change is <em>the elephant in the room</em> in many political debates."},"personal":{"ex":"In many conversations about AI in design, job displacement is <em>the elephant in the room</em> that nobody at Freepik wants to address directly.","tag":"💼 Freepik"},"note":"Excellent for opinion tasks and debates. Very high-level idiom."},{"phrase":"shed light on","es":"arrojar luz sobre, aclarar","meaning":"To make something easier to understand by explaining it.","generic":{"ex":"The report <em>sheds light on</em> the causes of the crisis."},"personal":{"ex":"Reading the scientific literature on plant-based protein really <em>shed light on</em> so much of my own experience as a vegetarian.","tag":"🧠 Personal"},"note":"Slightly formal. Works in both writing and speaking."},{"phrase":"take something with a pinch of salt","es":"tomarse algo con cautela, no creérselo del todo","meaning":"To not completely believe something you are told.","generic":{"ex":"I'd take those statistics <em>with a pinch of salt</em> — the methodology was questionable."},"personal":{"ex":"I always take viral 'ceramics hacks' on social media <em>with a pinch of salt</em> — they rarely hold up at high temperatures.","tag":"🏺 Ceramics"},"note":"Very natural. Also: 'with a grain of salt' in American English."},{"phrase":"in black and white","es":"en blanco y negro, de forma clara y sin ambigüedad","meaning":"Clear and definite; written or presented as facts.","generic":{"ex":"The rules are there <em>in black and white</em> — there's no room for misinterpretation."},"personal":{"ex":"Having glaze recipes written <em>in black and white</em> in a manual means students don't have to rely on memory in the middle of a session.","tag":"🏺 Ceramics"},"note":"Often implies undeniable evidence or clear documentation."},{"phrase":"get wind of something","es":"enterarse de algo (antes de que sea oficial)","meaning":"To hear about something, often before it is officially announced.","generic":{"ex":"She <em>got wind of</em> the planned changes before the announcement."},"personal":{"ex":"I <em>got wind of</em> a new APTIS exam format through a teacher's forum — definitely worth double-checking.","tag":"📝 APTIS"},"note":"Slightly informal. Implies early, unofficial information."}]},{"id":"youth","emoji":"🧑‍🤝‍🧑","title":"Young People","idioms":[{"phrase":"find your feet","es":"encontrar tu sitio, adaptarte a una nueva situación","meaning":"To become confident and independent in a new situation.","generic":{"ex":"It took a few months, but she finally <em>found her feet</em> in the new job."},"personal":{"ex":"When I started at Freepik, it took a while to <em>find my feet</em> in such a large corporate environment.","tag":"💼 Freepik"},"note":"Positive idiom. Implies progress from uncertainty to confidence."},{"phrase":"wet behind the ears","es":"novato/a, sin experiencia, poco maduro/a","meaning":"Lacking experience; immature or naive.","generic":{"ex":"He was still <em>wet behind the ears</em> when he started his first job."},"personal":{"ex":"I was completely <em>wet behind the ears</em> when I first started teaching ceramics — confident in my craft, but not yet in my pedagogy.","tag":"🏺 Ceramics"},"note":"Slightly condescending if said about others. Fine when self-deprecating."},{"phrase":"spread your wings","es":"abrir las alas, aventurarse a nuevas experiencias","meaning":"To try new experiences and become more independent.","generic":{"ex":"Moving abroad at 22 gave her the chance to really <em>spread her wings</em>."},"personal":{"ex":"Launching Cerámica Emprendedor was my way of <em>spreading my wings</em> beyond the constraints of a single employer.","tag":"🏺 Ceramics"},"note":"Positive, aspirational idiom. Common in articles about young people."},{"phrase":"old before your time","es":"mayor antes de tiempo, demasiado serio para su edad","meaning":"More serious or mature than is typical for your age.","generic":{"ex":"She was always <em>old before her time</em> — more interested in books than parties."},"personal":{"ex":"I was definitely <em>old before my time</em> in some ways — always more drawn to craft, materials and depth than to what was trending.","tag":"🧠 Personal"},"note":"Can be complimentary or bittersweet, depending on context."},{"phrase":"the world is your oyster","es":"tienes el mundo a tus pies, todo es posible","meaning":"You have the ability and freedom to achieve anything you want.","generic":{"ex":"You're young, talented and free — <em>the world is your oyster</em>."},"personal":{"ex":"When I think about what Cerámica Emprendedor could become in the nex om"],"answer":"for","explanation":"FOR is used to express a duration of time (how long something lasts)."},{"sentence":"Please submit your report ___ Friday at the latest.","options":["until","for","by","at"],"answer":"by","explanation":"BY means 'not later than'. UNTIL would imply the action continues up to that point."},{"sentence":"The proposal was rejected ___ the board of directors.","options":["from","with","by","of"],"answer":"by","explanation":"In passive constructions, BY introduces the agent (who performed the action)."},{"sentence":"There's a huge difference ___ knowing and doing.","options":["among","between","of","in"],"answer":"between","explanation":"BETWEEN is used for two clearly differentiated things."},{"sentence":"She got the information ___ a reliable source.","options":["from","of","by","with"],"answer":"from","explanation":"FROM indicates origin or source of information."},{"sentence":"The funds were distributed ___ the affected families.","options":["between","within","among","through"],"answer":"among","explanation":"AMONG is used when referring to a group of more than two."},{"sentence":"___ the setbacks, the project was completed on schedule.","options":["Although","Despite","However","Even"],"answer":"Despite","explanation":"DESPITE is a preposition followed by a noun phrase. ALTHOUGH is a conjunction (followed by a clause)."},{"sentence":"I bumped into her completely ___ chance.","options":["at","by","on","with"],"answer":"by","explanation":"'By chance' is a fixed collocation meaning accidentally or unexpectedly."},{"sentence":"The new policy is ___ the interest of all employees.","options":["in","for","on","at"],"answer":"in","explanation":"'In the interest of' is the correct fixed expression meaning 'for the benefit of'."}],"quizAdvanced":[{"sentence":"___ recent studies, caffeine can improve short-term concentration.","options":["According to","Due to","Owing to","Based in"],"answer":"According to","explanation":"'According to' introduces a source. NEVER say 'according to me' — use 'in my opinion' instead."},{"sentence":"She managed to pass the exam ___ revising very little.","options":["despite of","in spite of","even though","regardless"],"answer":"in spite of","explanation":"'In spite of' (or 'despite') is followed by a noun/gerund. 'Despite of' does NOT exist in English."},{"sentence":"His success came ___ years of dedicated practice.","options":["from","through","out of","by"],"answer":"through","explanation":"THROUGH suggests 'by means of' — an ongoing process that led to a result. FROM implies origin."},{"sentence":"The committee is ___ considerable pressure to reach a decision.","options":["under","in","on","at"],"answer":"under","explanation":"'Under pressure' is the fixed collocation. Compare: 'in trouble', 'at risk', 'on edge'."},{"sentence":"The policy was implemented without consulting those ___ charge.","options":["on","with","in","at"],"answer":"in","explanation":"'In charge' is a fixed collocation meaning responsible or in control."},{"sentence":"She took the job offer ___ account the long commute.","options":["into","in","on","to"],"answer":"into","explanation":"'Take into account' is a fixed expression. Do not omit 'into'."},{"sentence":"Her comments were taken completely ___ of context.","options":["away","off","out","from"],"answer":"out","explanation":"'Out of context' is the correct fixed expression."},{"sentence":"The results varied ___ region to region.","options":["between","from","across","among"],"answer":"from","explanation":"The pattern 'from X to X' expresses variation across a range. 'From region to region' is natural C1 usage."},{"sentence":"They were ___ odds with each other from the very beginning.","options":["on","in","at","by"],"answer":"at","explanation":"'At odds with' is a fixed C1 expression meaning in disagreement or conflict."},{"sentence":"The merger is contingent ___ shareholder approval.","options":["of","on","for","with"],"answer":"on","explanation":"'Contingent on' means dependent on. Compare: 'dependent on', 'reliant on'."}],"quizColloc":[{"sentence":"The company is ___ the verge of bankruptcy.","options":["at","on","in","by"],"answer":"on","explanation":"'On the verge of' means very close to something happening."},{"sentence":"This decision was made ___ behalf of the entire team.","options":["in","at","on","for"],"answer":"on","explanation":"'On behalf of' is the fixed phrase meaning representing someone."},{"sentence":"His qualifications are, ___ large, quite impressive.","options":["for","on","by","at"],"answer":"by","explanation":"'By and large' means on the whole, generally speaking."},{"sentence":"The meeting was postponed ___ short notice.","options":["on","with","at","by"],"answer":"at","explanation":"'At short notice' means with very little warning or preparation time."},{"sentence":"She memorised the poem ___ heart.","options":["with","from","in","by"],"answer":"by","explanation":"'By heart' means from memory, without looking."},{"sentence":"The matter is, ___ all accounts, extremely serious.","options":["for","on","at","by"],"answer":"by","explanation":"'By all accounts' means according to what everyone says."},{"sentence":"We need to take the long-term implications ___ consideration.","options":["in","into","under","to"],"answer":"into","explanation":"'Take into consideration' is a fixed expression, like 'take into account'."},{"sentence":"Her contribution to the project was ___ no means insignificant.","options":["at","in","by","on"],"answer":"by","explanation":"'By no means' is a formal expression meaning 'not at all'."},{"sentence":"The policy is now ___ review.","options":["in","under","on","at"],"answer":"under","explanation":"'Under review' means being examined or reconsidered. Compare: 'under construction', 'under pressure'."},{"sentence":"His remark was totally ___ of character.","options":["away","out","off","beyond"],"answer":"out","explanation":"'Out of character' means not typical of  generations.","correct":"jeopardize","wordBank":["jeopardize","celebrate","protect","measure","observe"],"explanation":"\"Jeopardize\" = poner en peligro. Es formal y muy habitual en C1. Sinónimo: endanger, compromise, threaten."},{"sentence":"The two sides reached a ___ after months of difficult negotiations.","correct":"compromise","wordBank":["compromise","argument","competition","strategy","refusal"],"explanation":"\"Reach a compromise\" = llegar a un acuerdo. También: agreement, settlement, resolution."},{"sentence":"The campaign ___ to raise awareness of mental health issues.","correct":"aims","wordBank":["aims","fails","refuses","demands","prevents"],"explanation":"\"Aim to do something\" = tener como objetivo. También: seek to, intend to, endeavour to."},{"sentence":"His speech ___ a lot of controversy among the audience.","correct":"sparked","wordBank":["sparked","removed","avoided","prevented","forgot"],"explanation":"\"Spark controversy/debate/interest\" es una collocation muy habitual en textos de C1."},{"sentence":"It is worth ___ the long-term consequences of this decision.","correct":"considering","wordBank":["considering","avoiding","hiding","selling","ignoring"],"explanation":"\"Worth considering\" = worth + gerundio. Muy frecuente en writing y speaking de C1."},{"sentence":"The organisation ___ on donations to fund its projects.","correct":"relies","wordBank":["relies","ignores","competes","refuses","creates"],"explanation":"\"Rely on\" = depender de. También: depend on, count on. \"Rely\" es más formal."},{"sentence":"The new regulation will ___ all companies to report their carbon emissions.","correct":"require","wordBank":["require","prevent","allow","delay","question"],"explanation":"\"Require companies to do\" = exigir que hagan algo. También: oblige, mandate, compel."},{"sentence":"Social media has ___ the way people communicate around the world.","correct":"transformed","wordBank":["transformed","maintained","questioned","limited","confused m _______ happy with my new car. It's brilliant!","opts":["so","quite","a bit"],"ans":"A"},{"q":"I'm not sure about my future. _______ I'll start a business.","opts":["Sometimes","Perhaps","Always"],"ans":"B"},{"q":"Please, ________ the street if the light is red.","opts":["cross not","not cross","do not cross"],"ans":"C"},{"q":"Why _______ you apply for the job, you've got the experience.","opts":["are","don't","not"],"ans":"B"},{"q":"I _______ London but it's expensive.","opts":["likes","like","liking"],"ans":"B"},{"q":"We _______ through France during the summer.","opts":["was travelling","travelling","travelled"],"ans":"C"},{"q":"John: I love riding bikes. Paul: _______? Me too!","opts":["Really","Right","Anyway"],"ans":"A"},{"q":"I'm really not sure what to do at work. I need _______ advice.","opts":["the","piece of","some"],"ans":"C"},{"q":"I think, in the future, space travel _______ as common as plane travel is now.","opts":["will become","has become","is becoming"],"ans":"A"},{"q":"Please don't come in the morning. I will _______ if you do.","opts":["have worked","be working","work"],"ans":"B"},{"q":"San Francisco is the most beautiful city I _______ visited.","opts":["ever","have","had"],"ans":"B"},{"q":"I'm sorry to let you_______, but I can't come to your party.","opts":["down","on","under"],"ans":"A"},{"q":"You missed a great party on Saturday night. You _______ have come.","opts":["must","ought","should"],"ans":"C"},{"q":"_______ the cold weather, she went swimming.","opts":["Although","Despite","In spite"],"ans":"B"},{"q":"He had been working for hours when he _______ asleep.","opts":["has fallen","falls","fell"],"ans":"C"},{"q":"Before she got married, she _______ go out most evenings.","opts":["should","would","must"],"ans":"B"},{"q":"It _______ been snowing heavily, so we decided to go skiing.","opts":["has","had","would have"],"ans":"B"},{"q":"It is expected that two million copies of the novel _______ sold by December.","opts":["will have been","have been","will have being"],"ans":"A"},{"q":"If I _______ harder at school, I wouldn't be doing this job now.","opts":["has worked","have worked","had worked"],"ans":"C"},{"q":"The way I see it, you _______ have sold the land then – prices are higher now.","opts":["mustn't","shouldn't","can't"],"ans":"B"}],"vocab":{"q1":{"label":"Synonyms: choose the word most similar in meaning.","words":["oppose","unite","complete","say","vote"],"opts":["doubt","tell","accept","join","realise","assume","choose","finish","disagree","touch","large"],"correct":["J","D","H","B","G"]},"q2":{"label":"Match the definition.","words":["To say no is to...","To look at something is to...","To wrap something is to...","To give orders is to...","To guess something is to..."],"opts":["instruct","improve","follow","share","cover","refuse","measure","link","observe","estimate"],"correct":["F","J","E","A","K"]},"q3":{"label":"Synonyms: match the informal/formal word.","words":["whack","tread","arrest","mend","thrill"],"opts":["catch","dance","chase","hit","step","stand","excite","laugh","mix","fix"],"correct":["D","E","A","K","G"]},"q4":{"label":"Collocations: which word pairs best?","words":["millionaire","epidemic","diploma","windscreen","bargain"],"opts":["hunters","subject","employee","programme","shoppers","joint","proportions","wipers","size","businessmen"],"correct":["K","G","D","H","A"]},"q5":{"label":"Complete the sentence.","words":["I don't buy _______ food because it's expensive.","He was very _______ about being unhappy.","It was one of the ugliest things I've ever seen. It was absolutely _______.","They'd spent a huge amount of money on the wedding. It was very _______.","When the player found out he'd lost, he was absolutely _______."],"opts":["catch","vicious","swift","organic","ripe","extravagant","secret","furious","vocal","calm"],"correct":["D","J","B","F","H"]}}}},"extra":{"4":{"grammar":[{"q":"Not until she _________ the report did she realise the full extent of the problem.","opts":["read","had read","was reading"],"ans":"B"},{"q":"_________ he had arrived than the arguments started.","opts":["No sooner","Hardly","Scarcely"],"ans":"A"},{"q":"It was _________ who first suggested the idea.","opts":["she","her","hers"],"ans":"A"},{"q":"The conference is _________ to attract over 2,000 delegates.","opts":["expected","expecting","expect"],"ans":"A"},{"q":"Had she _________ harder, she would have passed.","opts":["studied","study","been studying"],"ans":"A"},{"q":"The results, _________ were surprising, led to further research.","opts":["which","that","what"],"ans":"A"},{"q":"She speaks three languages, _________ is remarkable.","opts":["which","that","what"],"ans":"A"},{"q":"_________ though it may seem, the project came in under budget.","opts":["Remarkable","Remarkably","Remarkableness"],"ans":"A"},{"q":"The new policy is reported _________ a significant impact on employment.","opts":["to have had","to have","having had"],"ans":"A"},{"q":"It is essential that every student _________ given equal opportunities.","opts":["be","is","was"],"ans":"A"},{"q":"Only _________ joining the programme did she realise its true value.","opts":["after","by","when"],"ans":"B"},{"q":"She _________ rather you didn't mention this to anyone.","opts":["would","will","should"],"ans":"A"},{"q":"The data _________ being analysed by a team of researchers.","opts":["is","are","is/are"],"ans":"C"},{"q":"_________ the training was exhausting, every participant completed it.","opts":["Although","Despite","In spite"],"ans":"A"},{"q":"I wish I _________ more time to prepare for the exam.","opts":["had","have","would have"],"ans":"A"},{"q":"She got her car _________ before the long journey.","opts":["serviced","service","servicing"],"ans":"A"},{"q":"He is believed _________ the country before the investigation began.","opts":["to have left","to leave","leaving"],"ans":"A"},{"q":"Provided _________ you submit before the deadline, the application will be considered.","opts":["that","if","when"],"ans":"A"},{"q":"_________ of the committee members agreed with the proposal.","opts":["None","No one","Neither"],"ans":"A"},{"q":"The more frequently you practise, _________ you will become.","opts":["the more fluent","more fluent","most fluent"],"ans":"A"},{"q":"By the time you read this, she _________ the country.","opts":["will have left","will leave","leaves"],"ans":"A"},{"q":"He had the report _________ by a professional translator.","opts":["translated","translate","translating"],"ans":"A"},{"q":"We use _________ to express that something is not necessary to do.","opts":["needn't","mustn't","shouldn't"],"ans":"A"},{"q":"_________ she may fail, she will have learnt a great deal from the experience.","opts":["Even if","Even though","Although"],"ans":"A"},{"q":"The committee demanded that the CEO _________ immediately.","opts":["resign","resigns","resigned"],"ans":"A"}]},"5":{"grammar":[{"q":"Under no circumstances _________ the password be shared with others.","opts":["should","would","must"],"ans":"A"},{"q":"Rarely _________ such dedication in a student.","opts":["do I see","I see","I have seen"],"ans":"A"},{"q":"What surprised everyone _________ the speed of the recovery.","opts":["was","were","had been"],"ans":"A"},{"q":"She _________ have known about the problem — she was there the whole time.","opts":["must","should","would"],"ans":"A"},{"q":"The policy _________ into force on the first of January.","opts":["comes","come","coming"],"ans":"A"},{"q":"_________ he would accept the offer, his career would transform overnight.","opts":["Were","Should","Had"],"ans":"B"},{"q":"There's no _________ talking to him when he's in that mood.","opts":["point","use","good"],"ans":"A"},{"q":"She _________ able to complete the task despite the time pressure.","opts":["was","could","might have been"],"ans":"A"},{"q":"Economics _________ not always been recognised as a science.","opts":["has","have","had"],"ans":"A"},{"q":"He suggested that the team __
