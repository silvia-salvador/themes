 meals usually are. Judging by the dishes on the table, it could be a Sunday lunch or some sort of small celebration. What strikes me most is how natural it looks — nobody's posing, they're just enjoying each other's company.\"</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>❓ Las 2 preguntas personales</h3>\n      <p style=\"font-size:13px\">Suelen seguir patrones predecibles:</p>\n      <ul class=\"sl\" style=\"font-size:13px;margin-top:6px\">\n        <li><strong>Question 2:</strong> \"Tell me about a time when you…\" (anécdota)</li>\n        <li><strong>Question 3:</strong> \"How important is X for you / for people today?\" (opinión ligera)</li>\n      </ul>\n      <div class=\"note\">Plantilla anécdota: <strong>WHEN</strong> (it was last summer…) → <strong>WHERE/WHO</strong> (I was with…) → <strong>WHAT happened</strong> (we ended up…) → <strong>HOW IT FELT</strong> (it was quite memorable because…).</div>\n    </div>\n  </div>\n\n  <!-- ====== PART 3 ====== -->\n  <div class=\"panel\" id=\"sp-p3\">\n    <div class=\"card\">\n      <h3><span class=\"tag t-o\">PART 3</span> Comparar 2 fotos + 2 preguntas · 45 s cada una</h3>\n      <p style=\"font-size:13px\">La clave aquí es que <strong>NO debes describir cada foto por separado</strong>. Tienes que <em>comparar</em> y <em>contrastar</em>. Si describes la foto A y luego la B, pierdes puntos en discourse.</p>\n    </div>\n\n    <div class=\"card\">\n      <h3>🔀 Estructura para comparar (úsala TAL CUAL)</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.8\">\n        <strong>① Lo que tienen en común:</strong> \"Both pictures show… / What both have in common is…\"<br>\n        <strong>② Diferencia 1:</strong> \"Whereas in the first one…, in the second…\"<br>\n        <strong>③ Diferencia 2:</strong> \"Another contrast is that…\"<br>\n        <strong>④ Tu reacción / preferencia:</strong> \"If I had to choose, I'd probably go for…, because…\"\n      </div>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3>🪄 Frases pro para comparar</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"Both images revolve around the idea of…\"</li>\n          <li>\"Whereas the first picture shows…, the second one captures…\"</li>\n          <li>\"They couldn't be more different in terms of…\"</li>\n          <li>\"At first glance they seem similar, but…\"</li>\n          <li>\"What sets them apart is…\"</li>\n          <li>\"They're two sides of the same coin: one shows…, the other…\"</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3>⚖️ Conectores de contraste</h3>\n        <div style=\"font-size:13px;line-height:1.9\">\n          <span class=\"tag t-p\">whereas</span> <span class=\"tag t-p\">while</span> <span class=\"tag t-p\">on the other hand</span> <span class=\"tag t-p\">in contrast</span> <span class=\"tag t-p\">unlike</span> <span class=\"tag t-p\">conversely</span> <span class=\"tag t-p\">by comparison</span> <span class=\"tag t-p\">though</span>\n        </div>\n        <div class=\"note\">Repite el mismo conector dos veces y pierdes variedad. Ten 3 distintos en la cabeza.</div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>✅ Modelo · Foto A: oficina tradicional / Foto B: trabajando desde casa</h3>\n      <div class=\"ex\">\"Both pictures revolve around the world of work, but they couldn't be more different in feel. Whereas the first one shows a fairly traditional office — desks lined up, people in formal clothes, that slightly impersonal corporate look — the second captures someone working from their kitchen table, in a hoodie, with a coffee mug and a laptop. What strikes me most is the atmosphere: the office feels structured, almost rigid, while the home setup looks relaxed but possibly a bit isolating. They're really two sides of the same coin — one offers community and routine, the other flexibility and comfort. If I had to choose, I'd probably go for a hybrid: the structure of the office a couple of days a week, the freedom of home for the rest.\"</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>⚡ Tips Part 3</h3>\n      <ul class=\"sl\" style=\"font-size:13px\">\n        <li>Empieza con el <strong>tema común</strong> — eso ya muestra \"discourse management\".</li>\n        <li>Usa <strong>al menos 2 conectores de contraste distintos</strong>.</li>\n        <li>Cierra con tu <strong>preferencia personal</strong> aunque no te la pidan: te da más segundos y suena C1.</li>\n        <li>Si una foto te despista, <em>úsala</em>: \"I'm not entirely sure what's happening in the second one, but it could be…\"</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- ====== PART 4 ====== -->\n  <div class=\"panel\" id=\"sp-p4\">\n    <div class=\"card\" style=\"border-left:4px solid var(--red)\">\n      <h3><span class=\"tag t-r\">PART 4</span> Discusión abstracta · 3 preguntas · 1 min prep + 2 min respuesta</h3>\n      <p style=\"font-size:13px\">Aquí es donde se decide si pasas a C1. Tienes <strong>1 minuto para pensar</strong> y <strong>2 minutos para responder LAS 3 PREGUNTAS</strong> seguidas. Es una mini-presentación oral. Las 3 preguntas suelen ir de lo concreto a lo abstracto.</p>\n    </div>\n\n    <div class=\"card\">\n      <h3>🧩 Patrón típico de las 3 preguntas</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.8\">\n        <strong>Q1 — concreta/personal:</strong> \"What did you study at school / what kind of education did you have?\"<br>\n        <strong>Q2 — comparativa:</strong> \"Why is education today different from 50 years ago?\"<br>\n        <strong>Q3 — abstracta/futuro:</strong> \"What do you think education will look like in the future?\"\n      </div>\n      <div class=\"note\">⭐ Las 3 SIEMPRE están conectadas. Es el mismo tema, vista desde 3 ángulos: pasado/yo → comparación → futuro/sociedad.</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>⏰ Cómo usar el minuto de preparación</h3>\n      <div class=\"g3\">\n        <div>\n          <span class=\"tag t-b\">0–15 s</span>\n          <div style=\"font-size:12px;margin-top:4px\">Identifica el tema-paraguas de las 3 preguntas. Apunta 1 palabra.</div>\n        </div>\n        <div>\n          <span class=\"tag t-g\">15–35 s</span>\n          <div style=\"font-size:12px;margin-top:4px\">Para cada Q, escribe 2 keywords + 1 ejemplo (no frases).</div>\n        </div>\n        <div>\n          <span class=\"tag t-o\">35–55 s</span>\n          <div style=\"font-size:12px;margin-top:4px\">Decide cómo enlazar Q1→Q2→Q3 con conectores.</div>\n        </div>\n      </div>\n      <div class=\"ex\" style=\"margin-top:10px\"><strong>Notas tipo (ejemplo educación):</strong><br>Q1: my school = strict / no laptops / good teachers<br>Q2: now = digital, more freedom, less memorising<br>Q3: future = AI tutors, personalised, downside = isolation</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🏗️ Plantilla de 2 minutos (≈40 s por respuesta)</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.8\">\n        <strong>R1 (≈35 s):</strong> Personal hook + ejemplo concreto.<br>\n        <em>Bridge:</em> \"But of course, things have changed a lot since then…\"<br>\n        <strong>R2 (≈45 s):</strong> Compara antes/ahora con conectores. Causa + ejemplo.<br>\n        <em>Bridge:</em> \"Looking ahead / If I had to predict…\"<br>\n        <strong>R3 (≈40 s):</strong> Especulación + condicional + matiz/contraste + cierre.\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>✅ Respuesta modelo COMPLETA · Tema: Education</h3>\n      <div class=\"ex\" style=\"line-height:1.8\">\n        <strong style=\"color:var(--acc)\">Q1.</strong> \"Well, my school days were honestly pretty traditional. I went to a state school in a small town, where the focus was very much on memorising — history dates, grammar tables, that kind of thing. <em>Funnily enough,</em> we didn't even have computers in class until I was about fourteen, which sounds almost unreal nowadays.<br><br>\n        <strong style=\"color:var(--grn)\">[Bridge]</strong> But of course, things have changed enormously since then.<br><br>\n        <strong style=\"color:var(--acc)\">Q2.</strong> Education today is far more <strong>student-centred</strong> than it used to be. Whereas in the past the teacher was the only source of information, nowadays kids have the entire internet in their pockets. <em>That's led to</em> a shift in what teachers actually do: their job is less about transmitting facts and more about <strong>guiding critical thinking</strong>. Take debates or project-based learning, for instance — they barely existed when I was a student.<br><br>\n        <strong style=\"color:var(--grn)\">[Bridge]</strong> Looking ahead, though, the picture gets even more interesting.<br><br>\n        <strong style=\"color:var(--acc)\">Q3.</strong> If I had to predict, I'd say AI is going to <strong>completely reshape</strong> the way we learn. We're likely to see personalised tutors that adapt to each student's pace, which would be a huge step forward for kids who don't fit the average mould. <em>That said</em>, there's a real risk: if everything moves online, students might miss out on the social side of school, which is arguably just as important as the academic one. So at the end of the day, the future of education will probably depend on finding the right balance between technology and human contact.\"\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🎯 Frases-puente entre preguntas (oro puro)</h3>\n      <div class=\"g2\">\n        <div>\n          <strong style=\"color:var(--grn);font-size:12px\">DE Q1 A Q2:</strong>\n          <ul class=\"sl\" style=\"font-size:13px\">\n            <li>\"But of course, things have changed enormously since then.\"</li>\n            <li>\"That was my experience, but on a wider scale…\"</li>\n            <li>\"Zooming out from my own case…\"</li>\n          </ul>\n        </div>\n        <div>\n          <strong style=\"color:var(--org);font-size:12px\">DE Q2 A Q3:</strong>\n          <ul class=\"sl\" style=\"font-size:13px\">\n            <li>\"Looking ahead, the picture gets even more interesting.\"</li>\n            <li>\"If we project that into the future…\"</li>\n            <li>\"And I think this trend is only going to accelerate.\"</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>⚡ Tips Part 4</h3>\n      <ul class=\"sl\" style=\"font-size:13px\">\n        <li>El minuto de prep es <strong>SAGRADO</strong>. No empieces a escribir frases enteras: solo keywords.</li>\n        <li>Usa <strong>al menos un condicional</strong> (preferiblemente tipo 2 o 3) en Q3.</li>\n        <li>Mete <strong>1 palabra \"premium\"</strong> por respuesta: <em>shift, trend, arguably, tend to, given that, drawback, far-reaching, in the long run.</em></li>\n        <li>Si te quedas en blanco a mitad: gana tiempo con <em>\"That's actually a tricky one… let me put it this way…\"</em></li>\n        <li>No te calles para \"pensar\". Mejor habla más despacio que en silencio.</li>\n        <li>Si te queda tiempo al final, cierra con: <em>\"So all in all, [paraphrase the topic].\"</em></li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- ====== PHRASES PRO ====== -->\n  <div class=\"panel\" id=\"sp-phrases\">\n    <div class=\"card\">\n      <h3>💬 Plantillas de discurso para sonar pro</h3>\n      <p style=\"font-size:13px\">Memoriza <strong>2 frases por categoría</strong> — más es contraproducente. Estas funcionan en CUALQUIER tema de Part 3 y Part 4.</p>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3 style=\"color:var(--acc)\">🎬 Apertura (gana 3 segundos para pensar)</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"That's actually a really interesting question because…\"</li>\n          <li>\"Well, there are several angles to consider here…\"</li>\n          <li>\"I'd say that, broadly speaking,…\"</li>\n          <li>\"It really depends on what we mean by…\"</li>\n          <li>\"It's a tricky one, but let me put it this way:…\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <h3 style=\"color:var(--pur)\">🧠 Dar tu opinión</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"From my perspective,…\"</li>\n          <li>\"Personally, I'd argue that…\"</li>\n          <li>\"I tend to think that…\"</li>\n          <li>\"It seems to me that…\"</li>\n          <li>\"If you ask me,…\"</li>\n          <li>\"I'm firmly convinced that…\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <h3 style=\"color:var(--org)\">🌍 Generalizar (la que pediste)</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>\"Nowadays, people find it harder to…\"</strong></li>\n          <li>\"These days, it's increasingly common to see…\"</li>\n          <li>\"There's a growing tendency for people to…\"</li>\n          <li>\"More and more, we're seeing…\"</li>\n          <li>\"It's widely acknowledged that…\"</li>\n          <li>\"Most people would probably agree that…\"</li>\n          <li>\"In today's world,…\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <h3 style=\"color:var(--grn)\">📌 Dar ejemplos</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"Take, for instance,…\"</li>\n          <li>\"A clear example of this would be…\"</li>\n          <li>\"To give you an example,…\"</li>\n          <li>\"Let's say…\"</li>\n          <li>\"Just to illustrate the point,…\"</li>\n          <li>\"Think of…, for example.\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <h3 style=\"color:var(--pnk)\">⚖️ Contrastar / matizar</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"On the one hand…, on the other…\"</li>\n          <li>\"Whereas some people believe…, others argue…\"</li>\n          <li>\"That said,…\"</li>\n          <li>\"Having said that,…\"</li>\n          <li>\"It's worth pointing out, however, that…\"</li>\n          <li>\"There's a flip side, though:…\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <h3 style=\"color:var(--yel)\">➕ Añadir información</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"What's more,…\"</li>\n          <li>\"On top of that,…\"</li>\n          <li>\"Not only that, but…\"</li>\n          <li>\"Another thing to bear in mind is…\"</li>\n          <li>\"Add to that the fact that…\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <h3 style=\"color:var(--red)\">🔗 Causa & efecto</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"As a result,…\"</li>\n          <li>\"This has led to…\"</li>\n          <li>\"Consequently,…\"</li>\n          <li>\"That's why…\"</li>\n          <li>\"Because of this,…\"</li>\n          <li>\"Which in turn means…\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <h3 style=\"color:var(--acc)\">🔮 Especular / hipótesis</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"If I had to predict,…\"</li>\n          <li>\"It might well be that…\"</li>\n          <li>\"Were it up to me, I'd…\"</li>\n          <li>\"Should that happen,…\"</li>\n          <li>\"Chances are that…\"</li>\n          <li>\"It wouldn't surprise me if…\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <h3 style=\"color:var(--grn)\">🏁 Cerrar</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"All things considered,…\"</li>\n          <li>\"At the end of the day,…\"</li>\n          <li>\"When it comes down to it,…\"</li>\n          <li>\"All in all,…\"</li>\n          <li>\"To sum up,…\"</li>\n          <li>\"So that's basically how I see it.\"</li>\n        </ul>\n      </div>\n\n      <div class=\"card\">\n        <h3 style=\"color:var(--pur)\">🛠️ Reformular si te bloqueas</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"…or rather,…\"</li>\n          <li>\"What I mean is,…\"</li>\n          <li>\"To put it differently,…\"</li>\n          <li>\"In other words,…\"</li>\n          <li>\"How can I put this…\"</li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"card\" style=\"border-left:4px solid var(--yel)\">\n      <h3>⭐ Las 10 frases que SIEMPRE caben</h3>\n      <ol style=\"font-size:13px;padding-left:22px;line-height:1.8\">\n        <li>\"That's actually a really interesting question because…\"</li>\n        <li>\"From my perspective,…\"</li>\n        <li>\"Nowadays, people tend to…\"</li>\n        <li>\"Take, for instance,…\"</li>\n        <li>\"That said,…\"</li>\n        <li>\"What's more,…\"</li>\n        <li>\"This has led to…\"</li>\n        <li>\"If I had to predict,…\"</li>\n        <li>\"There's a flip side, though:…\"</li>\n        <li>\"At the end of the day,…\"</li>\n      </ol>\n    </div>\n  </div>\n\n  <!-- ====== TOPICS ====== -->\n  <div class=\"panel\" id=\"sp-topics\">\n    <div class=\"card\">\n      <h3>🌍 Los 16 temas que se repiten</h3>\n      <p style=\"font-size:13px\">Los aprobados de Aptis Advanced suelen rotar sobre estos bloques. Para cada uno, te doy <strong>3 keywords premium</strong> + <strong>1 frase plantilla</strong> que casi siempre encaja.</p>\n    </div>\n\n    <div class=\"g2\" id=\"sp-topics-grid\">\n      <!-- TEMAS -->\n      <div class=\"card\"><h3>🏠 1. Family &amp; relationships</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> bonds, generational gap, work-life balance, nuclear/extended family, role model</div>\n        <div class=\"ex\">\"Family dynamics have shifted dramatically — what used to be a strict hierarchy is now much more of a partnership.\"</div></div>\n\n      <div class=\"card\"><h3>💻 2. Technology &amp; social media</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> screen time, doomscrolling, digital footprint, echo chamber, attention span</div>\n        <div class=\"ex\">\"Technology has become a double-edged sword: it connects us but also fragments our attention.\"</div></div>\n\n      <div class=\"card\"><h3>📚 3. Education</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> rote learning, critical thinking, lifelong learning, achievement gap, soft skills</div>\n        <div class=\"ex\">\"Schools are slowly moving away from memorisation towards developing the kind of skills the job market actually rewards.\"</div></div>\n\n      <div class=\"card\"><h3>💼 4. Work &amp; career</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> burnout, gig economy, remote work, side hustle, glass ceiling</div>\n        <div class=\"ex\">\"Whereas a stable nine-to-five was once the goal, today's professionals juggle several roles and value flexibility above almost everything else.\"</div></div>\n\n      <div class=\"card\"><h3>🌱 5. Environment &amp; climate</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> carbon footprint, sustainability, single-use plastic, renewable energy, greenwashing</div>\n        <div class=\"ex\">\"We've reached a point where individual changes matter, but they won't fix the problem unless governments and corporations follow suit.\"</div></div>\n\n      <div class=\"card\"><h3>🏥 6. Health &amp; wellbeing</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> mental health, sedentary lifestyle, preventive medicine, mindfulness, work-induced stress</div>\n        <div class=\"ex\">\"Mental health used to be a taboo, but nowadays people are far more comfortable openly seeking help.\"</div></div>\n\n      <div class=\"card\"><h3>🍽️ 7. Food &amp; eating habits</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> processed food, plant-based diet, food waste, foodie culture, ultra-convenience</div>\n        <div class=\"ex\">\"There's a growing tendency to question what we eat — not just for health, but for ethics and the planet.\"</div></div>\n\n      <div class=\"card\"><h3>🌆 8. City life vs. rural life</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> urban sprawl, gentrification, commuter, quality of life, sense of community</div>\n        <div class=\"ex\">\"Cities offer opportunity but rarely peace of mind, whereas the countryside offers the opposite — and the trick, of course, is finding a middle ground.\"</div></div>\n\n      <div class=\"card\"><h3>✈️ 9. Travel &amp; tourism</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> mass tourism, off-the-beaten-track, eco-travel, cultural exchange, overtourism</div>\n        <div class=\"ex\">\"Travel has become both more accessible and more problematic — many cities are buckling under the weight of overtourism.\"</div></div>\n\n      <div class=\"card\"><h3>🎨 10. Art &amp; culture</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> heritage, mainstream vs. niche, accessibility, AI-generated art, cultural identity</div>\n        <div class=\"ex\">\"Art reflects the anxieties of its time, and AI-generated images are a perfect example of that.\"</div></div>\n\n      <div class=\"card\"><h3>📺 11. Media &amp; news</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> fake news, echo chamber, fact-checking, clickbait, media literacy</div>\n        <div class=\"ex\">\"In an age of clickbait, being able to spot misleading headlines has become a core skill, almost like reading itself.\"</div></div>\n\n      <div class=\"card\"><h3>💰 12. Money &amp; consumerism</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> impulse buying, fast fashion, status symbols, financial literacy, conspicuous consumption</div>\n        <div class=\"ex\">\"We live in a society where buying has become a form of identity, which is exhausting both for our wallets and the planet.\"</div></div>\n\n      <div class=\"card\"><h3>👴 13. Generations &amp; ageing</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> ageing population, generation gap, retirement, intergenerational, ageism</div>\n        <div class=\"ex\">\"With life expectancy rising, the very idea of 'retirement age' is being rewritten in real time.\"</div></div>\n\n      <div class=\"card\"><h3>🏛️ 14. Government &amp; society</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> civic duty, public services, polarisation, accountability, social fabric</div>\n        <div class=\"ex\">\"Trust in institutions has eroded over the past decade, and rebuilding it isn't going to happen overnight.\"</div></div>\n\n      <div class=\"card\"><h3>🌐 15. Globalisation &amp; languages</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> lingua franca, cultural homogenisation, multilingualism, soft power, identity</div>\n        <div class=\"ex\">\"English has become the unofficial language of business and the internet, which is convenient but also flattens linguistic diversity.\"</div></div>\n\n      <div class=\"card\"><h3>🎯 16. Future &amp; predictions</h3>\n        <div style=\"font-size:13px\"><strong>Keywords:</strong> automation, AI, breakthrough, dystopia/utopia, paradigm shift</div>\n        <div class=\"ex\">\"Predicting the future is tricky, but one thing's certain: the pace of change isn't slowing down any time soon.\"</div></div>\n    </div>\n\n    <div class=\"card\" style=\"border-left:4px solid var(--grn)\">\n      <h3>🪄 Las 5 frases-comodín que valen para CUALQUIER tema</h3>\n      <ol style=\"font-size:13px;padding-left:22px;line-height:1.9\">\n        <li>\"It's a real <strong>double-edged sword</strong> — it brings benefits but also risks.\"</li>\n        <li>\"Things have shifted dramatically over the last couple of decades.\"</li>\n        <li>\"It really comes down to finding the right balance between [X] and [Y].\"</li>\n        <li>\"There's no one-size-fits-all answer here.\"</li>\n        <li>\"At the end of the day, it's about how we adapt as a society.\"</li>\n      </ol>\n    </div>\n  </div>\n\n  <!-- ====== TIPS ====== -->\n  <div class=\"panel\" id=\"sp-tips\">\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3 style=\"color:var(--grn)\">✅ Top 10 cosas que SUMAN</h3>\n        <ol style=\"font-size:13px;padding-left:22px;line-height:1.8\">\n          <li>Variedad de tiempos verbales (presente, pasado, perfectos, condicionales).</li>\n          <li>Al menos UN <strong>conditional type 2 o 3</strong>.</li>\n          <li>UN <strong>idiom</strong> bien colocado (no fuerces tres).</li>\n          <li>UN <strong>phrasal verb</strong> natural (look up, come across, run out of…).</li>\n          <li>2-3 <strong>conectores distintos</strong> en cada respuesta larga.</li>\n          <li>Un <strong>matiz</strong>: \"however\", \"that said\", \"having said that\".</li>\n          <li>Un <strong>ejemplo concreto</strong> (no teoría abstracta vacía).</li>\n          <li>Entonación clara: subir al hacer pregunta retórica, bajar al cerrar.</li>\n          <li>Auto-corrección sutil: \"I mean…\", \"or rather…\".</li>\n          <li>Cierre claro: el examinador necesita oír que has terminado.</li>\n        </ol>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--red)\">❌ Top 10 cosas que RESTAN</h3>\n        <ol style=\"font-size:13px;padding-left:22px;line-height:1.8\">\n          <li>Listas planas (\"I like X, Y, Z\").</li>\n          <li>Repetir el mismo conector (\"and… and… and…\").</li>\n          <li>Frases memorizadas obvias (\"In my humble opinion, in this present day and age…\").</li>\n          <li>Quedarte en silencio &gt; 3 segundos.</li>\n          <li>Decir <em>\"How do you say…\"</em> en español.</li>\n          <li>Pronunciar mal palabras básicas (clothes, three, women, choose).</li>\n          <li>Usar <em>\"very very\"</em> o <em>\"a lot a lot\"</em>.</li>\n          <li>Confundir <em>do/make</em>, <em>say/tell</em>, <em>since/for</em>.</li>\n          <li>No responder a la pregunta (irse por las ramas).</li>\n          <li>Acabar con \"yes, that's all\" — suena escolar.</li>\n        </ol>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🗣️ Pronunciación: las 10 trampas</h3>\n      <table class=\"rs-table\">\n        <thead><tr><th>Palabra</th><th>❌ Mal</th><th>✅ Bien</th></tr></thead>\n        <tbody>\n          <tr><td>clothes</td><td>/klóu-zes/</td><td>/kləʊðz/ — casi como \"close\"</td></tr>\n          <tr><td>women</td><td>/wúmen/</td><td>/ˈwɪmɪn/ — \"wimin\"</td></tr>\n          <tr><td>focus</td><td>/fókus/</td><td>/ˈfəʊkəs/</td></tr>\n          <tr><td>iron</td><td>/áiron/</td><td>/ˈaɪən/ — la \"r\" no suena</td></tr>\n          <tr><td>chocolate</td><td>/choco-late/</td><td>/ˈtʃɒk.lət/ — 2 sílabas</td></tr>\n          <tr><td>vegetables</td><td>/ve-ge-ta-bels/</td><td>/ˈvedʒ.tə.bəlz/</td></tr>\n          <tr><td>comfortable</td><td>/com-for-ta-ble/</td><td>/ˈkʌm(p)f.tə.bəl/</td></tr>\n          <tr><td>thorough</td><td>/thoró/</td><td>/ˈθʌr.ə/</td></tr>\n          <tr><td>determine</td><td>/de-ter-main/</td><td>/dɪˈtɜː.mɪn/</td></tr>\n          <tr><td>schedule</td><td>/eskédiul/ (UK)</td><td>/ˈʃedjuːl/</td></tr>\n        </tbody>\n      </table>\n    </div>\n\n    <div class=\"card\" style=\"border-left:4px solid var(--acc)\">\n      <h3>🎙️ Mantra antes de empezar</h3>\n      <ul class=\"sl\" style=\"font-size:13px;line-height:1.8\">\n        <li>Respira hondo 3 veces antes de la pregunta 1 — relaja la voz.</li>\n        <li>Si te equivocas, <strong>NO te disculpes</strong>: corrige y sigue.</li>\n        <li>Estás contando una historia, no recitando una redacción.</li>\n        <li>Mejor <strong>parecer que piensas</strong> (\"hmm, let me see…\") que sonar artificial.</li>\n        <li>El examinador no es humano: es un programa que mide rasgos. Si dudas, dilo en inglés.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- ====== TRAINER ====== -->\n  <div class=\"panel\" id=\"sp-trainer\">\n    <div class=\"card\">\n      <h3>🎲 Generador de preguntas Part 4</h3>\n      <p style=\"font-size:13px\">Pulsa el botón. Te da un tema con sus 3 preguntas tipo. Cronométrate: <strong>1 min de prep + 2 min de respuesta</strong>.</p>\n      <div style=\"text-align:center;margin:14px 0\">\n        <button class=\"btn org\" onclick=\"spRandomTopic()\">🎲 Dame un tema random</button>\n        <button class=\"btn sec\" onclick=\"spStartTimer()\" style=\"margin-left:8px\">⏱️ Cronómetro 3 min</button>\n      </div>\n      <div id=\"sp-topic-out\" class=\"card\" style=\"background:var(--sur);min-height:120px\"></div>\n      <div id=\"sp-timer\" style=\"text-align:center;font-family:var(--serif);font-size:2rem;color:var(--acc);margin-top:8px\"></div>\n    </div>\n\n    <div class=\"card\">\n      <h3>📝 Plantilla de notas (1 minuto)</h3>\n      <div class=\"struct\" style=\"white-space:pre-line;line-height:1.8\">\nTEMA: ____________________\n\nQ1 (mi caso):\n  · keyword: ___________\n  · ejemplo: ___________\n\nQ2 (sociedad / antes-ahora):\n  · keyword: ___________\n  · contraste: __________\n\nQ3 (futuro / hipótesis):\n  · keyword: ___________\n  · condicional: _______\n  · matiz: _____________\n      </div>\n    </div>\n  </div>";

const HTML_APT_WRITING = "<div class=\"sh\">\n    <h1>✍️ Writing — Aptis Advanced</h1>\n    <p>Las 4 tareas explicadas, plantillas formales/informales, linkers C1, modelos completos, temas recurrentes y errores típicos. Aquí el registro lo es todo.</p>\n  </div>\n\n  <div class=\"tabs\">\n    <button class=\"tb on\" onclick=\"wTab('overview',this)\">📋 Estructura</button>\n    <button class=\"tb\" onclick=\"wTab('p1',this)\">1️⃣ Chat (50w)</button>\n    <button class=\"tb\" onclick=\"wTab('p2',this)\">2️⃣ Email informal</button>\n    <button class=\"tb\" onclick=\"wTab('p3',this)\">3️⃣ Email formal</button>\n    <button class=\"tb\" onclick=\"wTab('p4',this)\">4️⃣ Essay/Article</button>\n    <button class=\"tb\" onclick=\"wTab('register',this)\">🎩 Registros</button>\n    <button class=\"tb\" onclick=\"wTab('linkers',this)\">🔗 Linkers</button>\n    <button class=\"tb\" onclick=\"wTab('templates',this)\">📐 Plantillas</button>\n    <button class=\"tb\" onclick=\"wTab('topics',this)\">🌍 Temas</button>\n    <button class=\"tb\" onclick=\"wTab('tips',this)\">⚡ Tips &amp; errores</button>\n  </div>\n\n  <!-- ====== OVERVIEW ====== -->\n  <div class=\"panel on\" id=\"w-overview\">\n    <div class=\"card\">\n      <h3>⏱️ El examen en 50 minutos</h3>\n      <p style=\"font-size:13px;margin-bottom:10px\">Aptis Advanced Writing son <strong>4 tareas</strong> en <strong>50 minutos</strong>. Cada una tiene un registro distinto y dificultad creciente. La clave es <strong>gestionar el tiempo</strong>: si te enrollas en Part 1, no llegas al Part 4 (donde están los puntos gordos).</p>\n      <table class=\"rs-table\">\n        <thead><tr><th>Parte</th><th>Tarea</th><th>Palabras</th><th>Tiempo</th><th>Registro</th></tr></thead>\n        <tbody>\n          <tr><td><span class=\"tag t-b\">Part 1</span></td><td>3 respuestas tipo chat / red social</td><td><strong>~50</strong> total<br>(≈ 17 c/u)</td><td><strong>5 min</strong></td><td>Informal</td></tr>\n          <tr><td><span class=\"tag t-g\">Part 2</span></td><td>Email a un amigo / contacto cercano</td><td><strong>~120</strong></td><td><strong>10 min</strong></td><td>Informal/neutral</td></tr>\n          <tr><td><span class=\"tag t-o\">Part 3</span></td><td>Dos correos (1 informal a amigo + 1 formal a institución) sobre la misma situación</td><td><strong>~180</strong> total<br>(≈ 50 informal + 130 formal)</td><td><strong>15 min</strong></td><td>Mix</td></tr>\n          <tr><td><span class=\"tag t-r\">Part 4</span></td><td>Essay / article / report sobre tema social</td><td><strong>200-250</strong></td><td><strong>20 min</strong></td><td>Formal académico</td></tr>\n        </tbody>\n      </table>\n      <div class=\"note\">⏰ <strong>Reparto recomendado</strong>: P1 → 5 min · P2 → 10 min · P3 → 15 min · P4 → 20 min. Pon un timer mental.</div>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3>📊 Cómo se puntúa</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>Task achievement</strong>: ¿has cumplido los 3 prompts del enunciado?</li>\n          <li><strong>Coherence &amp; cohesion</strong>: párrafos lógicos + linkers variados.</li>\n          <li><strong>Lexical resource</strong>: vocabulario rico, collocations, sin repetir.</li>\n          <li><strong>Grammatical range &amp; accuracy</strong>: condicionales, pasivas, modales perfectos…</li>\n          <li><strong>Register</strong>: <em>cada parte</em> tiene el suyo y mezclarlos resta MUCHO.</li>\n        </ul>\n        <div class=\"note\">⭐ Para C1 no se exige perfección, sí <strong>variedad</strong> y <strong>control del registro</strong>.</div>\n      </div>\n      <div class=\"card\">\n        <h3>🎯 Objetivo por parte</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>P1</strong>: muestra naturalidad, no presumas. 3 frases por respuesta máximo.</li>\n          <li><strong>P2</strong>: tono cálido, conector simple, todo en presente/futuro.</li>\n          <li><strong>P3</strong>: contraste de registro entre los 2 emails — eso ES la prueba.</li>\n          <li><strong>P4</strong>: tesis clara + 2 párrafos de desarrollo + conclusión. Aquí caben condicionales y pasivas avanzadas.</li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🧱 Esquema universal de párrafo C1 (memoriza esto)</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.8\">\n        🟦 TOPIC SENTENCE &nbsp;➜&nbsp; 🟪 EXPLICACIÓN/RAZÓN (\"This is because…\") &nbsp;➜&nbsp; 🟧 EJEMPLO (\"For instance…\") &nbsp;➜&nbsp; 🟨 MATIZ/CONTRASTE (\"That said…\") &nbsp;➜&nbsp; 🟩 LINK A LA SIGUIENTE IDEA\n      </div>\n      <div class=\"ex\"><strong>Demo:</strong> \"One of the most pressing concerns is the impact of social media on attention span. <em>(topic)</em> This is largely because platforms are deliberately designed to keep us scrolling. <em>(reason)</em> A clear example would be the way short-form video apps train users to expect novelty every few seconds. <em>(example)</em> That said, dismissing all social media as harmful would be an oversimplification — many people use it constructively. <em>(nuance)</em> Bearing this in mind, the real question is how we regulate, not whether we ban. <em>(link)</em>\"</div>\n    </div>\n  </div>\n\n  <!-- ====== PART 1 ====== -->\n  <div class=\"panel\" id=\"w-p1\">\n    <div class=\"card\">\n      <h3><span class=\"tag t-b\">PART 1</span> Comentarios sociales / chat · 3 respuestas · ~50 palabras totales · 5 min</h3>\n      <p style=\"font-size:13px\">Imagina un chat de grupo o red social. Te dan una situación (un cumpleaños, una mudanza, una nueva afición) y 3 prompts cortos. Tienes que responder como en un mensaje rápido. <strong>Cero formalidades</strong>.</p>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3>📝 Tipos de pregunta</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>\"What are your plans for…?\"</li>\n          <li>\"Tell us about your favourite…\"</li>\n          <li>\"What do you usually do at…?\"</li>\n          <li>\"How was your weekend / trip…?\"</li>\n          <li>\"Do you prefer X or Y? Why?\"</li>\n          <li>\"Have you ever tried…?\"</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3>📐 Estructura ideal (≈ 17 palabras)</h3>\n        <div class=\"struct\">[reacción corta] + [respuesta directa] + [detalle/razón breve]</div>\n        <div class=\"ex\">\"Oh, sounds amazing! I usually go hiking on Saturdays — fresh air really clears my head.\"</div>\n        <div class=\"note\">⚠️ <strong>NO</strong> uses \"Dear\", \"Best regards\" ni saludos formales. Es chat.</div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>✅ Modelo completo · Tema: \"Tell us about your weekend!\"</h3>\n      <div class=\"ex\" style=\"line-height:1.8\">\n        <strong style=\"color:var(--acc)\">Q1.</strong> What did you do? \"Honestly nothing fancy — just chilled out at home and binge-watched a series I'd been putting off for ages.\"<br><br>\n        <strong style=\"color:var(--acc)\">Q2.</strong> Did you see anyone? \"Yeah, my sister popped over on Sunday. We ended up cooking together and chatting for hours, which was lovely.\"<br><br>\n        <strong style=\"color:var(--acc)\">Q3.</strong> Any plans for next weekend? \"Probably a hike if the weather holds up. Otherwise, more series — no shame in that.\"\n      </div>\n      <div class=\"note\">📊 ≈ 50 palabras totales. Tono casual, contracciones (\"I'd\", \"we'd\"), interjecciones (\"Honestly\", \"Yeah\").</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>⚡ Tips Part 1</h3>\n      <ul class=\"sl\" style=\"font-size:13px\">\n        <li>Usa contracciones (I'm, don't, we'd) — <em>obligatorio</em> para sonar natural.</li>\n        <li>Mete <strong>1 phrasal verb</strong> (\"popped over\", \"ended up\", \"binged on\", \"got round to\").</li>\n        <li>Prohibido empezar con \"I am writing to…\" — ESO ES P3.</li>\n        <li>Si te quedas sin ideas: invéntalo. Nadie comprueba.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- ====== PART 2 ====== -->\n  <div class=\"panel\" id=\"w-p2\">\n    <div class=\"card\">\n      <h3><span class=\"tag t-g\">PART 2</span> Email a contacto cercano · ~120 palabras · 10 min</h3>\n      <p style=\"font-size:13px\">Un amigo o contacto te ha invitado a algo / te ha pedido consejo / te ha mandado info. Tu respuesta tiene que cubrir <strong>3 puntos</strong> que vienen como bullet points en el enunciado. <strong>Tono semi-informal pero cuidado</strong>.</p>\n    </div>\n\n    <div class=\"card\">\n      <h3>📐 Estructura tipo (4 párrafos cortos)</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.8\">\n        <strong>① Saludo:</strong> Hi [name],<br>\n        <strong>② Apertura:</strong> reacción + agradecimiento (\"Thanks so much for…\")<br>\n        <strong>③ Cuerpo:</strong> responde a los <strong>3 prompts</strong> del enunciado<br>\n        <strong>④ Cierre:</strong> propuesta + despedida (\"Speak soon!\" / \"Let me know!\")<br>\n        <strong>⑤ Firma:</strong> Take care, [tu nombre]\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>✅ Modelo completo</h3>\n      <p style=\"font-size:13px;color:var(--mu);margin-bottom:6px\">📩 Enunciado: \"A friend has invited you to a weekend trip to the mountains. Reply mentioning: (1) if you can come, (2) what you'd like to do there, (3) a suggestion for the journey.\"</p>\n      <div class=\"ex\" style=\"line-height:1.8;font-family:var(--sans)\">\n<strong>Hi Laura,</strong><br><br>\nThanks a million for the invite — it really made my day! I'd absolutely love to come along. The timing couldn't be better since I've been desperate for a proper break from the city.<br><br>\nAs for what to do, I'm completely up for whatever you've got in mind, but if I had to pick, I'd love to go on at least one long hike and maybe try that little restaurant you keep mentioning. A bit of stargazing in the evening wouldn't hurt either.<br><br>\nAbout the journey, would you be up for sharing my car? Petrol's split four ways and we'd avoid all the train hassle. Let me know what you think!<br><br>\nCan't wait — speak soon,<br>\n<strong>Sara</strong>\n      </div>\n      <div class=\"note\">📊 ≈ 130 palabras · 4 párrafos · saluda, cubre los 3 prompts, cierra con propuesta. Mix natural de presente/condicional/futuro.</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🪄 Frases comodín para P2</h3>\n      <div class=\"g2\">\n        <div>\n          <strong style=\"color:var(--grn);font-size:12px\">APERTURA</strong>\n          <ul class=\"sl\" style=\"font-size:13px\">\n            <li>\"Thanks so much for…\"</li>\n            <li>\"It was great to hear from you.\"</li>\n            <li>\"Sorry it's taken me a while to get back to you.\"</li>\n            <li>\"Just a quick one to say…\"</li>\n          </ul>\n        </div>\n        <div>\n          <strong style=\"color:var(--org);font-size:12px\">CIERRE</strong>\n          <ul class=\"sl\" style=\"font-size:13px\">\n            <li>\"Let me know what you think!\"</li>\n            <li>\"Looking forward to hearing back.\"</li>\n            <li>\"Speak soon!\" / \"Catch up soon!\"</li>\n            <li>\"Give my love to [X].\"</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- ====== PART 3 ====== -->\n  <div class=\"panel\" id=\"w-p3\">\n    <div class=\"card\" style=\"border-left:4px solid var(--org)\">\n      <h3><span class=\"tag t-o\">PART 3</span> Dos correos: 1 informal + 1 formal · ~180 palabras totales · 15 min</h3>\n      <p style=\"font-size:13px\">Te dan UNA situación (un problema, una queja, un cambio) y tienes que escribir <strong>DOS emails</strong> sobre lo mismo: uno a un <strong>amigo</strong> (informal, ≈ 50 palabras) y otro a una <strong>institución/persona oficial</strong> (formal, ≈ 130 palabras). El truco: el contenido es similar, el <strong>registro</strong> cambia totalmente.</p>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\" style=\"border-left:3px solid var(--grn)\">\n        <h3>💌 Email informal (≈ 50 palabras)</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>Saludo: <em>Hi [name],</em></li>\n          <li>Tono: emocional, casual, contracciones</li>\n          <li>Contenido: cuenta lo que pasó + cómo te sientes</li>\n          <li>Cierre: <em>Speak soon, [name]</em></li>\n        </ul>\n      </div>\n      <div class=\"card\" style=\"border-left:3px solid var(--red)\">\n        <h3>🎩 Email formal (≈ 130 palabras)</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li>Saludo: <em>Dear Sir/Madam,</em> o <em>Dear Mr/Ms [surname],</em></li>\n          <li>Tono: distante, sin contracciones, pasivas</li>\n          <li>Contenido: motivo → datos → petición concreta</li>\n          <li>Cierre: <em>Yours faithfully,</em> (sin nombre) / <em>Yours sincerely,</em> (con nombre)</li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>✅ Modelo completo (mismo problema, dos registros)</h3>\n      <p style=\"font-size:13px;color:var(--mu);margin-bottom:6px\">📩 Situación: tu vuelo se ha retrasado 6 horas y has perdido una conexión. Escribe (1) a tu hermana contándolo y (2) una queja formal a la aerolínea.</p>\n\n      <div class=\"ex\" style=\"line-height:1.8;font-family:var(--sans);background:rgba(63,185,80,.06);border-left-color:var(--grn)\">\n<strong style=\"color:var(--grn)\">EMAIL 1 · Informal (a tu hermana)</strong><br><br>\n<strong>Hi Marta,</strong><br><br>\nYou won't believe what happened — the flight got delayed six hours and I missed my connection in Paris! I'm stuck at the airport, knackered and starving. I'll probably catch the next one tomorrow morning. Don't worry, I'm fine, just a bit grumpy.<br><br>\nSpeak tomorrow,<br>\n<strong>Sara</strong>\n      </div>\n\n      <div class=\"ex\" style=\"line-height:1.8;font-family:var(--sans);background:rgba(248,81,73,.04);border-left-color:var(--red);margin-top:10px\">\n<strong style=\"color:var(--red)\">EMAIL 2 · Formal (a la aerolínea)</strong><br><br>\n<strong>Dear Customer Service Team,</strong><br><br>\nI am writing to express my deep dissatisfaction regarding flight AB123 from Madrid to Berlin on 14th May, which was delayed by approximately six hours. As a direct result, I missed my connecting flight in Paris and was forced to spend the night at the airport.<br><br>\nAt no point were passengers offered accommodation, meal vouchers or clear updates, despite repeated enquiries at your information desk. This level of disruption is, in my view, unacceptable for an airline of your standing.<br><br>\nI would therefore be grateful if you could provide a full refund for the missed connection, along with appropriate compensation in line with EU passenger rights regulations.<br><br>\nI look forward to receiving your response within the next two weeks.<br><br>\nYours faithfully,<br>\n<strong>Sara García</strong>\n      </div>\n      <div class=\"note\">⭐ Fíjate en el contraste: \"knackered\" vs \"deep dissatisfaction\" · \"Don't worry\" vs \"I would be grateful if\" · contracciones vs cero contracciones.</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>📐 Plantilla del email FORMAL (oro puro)</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.9\">\n        <strong>P1 - Motivo:</strong> \"I am writing to [express my concern / enquire about / request information regarding]…\"<br>\n        <strong>P2 - Hechos:</strong> \"On [date/situation], … Despite [efforts], …\"<br>\n        <strong>P3 - Petición:</strong> \"I would therefore be grateful if you could…\"<br>\n        <strong>P4 - Cierre:</strong> \"I look forward to your prompt response.\"<br>\n        <strong>Firma:</strong> Yours faithfully (no sé el nombre) / Yours sincerely (sé el nombre)\n      </div>\n    </div>\n  </div>\n\n  <!-- ====== PART 4 ====== -->\n  <div class=\"panel\" id=\"w-p4\">\n    <div class=\"card\" style=\"border-left:4px solid var(--red)\">\n      <h3><span class=\"tag t-r\">PART 4</span> Essay / artículo / report · 200-250 palabras · 20 min</h3>\n      <p style=\"font-size:13px\">Aquí se decide tu C1. Te dan un tema social (educación, tecnología, medioambiente…) con una pregunta abierta, y debes escribir un <strong>texto argumentativo</strong> con tesis, dos puntos de desarrollo y conclusión. Registro <strong>formal académico</strong>.</p>\n    </div>\n\n    <div class=\"card\">\n      <h3>📝 Tipos de prompt habituales</h3>\n      <ul class=\"sl\" style=\"font-size:13px;line-height:1.9\">\n        <li>\"<strong>Some people think</strong> X, <strong>others believe</strong> Y. Discuss both views and give your opinion.\"</li>\n        <li>\"To what extent do you agree or disagree with the following statement: '…'?\"</li>\n        <li>\"<strong>What are the advantages and disadvantages</strong> of X?\"</li>\n        <li>\"<strong>What problems does</strong> X cause and <strong>how could they be addressed</strong>?\"</li>\n        <li>\"<strong>Why has</strong> X become more common, and <strong>what are the consequences</strong>?\"</li>\n      </ul>\n      <div class=\"note\">⭐ El prompt te da la <strong>estructura</strong>. Léelo dos veces y subraya los verbos clave (discuss, agree, advantages…).</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🏗️ Estructura clásica (4 párrafos)</h3>\n      <div class=\"struct\" style=\"white-space:normal;line-height:1.9\">\n        <strong>P1 — Introducción (≈ 35-40 palabras):</strong><br>\n        Frase de contexto + paráfrasis del tema + tesis (\"This essay will argue that…\")<br><br>\n        <strong>P2 — Cuerpo 1 (≈ 70-80 palabras):</strong><br>\n        Topic sentence → razón → ejemplo → matiz<br><br>\n        <strong>P3 — Cuerpo 2 (≈ 70-80 palabras):</strong><br>\n        Topic sentence → razón → ejemplo → matiz (contraste con P2 si \"discuss both views\")<br><br>\n        <strong>P4 — Conclusión (≈ 30-40 palabras):</strong><br>\n        Resume + reafirma tesis + frase de cierre con visión amplia\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>✅ Modelo completo · Tema: \"Some people argue social media has done more harm than good. Discuss both views and give your opinion.\" (≈ 240 palabras)</h3>\n      <div class=\"ex\" style=\"line-height:1.8;font-family:var(--sans)\">\n<strong>The rise of social media has transformed the way we communicate, work and form opinions.</strong> While many celebrate the connectivity it provides, others contend that the social cost has been severe. This essay will examine both perspectives before arguing that, on balance, the drawbacks are increasingly difficult to ignore.<br><br>\nOn the one hand, it is undeniable that social media has democratised access to information and given a voice to communities long ignored by traditional media. <em>For instance</em>, grassroots movements such as climate strikes have grown precisely because young activists could organise online. <em>Furthermore</em>, families separated by distance now stay genuinely connected, which would have been almost unthinkable a generation ago.<br><br>\nOn the other hand, <em>there is mounting evidence that</em> excessive use is reshaping our cognition and mental wellbeing in worrying ways. Studies <em>have repeatedly shown</em> a correlation between heavy use and rising anxiety levels among teenagers. <em>What is more</em>, algorithms designed to maximise engagement often end up amplifying outrage rather than nuance, fuelling polarisation in public debate.<br><br>\n<em>In conclusion</em>, while social media offers genuine benefits in terms of connection and visibility, the cumulative effect on attention, mental health and democratic discourse appears, on balance, deeply problematic. Rather than rejecting the technology outright, what is needed is a serious conversation about regulation and digital literacy — before the costs become irreversible.\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🎯 Frases-puente que marcan C1</h3>\n      <div class=\"g2\">\n        <div>\n          <strong style=\"color:var(--acc);font-size:12px\">INTRO</strong>\n          <ul class=\"sl\" style=\"font-size:13px\">\n            <li>\"The rise of X has transformed…\"</li>\n            <li>\"In recent years, the debate around X has intensified.\"</li>\n            <li>\"This essay will examine both perspectives before arguing…\"</li>\n          </ul>\n        </div>\n        <div>\n          <strong style=\"color:var(--grn);font-size:12px\">CUERPO</strong>\n          <ul class=\"sl\" style=\"font-size:13px\">\n            <li>\"On the one hand…\" / \"On the other…\"</li>\n            <li>\"There is mounting evidence that…\"</li>\n            <li>\"It would be naïve to deny that…\"</li>\n            <li>\"What is more, …\"</li>\n          </ul>\n        </div>\n        <div>\n          <strong style=\"color:var(--org);font-size:12px\">EJEMPLOS</strong>\n          <ul class=\"sl\" style=\"font-size:13px\">\n            <li>\"A clear illustration of this would be…\"</li>\n            <li>\"Take, for instance, …\"</li>\n            <li>\"Studies have repeatedly shown…\"</li>\n          </ul>\n        </div>\n        <div>\n          <strong style=\"color:var(--red);font-size:12px\">CONCLUSIÓN</strong>\n          <ul class=\"sl\" style=\"font-size:13px\">\n            <li>\"In conclusion, while X…, on balance…\"</li>\n            <li>\"Rather than dismissing/embracing X outright, what is needed is…\"</li>\n            <li>\"Before the costs become irreversible, …\"</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>⚡ Tips Part 4</h3>\n      <ul class=\"sl\" style=\"font-size:13px\">\n        <li>Antes de escribir, dedica <strong>2 minutos</strong> a planificar: 1 frase por párrafo en sucio.</li>\n        <li>Mete <strong>1 pasiva impersonal</strong> (\"It is widely acknowledged that…\", \"Studies have shown…\").</li>\n        <li>Mete <strong>1 condicional</strong> en el cuerpo 2 o conclusión (\"If governments were to…, …\").</li>\n        <li>Mete <strong>1 inversión</strong> (\"Not only has X…, but…\") — vale ORO.</li>\n        <li>Linkers <strong>variados</strong>: \"however / nevertheless / that said / by contrast\" — no repitas.</li>\n        <li>NO uses primera persona (\"I think\") más de 2 veces. Despersonaliza: \"It can be argued that…\"</li>\n        <li>Cuenta palabras al final. Si vas corto, amplía con un ejemplo. Si te pasas, recorta el cuerpo 2.</li>\n      </ul>\n    </div>\n  </div>\n\n  <!-- ====== REGISTROS ====== -->\n  <div class=\"panel\" id=\"w-register\">\n    <div class=\"card\">\n      <h3>🎩 La tabla de oro: formal vs informal</h3>\n      <p style=\"font-size:13px\">Mezclar registros baja la nota más que cualquier error gramatical. Memoriza esta tabla.</p>\n    </div>\n\n    <div class=\"card\">\n      <table class=\"rs-table\">\n        <thead><tr><th>Función</th><th>❌ Informal (P1, P2)</th><th>✅ Formal (P3 formal, P4)</th></tr></thead>\n        <tbody>\n          <tr><td>Saludar</td><td>Hi / Hey</td><td>Dear Sir/Madam, Dear Mr/Ms [surname]</td></tr>\n          <tr><td>Despedida</td><td>Speak soon / Take care / Cheers</td><td>Yours faithfully / Yours sincerely / Kind regards</td></tr>\n          <tr><td>Pedir algo</td><td>Can you…? / Could you…?</td><td>I would be grateful if you could… / I would appreciate it if…</td></tr>\n          <tr><td>Disculparse</td><td>Sorry about / Sorry I…</td><td>I sincerely apologise for / Please accept my apologies for…</td></tr>\n          <tr><td>Agradecer</td><td>Thanks a lot / Thanks so much</td><td>I would like to thank you for / I am most grateful for…</td></tr>\n          <tr><td>Quejarse</td><td>I'm not happy about / It's a pain</td><td>I wish to express my dissatisfaction with / I am writing to complain about…</td></tr>\n          <tr><td>Empezar</td><td>Just a quick one… / How are things?</td><td>I am writing in connection with / I am writing to enquire about…</td></tr>\n          <tr><td>Cerrar</td><td>Let me know! / Talk soon</td><td>I look forward to your prompt response / I hope to hear from you soon</td></tr>\n          <tr><td>Decir \"muy\"</td><td>really, super, totally</td><td>extremely, particularly, highly</td></tr>\n          <tr><td>Decir \"pero\"</td><td>but / though</td><td>however / nevertheless / nonetheless</td></tr>\n          <tr><td>Decir \"y\"</td><td>and / plus / also</td><td>furthermore / in addition / moreover</td></tr>\n          <tr><td>Decir \"obtener\"</td><td>get</td><td>obtain / acquire / receive</td></tr>\n          <tr><td>Contracciones</td><td>I'm, don't, we'll, can't</td><td>I am, do not, we will, cannot</td></tr>\n          <tr><td>Phrasal verbs</td><td>find out, put up with, get on with</td><td>discover, tolerate, maintain a relationship with</td></tr>\n        </tbody>\n      </table>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--yel)\">\n      <h3>⚠️ Los 5 leaks de registro que más te delatan</h3>\n      <ol style=\"font-size:13px;padding-left:22px;line-height:1.9\">\n        <li><strong>Contracciones en email formal o ensayo</strong>: \"I'm\" → \"I am\". Siempre.</li>\n        <li><strong>Phrasal verbs informales en P4</strong>: \"find out\" → \"discover\", \"put up with\" → \"tolerate\".</li>\n        <li><strong>\"a lot of\"</strong> en escritura formal → \"considerable / significant / a great deal of\".</li>\n        <li><strong>\"things\"</strong> en ensayo → \"aspects / factors / issues / matters\".</li>\n        <li><strong>\"Hi\" o emoticonos</strong> en P3 formal o P4 — restan automáticamente.</li>\n      </ol>\n    </div>\n  </div>\n\n  <!-- ====== LINKERS ====== -->\n  <div class=\"panel\" id=\"w-linkers\">\n    <div class=\"card\">\n      <h3>🔗 Linkers C1 — varía o pierdes</h3>\n      <p style=\"font-size:13px\">Repetir el mismo conector dos veces seguidas es un marcador clarísimo de B2. Aquí tienes <strong>3 opciones por función</strong>: usa una distinta cada vez.</p>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3 style=\"color:var(--grn)\">➕ Adición</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>Furthermore</strong>, …</li>\n          <li><strong>In addition</strong>, …</li>\n          <li><strong>Moreover</strong>, …</li>\n          <li><strong>What is more</strong>, …</li>\n          <li><strong>Not only</strong> X <strong>but also</strong> Y.</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--red)\">⚖️ Contraste</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>However</strong>, …</li>\n          <li><strong>Nevertheless</strong>, …</li>\n          <li><strong>Nonetheless</strong>, …</li>\n          <li><strong>By contrast</strong>, …</li>\n          <li><strong>That said</strong>, …</li>\n          <li><strong>Whereas</strong> X, Y…</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--org)\">🔗 Causa</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>Owing to</strong> X, …</li>\n          <li><strong>Due to</strong> X, …</li>\n          <li><strong>This is largely because</strong> …</li>\n          <li><strong>Given that</strong> …, …</li>\n          <li><strong>In light of</strong> X, …</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--pur)\">⚡ Consecuencia</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>As a result</strong>, …</li>\n          <li><strong>Consequently</strong>, …</li>\n          <li><strong>This has led to</strong> …</li>\n          <li><strong>Hence</strong>, …</li>\n          <li><strong>Thereby</strong> + -ing</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--acc)\">📌 Ejemplo</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>For instance</strong>, …</li>\n          <li><strong>A clear illustration would be</strong> …</li>\n          <li><strong>Take</strong> X<strong>, for example</strong>.</li>\n          <li><strong>Such as</strong> …</li>\n          <li><strong>Particularly</strong>, …</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--pnk)\">🎯 Énfasis</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>Crucially</strong>, …</li>\n          <li><strong>It is worth noting that</strong> …</li>\n          <li><strong>Above all</strong>, …</li>\n          <li><strong>Particularly worrying is</strong> …</li>\n          <li><strong>What is striking is that</strong> …</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--yel)\">🏁 Conclusión</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>In conclusion</strong>, …</li>\n          <li><strong>Overall</strong>, …</li>\n          <li><strong>On balance</strong>, …</li>\n          <li><strong>To sum up</strong>, …</li>\n          <li><strong>All things considered</strong>, …</li>\n        </ul>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--grn)\">🛡️ Concesión</h3>\n        <ul class=\"sl\" style=\"font-size:13px\">\n          <li><strong>Admittedly</strong>, …</li>\n          <li><strong>It is true that</strong> …, but…</li>\n          <li><strong>Although</strong> X, Y…</li>\n          <li><strong>Despite</strong> the fact that…</li>\n          <li><strong>While</strong> some argue…, others…</li>\n        </ul>\n      </div>\n    </div>\n  </div>\n\n  <!-- ====== TEMPLATES ====== -->\n  <div class=\"panel\" id=\"w-templates\">\n    <div class=\"card\">\n      <h3>📐 Plantillas listas para copiar (rellena los huecos)</h3>\n      <p style=\"font-size:13px\">Memoriza la estructura, no las palabras exactas. Cambias el tema, todo lo demás se mantiene.</p>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--grn)\">\n      <h3>💌 Plantilla email INFORMAL (P2 / P3 informal)</h3>\n      <div class=\"struct\" style=\"white-space:pre-line;line-height:1.8;font-family:monospace;font-size:12px\">\nHi [name],\n\nThanks so much for [your message / the invite / letting me know].\n[Reacción emocional: Sounds great / What a shame / I'm so glad…]\n\n[Responde al primer prompt — 1-2 frases]\n\n[Responde al segundo prompt — 1-2 frases con detalle]\n\n[Responde al tercer prompt o cierra con propuesta]\n\n[Speak soon / Looking forward to it / Catch up soon]!\n\nTake care,\n[Tu nombre]\n      </div>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--red)\">\n      <h3>🎩 Plantilla email FORMAL (P3 formal)</h3>\n      <div class=\"struct\" style=\"white-space:pre-line;line-height:1.8;font-family:monospace;font-size:12px\">\nDear Sir/Madam,\n\nI am writing in connection with [situación / problema / solicitud] which took place on [fecha/contexto].\n\nOn [date], I [briefly state the facts]. Despite [efforts made], [problem persists / no response received].\n\nIn light of the above, I would be most grateful if you could [petición concreta] at your earliest convenience.\n\nI look forward to receiving your prompt response.\n\nYours faithfully,\n[Tu nombre completo]\n      </div>\n      <div class=\"note\">⚠️ <strong>Yours faithfully</strong> = no sé el nombre del destinatario. <strong>Yours sincerely</strong> = sí lo sé.</div>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--acc)\">\n      <h3>📚 Plantilla ESSAY argumentativo (P4)</h3>\n      <div class=\"struct\" style=\"white-space:pre-line;line-height:1.8;font-family:monospace;font-size:12px\">\n[CONTEXTO]. While [view A], [view B]. This essay will argue that [tu tesis].\n\nOn the one hand, it is undeniable that [argumento A]. For instance, [ejemplo concreto]. Furthermore, [refuerzo del argumento].\n\nOn the other hand, there is mounting evidence that [argumento B]. A clear illustration would be [ejemplo]. What is more, [consecuencia].\n\nIn conclusion, while [reconoce parte del A], on balance [reafirma tu tesis B]. Rather than [solución simplista], what is needed is [propuesta matizada].\n      </div>\n      <div class=\"note\">⭐ Esta plantilla cubre el 80% de los prompts. Adáptala al verbo (discuss, agree, advantages…).</div>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--pur)\">\n      <h3>📰 Plantilla ARTÍCULO (variante de P4 si te dan article)</h3>\n      <div class=\"struct\" style=\"white-space:pre-line;line-height:1.8;font-family:monospace;font-size:12px\">\n[Título atractivo en forma de pregunta o frase corta]\n\n[Hook — anécdota corta, dato sorprendente o pregunta retórica]. This is the reality for many of us today.\n\n[Desarrollo punto 1 — más cercano al lector, ejemplos del día a día]\n\n[Desarrollo punto 2 — perspectiva más amplia, datos o expertos]\n\nSo what does this mean for us? [Reflexión final + llamada a la acción suave].\n      </div>\n      <div class=\"note\">El artículo permite tono <em>algo</em> menos académico que el essay (preguntas retóricas, \"you/we\"). Pero sigue siendo formal.</div>\n    </div>\n  </div>\n\n  <!-- ====== TOPICS ====== -->\n  <div class=\"panel\" id=\"w-topics\">\n    <div class=\"card\">\n      <h3>🌍 Los 12 temas que más caen en P4</h3>\n      <p style=\"font-size:13px\">Para cada tema te doy <strong>3 ideas listas</strong> + <strong>vocabulario premium</strong>. Memorizar 1 ejemplo por tema te resuelve el 80% del examen.</p>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\"><h3>💻 1. Tecnología &amp; AI</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: efficiency, accessibility, democratisation of knowledge</li>\n          <li>Contra: job displacement, surveillance, attention erosion</li>\n          <li>Vocab: <em>algorithm-driven, far-reaching implications, paradigm shift</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>📚 2. Educación</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: critical thinking, inclusion, lifelong learning</li>\n          <li>Contra: rote memorisation, achievement gap, screen-saturation</li>\n          <li>Vocab: <em>student-centred, curriculum overhaul, soft skills</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>🌱 3. Medioambiente</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: renewable energy, circular economy, individual responsibility</li>\n          <li>Contra: greenwashing, lack of regulation, consumer apathy</li>\n          <li>Vocab: <em>carbon footprint, net-zero, mounting evidence</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>💼 4. Trabajo &amp; carrera</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: remote work, flexibility, upskilling</li>\n          <li>Contra: burnout, gig economy precarity, isolation</li>\n          <li>Vocab: <em>work-life balance, gig economy, hybrid model</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>🏥 5. Salud &amp; bienestar</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: preventive medicine, mental health awareness, public campaigns</li>\n          <li>Contra: sedentary lifestyle, healthcare inequality, pharma reliance</li>\n          <li>Vocab: <em>preventive care, mental wellbeing, sedentary lifestyle</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>📺 6. Medios &amp; redes</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: amplifying voices, real-time information, community-building</li>\n          <li>Contra: misinformation, echo chambers, polarisation</li>\n          <li>Vocab: <em>echo chamber, fact-checking, digital literacy</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>🌆 7. Urbanismo &amp; ciudades</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: opportunities, public transport, cultural vibrancy</li>\n          <li>Contra: pollution, gentrification, housing crisis</li>\n          <li>Vocab: <em>urban sprawl, gentrification, liveable city</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>✈️ 8. Turismo &amp; viajes</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: cultural exchange, economic boost, personal growth</li>\n          <li>Contra: overtourism, environmental damage, cultural commodification</li>\n          <li>Vocab: <em>overtourism, eco-travel, off-the-beaten-track</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>👴 9. Generaciones &amp; envejecimiento</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: longer lifespans, intergenerational wisdom, active retirement</li>\n          <li>Contra: pension burden, ageism, isolation</li>\n          <li>Vocab: <em>ageing population, intergenerational, age-friendly</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>💰 10. Consumismo &amp; economía</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: choice, innovation, accessibility</li>\n          <li>Contra: fast fashion, debt culture, planned obsolescence</li>\n          <li>Vocab: <em>impulse buying, conspicuous consumption, financial literacy</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>🌐 11. Globalización &amp; cultura</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: cross-cultural exchange, mobility, innovation</li>\n          <li>Contra: cultural homogenisation, loss of identity, language extinction</li>\n          <li>Vocab: <em>cultural homogenisation, lingua franca, soft power</em></li>\n        </ul></div>\n\n      <div class=\"card\"><h3>🏛️ 12. Gobierno &amp; sociedad</h3>\n        <ul class=\"sl\" style=\"font-size:12.5px\">\n          <li>Pro: civic engagement, transparency, public services</li>\n          <li>Contra: corruption, polarisation, declining trust</li>\n          <li>Vocab: <em>civic duty, accountability, public discourse</em></li>\n        </ul></div>\n    </div>\n\n    <div class=\"card\" style=\"border-left:4px solid var(--grn)\">\n      <h3>🪄 Las 5 frases-comodín que valen para CUALQUIER tema</h3>\n      <ol style=\"font-size:13px;padding-left:22px;line-height:1.9\">\n        <li>\"This issue has <strong>far-reaching implications</strong> for [society / future generations].\"</li>\n        <li>\"There is <strong>mounting evidence</strong> that…\"</li>\n        <li>\"What is needed is <strong>a serious conversation about</strong> [regulation / education / responsibility].\"</li>\n        <li>\"It would be <strong>naïve to deny</strong> that there are upsides, but…\"</li>\n        <li>\"Rather than [oversimplifying / dismissing X outright], <strong>what is required is</strong> [a balanced approach].\"</li>\n      </ol>\n    </div>\n  </div>\n\n  <!-- ====== TIPS ====== -->\n  <div class=\"panel\" id=\"w-tips\">\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3 style=\"color:var(--grn)\">✅ Top 12 cosas que SUMAN</h3>\n        <ol style=\"font-size:13px;padding-left:22px;line-height:1.8\">\n          <li>Variedad de tiempos verbales (presente, pasado, perfectos, condicionales).</li>\n          <li>Al menos UN <strong>conditional type 2 o 3</strong> en P4.</li>\n          <li>Una <strong>pasiva impersonal</strong> (\"It is widely held that…\") en P3 formal o P4.</li>\n          <li>Una <strong>inversión</strong> (\"Not only has X…, but…\") en P4 — vale ORO.</li>\n          <li>Linkers <strong>variados</strong> (3 distintos por texto mínimo).</li>\n          <li>Un <strong>collocation premium</strong> (\"far-reaching impact\", \"deep-rooted issue\").</li>\n          <li>Párrafos con <strong>topic sentence</strong> clara al inicio.</li>\n          <li>Cumplir EXACTAMENTE los 3 prompts del enunciado.</li>\n          <li>Cierre con <strong>visión amplia</strong> en P4 (futuro, sociedad, regulación).</li>\n          <li>Usar <strong>cero contracciones</strong> en P3 formal y P4.</li>\n          <li>Contar palabras al final — ni 50 menos ni 50 más.</li>\n          <li>Releer 30 segundos buscando <em>typos</em> y concordancias.</li>\n        </ol>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--red)\">❌ Top 12 cosas que RESTAN</h3>\n        <ol style=\"font-size:13px;padding-left:22px;line-height:1.8\">\n          <li>Mezclar registros (contracciones en email formal).</li>\n          <li>Empezar P1 o P2 con \"I am writing to inform you\" — ¡es chat!</li>\n          <li>\"In my humble opinion\" / \"Last but not least\" — sonar a plantilla mala.</li>\n          <li>Ignorar uno de los 3 prompts del enunciado.</li>\n          <li>Repetir el mismo linker (\"And… and… and…\").</li>\n          <li>Usar \"thing/things\" en ensayo formal.</li>\n          <li>\"A lot of\" en P4 → \"considerable / significant\".</li>\n          <li>Phrasal verbs informales en P4 (\"get on with\" → \"maintain\").</li>\n          <li>Abreviar en email formal (\"FYI\", \"ASAP\", \"etc.\").</li>\n          <li>Pasar de las 250 palabras en P4 — pierdes precisión.</li>\n          <li>No firmar (especialmente en P3 formal).</li>\n          <li>Errores de bulto en concordancia (sustantivo singular + verbo plural).</li>\n        </ol>\n      </div>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--yel)\">\n      <h3>🪤 Trampas léxicas que pillan a TODO el mundo</h3>\n      <table class=\"rs-table\">\n        <thead><tr><th>Confusión</th><th>Distinción</th></tr></thead>\n        <tbody>\n          <tr><td><strong>say / tell</strong></td><td>say <em>something</em> · tell <em>someone</em> something</td></tr>\n          <tr><td><strong>do / make</strong></td><td>do homework, do the dishes · make a decision, make a mistake</td></tr>\n          <tr><td><strong>since / for</strong></td><td>since 2020 (punto en el tiempo) · for 5 years (duración)</td></tr>\n          <tr><td><strong>fewer / less</strong></td><td>fewer + countable (fewer cars) · less + uncountable (less time)</td></tr>\n          <tr><td><strong>among / between</strong></td><td>between 2 cosas · among 3+ cosas</td></tr>\n          <tr><td><strong>affect / effect</strong></td><td>affect = verbo (afectar) · effect = sustantivo (efecto)</td></tr>\n          <tr><td><strong>practice / practise</strong></td><td>practice = noun (UK) · practise = verb (UK)</td></tr>\n          <tr><td><strong>economic / economical</strong></td><td>economic = de la economía · economical = barato/eficiente</td></tr>\n          <tr><td><strong>sensible / sensitive</strong></td><td>sensible = razonable · sensitive = sensible emocionalmente</td></tr>\n          <tr><td><strong>actually / currently</strong></td><td>actually = en realidad · currently = actualmente</td></tr>\n        </tbody>\n      </table>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--acc)\">\n      <h3>⏰ Plan de los 50 minutos (cronómetro mental)</h3>\n      <ul class=\"sl\" style=\"font-size:13px;line-height:1.9\">\n        <li><strong>0-5 min</strong>: Part 1. Lee, responde rápido, no te enrolles.</li>\n        <li><strong>5-15 min</strong>: Part 2. Saluda → 3 puntos → cierra.</li>\n        <li><strong>15-30 min</strong>: Part 3. Email informal corto + email formal con plantilla.</li>\n        <li><strong>30-48 min</strong>: Part 4. <strong>2 min planificar</strong> + 14 escribir + 2 revisar.</li>\n        <li><strong>48-50 min</strong>: Releer P3 formal y P4 buscando typos y registro mezclado.</li>\n      </ul>\n    </div>\n  </div>";

const HTML_APT_PROGRAM = "<div class=\"sh\">\n    <h1>⭐ Pro Grammar C1+</h1>\n    <p>Estructuras avanzadas que separan B2 de C1: inversión negativa, cleft sentences, modal perfects, fronting y hedging. Compactas, con ejemplos y comparativas.</p>\n  </div>\n\n  <div class=\"tabs\">\n    <button class=\"tb on\" onclick=\"pgTab('inv',this)\">🔄 Inversión</button>\n    <button class=\"tb\" onclick=\"pgTab('cleft',this)\">✂️ Cleft</button>\n    <button class=\"tb\" onclick=\"pgTab('modals',this)\">🎯 Modal Perfects</button>\n    <button class=\"tb\" onclick=\"pgTab('fronting',this)\">⬅️ Fronting</button>\n    <button class=\"tb\" onclick=\"pgTab('hedging',this)\">🪶 Hedging &amp; Stance</button>\n  </div>\n\n  <!-- INVERSIÓN -->\n  <div class=\"panel on\" id=\"pg-inv\">\n    <div class=\"card\">\n      <h3>🔄 Inversión negativa — el \"wow factor\" del C1</h3>\n      <p style=\"font-size:13px\">Cuando empiezas la frase con un adverbio negativo o restrictivo, <strong>invertes sujeto y auxiliar</strong> (como en una pregunta). Suena súper formal y impacta en Writing y Speaking Part 4.</p>\n    </div>\n\n    <div class=\"g2\">\n      <div class=\"card\">\n        <h3>📐 Disparadores</h3>\n        <div style=\"font-size:13px;line-height:1.9\">\n          <span class=\"tag t-r\">Never</span> <span class=\"tag t-r\">Rarely</span> <span class=\"tag t-r\">Seldom</span> <span class=\"tag t-r\">Hardly</span> <span class=\"tag t-r\">Scarcely</span> <span class=\"tag t-r\">No sooner</span> <span class=\"tag t-r\">Not only</span> <span class=\"tag t-r\">Little</span> <span class=\"tag t-r\">Only then / when / after</span> <span class=\"tag t-r\">Under no circumstances</span> <span class=\"tag t-r\">At no time</span>\n        </div>\n      </div>\n      <div class=\"card\">\n        <h3>📝 Fórmula</h3>\n        <div class=\"struct\">[adv. negativo] + [aux/be] + [sujeto] + [verbo principal]</div>\n        <div class=\"ex\">Normal: I had never seen such a thing.<br>Inversión: <strong>Never had I seen</strong> such a thing.</div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>✨ Ejemplos premium para usar tal cual</h3>\n      <ul class=\"sl\" style=\"font-size:13.5px;line-height:1.9\">\n        <li><strong>Not only</strong> has technology transformed our jobs, <strong>but it has also</strong> reshaped our personal lives.</li>\n        <li><strong>Rarely do we</strong> stop to think about how dependent we've become on our phones.</li>\n        <li><strong>Seldom has</strong> a single invention had such a far-reaching impact.</li>\n        <li><strong>No sooner had</strong> the law been passed <strong>than</strong> protests broke out.</li>\n        <li><strong>Under no circumstances should</strong> children be exposed to that kind of content.</li>\n        <li><strong>Only when</strong> we lose something <strong>do we</strong> realise its value.</li>\n        <li><strong>Little did I know</strong> that decision would change everything.</li>\n      </ul>\n      <div class=\"note\">⚠️ Después del adv. negativo SIEMPRE va auxiliar. Si el verbo no tiene auxiliar, usa <strong>do/does/did</strong>.</div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🎤 Cómo meterlo en Speaking sin sonar postizo</h3>\n      <p style=\"font-size:13px\">Usa <strong>una</strong> inversión por respuesta larga. Las que mejor cuelan en cualquier tema:</p>\n      <div class=\"ex\">\"<strong>Not only has</strong> social media changed how we communicate, but it's also rewired how we form opinions.\"</div>\n      <div class=\"ex\">\"<strong>Rarely do we</strong> stop and think about the long-term consequences of these decisions.\"</div>\n    </div>\n  </div>\n\n  <!-- CLEFT -->\n  <div class=\"panel\" id=\"pg-cleft\">\n    <div class=\"card\">\n      <h3>✂️ Cleft sentences — partir la frase para enfatizar</h3>\n      <p style=\"font-size:13px\">Coges una frase normal y la \"rompes\" en dos para destacar UNA parte. Hay 3 tipos. Memoriza la fórmula: el resto sale solo.</p>\n    </div>\n\n    <div class=\"g3\">\n      <div class=\"card\">\n        <h3 style=\"color:var(--acc)\">It-cleft</h3>\n        <div class=\"struct\">It + be + ELEMENTO + that/who…</div>\n        <div class=\"ex\">Normal: My mother taught me to cook.<br>Cleft: <strong>It was my mother who</strong> taught me to cook.</div>\n        <div class=\"def\">Énfasis: el sujeto/objeto/momento.</div>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--grn)\">Wh-cleft (Pseudo-cleft)</h3>\n        <div class=\"struct\">What + sujeto + verbo + is/was + ELEMENTO</div>\n        <div class=\"ex\">Normal: I really need a holiday.<br>Cleft: <strong>What I really need is</strong> a holiday.</div>\n        <div class=\"def\">Énfasis: lo que se hace o se quiere.</div>\n      </div>\n      <div class=\"card\">\n        <h3 style=\"color:var(--org)\">All-cleft</h3>\n        <div class=\"struct\">All (that) + S + V + is/was + ELEMENTO</div>\n        <div class=\"ex\"><strong>All I want is</strong> a quiet evening.</div>\n        <div class=\"def\">Énfasis minimalista: \"lo único\".</div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h3>🪄 Variantes que impresionan</h3>\n      <ul class=\"sl\" style=\"font-size:13.5px;line-height:1.9\">\n        <li><strong>The thing (that) is…</strong> \"The thing that worries me most is the impact on kids.\"</li>\n        <li><strong>The reason why…</strong> \"The reason why young people are leaving is housing.\"</li>\n        <li><strong>What happens is…</strong> \"What happens is that families end up never seeing each other.\"</li>\n        <li><strong>The way + S + V…</strong> \"The way we work has changed beyond recognition.\"</li>\n      </ul>\n    </div>\n\n    <div class=\"card\" style=\"border-left:3px solid var(--yel)\">\n      <h3>🎤 Mini-drill (úsalo de calentamiento)</h3>\n      <ol style=\"font-size:13px;padding-left:22px;line-height:1.9\">\n        <li>Coge cualquier frase plana: \"Phones are addictive.
