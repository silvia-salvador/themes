_______ the project timeline.","opts":["reconsider","reconsiders","reconsidered"],"ans":"A"},{"q":"The fewer complaints we receive, _________ confident we can be.","opts":["the more","more","most"],"ans":"A"},{"q":"It was _________ his refusal to negotiate that caused the breakdown.","opts":["precisely","exact","just merely"],"ans":"A"},{"q":"She _________ better leave now if she wants to catch the last train.","opts":["had","has","would"],"ans":"A"},{"q":"The results, _________ unexpected, prompted a full investigation.","opts":["while","although","however"],"ans":"A"},{"q":"_________ work still remains to be done before the deadline.","opts":["Considerable","Considerably","Consider"],"ans":"A"},{"q":"Not only _________ the project delayed, but it also exceeded the budget.","opts":["was","has","did"],"ans":"A"},{"q":"She was adamant that the meeting _________ postponed.","opts":["not be","is not","was not"],"ans":"A"},{"q":"The data _________ to suggest a strong correlation between the two variables.","opts":["appear","appears","appeared"],"ans":"A"},{"q":"_________ widespread concern about the proposal, it was approved unanimously.","opts":["Despite","Although","Notwithstanding"],"ans":"C"},{"q":"He _________ the consequences before making such a rash decision.","opts":["should have considered","must consider","would consider"],"ans":"A"},{"q":"The new device _________ to have already sold over a million units.","opts":["is reported","reports","is reporting"],"ans":"A"},{"q":"It _________ until the final chapter that the mystery is resolved.","opts":["isn't","wasn't","hasn't been"],"ans":"A"},{"q":"_________ all the challenges, the team delivered an outstanding result.","opts":["Notwithstanding","Despite of","In spite"],"ans":"A"},{"q":"By next year, the company _________ for three decades.","opts":["will have been operating","will be operating","has been operating"],"ans":"A"},{"q":"She came across _________ confident in the interview despite her nerves.","opts":["as","like","being"],"ans":"A"}]}}},
  HUB_GRAMMAR: [{"n":1,"t":"Simple & continuous verb forms","sub":"Reference · Substitution · Adverbs of frequency","sections":[{"h":"Simple forms","body":"\n          <p>Las <em>simple forms</em> describen acciones o estados <strong>permanentes, completos o típicos</strong>.</p>\n          <div class=\"ex\"><em>The rain in Spain falls mainly on the plain.</em> (hecho)</div>\n          <div class=\"ex\"><em>I work for a publisher.</em> (estado permanente)</div>\n          <div class=\"ex\"><em>She arrived at six.</em> (acción completa)</div>\n          <h4 style=\"border:none;margin-top:10px\">Uses</h4>\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li>Hábitos y rutinas: <em>I get up at seven.</em></li>\n            <li>Hechos generales: <em>Water boils at 100°C.</em></li>\n            <li>Estados (verbos no-acción): <em>I believe you / I own a flat.</em></li>\n            <li>Acciones completadas en el pasado: <em>She wrote three novels.</em></li>\n          </ul>\n        "},{"h":"Continuous forms","body":"\n          <p>Las <em>continuous forms</em> sugieren que la situación es <strong>temporal, incompleta o en progreso</strong>.</p>\n          <div class=\"ex\"><em>What are you doing? — I'm reading.</em> (en este momento)</div>\n          <div class=\"ex\"><em>I've been waiting for over an hour.</em> (duración antes del momento de hablar)</div>\n          <div class=\"ex\"><em>She's always interrupting me!</em> (queja con <em>always/forever/continually</em>)</div>\n          <h4 style=\"border:none;margin-top:10px\">Usos clave C1</h4>\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li><strong>Cambio o desarrollo</strong>: <em>Simon's growing up</em> / <em>The climate is changing</em>.</li>\n            <li><strong>Planes futuros</strong> ya decididos: <em>I'm flying to Rome tomorrow.</em></li>\n            <li><strong>Repetición molesta</strong>: <em>He's always losing his keys.</em></li>\n            <li><strong>Sentimientos temporales</strong>: <em>I'm feeling tired today.</em> (≠ <em>I feel tired</em>, más permanente)</li>\n          </ul>\n          <div class=\"note\"><strong>Atención:</strong> Verbos de estado (<em>know, believe, own, contain, deserve, seem…</em>) normalmente NO van en continuous.</div>\n        "},{"h":"Reference: this, that, these, those","body":"\n          <p>Como <strong>determinantes</strong> antes de un nombre, se refieren a información <strong>previamente mencionada</strong>.</p>\n          <div class=\"ex\"><em>The woman was clearly angry with her son. <strong>She felt</strong> this <strong>boy was untrustworthy</strong>.</em></div>\n          <p>Como <strong>pronombres</strong>, suenan más distantes que un sustantivo propio:</p>\n          <div class=\"ex\"><em>They decided to feed another meeting. <strong>This took</strong> two hours.</em></div>\n        "},{"h":"Substitution","body":"\n          <p>Sustituimos para <strong>evitar repetir</strong>. Auxiliares: <em>do, does, did</em>; <em>will, can, must…</em></p>\n          <div class=\"ex good\"><em>I don't have a sister. — <strong>Neither do I.</strong></em></div>\n          <div class=\"ex good\"><em>You won't talk to him, will you? — <strong>I will if you want.</strong></em></div>\n        "}],"quiz":[{"q":"Choose the best form: <em>Look! He ___ again — third time this week.</em>","o":["is being late","is late","has been late","always is late"],"a":0,"fb":"<em>always + continuous</em> = queja/repetición molesta. <em>He is always being late.</em> Aunque en oral se usa <em>he is always late</em>, la forma continuous enfatiza queja."},{"q":"Which one is INCORRECT?","o":["The climate is changing.","I believe in karma.","I'm thinking that you're right.","She's working in London this month."],"a":2,"fb":"<em>Think</em> en sentido de 'opinar' es un verbo de estado: <em>I think you're right</em>. <em>I'm thinking</em> = estoy considerando."},{"q":"<em>I ___ this novel since Tuesday.</em>","o":["read","am reading","have been reading","have read"],"a":2,"fb":"Acción que empezó en el pasado y continúa ahora: <em>present perfect continuous</em>."}]},{"n":2,"t":"Gerunds & infinitives","sub":"Comparisons · Modifiers","sections":[{"h":"Gerund (-ing)","body":"\n          <p>El gerundio funciona como nombre. Se usa:</p>\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li>Como sujeto: <em>Swimming keeps me fit.</em></li>\n            <li>Tras preposición: <em>I'm good at cooking.</em></li>\n            <li>Tras ciertos verbos: <em>admit, avoid, consider, deny, enjoy, finish, imagine, keep, mind, miss, postpone, suggest, risk…</em></li>\n          </ul>\n          <div class=\"ex\"><em>She suggested <strong>leaving</strong> early.</em></div>\n          <div class=\"ex bad\"><em>She suggested to leave early.</em></div>\n        "},{"h":"Infinitive (to + verb)","body":"\n          <p>Se usa tras verbos que expresan intención, decisión, esfuerzo o emoción:</p>\n          <ul style=\"padding-left:20px;font-size:13.5px\"><li><em>agree, decide, expect, hope, manage, plan, promise, refuse, want, would like, pretend, threaten…</em></li></ul>\n          <div class=\"ex\"><em>She managed <strong>to finish</strong> the report.</em></div>\n          <div class=\"ex\"><em>I'd love <strong>to go</strong> with you.</em></div>\n        "},{"h":"Verbos que cambian de significado","body":"\n          <table class=\"t\">\n            <tr><th>Verbo</th><th>+ gerund</th><th>+ infinitive</th></tr>\n            <tr><td>remember</td><td>recordar haber hecho</td><td>acordarse de hacer</td></tr>\n            <tr><td>forget</td><td>olvidar haber hecho</td><td>olvidarse de hacer</td></tr>\n            <tr><td>stop</td><td>dejar de</td><td>parar para</td></tr>\n            <tr><td>try</td><td>probar (experimentar)</td><td>intentar (esforzarse)</td></tr>\n            <tr><td>regret</td><td>arrepentirse de haber</td><td>lamentar (al anunciar)</td></tr>\n            <tr><td>mean</td><td>implicar</td><td>tener la intención</td></tr>\n            <tr><td>go on</td><td>continuar haciendo lo mismo</td><td>pasar a hacer otra cosa</td></tr>\n          </table>\n          <div class=\"ex good\"><em>I remember <strong>locking</strong> the door.</em> (recuerdo haberlo cerrado)</div>\n          <div class=\"ex good\"><em>Remember <strong>to lock</strong> the door!</em> (acuérdate de cerrar)</div>\n        "},{"h":"Comparisons (C1 patterns)","body":"\n          <div class=\"struct\">the + comparative …, the + comparative …</div>\n          <div class=\"ex\"><em><strong>The more</strong> you practise, <strong>the better</strong> you'll get.</em></div>\n          <div class=\"struct\">far / much / a lot / considerably + comparative</div>\n          <div class=\"ex\"><em>This is <strong>far more</strong> interesting than the last one.</em></div>\n          <div class=\"struct\">not nearly as … as</div>\n          <div class=\"ex\"><em>The film wasn't <strong>nearly as good as</strong> the book.</em></div>\n          <div class=\"struct\">by far the + superlative</div>\n          <div class=\"ex\"><em>She's <strong>by far the most</strong> talented in the group.</em></div>\n        "}],"quiz":[{"q":"<em>I regret ___ you that the flight has been cancelled.</em>","o":["telling","to tell","told","tell"],"a":1,"fb":"<em>Regret + to + inf</em> = lamentar (al anunciar malas noticias)."},{"q":"Pick the natural pattern:","o":["She is more taller than him.","She is far taller than him.","She is more tall than him.","She is the more tall than him."],"a":1,"fb":"<em>Far / much / a lot + comparative</em> es el patrón C1."},{"q":"<em>I'm looking forward ___ you.</em>","o":["to see","seeing","to seeing","see"],"a":2,"fb":"<em>Look forward to</em>: <strong>to</strong> aquí es preposición → gerundio."}]},{"n":3,"t":"Adding emphasis · Clefting · Fronting","sub":"Para sonar avanzado en writing y speaking","sections":[{"h":"Énfasis con auxiliares","body":"\n          <p>Acentuamos el auxiliar (<em>do, does, did</em>) para enfatizar lo afirmativo:</p>\n          <div class=\"ex\"><em>I <strong>do</strong> enjoy the party last night!</em></div>\n          <div class=\"ex\"><em>She <strong>does</strong> look tired.</em></div>\n          <div class=\"ex\"><em>He <strong>did</strong> phone, but you weren't here.</em></div>\n        "},{"h":"Cleft sentences — It-cleft","body":"\n          <div class=\"struct\">It + be + X + that/who … = lo enfatizado es X</div>\n          <div class=\"ex\"><em><strong>It was the rain</strong> that ruined the picnic.</em> (no el viento)</div>\n          <div class=\"ex\"><em><strong>It was John</strong> who broke the vase.</em> (no Mary)</div>\n          <div class=\"ex\"><em><strong>It wasn't until</strong> midnight <strong>that</strong> he arrived.</em></div>\n        "},{"h":"Cleft sentences — What-cleft","body":"\n          <div class=\"struct\">What + clause + be + X = lo enfatizado es X</div>\n          <div class=\"ex\"><em><strong>What I need</strong> is a good holiday.</em></div>\n          <div class=\"ex\"><em><strong>What annoys me</strong> is people who talk in cinemas.</em></div>\n          <div class=\"ex\"><em><strong>What he did</strong> was (to) call the police.</em></div>\n          <p class=\"small\">Variantes: <em>The thing/reason that…, All I want is…, The one thing I'd change is…</em></p>\n        "},{"h":"Fronting","body":"\n          <p>Mover la información importante al principio para darle énfasis.</p>\n          <div class=\"ex\"><em><strong>Really good</strong> it was — the best film I've seen all year.</em></div>\n          <div class=\"ex\"><em><strong>Ten quid</strong> it cost — a daylight robbery!</em></div>\n          <p>Con verbo + objeto delante: <em><strong>How clever</strong> you are! <strong>Such a fool</strong> I was!</em></p>\n        "},{"h":"Inversión tras adverbios negativos","body":"\n          <div class=\"struct\">Negative adverb + AUX + S + V</div>\n          <p>Muy formal, frecuente en writing.</p>\n          <table class=\"t\">\n            <tr><th>Frente</th><th>Ejemplo</th></tr>\n            <tr><td>Never (before)</td><td><em>Never have I seen such a mess.</em></td></tr>\n            <tr><td>Rarely / Seldom</td><td><em>Rarely do we get such weather.</em></td></tr>\n            <tr><td>Hardly … when</td><td><em>Hardly had I sat down when the phone rang.</em></td></tr>\n            <tr><td>No sooner … than</td><td><em>No sooner had he arrived than she left.</em></td></tr>\n            <tr><td>Not until</td><td><em>Not until later did I realise.</em></td></tr>\n            <tr><td>Little</td><td><em>Little did I know what was coming.</em></td></tr>\n            <tr><td>Only then / Only after</td><td><em>Only then did she understand.</em></td></tr>\n          </table>\n        "}],"quiz":[{"q":"<em>___ until he left that I realised the truth.</em>","o":["It was not","It wasn't","It was no","Not"],"a":0,"fb":"<em>It was not until X that …</em> — patrón fijo de énfasis."},{"q":"Choose the most natural inversion:","o":["Never I have seen…","Never have I seen…","Never I saw…","I have never seen…"],"a":1,"fb":"Tras <em>never</em> en posición inicial, inversión: aux + suj."},{"q":"<em>What I really need ___ a long holiday.</em>","o":["are","is","be","being"],"a":1,"fb":"<em>What-cleft</em> singular siempre, aunque el complemento sea plural en inglés británico estándar."}]},{"n":4,"t":"Reported speech · Modal verbs","sub":"must / might / may / could","sections":[{"h":"Reported speech — Backshift","body":"\n          <p>Al reportar, los tiempos suelen desplazarse un paso atrás:</p>\n          <table class=\"t\">\n            <tr><th>Direct</th><th><span class=\"arrow\">→</span></th><th>Reported</th></tr>\n            <tr><td>present simple</td><td class=\"arrow\">→</td><td>past simple</td></tr>\n            <tr><td>present continuous</td><td class=\"arrow\">→</td><td>past continuous</td></tr>\n            <tr><td>past simple / present perfect</td><td class=\"arrow\">→</td><td>past perfect</td></tr>\n            <tr><td>will</td><td class=\"arrow\">→</td><td>would</td></tr>\n            <tr><td>can</td><td class=\"arrow\">→</td><td>could</td></tr>\n            <tr><td>must (obligation)</td><td class=\"arrow\">→</td><td>had to</td></tr>\n            <tr><td>may</td><td class=\"arrow\">→</td><td>might</td></tr>\n          </table>\n          <div class=\"note\">No hay backshift si la verdad sigue siendo cierta: <em>She said the Earth is round.</em></div>\n        "},{"h":"Reported speech — Verb patterns","body":"\n          <table class=\"t\">\n            <tr><th>Patrón</th><th>Verbos</th></tr>\n            <tr><td>verb + that</td><td>say, mention, claim, complain, point out, predict, remark, reply, add</td></tr>\n            <tr><td>verb + infinitive</td><td>agree, claim, demand, offer, promise, refuse, threaten</td></tr>\n            <tr><td>verb + obj + infinitive</td><td>advise, ask, beg, encourage, instruct, invite, order, persuade, remind, tell, urge, warn</td></tr>\n            <tr><td>verb + gerund</td><td>admit, advise, deny, mention, recommend, regret, suggest</td></tr>\n            <tr><td>verb + prep + (-ing)</td><td>argue with, apologise for, accuse of, insist on, congratulate on, admit to, confess to, object to</td></tr>\n            <tr><td>verb + that-clause (should)</td><td>advise, agree, ask, demand, insist, propose, recommend, request, suggest, urge</td></tr>\n          </table>\n          <div class=\"ex\"><em>She <strong>insisted on paying</strong> the bill.</em></div>\n          <div class=\"ex\"><em>I suggested <strong>(that) he (should) report</strong> it to the police.</em></div>\n        "},{"h":"Modal verbs: must / might / may / could","body":"\n          <p><strong>Probabilidad presente o futura:</strong></p>\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li><em>may / might / could</em> = posibilidad (es posible)</li>\n            <li><em>must</em> = deducción (con evidencia)</li>\n            <li><em>can't</em> = deducción negativa</li>\n          </ul>\n          <div class=\"ex\"><em>The lights are on — they <strong>must be</strong> home.</em></div>\n          <div class=\"ex\"><em>She <strong>can't be</strong> serious!</em></div>\n          <p><strong>Probabilidad pasada (modal + have + pp):</strong></p>\n          <div class=\"ex\"><em>He <strong>must have left</strong> already.</em></div>\n          <div class=\"ex\"><em>I <strong>might have offended</strong> him.</em></div>\n          <div class=\"ex\"><em>It <strong>can't have been</strong> her.</em></div>\n          <p><strong>May/might + well</strong> = bastante probable:</p>\n          <div class=\"ex\"><em>She <strong>may well win</strong> an Oscar.</em></div>\n        "}],"quiz":[{"q":"<em>She insisted ___ the bill.</em>","o":["to pay","on paying","paying","that pay"],"a":1,"fb":"<em>Insist on + -ing</em>."},{"q":"He looks exhausted. He ___ all night.","o":["must work","must be working","must have worked","must have been working"],"a":3,"fb":"Deducción sobre acción que se prolongó: <em>must have been working</em>."},{"q":"<em>She told me ___.</em>","o":["that to wait","to waiting","to wait","wait"],"a":2,"fb":"<em>Tell + obj + to-inf</em>."}]},{"n":5,"t":"Relative clauses · Hypothetical past · Question tags","sections":[{"h":"Defining vs non-defining relative clauses","body":"\n          <p><strong>Defining</strong> = información esencial (sin coma):</p>\n          <div class=\"ex\"><em>The book <strong>that I bought</strong> was expensive.</em></div>\n          <p><strong>Non-defining</strong> = información extra (con comas, NO se puede usar <em>that</em>):</p>\n          <div class=\"ex\"><em>My father, <strong>who lived in Madrid</strong>, was a doctor.</em></div>\n          <p>Pronombres: <em>who</em> (personas), <em>which</em> (cosas), <em>that</em> (solo defining), <em>whose</em> (posesión), <em>where</em> (lugar), <em>when</em> (tiempo), <em>why</em> (razón).</p>\n        "},{"h":"Hypothetical past situations","body":"\n          <div class=\"struct\">wish / if only + past perfect = arrepentimiento del pasado</div>\n          <div class=\"ex\"><em><strong>I wish I had told</strong> him the truth.</em></div>\n          <div class=\"struct\">would / might / could + have + pp = especulación pasada</div>\n          <div class=\"ex\"><em>If you'd been there, he <strong>would have helped</strong> you.</em></div>\n          <div class=\"struct\">had + S + pp = inversión condicional (formal)</div>\n          <div class=\"ex\"><em><strong>Had he stayed</strong> longer, he would have met Brad.</em></div>\n          <div class=\"struct\">should have + pp = crítica / arrepentimiento</div>\n          <div class=\"ex\"><em>You <strong>should have invited</strong> him.</em></div>\n          <div class=\"struct\">suppose / supposing / imagine + clausula = ¿y si?</div>\n          <div class=\"ex\"><em><strong>Suppose he'd invited</strong> you, what would you have said?</em></div>\n        "},{"h":"Question tags","body":"\n          <p>Concordancia inversa con el verbo principal:</p>\n          <div class=\"ex\"><em>You've seen it, <strong>haven't you</strong>?</em></div>\n          <div class=\"ex\"><em>She doesn't smoke, <strong>does she</strong>?</em></div>\n          <p><strong>Same-way tags</strong> (positivo + positivo) → expresan sorpresa, interés, sarcasmo:</p>\n          <div class=\"ex\"><em>'He graduated last year.' 'So he went to university, <strong>did he</strong>?'</em></div>\n          <p><strong>Casos especiales:</strong></p>\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li><em>I am</em> → <em>…, aren't I?</em></li>\n            <li>Imperativos → <em>…, will you? / won't you?</em></li>\n            <li><em>Let's…</em> → <em>…, shall we?</em></li>\n            <li><em>Don't…</em> → <em>…, will you?</em></li>\n          </ul>\n        "}],"quiz":[{"q":"Choose the correct sentence:","o":["My brother, that lives in Paris, is a chef.","My brother who lives in Paris is a chef.","My brother, who lives in Paris, is a chef.","My brother, which lives in Paris, is a chef."],"a":2,"fb":"Non-defining: comas + <em>who</em> (no <em>that</em>)."},{"q":"<em>___ studied harder, I would have passed.</em>","o":["If I have","Had I","If I would have","Have I"],"a":1,"fb":"Inversión condicional 3ª: <em>Had + S + pp</em>."},{"q":"<em>Let's go for a coffee, ___?</em>","o":["don't we","shall we","will we","do we"],"a":1,"fb":"Tras <em>Let's</em>, el tag siempre es <em>shall we</em>."}]},{"n":6,"t":"Passives · Causative have · need + gerund","sections":[{"h":"Pasivas — usos","body":"\n          <p>Usamos pasivas para:</p>\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li>Crear un estilo formal/objetivo</li>\n            <li>Centrarnos en la acción o el receptor</li>\n            <li>Cuando el agente es desconocido, obvio o irrelevante</li>\n          </ul>\n          <div class=\"ex\"><em>Over 50,000 workers <strong>have been made</strong> redundant.</em></div>\n          <div class=\"ex\"><em>The drink <strong>is sold</strong> in over 50 countries.</em></div>\n          <p class=\"small\">Evita <em>is being being</em>: en lugar de present perfect continuous pasivo, usa: <em>has recently been told</em>.</p>\n        "},{"h":"Causative have / get","body":"\n          <div class=\"struct\">have / get + object + past participle</div>\n          <p>= organizo que alguien lo haga por mí.</p>\n          <div class=\"ex\"><em>I <strong>had my hair cut</strong> yesterday.</em> (me lo cortaron)</div>\n          <div class=\"ex\"><em>She <strong>got her photos developed</strong> at the shop.</em></div>\n          <p>También con experiencias desagradables fuera de mi control:</p>\n          <div class=\"ex\"><em>He <strong>had his car stolen</strong>.</em></div>\n          <p>En imperativos informales: <em>Get your hair cut!</em></p>\n        "},{"h":"Need + gerund / passive infinitive","body":"\n          <p>Ambas formas indican que la acción <strong>debe hacerse</strong>:</p>\n          <div class=\"ex\"><em>The flat <strong>needs painting / needs to be painted</strong>.</em></div>\n        "},{"h":"Passive constructions with infinitive","body":"\n          <p>Verbos como <em>allege, believe, claim, consider, estimate, expect, know, report, rumour, say, think, understand</em> se usan en construcciones pasivas:</p>\n          <div class=\"struct\">It + be + pp + that-clause</div>\n          <div class=\"ex\"><em>It is believed that he is suffering from heart disease.</em></div>\n          <div class=\"struct\">S + be + pp + to-infinitive</div>\n          <div class=\"ex\"><em>He <strong>is reported to have spoken</strong> to the actress.</em></div>\n          <div class=\"ex\"><em>They <strong>were said to be delighted</strong>.</em></div>\n        "}],"quiz":[{"q":"<em>She ___ her car serviced last week.</em>","o":["did","had","made","got to"],"a":1,"fb":"Causative <em>had + obj + pp</em>."},{"q":"<em>The reports ___ false by the committee.</em>","o":["were considered to be","were considered to being","considered to be","are considered being"],"a":0,"fb":"Pasiva + to-inf: <em>were considered to be</em>."},{"q":"<em>The walls need ___.</em>","o":["paint","painting","to paint","being paint"],"a":1,"fb":"<em>Need + -ing</em> con sentido pasivo (también: <em>need to be painted</em>)."}]},{"n":7,"t":"Participle clauses · Ellipsis","sections":[{"h":"Present participle clauses (-ing)","body":"\n          <p>Sustituyen oraciones de relativo activas o expresan acciones simultáneas/anteriores.</p>\n          <div class=\"ex\"><em>The royal newly-weds <strong>waving to the crowd</strong> cheered them.</em> (= who were waving)</div>\n          <div class=\"ex\"><em><strong>Having checked</strong> the door, she went to bed.</em> (= After she had checked)</div>\n          <div class=\"ex\"><em><strong>Not knowing</strong> his address, I emailed instead.</em> (= because I didn't know)</div>\n        "},{"h":"Past participle clauses (pp)","body":"\n          <p>Sustituyen oraciones de relativo pasivas:</p>\n          <div class=\"ex\"><em>Residents <strong>affected by the flooding</strong> will receive compensation.</em></div>\n          <div class=\"ex\"><em>The building, <strong>damaged in the fire</strong>, has been demolished.</em></div>\n        "},{"h":"Ellipsis","body":"\n          <p>Omitimos palabras obvias por contexto, especialmente con <em>and, but, or</em>:</p>\n          <div class=\"ex\"><em>He made friends with some of the older boys and (the older boys) girls in the school.</em></div>\n          <p>Tras modales, podemos omitir el infinitivo:</p>\n          <div class=\"ex\"><em>'Is it time for dinner?' 'It must be — I'm starving.'</em></div>\n          <p>En conversación, omitimos <em>I/you</em> y auxiliares:</p>\n          <div class=\"ex\"><em>(Are you) Going on holiday?</em></div>\n          <div class=\"ex\"><em>(I) Can't find my keys!</em></div>\n        "}],"quiz":[{"q":"<em>___ all his homework, he went out.</em>","o":["Finishing","Having finished","Finished","Having been finishing"],"a":1,"fb":"Acción anterior y completada: <em>having + pp</em>."},{"q":"<em>The man ___ the suit is my uncle.</em>","o":["wear","wearing","wore","worn"],"a":1,"fb":"Active participle = who is wearing."},{"q":"<em>The cars ___ in Germany are very reliable.</em>","o":["making","made","make","that making"],"a":1,"fb":"Passive participle = which are made."}]},{"n":8,"t":"Noun phrases · Attitude adverbials · Discourse markers","sections":[{"h":"Compound nouns","body":"\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li><strong>noun + noun</strong>: <em>car keys, shellfish, salmon, bookshop</em></li>\n            <li><strong>noun + prep + noun</strong>: <em>a film about racism, my chances of success</em></li>\n            <li><strong>noun's + noun</strong>: <em>a man of average height, a decision of great importance</em></li>\n            <li><strong>noun + -'s + noun</strong> (animales/personas): <em>cat's eye, children's books</em></li>\n          </ul>\n        "},{"h":"Attitude adverbials","body":"\n          <p>Expresan la actitud del hablante hacia lo dicho:</p>\n          <table class=\"t\">\n            <tr><th>Adverb</th><th>Function</th></tr>\n            <tr><td>amazingly, surprisingly, curiously, funnily enough</td><td>sorpresa</td></tr>\n            <tr><td>ironically, oddly, predictably</td><td>resaltar contraste</td></tr>\n            <tr><td>regrettably, sadly, unfortunately</td><td>pesar</td></tr>\n            <tr><td>frankly, honestly, admittedly</td><td>franqueza</td></tr>\n            <tr><td>understandably, undoubtedly</td><td>certeza</td></tr>\n            <tr><td>surely, naturally, certainly</td><td>esperar acuerdo</td></tr>\n          </table>\n          <div class=\"ex\"><em><strong>Oddly enough,</strong> I don't feel sad about what happened.</em></div>\n          <div class=\"ex\"><em><strong>To start with,</strong> I have a lot of work; <strong>besides,</strong> I'm not into it.</em></div>\n        "},{"h":"Discourse markers","body":"\n          <p>Conectores que estructuran el discurso:</p>\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li><strong>Enumerar</strong>: first/firstly, secondly, finally, moreover, in addition</li>\n            <li><strong>Añadir</strong>: also, besides, what's more, on top of that</li>\n            <li><strong>Reformular</strong>: in other words, that is to say, I mean, what I'm saying is</li>\n            <li><strong>Contraste</strong>: however, nevertheless, on the other hand, yet, even so</li>\n            <li><strong>Cambiar tema</strong>: by the way, anyway, incidentally, as I was saying</li>\n            <li><strong>Resumir</strong>: in short, all in all, to sum up, ultimately</li>\n            <li><strong>Ejemplificar</strong>: for instance, take… for example, such as</li>\n          </ul>\n        "}],"quiz":[{"q":"Pick the best discourse marker: <em>I love sushi. ___, my husband hates it.</em>","o":["Therefore","However","Moreover","Besides"],"a":1,"fb":"Contraste claro: <em>however</em>."},{"q":"<em>___, the policeman arrived just in time.</em>","o":["Fortunately","Fortune","Fortunate","Fortunately enough"],"a":0,"fb":"Adverbio de actitud: <em>Fortunately</em>."},{"q":"Compound noun: <em>a holiday lasting two weeks</em> →","o":["a two weeks holiday","a two-week holiday","a two-weeks holiday","a holiday of two-weeks"],"a":1,"fb":"Compound adjective con número: SIN -s y con guión."}]},{"n":9,"t":"Modal verbs (will / would / shall) · Inversion","sections":[{"h":"Will & would — usos avanzados","body":"\n          <p><strong>Will</strong>:</p>\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li>Predicciones: <em>I think she'll pass.</em></li>\n            <li>Decisiones espontáneas: <em>I'll have the soup.</em></li>\n            <li>Promesas y ofertas: <em>I'll help you.</em></li>\n            <li>Hechos futuros: <em>He'll be eighteen tomorrow.</em></li>\n            <li>Hábitos típicos (presente): <em>She'll always wait for him.</em></li>\n            <li>Hechos generales / leyes científicas: <em>Water will boil at 100°C.</em></li>\n          </ul>\n          <p><strong>Would</strong>:</p>\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li>Hábitos pasados (acciones): <em>She would always wait for him.</em></li>\n            <li>Predicciones desde el pasado: <em>One day he would be famous.</em></li>\n            <li>Hipotético / cortesía: <em>I'd like a coffee.</em></li>\n          </ul>\n        "},{"h":"Shall","body":"\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li>Ofertas: <em>Shall I pick you up?</em></li>\n            <li>Sugerencias: <em>Shall we try that new restaurant?</em></li>\n            <li>Pedir consejo: <em>Where shall I put it?</em></li>\n            <li>Acuerdos formales (writing): <em>The Minister shall make a statement.</em></li>\n          </ul>\n        "},{"h":"Inversion (formal)","body":"\n          <p>Tras adverbios negativos/restrictivos, condicionales formales y tras <em>so/such…that</em>:</p>\n          <table class=\"t\">\n            <tr><td>Never before</td><td><em>Never before had I felt so happy.</em></td></tr>\n            <tr><td>Not only … but also</td><td><em>Not only did he lie, but he also stole.</em></td></tr>\n            <tr><td>Only when / Only after</td><td><em>Only when he left did I relax.</em></td></tr>\n            <tr><td>Were S to-inf</td><td><em>Were I to win, I'd buy a house.</em></td></tr>\n            <tr><td>Should S</td><td><em>Should you need help, call me.</em></td></tr>\n            <tr><td>So + adj + be + S that</td><td><em>So tired was she that she fell asleep.</em></td></tr>\n            <tr><td>Such + be + S that</td><td><em>Such was his fury that he shouted.</em></td></tr>\n          </table>\n        "}],"quiz":[{"q":"<em>___ I been older, I would have applied.</em>","o":["If","Have","Had","Would"],"a":2,"fb":"Inversión condicional 3ª."},{"q":"When I was a kid, I ___ visit my granny every weekend.","o":["used to","would","both A and B","was"],"a":2,"fb":"Acción habitual pasada: ambos funcionan."},{"q":"<em>___ he need help, he can call us.</em>","o":["If should","Should","Were","Had"],"a":1,"fb":"Inversión formal de <em>if</em>: <em>Should + S</em>."}]},{"n":10,"t":"Futures · Modal verbs (must / need / should)","sections":[{"h":"Maneras de hablar del futuro","body":"\n          <table class=\"t\">\n            <tr><th>Forma</th><th>Uso</th></tr>\n            <tr><td>present simple</td><td>horarios fijos: <em>The train leaves at 6.</em></td></tr>\n            <tr><td>present continuous</td><td>planes concretos: <em>I'm flying tomorrow.</em></td></tr>\n            <tr><td>going to + inf</td><td>intenciones, predicciones con evidencia: <em>Look! It's going to rain.</em></td></tr>\n            <tr><td>will + inf</td><td>predicciones, decisiones espontáneas, promesas</td></tr>\n            <tr><td>future perfect</td><td>acción terminada antes de X: <em>By 8, I'll have finished.</em></td></tr>\n            <tr><td>future continuous</td><td>acción en progreso en X: <em>This time tomorrow I'll be flying.</em></td></tr>\n            <tr><td>be to + inf</td><td>planes oficiales: <em>The PM is to visit Paris.</em></td></tr>\n            <tr><td>be about to / on the point of</td><td>inminente: <em>She's about to leave.</em></td></tr>\n            <tr><td>be due to / be set to</td><td>programado: <em>She's due to arrive at 9.</em></td></tr>\n            <tr><td>be bound to / certain to</td><td>seguro: <em>He's bound to be late.</em></td></tr>\n          </table>\n        "},{"h":"Must / mustn't","body":"\n          <p><strong>Must</strong>: obligación interna o consejo fuerte:</p>\n          <div class=\"ex\"><em>You <strong>must try</strong> the cheesecake.</em></div>\n          <p><strong>Mustn't</strong>: prohibición. <strong>Have to</strong>: obligación externa.</p>\n          <div class=\"ex\"><em>You <strong>mustn't</strong> use your phone here.</em> ≠ <em>I <strong>don't have to</strong> work tomorrow.</em> (no es necesario)</div>\n        "},{"h":"Need / needn't","body":"\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li><em>I need to leave</em> (verbo normal)</li>\n            <li><em>I needn't leave</em> = no es necesario (modal, sin <em>to</em>)</li>\n            <li><em>I needn't have left</em> = no era necesario, pero lo hice</li>\n            <li><em>I didn't need to leave</em> = no era necesario (y posiblemente no lo hice)</li>\n          </ul>\n        "},{"h":"Should / ought to","body":"\n          <p>Consejo, opinión:</p>\n          <div class=\"ex\"><em>You <strong>should</strong> see a doctor.</em></div>\n          <p>Crítica pasada:</p>\n          <div class=\"ex\"><em>You <strong>shouldn't have said</strong> that.</em></div>\n          <p>Probabilidad alta:</p>\n          <div class=\"ex\"><em>The plane <strong>should land</strong> at 5.</em></div>\n        "}],"quiz":[{"q":"<em>This time tomorrow, I ___ on a beach.</em>","o":["will lie","will be lying","will have lain","am lying"],"a":1,"fb":"Acción en progreso en momento futuro: <em>future continuous</em>."},{"q":"<em>You ___ told me — I already knew!</em>","o":["mustn't have","didn't have to","needn't have","didn't need to"],"a":2,"fb":"<em>Needn't have + pp</em> = no era necesario y aun así lo hiciste."},{"q":"<em>By the time you read this, I ___.</em>","o":["will leave","will have left","am leaving","will be leaving"],"a":1,"fb":"<em>By the time + presente</em> → future perfect."}]},{"n":11,"t":"Determiners, pronouns & quantifiers · Hypothetical present/future","sections":[{"h":"Determiners (algunas trampas C1)","body":"\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li><em>some</em>: cantidad indefinida pequeña en afirmativas / oferta-petición educada</li>\n            <li><em>any</em>: en negativas/preguntas; también 'cualquiera' en afirmativas</li>\n            <li><em>every</em>: enfatiza todos individualmente; va con singular</li>\n            <li><em>each</em>: dos o más, individual</li>\n            <li><em>either / neither</em>: dos elementos</li>\n            <li><em>none</em>: pronombre, puede ser singular o plural</li>\n            <li><em>most / most of the</em>: la mayoría / la mayoría de los…</li>\n          </ul>\n          <div class=\"ex\"><em><strong>Most</strong> people like pizza.</em> (en general)</div>\n          <div class=\"ex\"><em><strong>Most of</strong> my friends are vegetarian.</em></div>\n        "},{"h":"Hypothetical present & future","body":"\n          <div class=\"struct\">would rather + S + past simple = preferir que otro haga algo</div>\n          <div class=\"ex\"><em>I'd rather you <strong>didn't smoke</strong>.</em></div>\n          <div class=\"struct\">it's (high/about) time + past simple = ya es hora</div>\n          <div class=\"ex\"><em>It's <strong>high time you went</strong> to bed.</em></div>\n          <div class=\"struct\">wish / if only + past simple = deseo presente</div>\n          <div class=\"ex\"><em>I wish I <strong>spoke</strong> French.</em></div>\n          <div class=\"struct\">wish + would = queja por costumbre molesta de otro</div>\n          <div class=\"ex\"><em>I wish he <strong>wouldn't tap</strong> his fingers!</em></div>\n          <div class=\"struct\">suppose / imagine + past simple = ¿y si?</div>\n          <div class=\"ex\"><em>Suppose you <strong>lost</strong> your job. What would you do?</em></div>\n        "},{"h":"Prepositional phrases comunes","body":"\n          <p>Ver pestaña <strong>Prepositions</strong> para la lista completa, incluye joyas como:</p>\n          <p class=\"bigword\" style=\"margin:6px 0\">at fault · at gunpoint · at leisure · at stake · by chance · by nature · in arrears · in custody · in retrospect · in stock · off balance · on hold · on leave · out of breath · out of character · under suspicion · without a hitch</p>\n        "}],"quiz":[{"q":"<em>It's high time you ___ a haircut.</em>","o":["have","had","get","to have"],"a":1,"fb":"Tras <em>It's high time</em> → past simple."},{"q":"<em>I'd rather you ___ here.</em>","o":["don't smoke","didn't smoke","not smoke","wouldn't smoke"],"a":1,"fb":"<em>I'd rather + S + past simple</em>."},{"q":"<em>___ of my friends came to the party.</em>","o":["Most","The most","Almost","Almost all"],"a":0,"fb":"<em>Most + plural noun</em> (sin artículo, hablando en general)."}]},{"n":12,"t":"Plurals & number · Compound adjectives · Verb affixes","sections":[{"h":"Plurales especiales","body":"\n          <ul style=\"padding-left:20px;font-size:13.5px\">\n            <li>Mismas forma sing/plural: <em>sheep, deer, fish, salmon, aircraft, species</em></li>\n            <li>Irregulares: <em>child→children, foot→feet, mouse→mice, woman→women</em></li>\n            <li>Solo plural (con verbo plural): <em>scissors, trousers, jeans, pyjamas, glasses, tweezers</em></li>\n            <li>Solo singular pero parece plural: <em>news, mathematics, physics, politics, economics, ethics</em></li>\n            <li>Colectivos (sing o plur): <em>family, team, government, committee, audience, band</em></li>\n            <li>'The + adj' → plural: <em>the rich, the poor, the elderly, the unemployed</em></li>\n          </ul>\n        "},{"h":"Compound adjectives","body":"\n          <table class=\"t\">\n            <tr><th>Patrón</th><th>Ejemplo</th></tr>\n            <tr><td>num + noun (sing!)</td><td>a two-week holiday, a five-star hotel</td></tr>\n            <tr><td>adj + noun (-ed)</td><td>open-minded, good-natured, blue-eyed</td></tr>\n            <tr><td>adv + pp</td><td>well-known, badly-paid, highly-motivated</td></tr>\n            <tr><td>noun + pp</td><td>handmade, sun-dried, time-consuming</td></tr>\n            <tr><td>noun + -ing</td><td>thought-provoking, mouth-watering, breathtaking</td></tr>\n            <tr><td>num + age/height/etc</td><td>a 30-year-old man, a 6-foot wall</td></tr>\n          </table>\n        "},{"h":"Verb affixes","body":"\n          <table class=\"t\">\n            <tr><th>Affix</th><th>Meaning</th><th>Examples</th></tr>\n            <tr><td>en- / em-</td><td>causar / poner en</td><td>enable, enrich, empower, embed</td></tr>\n            <tr><td>-en (sufijo)</td><td>causar</td><td>brighten, harden, sweeten</td></tr>\n            <tr><td>-ise / -ize</td><td>convertir en</td><td>modernise, criticise, realise</td></tr>\n            <tr><td>-ify</td><td>hacer</td><td>simplify, classify, intensify</td></tr>\n            <tr><td>re-</td><td>otra vez</td><td>rewrite, replenish, retract</td></tr>\n            <tr><td>over-</td><td>demasiado</td><td>overdo, overshadow, overestimate</td></tr>\n            <tr><td>under-</td><td>insuficiente</td><td>underestimate, undermine, underfund</td></tr>\n            <tr><td>mis-</td><td>mal</td><td>misunderstand, misjudge, mistreat</td></tr>\n            <tr><td>out-</td><td>superar</td><td>outperform, outlive, outshine</td></tr>\n          </table>\n        "}],"quiz":[{"q":"Choose the correct compound adjective: <em>a film that lasts three hours</em>","o":["a three-hours film","a three hour film","a three-hour film","a three-hours-film"],"a":2,"fb":"Compound adj con número: guión + singular."},{"q":"<em>The news ___ very depressing today.</em>","o":["are","is","be","were"],"a":1,"fb":"<em>News</em> es incontable singular."},{"q":"Complete: <em>to make wider</em> = ","o":["widen","widing","widely","wideness"],"a":0,"fb":"Sufijo <em>-en</em> verbal: <em>wide → widen</em>."}]}],
  REF_GRAMMAR: [{"id":"G1","title":"Tiempos verbales: simple vs. continuo","units":"U1","subtitle":"Cuándo usar la forma simple y cuándo la continua","topics":[{"name":"Idea general","rules":["Las formas continuas describen un comportamiento <strong>temporal</strong>.","Las simples expresan <strong>estados</strong>, <strong>rutinas</strong> o <strong>verdades generales</strong>."],"examples":["She <strong>works</strong> here. (general, permanente)","She <strong>is working</strong> here. (temporal — quizá unos meses)","He <strong>is being</strong> very rude tonight."]},{"name":"Stative verbs — NO continuous","rules":["Verbos de estado (know, believe, want, need, own, seem, understand, prefer) no se usan en continuo.","<em>have</em> SÍ puede ser continuo cuando significa \"estar haciendo algo\"."],"examples":["❌ I am knowing → ✅ I <strong>know</strong> the answer.","✅ I'm <strong>having</strong> lunch.","I <strong>understand</strong> what you mean."]},{"name":"Always/forever + continuous = queja","rules":["<em>always, forever, continually</em> + continuous → expresa molestia.","Adverbios de duración: <em>for X, all morning, since 8</em>."],"examples":["He <strong>is always interrupting</strong> me! (queja)","I <strong>have been waiting</strong> for over an hour.","She <strong>is constantly complaining</strong>."]},{"name":"Substitution & Reference","rules":["<strong>do/does/did</strong> sustituyen al verbo para no repetir.","<strong>so/not</strong> sustituyen cláusulas con think, believe, hope, suppose.","<strong>this/that/these/those</strong> remiten a algo mencionado."],"examples":["Will it rain? — I hope <strong>not</strong>.","He doesn't like coffee, but his sister <strong>does</strong>.","<em>That</em> is exactly what I meant."]}]},{"id":"G2","title":"Gerundios, infinitivos y comparaciones","units":"U2","subtitle":"-ing vs. to + inf · estructuras comparativas","topics":[{"name":"Gerundios (-ing)","rules":["Como sujeto: <em>Smoking is bad</em>.","Tras preposiciones: <em>good at, interested in, fond of</em>.","Tras verbos: <em>enjoy, finish, mind, avoid, suggest, recommend, deny, miss, give up</em>."],"examples":["I enjoy <strong>cooking</strong>.","She's interested in <strong>learning</strong> Japanese.","He suggested <strong>going</strong> for a walk."]},{"name":"Infinitivos (to + inf)","rules":["Propósito: <em>I came <strong>to learn</strong></em>.","Tras adjetivos: <em>happy, glad, eager, hard, difficult, easy</em>.","Tras verbos: <em>want, hope, decide, agree, promise, refuse, plan, manage, learn</em>."],"examples":["She decided <strong>to take</strong> the exam.","It's easy <strong>to make</strong> mistakes.","I want <strong>to help</strong>."]},{"name":"Verbos con cambio de significado (-ing / to-inf)","rules":["<strong>remember + -ing</strong> = recuerdo del pasado. <strong>remember to</strong> = acordarse de hacerlo.","<strong>stop + -ing</strong> = dejar de. <strong>stop to</strong> = parar PARA hacer.","<strong>try + -ing</strong> = probar. <strong>try to</strong> = intentar.","<strong>regret + -ing</strong> = arrepentirse. <strong>regret to</strong> = lamento decir."],"examples":["I remember <strong>locking</strong> the door. (lo recuerdo)","Remember <strong>to lock</strong> the door. (acuérdate)","He stopped <strong>smoking</strong>. (dejó)","He stopped <strong>to smoke</strong>. (paró para fumar)"]},{"name":"Comparaciones avanzadas","rules":["<strong>The more… the more…</strong> = cuanto más… más…","<strong>Far / much / a lot</strong> + comparative → enfatiza.","<strong>Not as… as</strong> = no tan… como.","<strong>Just as… as</strong> = igual de."],"examples":["<strong>The more</strong> you practise, <strong>the better</strong> you get.","She is <strong>far older</strong> than her sister.","He's <strong>nowhere near as</strong> good <strong>as</strong> his father.","It's <strong>just as</strong> important <strong>as</strong> grammar."]}]},{"id":"G3","title":"Énfasis, inversión y cleft sentences","units":"U3 + U9","subtitle":"Estructuras para destacar partes de la frase","topics":[{"name":"Auxiliary verbs para enfatizar","rules":["En afirmativas, <strong>do/does/did</strong> antes del verbo enfatiza.","Stress en el auxiliar marca contraste."],"examples":["I <strong>do</strong> remember you! (sí me acuerdo)","She <strong>did</strong> tell me.","He <strong>does</strong> enjoy the party — really!"]},{"name":"Fronting","rules":["Mueves un elemento al inicio para enfatizar.","Adjetivos, cuantificadores, objetos."],"examples":["<strong>Really good</strong> it was — the best film I've seen.","<strong>Far more important</strong> is the candidate's experience.","<strong>What I really need</strong> is a holiday."]},{"name":"Cleft sentences","rules":["<strong>It-cleft</strong>: It + be + ELEMENTO + that/who…","<strong>Wh-cleft</strong>: What/Where/Why + cláusula + is/was + elemento.","<strong>All-cleft</strong>: All + cláusula + is/was + elemento."],"examples":["<strong>It was</strong> his honesty <strong>that</strong> impressed everyone.","<strong>What I love is</strong> the silence.","<strong>All I ask is</strong> your honesty."]},{"name":"Inversion negativa (U9)","rules":["Tras adverbio negativo/restrictivo al inicio, S+aux invierten.","Triggers: <em>Never, Rarely, Seldom, Hardly, Scarcely, No sooner, Not only, Little, Only when, Under no circumstances</em>."],"examples":["<strong>Never have I</strong> seen such dedication.","<strong>Not only did</strong> she pass, <strong>but</strong> she came top.","<strong>Only when</strong> you finish <strong>can</strong> you leave.","<strong>Hardly had</strong> she arrived <strong>when</strong> the phone rang."]}]},{"id":"G4","title":"Reported speech","units":"U4","subtitle":"Cómo reportar lo que alguien dijo","topics":[{"name":"Verb + that-clause","rules":["Verbos: <em>add, admit, announce, claim, complain, confirm, mention, point out, predict, remind, repeat, reply, say</em>.","Backshift: presente → pasado, pasado → past perfect, will → would.","No cambia si el verbo de reporte está en presente."],"examples":["\"I live here\" → She said <strong>(that) she lived there</strong>.","\"I don't want to go\" → He said <strong>(that) he didn't want to go</strong>.","She admitted <strong>(that) she had lied</strong>."]},{"name":"Verb + (object) + infinitive","rules":["Sin objeto: <em>agree, claim, demand, offer, promise, refuse, threaten</em> + to-inf.","Con objeto: <em>advise, ask, beg, encourage, instruct, invite, order, persuade, tell, urge, warn</em> + obj + to-inf."],"examples":["She offered <strong>to help</strong>.","He warned <strong>her not to leave</strong>.","They persuaded <strong>me to apply</strong>."]},{"name":"Verb + gerund / preposition","rules":["Verbos + -ing: <em>admit, deny, mention, recommend, suggest</em>.","Verbos + preposición: <em>apologize for, blame for, congratulate on, accuse of, insist on</em>."],"examples":["He admitted <strong>breaking</strong> the window.","She apologised <strong>for being</strong> late.","They accused him <strong>of stealing</strong>."]},{"name":"Reported questions","rules":["Yes/No → if / whether + orden normal SV.","Wh-questions → Wh + orden normal SV.","Sin signo de interrogación."],"examples":["\"Are you coming?\" → He asked <strong>if I was coming</strong>.","\"Why did you go?\" → She asked <strong>why I had gone</strong>.","\"Do you do that?\" → They asked <strong>whether I did that</strong>."]},{"name":"Modales en reported speech","rules":["can → could · will → would · may → might · must → had to (necesidad) o must (deducción).","could/would/should/might → no cambian."],"examples":["\"I can swim\" → He said <strong>he could swim</strong>.","\"You must go\" → She told me <strong>I had to go</strong>.","\"It might rain\" → He warned <strong>it might rain</strong>."]}]},{"id":"G5","title":"Modales: deducción, posibilidad, obligación","units":"U4 + U9 + U10","subtitle":"must / might / may / could / will / would / shall / need / should","topics":[{"name":"must, might, may, could — presente","rules":["<strong>may/might/could</strong> = posibilidad (50/50).","<strong>must</strong> = deducción casi segura positiva.","<strong>can't</strong> = deducción casi segura negativa.","<strong>may well / might well</strong> = bastante probable."],"examples":["She <strong>might</strong> be at home — I'm not sure.","He <strong>must</strong> be exhausted.","It <strong>can't</strong> be true.","You <strong>may well</strong> win this one."]},{"name":"Modal perfects — pasado","rules":["<strong>must have + pp</strong> = deducción positiva pasada.","<strong>can't have / couldn't have + pp</strong> = deducción negativa pasada.","<strong>may/might have + pp</strong> = posibilidad pasada.","<strong>should have + pp</strong> = crítica / arrepentimiento.","<strong>could have + pp</strong> = capacidad no usada.","<strong>needn't have + pp</strong> = lo hiciste pero no hacía falta."],"examples":["She <strong>must have left</strong> already — her car's gone.","You <strong>shouldn't have said</strong> that.","I <strong>could have won</strong> if I'd trained more.","You <strong>needn't have brought</strong> wine — there was plenty."]},{"name":"will / would / shall","rules":["<strong>will</strong> = predicción, intención, hábito presente.","<strong>would</strong> = hábitos pasados, peticiones, hipotético.","<strong>shall</strong> = ofrecimiento/sugerencia formal."],"examples":["He <strong>will</strong> always cook fish on Fridays.","When I was young, we <strong>would</strong> spend summers by the sea.","<strong>Shall I</strong> open the window?","He <strong>wouldn't</strong> listen to me."]},{"name":"must vs. have to vs. should","rules":["<strong>must</strong> = obligación interna (yo creo que debes).","<strong>have to</strong> = obligación externa (regla/ley).","<strong>mustn't</strong> = prohibición.","<strong>don't have to / needn't</strong> = no es necesario.","<strong>should/ought to</strong> = consejo."],"examples":["You <strong>must</strong> try this cake.","I <strong>have to</strong> wear a uniform at work.","You <strong>mustn't</strong> tell anyone.","You <strong>don't have to</strong> wait.","You <strong>should</strong> see a doctor."]}]},{"id":"G6","title":"Relativas y condicionales hipotéticos","units":"U5 + U11","subtitle":"Defining vs. non-defining · 3rd & mixed conditionals · wish/if only","topics":[{"name":"Defining relatives","rules":["Sin comas. Info esencial.","Pronombres: <em>who, that, which, whose</em>.","Se puede omitir el pronombre si es objeto."],"examples":["The man <strong>who lives</strong> next door is a doctor.","The book <strong>(that) I read</strong> was great.","The artist <strong>whose</strong> work I admire is Picasso."]},{"name":"Non-defining relatives","rules":["Con comas. Info extra, no esencial.","NO se usa <em>that</em>. Solo <em>who/which/whose</em>.","No se puede omitir el pronombre."],"examples":["My father, <strong>who lives</strong> in Madrid, is retired.","The Mona Lisa, <strong>which is</strong> in the Louvre, is famous.","Mr Smith, <strong>whose</strong> son I teach, called."]},{"name":"Hypothetical past (3rd / mixed)","rules":["<strong>3rd cond</strong>: If + past perfect, would have + pp.","<strong>Mixed cond</strong>: If + past perfect, would + base. (causa pasada → resultado presente)","<strong>Inverted</strong>: Had + suj + pp (formal, sin if)."],"examples":["If she <strong>had studied</strong>, she <strong>would have passed</strong>.","If I <strong>had learned</strong> French, I <strong>would be</strong> in Paris now. (mixed)","<strong>Had I known</strong>, I would have told you."]},{"name":"wish / if only / would rather","rules":["<strong>wish/if only + past simple</strong> = deseo presente irreal.","<strong>wish/if only + past perfect</strong> = deseo sobre el pasado.","<strong>wish + would</strong> = queja sobre comportamiento ajeno.","<strong>would rather + past simple</strong> = preferiría que (otro) hiciera."],"examples":["I <strong>wish I knew</strong> the answer.","I <strong>wish I had studied</strong> harder.","I <strong>wish she would stop</strong> shouting!","I'd <strong>rather you didn't</strong> wear that."]},{"name":"Question tags & It's (high) time","rules":["Tag = auxiliar + pronombre, polaridad opuesta.","Same-way tag → sarcasmo o sorpresa.","<strong>It's (high) time + past simple</strong>: idea de presente, sentido de queja."],"examples":["You've met Brad, <strong>haven't you</strong>?","So he just walked out, <strong>did he</strong>? (sarcasmo)","<strong>It's high time</strong> you <strong>got</strong> a haircut."]}]},{"id":"G7","title":"Pasivas y estructuras impersonales","units":"U6","subtitle":"Pasiva, causative have/get, need + -ing, passive infinitives","topics":[{"name":"Pasiva — forma y uso","rules":["Forma: <strong>be + past participle</strong>.","Uso: cuando el agente no es importante o queremos enfocar acción.","En contextos formales, noticias y textos académicos.","Para evitar pasiva continua perfecta, se usa <strong>get</strong>."],"examples":["The thief <strong>was caught</strong> yesterday.","Over 50,000 workers <strong>have been made</strong> redundant.","He <strong>got fired</strong> last week."]},{"name":"Cuándo mencionar el agente","rules":["Cuando la info es nueva o relevante.","Si el agente es obvio, desconocido o irrelevante, se omite."],"examples":["First prize was won <strong>by Mr Q Hunt</strong>.","My bike was stolen. (no se sabe por quién)","The drink <strong>is sold in</strong> over 50 countries."]},{"name":"Causative have/get","rules":["<strong>have + obj + pp</strong> = mandar hacer algo.","<strong>get + obj + pp</strong> = lo mismo, más informal.","También para cosas malas que te pasan."],"examples":["I <strong>had my car serviced</strong> yesterday.","She's <strong>getting her hair cut</strong> tomorrow.","We <strong>had our flat broken into</strong> last week."]},{"name":"need + -ing (pasivo)","rules":["<strong>need + -ing</strong> tiene significado pasivo (= needs to be done)."],"examples":["The car <strong>needs servicing</strong>. = needs to be serviced.","Your hair <strong>needs cutting</strong>.","The walls <strong>need painting</strong>."]},{"name":"Passive reporting (impersonal)","rules":["<strong>It is said/believed/reported + that-clause</strong>: registro académico.","<strong>Subject + is said/believed + to-inf</strong>: registro periodístico."],"examples":["<strong>It is widely believed that</strong> exercise improves mood.","She <strong>is reported to have spoken</strong> to officials.","He <strong>is thought to be hiding</strong>."]}]},{"id":"G8","title":"Participle clauses, elipsis y noun phrases","units":"U7 + U8","subtitle":"Cláusulas reducidas, elipsis y discourse markers","topics":[{"name":"Participle clauses","rules":["<strong>-ing</strong> → acción simultánea o consecuencia.","<strong>Past participle</strong> → significado pasivo o anterior.","<strong>Having + pp</strong> → acción anterior a la principal.","Sustituyen a relativas o cláusulas de tiempo."],"examples":["<strong>Standing</strong> by the window, she watched the rain.","<strong>Defeated</strong> at every turn, he gave up.","<strong>Having read</strong> the report, she called a meeting."]},{"name":"Ellipsis","rules":["Omitir palabras evidentes tras <em>and/but/or</em>.","Tras un modal el sujeto y el verbo pueden elidirse.","En conversación informal, S y aux iniciales pueden caerse."],"examples":["He made friends and <strong>(he) got</strong> in.","I've seen the film but Mike hasn't <strong>(seen it)</strong>.","Was Paul there? — He might <strong>(have been)</strong>."]},{"name":"Noun phrases complejos","rules":["Noun + noun: primer sustantivo modifica al segundo.","Singular en el primer noun: <em>a 3-day course</em>.","Algunos compuestos: tea bag, shellfish, maths teacher."],"examples":["She loves <strong>shellfish</strong>.","It's a <strong>nine-to-five</strong> job.","He works as a <strong>maths teacher</strong>."]},{"name":"Attitude adverbials","rules":["Expresan actitud del hablante: <em>amazingly, curiously, funnily enough, ironically, oddly, regrettably, sadly, surprisingly</em>.","Suelen ir al inicio de la frase."],"examples":["<strong>Surprisingly</strong>, he passed the test.","<strong>Funnily enough</strong>, we'd never noticed it.","<strong>Regrettably</strong>, we have to postpone."]},{"name":"Discourse markers","rules":["Enumerar: <em>firstly, secondly, finally</em>.","Añadir: <em>moreover, on top of that, what is more</em>.","Generalizar: <em>on the whole, broadly speaking</em>.","Cambiar tema: <em>anyway, by the way, incidentally</em>.","Aclarar: <em>actually, in fact</em>."],"examples":["<strong>By the way</strong>, did I tell you?","<strong>Actually</strong>, it was Joe.","<strong>On the whole</strong>, I agree."]}]},{"id":"G9","title":"Futuros, determinantes y plurales","units":"U10 + U11 + U12","subtitle":"Formas del futuro · cuantificadores · singular/plural","topics":[{"name":"Formas del futuro","rules":["<strong>present simple</strong>: horarios fijos.","<strong>present continuous</strong>: planes con fecha.","<strong>going to</strong>: intención, evidencia presente.","<strong>will</strong>: decisión espontánea, predicción.","<strong>future perfect</strong>: algo completado antes de un punto futuro.","<strong>future continuous</strong>: acción en progreso en momento futuro.","<strong>be + bound/sure/likely/certain/due/about to</strong> + inf: predicciones."],"examples":["The train <strong>leaves</strong> at 6.","I <strong>'m meeting</strong> her at 4 tomorrow.","She's <strong>going to</strong> study medicine.","By next year, I <strong>will have lived</strong> here for 5 years.","I <strong>'ll be flying</strong> at 9 a.m.","She's <strong>bound to</strong> win."]},{"name":"Determiners & quantifiers","rules":["<strong>each, every, neither, either</strong> + singular countable.","<strong>plenty of, a lot of, lots of</strong> = mucho/a (informal).","<strong>few/little</strong> (negativo) vs. <strong>a few/a little</strong> (positivo).","<strong>several, various</strong> = varios/as."],"examples":["<strong>Each</strong> child <strong>was</strong> given a prize.","<strong>Neither</strong> answer <strong>is</strong> correct.","<strong>Few</strong> people came. (negativo)","<strong>A few</strong> people came. (positivo)"]},{"name":"Hypothetical present/future","rules":["<strong>2nd cond</strong>: If + past simple, would + base.","<strong>suppose/imagine/supposing</strong> = if (informal).","<strong>were to + inf</strong>: muy improbable, formal.","<strong>Inverted</strong>: Were I…, Should you…, Had you… (sin if)."],"examples":["If I <strong>were</strong> rich, I <strong>'d travel</strong>.","<strong>Suppose</strong> you lost your job.","<strong>Were they to win</strong>, we might celebrate.","<strong>Should you have</strong> any questions, please ask."]},{"name":"Plurals & number","rules":["Animales/peces a veces mismo singular y plural: <em>sheep, deer, fish</em>.","Plurales irregulares: <em>child/children, foot/feet, person/people</em>.","Solo plural: <em>scissors, trousers, jeans, glasses</em>.","Colectivos: <em>family, team, government</em> singular o plural (UK).","Latino/griego: <em>crisis/crises, criterion/criteria, phenomenon/phenomena</em>."],"examples":["Two <strong>sheep are</strong> grazing.","<strong>My trousers are</strong> in the wash.","The team <strong>have/has</strong> won. (UK ambos)","Several <strong>phenomena</strong> were observed."]}]}],
  GRAMMAR_WEEKS: [{"num":"01","title":"Inversión Sintáctica","theme":"Inversion · Fronting · Negative Adverbials","days":[{"d":"Lunes","t":"Never / Rarely / Seldom → auxiliary inversion","ex":"\"Never have I seen such dedication.\" / \"Rarely does one encounter this.\""},{"d":"Martes","t":"Not only / No sooner / Hardly / Scarcely","ex":"\"Not only did she pass, but she came top.\" / \"No sooner had he arrived than...\""},{"d":"Miércoles","t":"Only when / Only then / Only by","ex":"\"Only when you finish can you leave.\" / \"Only by working together can we...\""},{"d":"Jueves","t":"Under no circumstances / In no way / At no time","ex":"\"Under no circumstances should you sign.\" / \"At no time was the data shared.\""},{"d":"Viernes","t":"Fronting for emphasis: adjectives, adverbs, objects","ex":"\"Remarkable though it may seem...\" / \"Such was his dedication that...\""}]},{"num":"02","title":"Cleft Sentences","theme":"It-clefts · Wh-clefts · Pseudo-clefts","days":[{"d":"Lunes","t":"It + be + FOCUS + that/who","ex":"\"It was his honesty that impressed everyone.\" / \"It is climate change that we must address.\""},{"d":"Martes","t":"What-clefts (pseudo-clefts)","ex":"\"What she wanted was recognition.\" / \"What matters most is consistency.\""},{"d":"Miércoles","t":"All + cleft, The reason/place/time + that","ex":"\"All I ask is your honesty.\" / \"The reason she left is that she felt undervalued.\""},{"d":"Jueves","t":"Clefts in writing: academic and formal contexts","ex":"Practice rewriting paragraph sentences with cleft structures for emphasis."},{"d":"Viernes","t":"Mixed practice: Inversión + Cleft","ex":"Transform 10 neutral sentences into emphatic structures."}]},{"num":"03","title":"Conditionals Avanzados","theme":"Mixed · Inverted · With unless/provided/as long as","days":[{"d":"Lunes","t":"Mixed conditional: past condition → present result","ex":"\"If I had studied medicine, I would be a doctor now.\""},{"d":"Martes","t":"Inverted conditionals (formal): Had / Were / Should","ex":"\"Had she known, she would have told us.\" / \"Were it not for you...\""},{"d":"Miércoles","t":"Unless / Provided that / As long as / On condition that","ex":"\"Unless you act now, it will be too late.\" / \"Provided that you comply...\""},{"d":"Jueves","t":"Supposing / Assuming / What if...","ex":"\"Supposing you had the chance — what would you do?\""},{"d":"Viernes","t":"Wish / If only / Would rather — tres tiempos","ex":"\"I wish I had listened.\" / \"If only she would stop.\" / \"I'd rather you didn't.\""}]},{"num":"04","title":"Pasivas Avanzadas","theme":"Passive reporting · Causative · Passive with infinitive","days":[{"d":"Lunes","t":"It is said / believed / reported / thought + that-clause","ex":"\"It is widely believed that the policy will change.\" (académico)"},{"d":"Martes","t":"Subject + is said/believed/reported + to-infinitive","ex":"\"She is reported to have spoken to officials.\" / \"He is believed to be hiding.\""},{"d":"Miércoles","t":"Causative have/get: have + obj + pp","ex":"\"I had my car serviced.\" / \"She got her hair cut.\" / \"We had our flat broken into.\""},{"d":"Jueves","t":"Passive with -ing and to-infinitive","ex":"\"The monkey was seen climbing the fence.\" / \"Peter has been taught to sing.\""},{"d":"Viernes","t":"Need + -ing (passive meaning) vs need + to be + pp","ex":"\"The car needs servicing.\" = \"The car needs to be serviced.\""}]},{"num":"05","title":"Modales Perfectos","theme":"Deduction · Possibility · Criticism · Regret","days":[{"d":"Lunes","t":"Must have / Can't have + pp — deducción pasada","ex":"\"She must have left already.\" / \"He can't have said that — I was there.\""},{"d":"Martes","t":"May/Might have + pp — posibilidad pasada","ex":"\"He might have missed the train.\" / \"She may have been working when you called.\""},{"d":"Miércoles","t":"Should have / Ought to have + pp — crítica","ex":"\"You should have told me sooner!\" / \"She ought to have been more careful.\""},{"d":"Jueves","t":"Could have + pp — capacidad no utilizada","ex":"\"She could have won if she'd trained harder.\" / \"You could have at least tried.\""},{"d":"Viernes","t":"Would have + pp — condicional pasado","ex":"\"I would have helped if you'd asked.\" — 3rd conditional result clause."}]},{"num":"06","title":"Cláusulas de Participio","theme":"Present · Past · Perfect participle clauses","days":[{"d":"Lunes","t":"Presente participio: simultáneo a la acción principal","ex":"\"Standing by the window, she watched the rain.\" (misma persona, simultáneo)"},{"d":"Martes","t":"Participio pasado: pasiva o resultado anterior","ex":"\"Defeated at every turn, he finally gave up.\" / \"Written in haste, the report had errors.\""},{"d":"Miércoles","t":"Having + pp: acción anterior a la principal","ex":"\"Having read the report, she called a meeting.\" / \"Having finished early, he left.\""},{"d":"Jueves","t":"Participio en lugar de cláusulas de relativo","ex":"\"Residents affected by the flooding will receive compensation.\" (= who were affected)"},{"d":"Viernes","t":"Participio con although, while, when","ex":"\"Although working hard, she found time for family.\" / \"When asked, he refused.\""}]},{"num":"07","title":"Nominalization & Academic Writing","theme":"Turning verbs/adjectives into nouns · Impersonal structures","days":[{"d":"Lunes","t":"Nominalización básica: verbo → sustantivo","ex":"decline → the decline of · improve → an improvement in · fail → the failure of"},{"d":"Martes","t":"Nominalización de adjetivo → sustantivo abstracto","ex":"willing → willingness · accurate → accuracy · strong → strength · brief → brevity"},{"d":"Miércoles","t":"Estructuras impersonales con it-clause","ex":"\"It is often argued that...\" / \"It has been suggested that...\" / \"It remains to be seen...\""},{"d":"Jueves","t":"Distanciamiento académico: hedging","ex":"\"It would appear that...\" / \"Evidence tends to suggest...\" / \"This may indicate that...\""},{"d":"Viernes","t":"Reescribe en registro formal y académico","ex":"Transforma textos periodísticos en párrafos de ensayo académico."}]},{"num":"08","title":"Revisión & Examen Completo","theme":"Consolidación de las 7 semanas anteriores","days":[{"d":"Lunes","t":"Revisión: Inversión + Cleft sentences","ex":"15 oraciones de práctica con corrección."},{"d":"Martes","t":"Revisión: Conditionals + Participles","ex":"Transforma 10 oraciones simples usando las estructuras aprendidas."},{"d":"Miércoles","t":"Revisión: Modales perfectos + Pasivas","ex":"Error correction: encuentra y corrige los errores en cada oración."},{"d":"Jueves","t":"Simulacro de examen completo (1h)","ex":"25 preguntas tipo APTIS C1/C2 cubriendo todo el temario."},{"d":"Viernes","t":"Revisión de errores + plan de trabajo futuro","ex":"Identifica tus 3 áreas más débiles y diseña un plan de refuerzo."}]}],
  ACTIVATE_UNITS: [{"num":1,"topic":"Travel & Holidays","reading":"Transformative Travel (6 fases del viaje ético)","grammar":"Articles & Uncountables","vocab":"Overcrowded, breathtaking, wanderlust, rugged, unspoilt...","usage":"Chartered vs hijacked · Despite vs albeit · Packet vs parcel vs package","listening":"Amusing Travel Stories (Heathrow, gato en avión...)","highlight":"Leer el artículo 'Transformative Travel' antes de responder las preguntas de comprensión. Vocabulario de viajes muy útil para APTIS."},{"num":2,"topic":"Crime & Justice","reading":"Miscarriages of Justice","grammar":"Modal Verbs","vocab":"Sentencing, acquittal, appeal, verdict, bail...","usage":"False friends y confusiones léxicas de crimen","listening":"The World's Dumbest Criminals","highlight":"Modal verbs: deben vs should, can't have vs couldn't, etc. — error muy frecuente en C1."},{"num":3,"topic":"Health & Happiness","reading":"Awe-Walks / The Health & Happiness Connection","grammar":"Future Perfect & Future Continuous","vocab":"Wellbeing, mindfulness, sedentary, burnout...","usage":"CrossFit y vocabulario de fitness","listening":"Health myths vs science","highlight":"Future Perfect y Continuous son frecuentes en writing C1 formal — dominarlos da puntos."},{"num":4,"topic":"Technology","reading":"The World of Animal Technology","grammar":"Three-Part Phrasal Verbs","vocab":"AI, algorithm, autonomous, disruptive...","usage":"Driverless Cars · What will the Future Look Like?","listening":"Tech debates","highlight":"Three-part phrasal verbs (look up to, put up with) son esenciales para sonar nativo."},{"num":5,"topic":"Animals & Nature","reading":"Rewilding / Mankind Versus Nature","grammar":"Gerund & Infinitive","vocab":"Endangered, biodiversity, predator, ecosystem...","usage":"It's a Strange World","listening":"Nature debates","highlight":"Gerund vs Infinitive: uno de los errores más comunes en C1. Memorizar los verbos que cambian de significado."},{"num":6,"topic":"Government & Politics","reading":"Politics & The Refugee Crisis","grammar":"2nd, 3rd & Mixed Conditionals","vocab":"Legislation, asylum, sovereignty, coalition...","usage":"Public Spending · Weird Laws","listening":"Political debates","highlight":"Mixed conditionals son difíciles pero muy valorados en APTIS Advanced writing y speaking."},{"num":7,"topic":"Entertainment","reading":"The Popularity of Squid Game / The Success of Netflix","grammar":"If Only and I Wish","vocab":"Streaming, binge-watch, ratings, blockbuster...","usage":"Changing TV as We Know It","listening":"Entertainment industry","highlight":"If Only / I Wish: subjuntivo de tipo 3 — muy útil para el speaking de APTIS."},{"num":8,"topic":"Education & Learning","reading":"Standard English / Distance Learning","grammar":"Passives","vocab":"Curriculum, assessment, literacy, pedagogy...","usage":"Fun in The Classroom","listening":"Education debates","highlight":"Pasivas: obligatorias en writing formal de informes y artículos (APTIS writing task)."},{"num":9,"topic":"Volunteering","reading":"Altruism or Self-Advancement","grammar":"Reported Speech","vocab":"NGO, philanthropy, aid, grassroots...","usage":"International Volunteering · Getting the Most Out of it","listening":"Volunteering experiences","highlight":"Reported speech con backshift + advanced reporting verbs (urged, acknowledged, insisted)."},{"num":10,"topic":"Work & Career","reading":"Experience or Personality? / Remote Working","grammar":"Linking Words & Discourse Markers","vocab":"Redundancy, entrepreneur, freelance, glassceilings...","usage":"Can I Make a Living Doing That?","listening":"Work dilemmas","highlight":"Discourse markers son ESENCIALES para cohesión en writing y speaking C1."},{"num":11,"topic":"Relationships","reading":"The Dating Game / Middle Child Syndrome","grammar":"Gradable & Non-Gradable Adjectives","vocab":"Commitment, attachment, rivalry, estrangement...","usage":"Adoption in Antiquity","listening":"Relationship stories","highlight":"Non-gradable adjectives (furious, exhausted, freezing) elevan el registro significativamente."},{"num":12,"topic":"Leisure & Free Time","reading":"Running / It's a Potter's World","grammar":"Relative Clauses","vocab":"Pastime, hobbyist, adrenaline, amateur...","usage":"Outdoor Activities","listening":"Leisure trends","highlight":"Relative clauses (defining vs non-defining) — error frecuente con comas y que/which/who."},{"num":13,"topic":"Time & Memory","reading":"Moulding Memories / Reminiscence Therapy","grammar":"Adverbs & Adverbial Phrases","vocab":"Nostalgic, reminisce, chronological, episodic...","usage":"Measuring Time","listening":"Memory science","highlight":"Adverbs de posición y frecuencia cambian el matiz — errores sutiles que diferencian B2 de C1."},{"num":14,"topic":"Social Media","reading":"Youth & Social Media / FOMO Among Teens","grammar":"Verb Inversions","vocab":"Algorithm, viral, influencer, echo chamber...","usage":"How to Make a Video Go Viral","listening":"Social media debates","highlight":"Inversiones (Never have I..., Rarely does...) son muy valoradas en writing C1 avanzado."},{"num":15,"topic":"Cities & Transport","reading":"Smart Cities / The History of Public Transport","grammar":"Advanced Comparison & Similarity","vocab":"Urban sprawl, congestion, infrastructure, commute...","usage":"The Future of Transport","listening":"City life debates","highlight":"Comparaciones avanzadas (the more... the more, whereas, as opposed to) son clave para writing."},{"num":16,"topic":"History & Warfare","reading":"Spotlight on Victorian England / Quirky Historical Facts","grammar":"Participles","vocab":"Empire, colonialism, conflict, legacy...","usage":"Virtual Museums","listening":"Historical debates","highlight":"Participio presente/pasado en posición inicial — da complejidad sintáctica valorada en C1."},{"num":17,"topic":"Social Issues","reading":"The End of Homelessness","grammar":"Adjectives (advanced use)","vocab":"Inequality, marginalization, welfare, stigma...","usage":"Social Issues (vocabulary in context)","listening":"Social debates","highlight":"Vocabulario de problemas sociales es frecuente en el reading y writing de APTIS Advanced."},{"num":18,"topic":"House & Home","reading":"Cosy Room, Happy Life / Micro Homes","grammar":"Prepositional Phrases 1","vocab":"Architecture, interior design, sustainable, dwelling...","usage":"Master Designers","listening":"Home design trends","highlight":"Frases preposicionales fijas (in terms of, with regard to) son esenciales en writing formal."},{"num":19,"topic":"Personality","reading":"Can Intelligence be Taught? / Personality Theories","grammar":"Make & Do (advanced collocations)","vocab":"Introvert, resilience, neurotic, cognitive...","usage":"Personality Types","listening":"Psychology debates","highlight":"Make/Do collocations: error muy típico que hay que erradicar completamente en C1."},{"num":20,"topic":"The Environment","reading":"Superhero Fungi / Carbon Footprints","grammar":"Prepositional Phrases 2","vocab":"Sustainability, emissions, biodegradable, renewable...","usage":"Environmental Ideas","listening":"Climate debates","highlight":"Tema crucial para APTIS — vocabulario medioambiental muy frecuente en todos los skills."}],
  SPEAKING_TOPICS: [{"name":"Work & careers","q":["What makes a good workplace?","Has work-life balance got harder or easier?","Would you ever start your own business?","Is remote work here to stay?","What does an ideal job look like for you?","How has work changed compared to one or two generations ago?","Do you think people will still have offices in 20 years' time? Why?"],"chunks":["climb the career ladder","work-life balance","burnout","make ends meet","9-to-5 grind","gig economy","perks and benefits","take on extra responsibilities","get promoted","flexitime","work from home","make redundant","stand a chance of","further one's career","high-flier"],"model":"<em>Personally, I'd say work-life balance has got a lot trickier in recent years. With everyone working from home, the boundaries between office and personal life have got really blurred — there's a tendency for people to keep checking emails late at night, which can easily lead to burnout. That said, flexibility cuts both ways: I can fit in a run at lunchtime, which I couldn't dream of in a traditional 9-to-5 setup.</em>"},{"name":"Technology","q":["Has social media done more harm than good?","Could AI replace human jobs?","Are we too dependent on smartphones?","Is privacy possible online?","How much time do you spend on screens every day?","Has technology made life easier or more complicated overall?","What's a technological change that might really transform society soon?"],"chunks":["digital natives","screen time","tech-savvy","glued to a screen","face-to-face interaction","data privacy","cyberbullying","go viral","information overload","filter bubble","AI-powered","keep up with the times","at the click of a button","double-edged sword"],"model":"<em>I tend to think social media is a double-edged sword. On one hand, it's brought us closer to friends abroad and given a voice to people who'd otherwise be ignored. On the other hand, the constant scrolling and comparison has been linked to anxiety, especially among teenagers. I'd argue the technology itself isn't the issue — it's how we use it.</em>"},{"name":"Education","q":["Should university be free?","What's the role of teachers in the digital age?","Are exams the best way to assess learning?","Is bilingual education a good idea?","Tell me about your school days. What were they like?","How is education today different from when your parents went to school?","How do you think technology will change education in the future?"],"chunks":["lifelong learning","hands-on experience","cram for an exam","fail miserably / pass with flying colours","drop out of school","further education","tuition fees","mature student","student loan","critical thinking","rote learning","brain drain","play truant","narrow the gap","level the playing field"],"model":"<em>If you ask me, free university education is a great idea in theory but tricky in practice. It would level the playing field for students from less wealthy backgrounds — and that's something I firmly believe in. The problem is funding: somebody has to foot the bill. A middle ground could be tuition based on family income, with grants for those who need them most.</em>"},{"name":"Health & wellbeing","q":["Are we becoming a sedentary society?","Is mental health taken seriously enough?","What's the best way to stay healthy?","Should fast food be taxed more?"],"chunks":["a balanced diet","cut down on","get into shape","couch potato","piling on the pounds","be on a strict diet","mental health awareness","stress-related illness","recharge your batteries","take its toll on","kick the habit","binge-watch","preventative care","public health","wellness industry"],"model":"<em>Generally speaking, I'd say we're more aware of mental health than ever — and that's a real shift compared to twenty years ago. People talk openly about anxiety and burnout, which used to be taboo. Having said that, awareness alone isn't enough. There's a chronic shortage of professionals in most countries, so people
